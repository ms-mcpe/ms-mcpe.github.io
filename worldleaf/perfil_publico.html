<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Perfil - WorldLeaf</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-void: #060a0f;
      --bg-body: #0b1120;
      --bg-card: #111827;
      --bg-card2: #162032;
      --bg-topbar: rgba(6,10,15,0.92);
      --bg-sidebar: #0d1729;
      --primary: #22c55e;
      --primary-light: #4ade80;
      --primary-dark: #16a34a;
      --primary-bg: rgba(34,197,94,0.09);
      --primary-glow: rgba(34,197,94,0.25);
      --primary-gradient: linear-gradient(135deg,#4ade80,#22c55e);
      --amber: #f59e0b;
      --amber-light: #fbbf24;
      --amber-bg: rgba(245,158,11,0.10);
      --amber-glow: rgba(245,158,11,0.22);
      --blue: #3b82f6;
      --blue-light: #60a5fa;
      --blue-bg: rgba(59,130,246,0.10);
      --info: #06b6d4;
      --info-bg: rgba(6,182,212,0.10);
      --owner-gradient: linear-gradient(135deg,#fcd34d,#f59e0b);
      --admin-gradient: linear-gradient(135deg,#60a5fa,#3b82f6);
      --app-gradient: linear-gradient(135deg,#c084fc,#a855f7);
      --text: #f0f6ff;
      --text-secondary: #94a3b8;
      --text-muted: #4b5e78;
      --text-light: #2d3f57;
      --border: #1e2f48;
      --border-light: #131f30;
      --surface: #162032;
      --surface-2: #1e2f48;
      --shadow: 0 4px 16px rgba(0,0,0,0.5);
      --shadow-md: 0 8px 28px rgba(0,0,0,0.6);
      --shadow-lg: 0 20px 48px rgba(0,0,0,0.7);
      --shadow-glow: 0 0 24px var(--primary-glow);
      --success: #22c55e; --success-bg: rgba(34,197,94,0.10);
      --danger: #ef4444; --danger-bg: rgba(239,68,68,0.10);
      --warning: #f59e0b; --warning-bg: rgba(245,158,11,0.10);
      --radius: 14px;
      --radius-sm: 9px;
      --overlay: rgba(0,0,0,0.72);
      --input-bg: #1e293b;
      --input-text: #f8fafc;
      --input-border: #334155;
      --viewer-bg: #090d16;
      --viewer-body: #0f172a;
      --viewer-text: #f8fafc;
      --viewer-text-muted: #64748b;
      --viewer-text-light: #cbd5e1;
      --viewer-comment-bg: #1e293b;
      --viewer-comment-text: #cbd5e1;
      --viewer-border: #334155;
      --viewer-btn-bg: rgba(255,255,255,0.1);
      --viewer-btn-hover: rgba(255,255,255,0.2);
      --viewer-primary: #22c55e;
    }
    [data-theme="dark"] {
      --bg-body: #0b1120;
      --bg-card: #1e293b;
      --bg-topbar: rgba(6,10,15,0.92);
      --bg-bottombar: rgba(6,10,15,0.92);
      --bg-sidebar: #0d1729;
      --primary: #22c55e;
      --primary-light: #4ade80;
      --primary-bg: rgba(34,197,94,0.09);
      --primary-dark: #16a34a;
      --primary-gradient: linear-gradient(135deg,#4ade80,#22c55e);
      --primary-glow: rgba(34,197,94,0.25);
      --text: #f0f6ff;
      --text-secondary: #94a3b8;
      --text-muted: #4b5e78;
      --text-light: #2d3f57;
      --border: #1e2f48;
      --border-light: #131f30;
      --shadow: 0 4px 16px rgba(0,0,0,0.5);
      --shadow-md: 0 8px 28px rgba(0,0,0,0.6);
    }
    [data-scheme="blue"] { --primary: #3b82f6; --primary-light: #60a5fa; --primary-bg: rgba(59,130,246,0.1); --primary-dark: #2563eb; --primary-gradient: linear-gradient(135deg,#60a5fa,#3b82f6); --viewer-primary: #60a5fa; }
    [data-scheme="purple"] { --primary: #8b5cf6; --primary-light: #a78bfa; --primary-bg: rgba(139,92,246,0.1); --primary-dark: #7c3aed; --primary-gradient: linear-gradient(135deg,#a78bfa,#8b5cf6); --viewer-primary: #a78bfa; }
    [data-scheme="orange"] { --primary: #f97316; --primary-light: #fb923c; --primary-bg: rgba(249,115,22,0.1); --primary-dark: #ea580c; --primary-gradient: linear-gradient(135deg,#fb923c,#f97316); --viewer-primary: #fb923c; }

    *,::before,::after{box-sizing:border-box;margin:0;padding:0;}
    ::-webkit-scrollbar{width:6px;height:6px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
    ::-webkit-scrollbar-thumb:hover{background:var(--surface-2);}

    body{
      font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
      background:var(--bg-body);min-height:100vh;color:var(--text);
      transition:background-color 0.3s ease,color 0.3s ease;
      overflow-x:hidden;width:100%;max-width:100%;
    }
    body::before{
      content:'';position:fixed;inset:0;z-index:-2;pointer-events:none;
      background-image:linear-gradient(var(--border-light) 1px, transparent 1px),linear-gradient(90deg, var(--border-light) 1px, transparent 1px);
      background-size:28px 28px;opacity:0.35;
    }
    body::after{
      content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
      background:radial-gradient(ellipse 80% 60% at 50% -10%, rgba(34,197,94,0.07) 0%, transparent 70%);
    }

    .loading{text-align:center;padding:80px 20px;color:var(--text-secondary);font-size:16px;animation:fadeIn 0.3s ease;}
    .loading .spinner{width:36px;height:36px;border:4px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

    .error-box{text-align:center;padding:80px 24px;color:var(--text-secondary);font-size:15px;animation:fadeIn 0.3s ease;}
    .error-box .err-icon{font-size:56px;margin-bottom:16px;opacity:0.5;}
    .error-box h2{font-size:20px;font-weight:700;color:var(--text);margin-bottom:8px;}
    .error-box p{color:var(--text-muted);margin-bottom:16px;line-height:1.6;}
    .error-box a{display:inline-block;padding:10px 28px;border:none;border-radius:10px;background:var(--primary);color:#fff;font-weight:700;text-decoration:none;transition:all 0.2s;}
    .error-box a:hover{background:var(--primary-dark);box-shadow:0 4px 12px var(--primary-glow);transform:scale(1.03);}

    .header{
      position:relative;width:100%;height:180px;overflow:hidden;
      background:var(--primary-gradient);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);
    }
    .header img{width:100%;height:100%;object-fit:cover;display:block;}
    .header .overlay{position:absolute;bottom:0;left:0;right:0;height:60%;background:linear-gradient(transparent,var(--bg-body));}

    .profile-section{position:relative;padding:0 20px;margin-top:-52px;animation:fadeIn 0.4s ease;}
    .avatar-outer{
      width:110px;height:110px;border-radius:50%;background:var(--primary-gradient);
      padding:3px;box-shadow:0 0 24px var(--primary-glow);flex-shrink:0;
    }
    .avatar-inner{
      width:100%;height:100%;border-radius:50%;overflow:hidden;
      background:var(--bg-body);display:flex;align-items:center;justify-content:center;
    }
    .avatar-inner img{width:100%;height:100%;object-fit:cover;display:block;}
    .avatar-letter{font-size:44px;font-weight:700;color:var(--primary);line-height:1;}

    .profile-name{font-size:24px;font-weight:700;color:var(--text);margin-top:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .profile-meta{font-size:13px;color:var(--text-secondary);margin-top:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .profile-meta .sep{color:var(--text-light);}

    .badge-rol{
      font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;
      text-transform:uppercase;letter-spacing:0.6px;padding:4px 14px;
      border-radius:20px;display:inline-flex;align-items:center;
    }
    .badge-owner{background:linear-gradient(135deg,#fcd34d,#f59e0b);color:#fff;box-shadow:0 2px 8px rgba(245,158,11,0.35);}
    .badge-admin{background:linear-gradient(135deg,#60a5fa,#3b82f6);color:#fff;box-shadow:0 2px 8px rgba(59,130,246,0.30);}
    .badge-app{background:linear-gradient(135deg,#c084fc,#a855f7);color:#fff;box-shadow:0 2px 8px rgba(168,85,247,0.30);}
    .badge-user{background:var(--primary-bg);color:var(--primary);}

    .badge-status{font-size:11px;font-weight:700;padding:3px 12px;border-radius:20px;text-transform:uppercase;letter-spacing:0.5px;display:inline-flex;align-items:center;}
    .badge-active{background:var(--success-bg);color:var(--success);}
    .badge-inactive{background:var(--danger-bg);color:var(--danger);}

    .coins-display{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:700;color:var(--amber);}
    .coins-display .coin-icon{font-size:16px;}

    .stats-row{
      display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
      gap:12px;margin:18px 0 0;
    }
    .stat-card{
      background:var(--bg-card);border-radius:var(--radius);padding:16px;
      text-align:center;box-shadow:var(--shadow);position:relative;overflow:hidden;
      border:1px solid var(--border-light);
    }
    .stat-card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:2px;
      background:var(--primary-gradient);
    }
    .stat-number{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;color:var(--primary);line-height:1.2;}
    .stat-label{font-size:12px;color:var(--text-secondary);font-weight:600;margin-top:4px;text-transform:uppercase;letter-spacing:0.4px;}

    .section-card{
      background:var(--bg-card);border-radius:var(--radius);margin:20px auto 0;
      padding:20px;box-shadow:var(--shadow);position:relative;overflow:hidden;
      max-width:680px;
    }
    .section-card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:3px;
      background:var(--primary-gradient);
    }
    .section-title{
      font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--text);
      margin-bottom:14px;display:flex;align-items:center;gap:8px;
    }
    .desc-text{font-size:14px;color:var(--text);line-height:1.6;white-space:pre-wrap;word-break:break-word;}
    .desc-empty{font-size:14px;color:var(--text-light);font-style:italic;}

    .foro-card{
      background:var(--bg-card2);border-radius:var(--radius-sm);overflow:hidden;
      margin-bottom:14px;cursor:pointer;position:relative;
      transition:transform 0.2s ease,box-shadow 0.2s ease,border-color 0.2s ease;
      border:1px solid var(--border);box-shadow:var(--shadow);
    }
    .foro-card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:2px;
      background:var(--primary-gradient);
    }
    .foro-card:hover{
      transform:translateY(-3px);box-shadow:var(--shadow-md);
      border-color:var(--primary-light);
    }
    .foro-card-header{padding:14px 16px 0;display:flex;justify-content:space-between;align-items:center;}
    .foro-card-user{font-size:13px;font-weight:700;color:var(--primary);}
    .foro-card-date{font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:4px;}
    .tipo-badge{display:inline-block;padding:1px 7px;border-radius:5px;font-size:9px;font-weight:700;background:var(--primary-bg);color:var(--primary);text-transform:uppercase;letter-spacing:0.4px;}
    .foro-card-snippet{padding:10px 16px 0;font-size:14px;color:var(--text);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word;line-height:1.5;}
    .foro-card-imgs{margin-top:10px;display:grid;gap:2px;overflow:hidden;background:var(--border-light);}
    .foro-card-imgs img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.25s;}
    .foro-card-imgs img:hover{transform:scale(1.02);}
    .foro-card-imgs.single img{max-height:260px;width:100%;}
    .foro-card-imgs.double{grid-template-columns:1fr 1fr;}
    .foro-card-imgs.double img{height:200px;}
    .foro-card-imgs.triple{grid-template-columns:2fr 1fr;grid-template-rows:100px 100px;}
    .foro-card-imgs.triple img:first-child{grid-row:1/3;height:202px;}
    .foro-card-imgs.triple img:not(:first-child){height:100px;}
    .foro-card-imgs.quad{grid-template-columns:1fr 1fr;grid-template-rows:100px 100px;}
    .foro-card-imgs.quad img{height:100px;}
    .foro-card-imgs.quint{grid-template-columns:1.5fr 1fr 1fr;grid-template-rows:100px 100px;}
    .foro-card-imgs.quint img:first-child{grid-column:1/3;grid-row:1/3;height:202px;}
    .foro-card-imgs.quint img:not(:first-child){height:100px;}
    .foro-card-stats{padding:10px 16px 14px;display:flex;gap:18px;font-size:13px;color:var(--text-secondary);font-weight:600;}
    .sin-foros{text-align:center;color:var(--text-light);font-size:14px;padding:30px 0;}

    .viewer{
      display:none;position:fixed;top:0;left:0;right:0;bottom:0;
      background:var(--viewer-bg);z-index:300;
      flex-direction:column;overflow-y:auto;
    }
    .viewer.open{display:flex;}
    .viewer-close{
      position:fixed;top:16px;right:20px;z-index:310;
      background:var(--viewer-btn-bg);color:#fff;border:none;
      font-size:28px;width:44px;height:44px;border-radius:50%;cursor:pointer;
      display:flex;align-items:center;justify-content:center;transition:all 0.2s;
    }
    .viewer-close:hover{background:var(--viewer-btn-hover);transform:scale(1.05);}
    .viewer-topbar{padding:20px 24px 0;display:flex;justify-content:space-between;align-items:center;}
    .viewer-user{color:var(--viewer-primary);font-size:15px;font-weight:700;cursor:pointer;}
    .viewer-user:hover{text-decoration:underline;}
    .viewer-date{color:var(--viewer-text-muted);font-size:13px;}
    .viewer-carousel{position:relative;display:flex;align-items:center;justify-content:center;padding:24px;max-height:55vh;}
    .carousel-track{display:flex;overflow-x:auto;gap:16px;padding:0 40px;scroll-behavior:smooth;max-width:100%;}
    .carousel-track img{max-height:50vh;border-radius:12px;object-fit:contain;cursor:pointer;flex-shrink:0;box-shadow:0 8px 24px rgba(0,0,0,0.4);}
    .carousel-btn{
      position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;
      background:var(--viewer-btn-bg);color:#fff;border:none;font-size:20px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;z-index:2;transition:all 0.2s;
    }
    .carousel-btn:hover{background:var(--viewer-btn-hover);transform:scale(1.05) translateY(-50%);}
    .carousel-prev{left:12px;}
    .carousel-next{right:12px;}
    .viewer-dots{display:flex;justify-content:center;gap:8px;padding:0 24px 16px;flex-wrap:wrap;}
    .viewer-dot{width:10px;height:10px;border-radius:50%;background:var(--viewer-border);border:none;cursor:pointer;padding:0;transition:all 0.2s;}
    .viewer-dot.active{background:var(--viewer-primary);transform:scale(1.2);}
    .viewer-body{background:var(--viewer-body);border-radius:24px 24px 0 0;padding:24px;flex:1;border-top:1px solid var(--viewer-border);}
    .viewer-desc{color:var(--viewer-text);font-size:15px;line-height:1.6;white-space:pre-wrap;word-break:break-word;max-height:220px;overflow-y:auto;margin-bottom:16px;padding-right:8px;}
    .viewer-actions{display:flex;gap:16px;margin-bottom:20px;}
    .viewer-actions .vbtn{
      background:none;border:1px solid var(--viewer-border);color:var(--viewer-text-light);
      padding:8px 20px;border-radius:24px;cursor:pointer;font-size:14px;font-weight:600;
      display:flex;align-items:center;gap:8px;transition:all 0.2s;
    }
    .viewer-actions .vbtn:hover{border-color:var(--viewer-primary);color:var(--viewer-primary);background:var(--viewer-btn-bg);}
    .viewer-actions .vbtn.liked{border-color:var(--viewer-primary);color:var(--viewer-primary);background:color-mix(in srgb, var(--viewer-primary) 15%, transparent);}
    .viewer-comments h4{color:var(--viewer-text-light);font-size:16px;font-weight:700;margin-bottom:12px;}
    .viewer-comments #viewerCommentsList{margin-bottom:16px;}
    .ver-mas-coms{
      display:block;width:100%;text-align:center;padding:10px;font-size:14px;font-weight:600;
      border:1px solid var(--viewer-border);border-radius:10px;background:none;color:var(--viewer-text-light);
      cursor:pointer;margin-top:6px;transition:all 0.2s;
    }
    .ver-mas-coms:hover{border-color:var(--viewer-primary);color:var(--viewer-primary);background:var(--viewer-btn-bg);}
    .viewer-comment{
      background:var(--viewer-comment-bg);border-radius:12px;padding:12px 16px;margin-bottom:10px;
      border:1px solid var(--viewer-border);position:relative;
    }
    .viewer-comment-user{font-size:13px;font-weight:700;color:var(--viewer-primary);margin-bottom:4px;cursor:pointer;}
    .viewer-comment-user:hover{text-decoration:underline;}
    .viewer-comment-text{font-size:14px;color:var(--viewer-comment-text);line-height:1.5;word-break:break-word;}
    .viewer-comment-date{font-size:11px;color:var(--viewer-text-muted);margin-top:6px;}
    .comment-form textarea{
      width:100%;padding:12px;border:1px solid var(--input-border);border-radius:10px;background:var(--input-bg);
      color:var(--input-text);font-size:14px;resize:vertical;min-height:48px;font-family:inherit;
      outline:none;margin-bottom:10px;transition:border-color 0.2s;
    }
    .comment-form textarea:focus{border-color:var(--primary);}
    .comment-form .btn-action{
      width:100%;padding:12px;border:none;border-radius:10px;font-size:16px;font-weight:700;
      font-family:'Rajdhani',sans-serif;cursor:pointer;background:var(--primary);color:#fff;transition:all 0.2s;
    }
    .comment-form .btn-action:hover{background:var(--primary-dark);box-shadow:0 4px 12px var(--primary-glow);}

    .coment-menu-btn{
      position:absolute;top:4px;right:4px;z-index:2;width:22px;height:22px;
      display:flex;align-items:center;justify-content:center;
      background:rgba(0,0,0,0.25);border-radius:50%;cursor:pointer;
      color:#fff;font-size:14px;line-height:1;transition:all 0.15s;border:none;
    }
    .coment-menu-btn:hover{background:rgba(255,255,255,0.25);}
    .coment-menu-dropdown{
      position:absolute;top:28px;right:4px;z-index:10;
      background:var(--bg-card2);border:1px solid var(--border);border-radius:8px;
      box-shadow:var(--shadow-md);min-width:100px;overflow:hidden;
      display:none;flex-direction:column;
    }
    .coment-menu-dropdown.open{display:flex;}
    .coment-menu-dropdown button{
      padding:6px 12px;border:none;background:none;color:var(--text);
      font-size:12px;font-weight:600;cursor:pointer;text-align:left;transition:all 0.1s;font-family:inherit;
    }
    .coment-menu-dropdown button:hover{background:var(--primary-bg);color:var(--primary);}
    .coment-menu-dropdown button:last-child{color:var(--danger);}
    .coment-menu-dropdown button:last-child:hover{background:var(--danger-bg);color:var(--danger);}

    .content-wrap{max-width:680px;margin:0 auto;padding:0 20px 40px;}

    .blocked-overlay{
      position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;
      background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:40px 24px;text-align:center;
    }
    .blocked-overlay .block-icon{font-size:72px;margin-bottom:16px;animation:pulseBlock 2s infinite;}
    @keyframes pulseBlock{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.1);opacity:0.8;}}
    .blocked-overlay h2{font-size:24px;font-weight:800;color:#ef4444;margin-bottom:8px;}
    .blocked-overlay p{font-size:15px;color:#cbd5e1;max-width:480px;line-height:1.6;margin-bottom:16px;}
    .blocked-overlay .razones{text-align:left;color:#94a3b8;font-size:14px;line-height:1.8;margin-bottom:24px;}
    .blocked-overlay .razones li{margin-bottom:4px;}
    .blocked-overlay .btn-soporte{
      display:inline-block;padding:14px 40px;border-radius:12px;
      background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;
      font-size:16px;font-weight:700;text-decoration:none;
      transition:all 0.2s;box-shadow:0 4px 16px rgba(59,130,246,0.3);
    }
    .blocked-overlay .btn-soporte:hover{transform:scale(1.05);box-shadow:0 8px 24px rgba(59,130,246,0.5);}

    @media(max-width:480px){
      .header{height:160px;}
      .avatar-outer{width:90px;height:90px;}
      .avatar-letter{font-size:36px;}
      .profile-name{font-size:20px;}
      .stats-row{grid-template-columns:repeat(2,1fr);}
    }
    @media(min-width:768px){
      .header{height:220px;}
      .profile-section{padding:0 32px;}
    }
  </style>
</head>
<body>

  <div id="loadingView" class="loading">
    <div class="spinner"></div>
    <span id="loadingText">Cargando perfil...</span>
  </div>

  <div id="errorView" class="error-box" style="display:none;">
    <div class="err-icon">&#128533;</div>
    <h2 id="errorTitle">Error</h2>
    <p id="errorDesc">No se pudo cargar el perfil.</p>
    <a href="index.html">Volver al inicio</a>
  </div>

  <div id="profileContent" style="display:none;">
    <div class="header" id="coverHeader">
      <img id="coverImg" src="" alt="Portada" style="display:none;">
      <div class="overlay"></div>
    </div>

    <div class="profile-section">
      <div class="avatar-outer">
        <div class="avatar-inner">
          <span class="avatar-letter" id="avatarLetter">U</span>
          <img id="avatarImg" src="" alt="Avatar" style="display:none;">
        </div>
      </div>

      <div class="profile-name">
        <span id="userName"></span>
        <span class="badge-rol" id="userRol"></span>
      </div>

      <div class="profile-meta" id="profileMeta">
        <span id="joinDate"></span>
        <span class="sep" id="sep1" style="display:none;">&bull;</span>
        <span class="badge-status" id="statusBadge" style="display:none;"></span>
      </div>

      <div id="coinsDisplay" class="coins-display" style="display:none;">
        <span class="coin-icon">&#128176;</span>
        <span id="coinsAmount">0</span>
      </div>

      <div class="stats-row" id="statsRow">
        <div class="stat-card">
          <div class="stat-number" id="statPosts">0</div>
          <div class="stat-label">Publicaciones</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="statLikes">0</div>
          <div class="stat-label">Likes recibidos</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="statComments">0</div>
          <div class="stat-label">Comentarios</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="statJoined" style="font-size:14px;">--</div>
          <div class="stat-label">Miembro desde</div>
        </div>
      </div>
    </div>

    <div class="section-card">
      <div class="section-title">&#128221; Descripci&oacute;n</div>
      <div class="desc-text" id="descText"></div>
    </div>

    <div class="section-card">
      <div class="section-title" id="forosSectionTitle">&#128172; Contenido</div>
      <div id="forosList"></div>
    </div>
  </div>

  <div class="viewer" id="viewerModal">
    <button class="viewer-close" onclick="cerrarViewer()">&times;</button>
    <div class="viewer-topbar">
      <span id="viewerUser" class="viewer-user"></span>
      <span id="viewerDate" class="viewer-date"></span>
    </div>
    <div class="viewer-carousel" id="viewerCarousel">
      <button class="carousel-btn carousel-prev" onclick="carouselPrev()">&#10094;</button>
      <div class="carousel-track" id="carouselTrack"></div>
      <button class="carousel-btn carousel-next" onclick="carouselNext()">&#10095;</button>
    </div>
    <div class="viewer-dots" id="viewerDots"></div>
    <div class="viewer-body">
      <div class="viewer-desc" id="viewerDesc"></div>
      <div class="viewer-actions">
        <button class="vbtn like" id="viewerLikeBtn" onclick="darLike()">&#128077; <span id="viewerLikes">0</span></button>
        <button class="vbtn dislike" id="viewerDislikeBtn" onclick="darDislike()">&#128078; <span id="viewerDislikes">0</span></button>
      </div>
      <div class="viewer-comments">
        <h4>Comentarios</h4>
        <div class="comment-form">
          <textarea id="commentInput" placeholder="Escribe un comentario..." rows="2"></textarea>
          <button class="btn-action" onclick="enviarComentario()">Enviar</button>
        </div>
        <div id="viewerCommentsList"></div>
      </div>
    </div>
  </div>

  <script>
    (function(){
      var t = localStorage.getItem('tema');
      if (t === 'oscuro') document.documentElement.setAttribute('data-theme', 'dark');
      var e = localStorage.getItem('esquema');
      if (e && e !== 'default') document.documentElement.setAttribute('data-scheme', e);
      var cp = localStorage.getItem('colorPrimario');
      if (cp) { document.documentElement.style.setProperty('--primary', cp); document.documentElement.style.setProperty('--primary-light', cp); document.documentElement.style.setProperty('--viewer-primary', cp); }
      var cf = localStorage.getItem('colorFondo');
      if (cf) document.documentElement.style.setProperty('--bg-body', cf);
    })();

    var API_URL = 'https://script.google.com/macros/s/AKfycbyIrIlhsgjpNcpOcT-aWnpjSSc-HdiDQTu3HqI1I5ZfOWqL_lBoyYj05034THSy1gKEyQ/exec';
    var sessionUser = localStorage.getItem('sessionUser');
    var sessionPass = localStorage.getItem('sessionPass');
    if (!sessionUser || !sessionPass) window.location.href = 'login.html';

    var usernameViewing = null;
    (function(){
      var m = window.location.search.match(/[?&]user=([^&]+)/);
      if (m && m[1]) {
        var raw = m[1];
        var decoded = decodeURIComponent(raw);
        usernameViewing = decoded;
        var withSpaces = decoded.replace(/-/g, ' ');
        if (usernameViewing !== withSpaces) usernameViewing = withSpaces;
      }
    })();

    if (!usernameViewing) {
      document.getElementById('loadingView').style.display = 'none';
      document.getElementById('errorView').style.display = 'block';
      document.getElementById('errorTitle').textContent = 'Usuario no especificado';
      document.getElementById('errorDesc').textContent = 'No se proporcion&oacute; un nombre de usuario en la URL.';
    }

    var forosCache = [];
    var viewerForo = null;
    var viewerComs = [];
    var carouselIdx = 0;
    var comentariosMax = 6;

    function jsonp(data) {
      return new Promise(function(resolve, reject) {
        var cb = 'jpcb_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
        var params = [];
        for (var key in data) {
          if (data.hasOwnProperty(key)) params.push(encodeURIComponent(key) + '=' + encodeURIComponent(data[key]));
        }
        params.push('callback=' + cb);
        var url = API_URL + '?' + params.join('&');
        window[cb] = function(resp) { delete window[cb]; if (script.parentNode) script.parentNode.removeChild(script); resolve(resp); };
        var script = document.createElement('script');
        script.src = url;
        script.onerror = function() { delete window[cb]; if (script.parentNode) script.parentNode.removeChild(script); reject(new Error('Error de conexi&oacute;n')); };
        document.body.appendChild(script);
        setTimeout(function() { if (window[cb]) { delete window[cb]; if (script.parentNode) script.parentNode.removeChild(script); reject(new Error('Tiempo de espera agotado')); } }, 60000);
      });
    }

    function escHtml(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function tiempoRelativo(fs) {
      if (!fs) return '';
      var d = new Date(fs);
      if (isNaN(d.getTime())) return fs;
      var seg = Math.floor((Date.now() - d.getTime()) / 1000);
      if (seg < 60) return 'hace ' + seg + ' segundos';
      var min = Math.floor(seg / 60);
      if (min < 60) return 'hace ' + min + (min === 1 ? ' minuto' : ' minutos');
      var hor = Math.floor(min / 60);
      if (hor < 24) return 'hace ' + hor + (hor === 1 ? ' hora' : ' horas');
      var dia = Math.floor(hor / 24);
      if (dia < 30) return 'hace ' + dia + (dia === 1 ? ' d&iacute;a' : ' d&iacute;as');
      var mes = Math.floor(dia / 30);
      if (mes < 12) return 'hace ' + mes + (mes === 1 ? ' mes' : ' meses');
      var anio = Math.floor(mes / 12);
      return 'hace ' + anio + (anio === 1 ? ' a&ntilde;o' : ' a&ntilde;os');
    }

    function formatearFechaCorta(fs) {
      if (!fs) return '--';
      var d = new Date(fs);
      if (isNaN(d.getTime())) return fs;
      var meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
      return meses[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
    }

    function mostrarCuentaInactiva() {
      var overlay = document.createElement('div');
      overlay.className = 'blocked-overlay';
      overlay.innerHTML = '<div class="block-icon">&#128683;</div>'
        + '<h2>Cuenta Desactivada</h2>'
        + '<p>Tu cuenta ha sido desactivada. Esto pudo deberse a las siguientes razones:</p>'
        + '<ul class="razones">'
        + '<li>1. Romper las reglas o pol&iacute;ticas de la plataforma.</li>'
        + '<li>2. No respetar a los usuarios de la plataforma.</li>'
        + '<li>3. Hacer spam de contenido.</li>'
        + '<li>4. Usar palabras obscenas.</li>'
        + '<li>5. Funar o difamar informaci&oacute;n falsa de otros usuarios.</li>'
        + '</ul>'
        + '<p style="font-weight:600;color:#f8fafc;">Para reactivar tu cuenta, comun&iacute;cate con soporte y cu&eacute;ntanos tu situaci&oacute;n.</p>'
        + '<a class="btn-soporte" href="https://soporte.com" target="_blank">Contactar Soporte</a>';
      document.body.appendChild(overlay);
    }

    function verificarCuenta() {
      jsonp({ action:'checkAccount', user:sessionUser }).then(function(r) {
        try { var d = typeof r === 'string' ? JSON.parse(r) : r; if (!d.exists || d.exists === false) { localStorage.removeItem('sessionUser'); localStorage.removeItem('sessionPass'); localStorage.removeItem('userProfile'); window.location.href = 'login.html'; } else if (d.status === 'Inactivo') { mostrarCuentaInactiva(); } } catch(e) {}
      }).catch(function(){});
    }

    function cargarPerfil() {
      document.getElementById('loadingText').textContent = 'Cargando perfil de ' + escHtml(usernameViewing) + '...';
      var cacheKey = 'userProfile_' + usernameViewing;
      var cached = localStorage.getItem(cacheKey);
      jsonp({ action:'getUserProfile', username:usernameViewing }).then(function(resp) {
        try {
          var data = typeof resp === 'string' ? JSON.parse(resp) : resp;
          if (data.status === 'PROFILE_OK' && data.profile) {
            var nuevoStr = JSON.stringify(data.profile);
            localStorage.setItem(cacheKey, nuevoStr);
            mostrarPerfil(data.profile);
          } else {
            mostrarError('Usuario no encontrado', 'El usuario "' + escHtml(usernameViewing) + '" no existe o no est&aacute; disponible.');
          }
        } catch(e) {
          if (!cached) mostrarError('Error de datos', 'Error al procesar la respuesta del servidor.');
        }
      }).catch(function(err) {
        if (cached) {
          try { mostrarPerfil(JSON.parse(cached)); return; } catch(e) {}
        }
        mostrarError('Error de conexi&oacute;n', 'No se pudo conectar con el servidor. Verifica tu conexi&oacute;n a internet.');
      });
    }

    function mostrarError(titulo, desc) {
      document.getElementById('loadingView').style.display = 'none';
      document.getElementById('errorView').style.display = 'block';
      document.getElementById('errorTitle').textContent = titulo;
      document.getElementById('errorDesc').innerHTML = desc;
    }

    function mostrarPerfil(p) {
      document.getElementById('loadingView').style.display = 'none';
      document.getElementById('profileContent').style.display = 'block';
      document.getElementById('errorView').style.display = 'none';

      document.getElementById('userName').textContent = p.user || usernameViewing;

      var rol = p.rol || 'User';
      var rolEl = document.getElementById('userRol');
      rolEl.textContent = rol;
      rolEl.className = 'badge-rol ' + (rol === 'Owner' ? 'badge-owner' : rol === 'Admin' ? 'badge-admin' : rol === 'App' ? 'badge-app' : 'badge-user');

      var ver = p.verificacion || '';
      if (ver && ver !== 'No Verificado') {
        var verEl = document.createElement('span');
        verEl.style.cssText = 'font-size:11px;color:var(--info);font-weight:600;';
        verEl.textContent = ver;
        document.getElementById('profileMeta').appendChild(verEl);
      }

      if (p.fecha || p.joinDate) {
        var join = p.fecha || p.joinDate;
        document.getElementById('joinDate').textContent = 'Miembro desde ' + formatearFechaCorta(join);
      }

      if (p.status) {
        var st = document.getElementById('statusBadge');
        st.textContent = p.status;
        st.className = 'badge-status ' + (p.status === 'Activo' || p.status === 'Active' ? 'badge-active' : 'badge-inactive');
        st.style.display = 'inline-flex';
        document.getElementById('sep1').style.display = 'inline';
      }

      if (p.coins !== undefined && p.coins !== null) {
        var mostrarCoins = true;
        if (p.coinsPublic !== undefined) mostrarCoins = !!p.coinsPublic;
        if (mostrarCoins) {
          document.getElementById('coinsAmount').textContent = p.coins;
          document.getElementById('coinsDisplay').style.display = 'flex';
        }
      }

      if (p.descripcion) {
        document.getElementById('descText').textContent = p.descripcion;
        document.getElementById('descText').className = 'desc-text';
      } else {
        document.getElementById('descText').textContent = 'Este usuario no ha escrito una descripci&oacute;n.';
        document.getElementById('descText').className = 'desc-empty';
      }

      if (p.fotoPortada) {
        document.getElementById('coverImg').src = p.fotoPortada;
        document.getElementById('coverImg').style.display = 'block';
      } else {
        document.getElementById('coverImg').style.display = 'none';
      }

      if (p.fotoPerfil) {
        document.getElementById('avatarImg').src = p.fotoPerfil;
        document.getElementById('avatarImg').style.display = 'block';
        document.getElementById('avatarLetter').style.display = 'none';
      } else {
        document.getElementById('avatarLetter').textContent = (p.user || usernameViewing).charAt(0).toUpperCase();
        document.getElementById('avatarImg').style.display = 'none';
        document.getElementById('avatarLetter').style.display = 'flex';
      }
    }

    function cargarForos() {
      var cachedForos = localStorage.getItem('forosCache');
      if (cachedForos) {
        try { forosCache = JSON.parse(cachedForos); } catch(e) {}
        renderForos();
      }
      jsonp({ action:'getForos' }).then(function(resp) {
        try {
          var data = typeof resp === 'string' ? JSON.parse(resp) : resp;
          if (data.status === 'FOROS_OK') {
            var nuevo = data.foros || [];
            var nuevoStr = JSON.stringify(nuevo);
            if (nuevoStr !== cachedForos) {
              forosCache = nuevo;
              localStorage.setItem('forosCache', nuevoStr);
              renderForos();
            }
          }
        } catch(e) {}
        if (!cachedForos) renderForos();
      }).catch(function() { if (!cachedForos) renderForos(); });
    }

    function renderForos() {
      var el = document.getElementById('forosList');
      var userForos = forosCache.filter(function(f) { return f.user === usernameViewing && f.tipo !== 'addon'; });
      if (!userForos.length) {
        el.innerHTML = '<div class="sin-foros">Este usuario no tiene publicaciones a&uacute;n.</div>';
        actualizarStats([]);
        return;
      }
      userForos.sort(function(a,b) { return (b.fecha||'').localeCompare(a.fecha||''); });
      var html = userForos.map(function(f) {
        var snip = (f.descripcion || '').slice(0, 280);
        var imgs = f.imagenes ? f.imagenes.split('|').filter(Boolean) : [];
        var ic = imgs.length;
        var imgClass = ic === 1 ? 'single' : ic === 2 ? 'double' : ic === 3 ? 'triple' : ic === 4 ? 'quad' : 'quint';
        return '<div class="foro-card" onclick="abrirViewer(\'' + f.id + '\')">'
          + '<div class="foro-card-header">'
          + '<span class="foro-card-user">' + escHtml(f.user || '') + '</span>'
          + '<span class="foro-card-date">' + (f.tipo && f.tipo !== 'foro' ? '<span class="tipo-badge">' + escHtml(f.tipo) + '</span> ' : '') + tiempoRelativo(f.fecha) + '</span>'
          + '</div>'
          + (imgs.length ? '<div class="foro-card-imgs ' + imgClass + '">' + imgs.map(function(u) { return '<img src="' + u + '" loading="lazy">'; }).join('') + '</div>' : '')
          + '<div class="foro-card-snippet">' + escHtml(snip) + '</div>'
          + '<div class="foro-card-stats"><span>&#128077; ' + (f.likes || 0) + '</span><span>&#128078; ' + (f.dislikes || 0) + '</span></div>'
          + '</div>';
      }).join('');
      el.innerHTML = html;
      actualizarStats(userForos);
    }

    function actualizarStats(userForos) {
      document.getElementById('statPosts').textContent = userForos.length;
      var totalLikes = 0;
      userForos.forEach(function(f) { totalLikes += (f.likes || 0); });
      document.getElementById('statLikes').textContent = totalLikes;
      var totalComs = 0;
      userForos.forEach(function(f) { totalComs += (f.comentarios || 0); });
      document.getElementById('statComments').textContent = totalComs || '--';
    }

    function abrirViewer(foroId) {
      var cached = null;
      for (var i = 0; i < forosCache.length; i++) {
        if (forosCache[i].id === foroId) { cached = forosCache[i]; break; }
      }
      if (cached) {
        viewerForo = cached;
        viewerComs = [];
        mostrarViewer();
      }
      jsonp({ action:'getForo', foroId:foroId }).then(function(resp) {
        try {
          var data = typeof resp === 'string' ? JSON.parse(resp) : resp;
          if (data.status === 'FORO_OK' && viewerForo && viewerForo.id === foroId) {
            for (var k in data.foro) viewerForo[k] = data.foro[k];
            viewerComs = data.comentarios || [];
            mostrarViewer();
          }
        } catch(e) {}
      }).catch(function() {});
    }

    function mostrarViewer() {
      if (!viewerForo) return;
      comentariosMax = 6;
      var userEl = document.getElementById('viewerUser');
      userEl.textContent = escHtml(viewerForo.user || '');
      userEl.onclick = function() { window.location.href = 'perfil_publico.html?user=' + encodeURIComponent(viewerForo.user).replace(/%20/g,'-'); };
      document.getElementById('viewerDate').textContent = tiempoRelativo(viewerForo.fecha);
      document.getElementById('viewerLikes').textContent = viewerForo.likes || 0;
      document.getElementById('viewerDislikes').textContent = viewerForo.dislikes || 0;
      var imgs = viewerForo.imagenes ? viewerForo.imagenes.split('|').filter(Boolean) : [];
      var track = document.getElementById('carouselTrack');
      if (imgs.length) {
        track.innerHTML = imgs.map(function(u) { return '<img src="' + u + '" onclick="window.open(\'' + u + '\',\'_blank\')">'; }).join('');
        var dots = document.getElementById('viewerDots');
        dots.innerHTML = imgs.map(function(_, i) { return '<button class="viewer-dot' + (i === 0 ? ' active' : '') + '" onclick="irAImg(' + i + ')"></button>'; }).join('');
        carouselIdx = 0;
        track.scrollLeft = 0;
      } else {
        track.innerHTML = '<p style="color:#666;padding:40px;">Sin im&aacute;genes</p>';
        document.getElementById('viewerDots').innerHTML = '';
      }
      document.getElementById('viewerDesc').textContent = viewerForo.descripcion || '';
      actualizarVotoUI();
      renderComentarios();
      document.getElementById('viewerModal').classList.add('open');
    }

    function cerrarViewer() {
      document.getElementById('viewerModal').classList.remove('open');
      viewerForo = null;
      viewerComs = [];
    }

    document.getElementById('viewerModal').addEventListener('click', function(e) {
      if (e.target === this) cerrarViewer();
    });

    function carouselNext() {
      var t = document.getElementById('carouselTrack');
      var imgs = t.querySelectorAll('img');
      if (!imgs.length) return;
      irAImg(Math.min(carouselIdx + 1, imgs.length - 1));
    }

    function carouselPrev() {
      irAImg(Math.max(carouselIdx - 1, 0));
    }

    function irAImg(idx) {
      var t = document.getElementById('carouselTrack');
      var imgs = t.querySelectorAll('img');
      if (!imgs.length) return;
      carouselIdx = idx;
      imgs[idx].scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
      document.querySelectorAll('.viewer-dot').forEach(function(d, i) { d.classList.toggle('active', i === idx); });
    }

    function userVoteState(foro) {
      var u = sessionUser;
      if (!u || !foro) return 0;
      if ((foro.likesUsers || '').split(',').indexOf(u) !== -1) return 1;
      if ((foro.dislikesUsers || '').split(',').indexOf(u) !== -1) return -1;
      return 0;
    }

    function actualizarVotoUI() {
      var s = userVoteState(viewerForo);
      document.getElementById('viewerLikeBtn').classList.toggle('liked', s === 1);
      document.getElementById('viewerDislikeBtn').classList.toggle('liked', s === -1);
    }

    function darLike() {
      if (!viewerForo) return;
      var s = userVoteState(viewerForo);
      var foroId = viewerForo.id;
      if (s === 1) { viewerForo.likes--; viewerForo.likesUsers = (viewerForo.likesUsers || '').split(',').filter(function(x) { return x !== sessionUser; }).join(','); }
      else {
        if (s === -1) { viewerForo.dislikes--; viewerForo.dislikesUsers = (viewerForo.dislikesUsers || '').split(',').filter(function(x) { return x !== sessionUser; }).join(','); }
        viewerForo.likes = (viewerForo.likes || 0) + 1;
        viewerForo.likesUsers = ((viewerForo.likesUsers || '').split(',').filter(Boolean).concat([sessionUser])).join(',');
      }
      document.getElementById('viewerLikes').textContent = viewerForo.likes;
      document.getElementById('viewerDislikes').textContent = viewerForo.dislikes;
      actualizarVotoUI();
      jsonp({ action:'likeForo', foroId:foroId, user:sessionUser }).then(function(resp) {
        try { var d = typeof resp === 'string' ? JSON.parse(resp) : resp; if (d.status === 'FORO_RATED') {
          viewerForo.likes = d.likes; viewerForo.dislikes = d.dislikes;
          viewerForo.likesUsers = d.likesUsers || ''; viewerForo.dislikesUsers = d.dislikesUsers || '';
          document.getElementById('viewerLikes').textContent = d.likes; document.getElementById('viewerDislikes').textContent = d.dislikes;
          actualizarVotoUI();
          for (var i = 0; i < forosCache.length; i++) { if (forosCache[i].id === foroId) { forosCache[i].likes = d.likes; forosCache[i].dislikes = d.dislikes; break; } }
          renderForos();
        } } catch(e) {}
      }).catch(function() {});
    }

    function darDislike() {
      if (!viewerForo) return;
      var s = userVoteState(viewerForo);
      var foroId = viewerForo.id;
      if (s === -1) { viewerForo.dislikes--; viewerForo.dislikesUsers = (viewerForo.dislikesUsers || '').split(',').filter(function(x) { return x !== sessionUser; }).join(','); }
      else {
        if (s === 1) { viewerForo.likes--; viewerForo.likesUsers = (viewerForo.likesUsers || '').split(',').filter(function(x) { return x !== sessionUser; }).join(','); }
        viewerForo.dislikes = (viewerForo.dislikes || 0) + 1;
        viewerForo.dislikesUsers = ((viewerForo.dislikesUsers || '').split(',').filter(Boolean).concat([sessionUser])).join(',');
      }
      document.getElementById('viewerLikes').textContent = viewerForo.likes;
      document.getElementById('viewerDislikes').textContent = viewerForo.dislikes;
      actualizarVotoUI();
      jsonp({ action:'dislikeForo', foroId:foroId, user:sessionUser }).then(function(resp) {
        try { var d = typeof resp === 'string' ? JSON.parse(resp) : resp; if (d.status === 'FORO_RATED') {
          viewerForo.likes = d.likes; viewerForo.dislikes = d.dislikes;
          viewerForo.likesUsers = d.likesUsers || ''; viewerForo.dislikesUsers = d.dislikesUsers || '';
          document.getElementById('viewerLikes').textContent = d.likes; document.getElementById('viewerDislikes').textContent = d.dislikes;
          actualizarVotoUI();
          for (var i = 0; i < forosCache.length; i++) { if (forosCache[i].id === foroId) { forosCache[i].likes = d.likes; forosCache[i].dislikes = d.dislikes; break; } }
          renderForos();
        } } catch(e) {}
      }).catch(function() {});
    }

    function renderComentarios() {
      var el = document.getElementById('viewerCommentsList');
      if (!viewerComs.length) { el.innerHTML = '<p style="color:#555;font-size:13px;">No hay comentarios todav&iacute;a.</p>'; return; }
      var mostrar = viewerComs.slice(0, comentariosMax);
      var html = mostrar.map(function(c) {
        var cId = c.id || '';
        var esPropio = c.user === sessionUser;
        var menuHtml = esPropio && cId ? '<button class="coment-menu-btn" onclick="event.stopPropagation();toggleComentMenu(\'' + cId + '\')">&#8942;</button><div class="coment-menu-dropdown" id="comentMenu_' + cId + '"><button onclick="event.stopPropagation();editarComentPropio(\'' + cId + '\')">Editar</button><button onclick="event.stopPropagation();eliminarComentPropio(\'' + cId + '\')">Eliminar</button></div>' : '';
        return '<div class="viewer-comment">' + menuHtml + '<div class="viewer-comment-user" onclick="window.location.href=\'perfil_publico.html?user=' + encodeURIComponent(c.user || '').replace(/%20/g,'-') + '\'">' + escHtml(c.user || '') + '</div><div class="viewer-comment-text">' + escHtml(c.comentario || '') + '</div><div class="viewer-comment-date">' + tiempoRelativo(c.fecha) + '</div></div>';
      }).join('');
      if (viewerComs.length > comentariosMax) {
        html += '<button class="vbtn ver-mas-coms" onclick="comentariosMax=9999;renderComentarios()">Ver m&aacute;s (' + (viewerComs.length - comentariosMax) + ' restantes)</button>';
      }
      el.innerHTML = html;
    }

    function enviarComentario() {
      if (!viewerForo) return;
      var texto = document.getElementById('commentInput').value.trim();
      if (!texto) return;
      document.getElementById('commentInput').value = '';
      var tempComment = { id: 'temp_' + Date.now(), user: sessionUser, comentario: texto, fecha: new Date().toISOString() };
      viewerComs.unshift(tempComment);
      renderComentarios();
      jsonp({ action:'addComentario', user:sessionUser, pass:sessionPass, foroId:viewerForo.id, comentario:texto }).then(function(resp) {
        try { var d = typeof resp === 'string' ? JSON.parse(resp) : resp;
          if (d.status !== 'COMENTARIO_OK') { viewerComs = viewerComs.filter(function(c) { return c !== tempComment; }); renderComentarios(); }
        } catch(e) { viewerComs = viewerComs.filter(function(c) { return c !== tempComment; }); renderComentarios(); }
      }).catch(function() { viewerComs = viewerComs.filter(function(c) { return c !== tempComment; }); renderComentarios(); });
    }

    function toggleComentMenu(id) {
      var el = document.getElementById('comentMenu_' + id);
      if (!el) return;
      var abierto = el.classList.contains('open');
      document.querySelectorAll('.coment-menu-dropdown.open').forEach(function(m) { if (m !== el) m.classList.remove('open'); });
      el.classList.toggle('open', !abierto);
    }

    function eliminarComentPropio(id) {
      if (!confirm('\u00bfEliminar este comentario?')) return;
      jsonp({ action:'deletePublicacion', user:sessionUser, pass:sessionPass, tipo:'comentario', id:id }).then(function(resp) {
        try { var d = typeof resp === 'string' ? JSON.parse(resp) : resp; if (d.status === 'OK') {
          viewerComs = viewerComs.filter(function(c) { return c.id !== id; });
          renderComentarios();
        } else { alert('Error al eliminar.'); } } catch(e) { alert('Error al eliminar.'); }
      }).catch(function() { alert('Error de conexi\u00f3n.'); });
    }

    function editarComentPropio(id) {
      var c = null;
      for (var i = 0; i < viewerComs.length; i++) { if (viewerComs[i].id === id) { c = viewerComs[i]; break; } }
      if (!c) return;
      var text = prompt('Editar comentario:', c.comentario);
      if (text === null || text.trim() === '') return;
      jsonp({ action:'editPublicacion', user:sessionUser, pass:sessionPass, tipo:'comentario', id:id, contenido:text.trim() }).then(function(resp) {
        try { var d = typeof resp === 'string' ? JSON.parse(resp) : resp; if (d.status === 'OK') {
          for (var i = 0; i < viewerComs.length; i++) { if (viewerComs[i].id === id) { viewerComs[i].comentario = text.trim(); break; } }
          renderComentarios();
        } else { alert('Error al editar.'); } } catch(e) { alert('Error al editar.'); }
      }).catch(function() { alert('Error de conexi\u00f3n.'); });
    }

    document.addEventListener('click', function() {
      document.querySelectorAll('.coment-menu-dropdown.open').forEach(function(m) { m.classList.remove('open'); });
    });

    verificarCuenta();
    cargarPerfil();
    cargarForos();
  </script>
</body>
</html>
