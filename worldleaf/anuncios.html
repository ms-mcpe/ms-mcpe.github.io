<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Anuncios - WorldLeaf Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--wa-bg:#111b21;--wa-bg-chat:#0b141a;--wa-bg-input:#1f2c33;--wa-bg-header:#1f2c33;--wa-bg-bubble-own:#005c4b;--wa-bg-bubble-other:#1f2c33;--wa-green:#00a884;--wa-teal:#00a884;--wa-text:#e9edef;--wa-text-secondary:#aebac1;--wa-text-muted:#667781;--wa-border:#313d45;--wa-divider:#182229;--wa-bg-hover:#2a3942;--wa-bg-check:#53bdeb;}
    *,::before,::after{box-sizing:border-box;margin:0;padding:0;}
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--wa-border);border-radius:99px;}
    html,body{height:100%;overflow:hidden;}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--wa-bg);color:var(--wa-text);display:flex;flex-direction:column;-webkit-user-select:none;user-select:none;}

    .chat-header{
      height:56px;flex-shrink:0;background:var(--wa-bg-header);
      display:flex;align-items:center;padding:0 12px;gap:8px;
      border-bottom:1px solid var(--wa-border);
    }
    .chat-header .back-btn{background:none;border:none;color:var(--wa-text-secondary);font-size:22px;cursor:pointer;padding:4px;display:flex;}
    .chat-header .avatar{width:38px;height:38px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--wa-green);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:15px;}
    .chat-header .avatar img{width:100%;height:100%;object-fit:cover;}
    .chat-header .info{flex:1;min-width:0;}
    .chat-header .name{font-size:16px;font-weight:600;color:var(--wa-text);}
    .chat-header .status{font-size:11px;color:var(--wa-text-muted);}
    .chat-header .admin-badge{font-size:9px;background:var(--wa-green);color:#fff;padding:2px 8px;border-radius:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;}

    .messages{
      flex:1;overflow-y:auto;padding:12px 16px;
      background:var(--wa-bg-chat);display:flex;flex-direction:column;gap:4px;
    }

    .msg-row{display:flex;flex-direction:column;animation:fadeUp 0.15s ease both;}
    .msg-row.own{align-items:flex-end;}
    .msg-row.other{align-items:flex-start;}

    .msg-bubble{
      max-width:85%;min-width:100px;
      border-radius:8px;padding:6px 10px 5px;
      word-wrap:break-word;overflow-wrap:break-word;
      line-height:1.4;position:relative;
    }
    .msg-row.own .msg-bubble{background:var(--wa-bg-bubble-own);color:#e9edef;border-top-right-radius:0;}
    .msg-row.own .msg-bubble::after{content:'';position:absolute;top:0;right:-6px;border:6px solid transparent;border-top-color:var(--wa-bg-bubble-own);border-right:0;}
    .msg-row.other .msg-bubble{background:var(--wa-bg-bubble-other);color:#e9edef;border-top-left-radius:0;}
    .msg-row.other .msg-bubble::after{content:'';position:absolute;top:0;left:-6px;border:6px solid transparent;border-top-color:var(--wa-bg-bubble-other);border-left:0;}

    .msg-username{font-size:11px;font-weight:600;color:var(--wa-green);margin-bottom:2px;}
    .msg-text{font-size:14px;line-height:1.45;}
    .msg-footer{display:flex;align-items:center;gap:4px;margin-top:2px;justify-content:flex-end;}
    .msg-time{font-size:10px;color:rgba(233,237,239,0.5);}

    .input-area{
      flex-shrink:0;background:var(--wa-bg-header);
      border-top:1px solid var(--wa-border);padding:8px 12px;
      display:flex;align-items:center;gap:8px;
    }
    .input-area input{
      flex:1;background:var(--wa-bg-input);border:none;border-radius:8px;
      padding:12px 16px;color:var(--wa-text);font-size:15px;outline:none;font-family:inherit;
    }
    .input-area input::placeholder{color:var(--wa-text-muted);}
    .input-area input:disabled{color:var(--wa-text-muted);cursor:not-allowed;}
    .input-area button{
      width:42px;height:42px;border-radius:50%;border:none;
      background:var(--wa-teal);color:#fff;font-size:18px;
      cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;
    }
    .input-area button:disabled{opacity:0.4;cursor:not-allowed;}
    .restricted-msg{text-align:center;padding:10px;font-size:12px;color:var(--wa-text-muted);flex-shrink:0;border-top:1px solid var(--wa-border);background:var(--wa-bg-chat);}
    .restricted-msg span{color:var(--wa-green);font-weight:600;}

    @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
    @media(min-width:768px){body{max-width:768px;margin:0 auto;border-left:1px solid var(--wa-border);border-right:1px solid var(--wa-border);}}
  </style>
</head>
<body>

  <div class="chat-header">
    <button class="back-btn" onclick="window.parent.postMessage({type:'closeChat'},'*')">&#8592;</button>
    <div class="avatar">&#128240;</div>
    <div class="info">
      <div class="name">Anuncios</div>
      <div class="status"><span class="admin-badge">Solo admins</span></div>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area" id="inputArea">
    <input type="text" id="msgInput" placeholder="Solo admins pueden escribir..." maxlength="2000" disabled>
    <button id="sendBtn" disabled>&#10148;</button>
  </div>
  <div class="restricted-msg" id="restrictedMsg">&#128274; Solo <span>Owners</span> y <span>Admins</span> pueden enviar mensajes</div>

  <script>
    var API_URL = 'https://script.google.com/macros/s/AKfycbyIrIlhsgjpNcpOcT-aWnpjSSc-HdiDQTu3HqI1I5ZfOWqL_lBoyYj05034THSy1gKEyQ/exec';
    var sessionUser = localStorage.getItem('sessionUser');
    var sessionPass = localStorage.getItem('sessionPass');
    if (!sessionUser || !sessionPass) window.location.href = 'login.html';

    var profileData = null;
    try { var s = localStorage.getItem('userProfile'); if (s) profileData = JSON.parse(s); } catch(e) {}
    var userRole = profileData && profileData.rol ? profileData.rol : '';
    var canWrite = userRole === 'Owner' || userRole === 'Admin' || userRole === 'App';

    var room = 'anuncios';
    var messages = [];
    var lastFetch = null;

    function escHtml(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

    function jsonp(data) {
      return new Promise(function(resolve, reject) {
        var cb = 'jpcb_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
        var params = [];
        for (var key in data) { if (data.hasOwnProperty(key)) params.push(encodeURIComponent(key)+'='+encodeURIComponent(data[key])); }
        params.push('callback=' + cb);
        var url = API_URL + '?' + params.join('&');
        window[cb] = function(resp) { delete window[cb]; if (script.parentNode) script.parentNode.removeChild(script); resolve(resp); };
        var script = document.createElement('script');
        script.src = url;
        script.onerror = function() { delete window[cb]; if (script.parentNode) script.parentNode.removeChild(script); reject(new Error('Error')); };
        document.body.appendChild(script);
        setTimeout(function(){if(window[cb]){delete window[cb];if(script.parentNode)script.parentNode.removeChild(script);reject(new Error('Timeout'));}},60000);
      });
    }

    function formatTime(fs) {
      if (!fs) return '';
      var d = new Date(fs);
      if (isNaN(d.getTime())) return '';
      return d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
    }

    function createMsg(msg) {
      var isOwn = msg.user === sessionUser;
      var div = document.createElement('div');
      div.className = 'msg-row' + (isOwn ? ' own' : ' other');
      var bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      if (!isOwn) {
        var un = document.createElement('div');
        un.className = 'msg-username';
        un.textContent = msg.user;
        bubble.appendChild(un);
      }
      var txt = document.createElement('div');
      txt.className = 'msg-text';
      txt.textContent = msg.msg;
      bubble.appendChild(txt);
      var footer = document.createElement('div');
      footer.className = 'msg-footer';
      var tm = document.createElement('span');
      tm.className = 'msg-time';
      tm.textContent = formatTime(msg.fecha);
      footer.appendChild(tm);
      bubble.appendChild(footer);
      div.appendChild(bubble);
      return div;
    }

    function renderMsgs() {
      var el = document.getElementById('messages');
      el.innerHTML = '';
      messages.forEach(function(m) { el.appendChild(createMsg(m)); });
      el.scrollTop = el.scrollHeight;
    }

    function fetchMsgs() {
      var params = { action:'getMessages', user:sessionUser, pass:sessionPass, room:room };
      if (lastFetch) params.since = lastFetch;
      return jsonp(params).then(function(resp) {
        try {
          var data = typeof resp === 'string' ? JSON.parse(resp) : resp;
          if (data.status === 'OK' && data.messages) {
            var newMsgs = data.messages;
            if (lastFetch) {
              for (var i = 0; i < newMsgs.length; i++) {
                var exists = false;
                for (var j = 0; j < messages.length; j++) {
                  if (messages[j].id === newMsgs[i].id) { exists = true; break; }
                }
                if (!exists) messages.push(newMsgs[i]);
              }
              if (newMsgs.length > 0) renderMsgs();
            } else {
              messages = [];
              for (var k = 0; k < newMsgs.length; k++) messages.push(newMsgs[k]);
              renderMsgs();
            }
            if (newMsgs.length > 0) lastFetch = newMsgs[newMsgs.length - 1].fecha;
            else if (!lastFetch && messages.length > 0) lastFetch = messages[messages.length - 1].fecha;
          }
        } catch(e) {}
      }).catch(function(){});
    }

    function sendMsg() {
      if (!canWrite) return;
      var input = document.getElementById('msgInput');
      var text = input.value.trim();
      if (!text) return;
      var tempId = '_temp_' + Date.now();
      var optMsg = { id:tempId, user:sessionUser, msg:text, fecha:new Date().toISOString() };
      messages.push(optMsg);
      renderMsgs();
      input.value = '';
      lastFetch = null;
      jsonp({ action:'sendMessage', user:sessionUser, pass:sessionPass, msg:text, room:room }).then(function(resp) {
        try {
          var r = typeof resp === 'string' ? JSON.parse(resp) : resp;
          if (r.status === 'OK') {
            for (var oi = 0; oi < messages.length; oi++) {
              if (messages[oi].id === tempId) { messages[oi].id = r.id; break; }
            }
            fetchMsgs();
          } else {
            for (var ri = 0; ri < messages.length; ri++) {
              if (messages[ri].id === tempId) { messages.splice(ri,1); renderMsgs(); break; }
            }
          }
        } catch(e) {}
      }).catch(function(){});
    }

    // Enable input if user can write
    if (canWrite) {
      document.getElementById('msgInput').disabled = false;
      document.getElementById('msgInput').placeholder = 'Escribe un anuncio...';
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('restrictedMsg').style.display = 'none';
      document.getElementById('msgInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
      });
    }

    fetchMsgs();
    setInterval(fetchMsgs, 3000);
  </script>
</body>
</html>
