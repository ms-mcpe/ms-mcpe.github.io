<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>!function(){var ua=navigator.userAgent.toLowerCase(),wv=/wv|webview/.test(ua),ios=/iphone|ipad|ipod/.test(ua),nosaf=!/safari|cribrowser|fxios|edgios|opios/.test(ua);if(!wv&&!(ios&&nosaf)&&!navigator.standalone){window.location.href='descarga.html'}}();</script>
  <script>
    (function(){
      var t = localStorage.getItem('tema');
      if (t === 'oscuro') document.documentElement.setAttribute('data-theme', 'dark');
      var e = localStorage.getItem('esquema');
      if (e && e !== 'default') document.documentElement.setAttribute('data-scheme', e);
      var cp = localStorage.getItem('colorPrimario');
      if (cp) {
        document.documentElement.style.setProperty('--primary', cp);
        document.documentElement.style.setProperty('--primary-light', cp);
      }
    })();
  </script>
  <title>Iniciar Sesión - WorldLeaf App</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-void: #060a0f;
      --bg-body: #0b1120;
      --bg-card: #111827;
      --bg-card2: #162032;
      --bg-topbar: rgba(6,10,15,0.92);
      --bg-sidebar: #0d1729;

      --primary: #22c55e;
      --primary-light: #4ade80;
      --primary-dark: #16a34a;
      --primary-bg: rgba(34,197,94,0.09);
      --primary-glow: rgba(34,197,94,0.25);
      --primary-gradient: linear-gradient(135deg,#4ade80,#22c55e);

      --amber: #f59e0b;
      --amber-light: #fbbf24;
      --amber-bg: rgba(245,158,11,0.10);
      --amber-glow: rgba(245,158,11,0.22);

      --blue: #3b82f6;
      --blue-light: #60a5fa;
      --blue-bg: rgba(59,130,246,0.10);
      --info: #06b6d4;
      --info-bg: rgba(6,182,212,0.10);

      --owner-gradient: linear-gradient(135deg,#fcd34d,#f59e0b);
      --admin-gradient: linear-gradient(135deg,#60a5fa,#3b82f6);
      --app-gradient: linear-gradient(135deg,#c084fc,#a855f7);

      --text: #f0f6ff;
      --text-secondary: #94a3b8;
      --text-muted: #4b5e78;
      --text-light: #2d3f57;

      --border: #1e2f48;
      --border-light: #131f30;
      --surface: #162032;
      --surface-2: #1e2f48;

      --shadow: 0 4px 16px rgba(0,0,0,0.5);
      --shadow-md: 0 8px 28px rgba(0,0,0,0.6);
      --shadow-lg: 0 20px 48px rgba(0,0,0,0.7);
      --shadow-glow: 0 0 24px var(--primary-glow);

      --success: #22c55e; --success-bg: rgba(34,197,94,0.10);
      --danger: #ef4444; --danger-bg: rgba(239,68,68,0.10);
      --warning: #f59e0b; --warning-bg: rgba(245,158,11,0.10);

      --radius: 14px;
      --radius-sm: 9px;
      --overlay: rgba(0,0,0,0.72);
    }
    [data-theme="dark"] {
      --bg-void: #060a0f;
      --bg-body: #0b1120;
      --bg-card: #111827;
      --bg-card2: #162032;
      --primary: #22c55e;
      --primary-light: #4ade80;
      --primary-dark: #16a34a;
      --primary-bg: rgba(34,197,94,0.09);
      --primary-glow: rgba(34,197,94,0.25);
      --primary-gradient: linear-gradient(135deg,#4ade80,#22c55e);
      --text: #f0f6ff;
      --text-secondary: #94a3b8;
      --text-muted: #4b5e78;
      --text-light: #2d3f57;
      --border: #1e2f48;
      --border-light: #131f30;
      --shadow: 0 4px 16px rgba(0,0,0,0.5);
      --shadow-md: 0 8px 28px rgba(0,0,0,0.6);
      --overlay: rgba(0,0,0,0.72);
    }
    [data-scheme="blue"] {
      --primary: #3b82f6; --primary-light: #60a5fa; --primary-bg: rgba(59,130,246,0.1); --primary-dark: #2563eb; --primary-gradient: linear-gradient(135deg,#60a5fa,#3b82f6);
    }
    [data-scheme="purple"] {
      --primary: #8b5cf6; --primary-light: #a78bfa; --primary-bg: rgba(139,92,246,0.1); --primary-dark: #7c3aed; --primary-gradient: linear-gradient(135deg,#a78bfa,#8b5cf6);
    }
    [data-scheme="orange"] {
      --primary: #f97316; --primary-light: #fb923c; --primary-bg: rgba(249,115,22,0.1); --primary-dark: #ea580c; --primary-gradient: linear-gradient(135deg,#fb923c,#f97316);
    }
    ::-webkit-scrollbar{width:6px;height:6px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
    ::-webkit-scrollbar-thumb:hover{background:var(--surface-2);}
    .page-title{font-family:'Rajdhani',sans-serif;font-size:30px;font-weight:700;color:var(--text);letter-spacing:-0.5px;}
    .btn-sm{
      padding:5px 13px;border:none;border-radius:7px;
      font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;
      letter-spacing:0.4px;cursor:pointer;transition:all 0.2s;
    }
    input, textarea, select{
      padding:10px 14px;border:1px solid var(--border);border-radius:9px;
      background:var(--bg-card2);color:var(--text);
      font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:all 0.2s;
    }
    input:focus, textarea:focus, select:focus{
      border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow);
    }

    *,::before,::after{box-sizing:border-box;margin:0;padding:0;}
    body{
      font-family:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: var(--text);
      transition: background-color 0.3s ease, color 0.3s ease;
      position: relative;
      overflow-x: hidden;
    }
    body::before{
      content:'';position:fixed;inset:0;z-index:-2;pointer-events:none;
      background-image:linear-gradient(var(--border-light) 1px, transparent 1px),linear-gradient(90deg, var(--border-light) 1px, transparent 1px);
      background-size:28px 28px;opacity:0.35;
    }
    body::after{
      content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
      background:radial-gradient(ellipse 80% 60% at 50% -10%, rgba(34,197,94,0.12) 0%, transparent 70%);
    }

    .container{
      background: var(--bg-card);
      border-radius: 20px;
      box-shadow: var(--shadow-md);
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
      transition: background-color 0.3s ease, border-color 0.3s ease;
      animation: fadeInSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes fadeInSlideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .container::before{
      content:'';position:absolute;top:0;left:0;right:0;
      height:3px;background:var(--primary-gradient);
    }
    .logo{
      text-align: center;
      margin-bottom: 28px;
    }
    .logo h1{
      color: var(--primary);
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -1px;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }
    .logo p{
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
    }
    .form-group{
      margin-bottom: 20px;
    }
    .form-group label{
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .form-group input{
      width:100%;background:var(--bg-body);
    }
    .form-group input::placeholder{
      color: var(--text-muted);
    }
    .btn{
      width:100%;padding:13px 28px;border:none;border-radius:10px;
      font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;
      color:#fff;cursor:pointer;transition:all 0.2s;
      display:flex;align-items:center;justify-content:center;
    }
    .btn-primary{
      background:var(--primary-gradient);
      box-shadow:0 4px 14px var(--primary-glow);
    }
    .btn-primary:hover{
      transform:translateY(-2px);filter:brightness(1.08);
      box-shadow:0 8px 20px var(--primary-glow);
    }
    .btn-primary:active{
      transform:translateY(0);
    }
    .btn-primary:disabled{
      background:var(--text-light);cursor:not-allowed;
      transform:none;box-shadow:none;opacity:0.6;
    }
    .links{
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-secondary);
    }
    .links a{
      color:var(--primary);text-decoration:none;
      font-weight:600;transition:color 0.2s;cursor:pointer;
    }
    .links a:hover{
      color:var(--primary-light);text-decoration:underline;
    }
    .links .separator{
      color: var(--border);
      margin: 0 10px;
    }
    .message{
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
      text-align: center;
      font-weight: 500;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .message.error{
      display: block;
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    .message.success{
      display: block;
      background: var(--primary-bg);
      color: var(--primary);
      border: 1px solid var(--primary);
    }
    .spinner{
      display: none;
      width: 22px;
      height: 22px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg);}}
    .btn-loading .btn-text{display:none;}
    .btn-loading .spinner{display:inline-block;}
    .footer-text{
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }
    .modal-overlay{
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--overlay);
      backdrop-filter: blur(6px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: all 0.3s ease;
    }
    .modal-overlay.active{
      display: flex;
    }
    .modal{
      background: var(--bg-card);
      border-radius: 20px;
      padding: 36px;
      max-width: 420px;
      width: 100%;
      position: relative;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border);
      animation: zoomIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes zoomIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .modal-close{
      position: absolute;
      top: 16px;
      right: 16px;
      background: var(--bg-body);
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: var(--text-secondary);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .modal-close:hover{
      background: var(--border);
      color: var(--text);
    }
    /* Style overrides for inline element styles */
    .modal .logo h1 {
      font-size: 22px !important;
    }
    .modal .logo p {
      font-size: 13px !important;
      color: var(--text-secondary) !important;
    }
    #step3 p {
      color: var(--primary) !important;
    }
    #step4 p {
      color: var(--text-secondary) !important;
    }
    #step4 p:first-of-type {
      color: var(--primary) !important;
    }
    @media(max-width:480px){
      .container{padding:32px 24px;}
      .modal{padding:28px 20px;}
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><h1>WorldLeaf</h1><p>Inicia sesión en tu cuenta</p></div>
    <div id="message" class="message"></div>
    <form id="loginForm">
      <div class="form-group">
        <label for="user">Nombre de usuario</label>
        <input type="text" id="user" placeholder="Tu nombre de usuario" required autocomplete="username" maxlength="20">
      </div>
      <div class="form-group">
        <label for="pass">Contraseña</label>
        <input type="password" id="pass" placeholder="8-20 caracteres, debe empezar con letra" required autocomplete="current-password" maxlength="20">
      </div>
      <button type="submit" class="btn btn-primary" id="loginBtn">
        <span class="btn-text">Iniciar sesión</span>
        <span class="spinner"></span>
      </button>
    </form>
    <div class="links">
      <a href="javascript:void(0)" onclick="showForgotPassword()">¿Olvidaste tu contraseña?</a>
      <span class="separator">|</span>
      <a href="register.html">Crear cuenta</a>
    </div>
    <div class="footer-text">WorldLeaf App &copy; 2026</div>
  </div>

  <div class="modal-overlay" id="forgotModal">
    <div class="modal">
      <button class="modal-close" onclick="cerrarModal()">&times;</button>
      <div class="logo" style="margin-bottom:20px;">
        <h1 style="font-size:22px;">Recuperar contraseña</h1>
        <p style="font-size:13px;">Te enviaremos un código de verificación</p>
      </div>
      <div id="forgotMessage" class="message"></div>
      <div id="step1">
        <form id="step1Form">
          <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" placeholder="tu@correo.com" required maxlength="30">
          </div>
          <button type="submit" class="btn btn-primary" id="sendCodeBtn">
            <span class="btn-text">Enviar código</span>
            <span class="spinner"></span>
          </button>
        </form>
      </div>
      <div id="step2" style="display:none;">
        <form id="step2Form">
          <div class="form-group">
            <label for="code">Código de verificación</label>
            <input type="text" id="code" placeholder="Ingresa el código de 6 dígitos" maxlength="6" required>
          </div>
          <button type="submit" class="btn btn-primary" id="verifyBtn">
            <span class="btn-text">Verificar código</span>
            <span class="spinner"></span>
          </button>
        </form>
      </div>
      <div id="step3" style="display:none;">
        <form id="step3Form">
          <p style="font-size:14px;color:#2e7d32;font-weight:600;margin-bottom:16px;text-align:center;">Código verificado. Ahora elige una nueva contraseña.</p>
          <div class="form-group">
            <label for="newPass">Nueva contraseña</label>
            <input type="password" id="newPass" placeholder="8-20 caracteres, debe empezar con letra" required minlength="8" maxlength="20">
          </div>
          <div class="form-group">
            <label for="confirmPass">Confirmar contraseña</label>
            <input type="password" id="confirmPass" placeholder="Repite la contraseña" required minlength="8" maxlength="20">
          </div>
          <button type="submit" class="btn btn-primary" id="changePassBtn">
            <span class="btn-text">Cambiar contraseña</span>
            <span class="spinner"></span>
          </button>
        </form>
      </div>
      <div id="step4" style="display:none;text-align:center;padding:20px 0;">
        <div style="font-size:48px;margin-bottom:12px;">&#10004;</div>
        <p style="font-size:18px;font-weight:600;color:#2e7d32;">Contraseña actualizada</p>
        <p style="font-size:14px;color:#666;margin:8px 0 20px;">Tu contraseña se ha restablecido correctamente.</p>
        <button class="btn btn-primary" onclick="cerrarModal();location.reload()">Volver a iniciar sesión</button>
      </div>
    </div>
  </div>

  <script>
    var API_URL = 'https://script.google.com/macros/s/AKfycbyIrIlhsgjpNcpOcT-aWnpjSSc-HdiDQTu3HqI1I5ZfOWqL_lBoyYj05034THSy1gKEyQ/exec';

    function jsonp(data) {
      return new Promise(function(resolve, reject) {
        var cb = 'jpcb_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
        var params = [];
        for (var key in data) {
          if (data.hasOwnProperty(key)) {
            params.push(encodeURIComponent(key) + '=' + encodeURIComponent(data[key]));
          }
        }
        params.push('callback=' + cb);
        var url = API_URL + '?' + params.join('&');
        window[cb] = function(resp) {
          delete window[cb];
          if (script.parentNode) script.parentNode.removeChild(script);
          resolve(resp);
        };
        var script = document.createElement('script');
        script.src = url;
        script.onerror = function() {
          delete window[cb];
          if (script.parentNode) script.parentNode.removeChild(script);
          reject(new Error('Error de conexión'));
        };
        document.body.appendChild(script);
        setTimeout(function() {
          if (window[cb]) {
            delete window[cb];
            if (script.parentNode) script.parentNode.removeChild(script);
            reject(new Error('Tiempo de espera agotado'));
          }
        }, 60000);
      });
    }

    function validarPassword(pass) {
      if (pass.length < 8) return 'La contraseña debe tener al menos 8 caracteres.';
      if (pass.length > 20) return 'La contraseña debe tener máximo 20 caracteres.';
      if (!/^[a-zA-Z]/.test(pass)) return 'La contraseña debe comenzar con una letra.';
      return null;
    }

    function escHtml(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function mostrarMensaje(el, texto, tipo) {
      el.innerHTML = texto;
      el.className = 'message ' + tipo;
      el.style.display = 'block';
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var btn = document.getElementById('loginBtn');
      var msg = document.getElementById('message');
      var user = document.getElementById('user').value.trim();
      var pass = document.getElementById('pass').value;
      if (!user || !pass) { mostrarMensaje(msg, 'Completa todos los campos.', 'error'); return; }
      if (user.length > 20) { mostrarMensaje(msg, 'El nombre debe tener máximo 20 caracteres.', 'error'); return; }
      var errPass = validarPassword(pass);
      if (errPass) { mostrarMensaje(msg, errPass, 'error'); return; }
      btn.classList.add('btn-loading');
      msg.style.display = 'none';
      jsonp({ action:'login', user:user, pass:pass }).then(function(resp) {
        btn.classList.remove('btn-loading');
        try {
          var data = typeof resp === 'string' ? JSON.parse(resp) : resp;
          if (data.status === 'LOGIN_OK') {
            localStorage.setItem('sessionUser', user);
            localStorage.setItem('sessionPass', pass);
            if (data.profile) localStorage.setItem('userProfile', JSON.stringify(data.profile));
            window.location.href = 'index.html';
          } else if (data.status === 'LOGIN_BLOCKED') {
            mostrarMensaje(msg, 'Tu cuenta ha sido suspendida. Contacta al administrador.', 'error');
          } else if (data.status === 'LOGIN_USER_NOT_FOUND') {
            mostrarMensaje(msg, 'Esta cuenta no existe. <a href="register.html" style="color:var(--primary);">Registrate</a>', 'error');
          } else if (data.status === 'LOGIN_WRONG_PASSWORD') {
            mostrarMensaje(msg, 'Contraseña incorrecta.', 'error');
          } else {
            mostrarMensaje(msg, 'Error al iniciar sesión.', 'error');
          }
        } catch(e) {
          mostrarMensaje(msg, 'Error al procesar la respuesta.', 'error');
        }
      }).catch(function(err) {
        btn.classList.remove('btn-loading');
        mostrarMensaje(msg, 'Error de conexión: ' + err.message, 'error');
      });
    });

    function showForgotPassword() {
      document.getElementById('forgotModal').classList.add('active');
      document.getElementById('step1').style.display = 'block';
      document.getElementById('step2').style.display = 'none';
      document.getElementById('step3').style.display = 'none';
      document.getElementById('step4').style.display = 'none';
      document.getElementById('forgotMessage').style.display = 'none';
      document.getElementById('email').value = '';
      document.getElementById('code').value = '';
      document.getElementById('newPass').value = '';
      document.getElementById('confirmPass').value = '';
    }

    function cerrarModal() {
      document.getElementById('forgotModal').classList.remove('active');
    }

    document.getElementById('forgotModal').addEventListener('click', function(e) {
      if (e.target === this) cerrarModal();
    });

    document.getElementById('step1Form').addEventListener('submit', function(e) {
      e.preventDefault();
      var btn = document.getElementById('sendCodeBtn');
      var msg = document.getElementById('forgotMessage');
      var email = document.getElementById('email').value.trim();
      if (!email) { mostrarMensaje(msg, 'Ingresa tu correo electrónico.', 'error'); return; }
      btn.classList.add('btn-loading');
      msg.style.display = 'none';
      jsonp({ action:'forgotPassword', email:email }).then(function(resp) {
        btn.classList.remove('btn-loading');
        try {
          var data = typeof resp === 'string' ? JSON.parse(resp) : resp;
          if (data.exito) {
            mostrarMensaje(msg, 'Código enviado a ' + escHtml(email) + '. Revisa tu bandeja de entrada.', 'success');
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
          } else {
            mostrarMensaje(msg, data.mensaje || 'Error al enviar el código.', 'error');
          }
        } catch(e) {
          mostrarMensaje(msg, 'Error al procesar la respuesta.', 'error');
        }
      }).catch(function(err) {
        btn.classList.remove('btn-loading');
        mostrarMensaje(msg, 'Error: ' + err.message, 'error');
      });
    });

    document.getElementById('step2Form').addEventListener('submit', function(e) {
      e.preventDefault();
      var btn = document.getElementById('verifyBtn');
      var msg = document.getElementById('forgotMessage');
      var code = document.getElementById('code').value.trim();
      var email = document.getElementById('email').value.trim();
      if (!code) { mostrarMensaje(msg, 'Ingresa el código de verificación.', 'error'); return; }
      btn.classList.add('btn-loading');
      msg.style.display = 'none';
      jsonp({ action:'verifyCodeOnly', email:email, code:code }).then(function(resp) {
        btn.classList.remove('btn-loading');
        try {
          var data = typeof resp === 'string' ? JSON.parse(resp) : resp;
          if (data.exito) {
            document.getElementById('step2').style.display = 'none';
            document.getElementById('step3').style.display = 'block';
          } else {
            mostrarMensaje(msg, data.mensaje || 'Código incorrecto.', 'error');
          }
        } catch(e) {
          mostrarMensaje(msg, 'Error al procesar la respuesta.', 'error');
        }
      }).catch(function(err) {
        btn.classList.remove('btn-loading');
        mostrarMensaje(msg, 'Error: ' + err.message, 'error');
      });
    });

    document.getElementById('step3Form').addEventListener('submit', function(e) {
      e.preventDefault();
      var btn = document.getElementById('changePassBtn');
      var msg = document.getElementById('forgotMessage');
      var code = document.getElementById('code').value.trim();
      var newPass = document.getElementById('newPass').value;
      var confirmPass = document.getElementById('confirmPass').value;
      var email = document.getElementById('email').value.trim();
      if (!newPass || !confirmPass) { mostrarMensaje(msg, 'Completa todos los campos.', 'error'); return; }
      if (newPass !== confirmPass) { mostrarMensaje(msg, 'Las contraseñas no coinciden.', 'error'); return; }
      var errPass = validarPassword(newPass);
      if (errPass) { mostrarMensaje(msg, errPass, 'error'); return; }
      btn.classList.add('btn-loading');
      msg.style.display = 'none';
      jsonp({ action:'verifyCodeAndChangePassword', email:email, code:code, newPassword:newPass }).then(function(resp) {
        btn.classList.remove('btn-loading');
        try {
          var data = typeof resp === 'string' ? JSON.parse(resp) : resp;
          if (data.exito) {
            document.getElementById('step3').style.display = 'none';
            document.getElementById('step4').style.display = 'block';
          } else {
            mostrarMensaje(msg, data.mensaje || 'Error al cambiar la contraseña.', 'error');
          }
        } catch(e) {
          mostrarMensaje(msg, 'Error al procesar la respuesta.', 'error');
        }
      }).catch(function(err) {
        btn.classList.remove('btn-loading');
        mostrarMensaje(msg, 'Error: ' + err.message, 'error');
      });
    });
  </script>
</body>
