<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Chat - WorldLeaf</title>
<style>
:root{--wa-bg:#111b21;--wa-bg-chat:#0b141a;--wa-bg-input:#1f2c33;--wa-bg-header:#1f2c33;--wa-bg-bubble-own:#005c4b;--wa-bg-bubble-other:#1f2c33;--wa-green:#00a884;--wa-teal:#00a884;--wa-text:#e9edef;--wa-text-secondary:#aebac1;--wa-text-muted:#667781;--wa-border:#313d45;--wa-bg-hover:rgba(233,237,239,0.05);}
*,::before,::after{box-sizing:border-box;margin:0;padding:0;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--wa-border);border-radius:99px;}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--wa-bg);color:var(--wa-text);display:flex;flex-direction:column;-webkit-user-select:none;user-select:none;}
.chat-header{height:56px;flex-shrink:0;background:var(--wa-bg-header);display:flex;align-items:center;padding:0 12px;gap:8px;border-bottom:1px solid var(--wa-border);}
.chat-header .back-btn{background:none;border:none;color:var(--wa-text-secondary);font-size:22px;cursor:pointer;padding:4px;display:flex;}
.chat-header .avatar{width:38px;height:38px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--wa-green);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:15px;}
.chat-header .info{flex:1;min-width:0;}
.chat-header .name{font-size:16px;font-weight:600;color:var(--wa-text);}
.chat-header .status{font-size:11px;color:var(--wa-text-muted);}
.chat-header .admin-badge{font-size:9px;background:var(--wa-green);color:#fff;padding:2px 8px;border-radius:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;}
.messages{flex:1;overflow-y:auto;padding:8px 12px;background:var(--wa-bg-chat);display:flex;flex-direction:column;gap:2px;}
.msg-row{display:flex;flex-direction:column;animation:fadeUp .15s ease both;padding:2px 0;}
.msg-row.own{align-items:flex-end;}
.msg-row.other{align-items:flex-start;}
.msg-row-inner{display:flex;align-items:flex-end;gap:6px;max-width:88%;}
.msg-row.other .msg-row-inner{flex-direction:row;}
.msg-row.own .msg-row-inner{flex-direction:row-reverse;}
.msg-avatar{width:28px;height:28px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--wa-green);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:11px;align-self:flex-end;margin-bottom:2px;}
.msg-avatar img{width:100%;height:100%;object-fit:cover;}
.msg-bubble{max-width:100%;min-width:60px;border-radius:8px;padding:6px 10px 5px;word-wrap:break-word;overflow-wrap:break-word;line-height:1.4;position:relative;cursor:default;}
.msg-row.own .msg-bubble{background:var(--wa-bg-bubble-own);color:#e9edef;border-top-right-radius:2px;}
.msg-row.other .msg-bubble{background:var(--wa-bg-bubble-other);color:#e9edef;border-top-left-radius:2px;}
.msg-username{font-size:11px;font-weight:600;color:var(--wa-teal);margin-bottom:2px;}
.msg-text{font-size:14px;line-height:1.45;}
.msg-reply-preview{padding:4px 8px;margin-bottom:4px;border-left:3px solid var(--wa-teal);border-radius:4px;background:rgba(0,0,0,0.15);font-size:12px;}
.msg-reply-preview .mrp-user{font-weight:600;color:var(--wa-teal);font-size:11px;}
.msg-reply-preview .mrp-text{color:var(--wa-text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.msg-footer{display:flex;align-items:center;gap:4px;margin-top:2px;justify-content:flex-end;}
.msg-time{font-size:10px;color:rgba(233,237,239,0.5);}
.msg-edited-badge{font-size:9px;color:rgba(233,237,239,0.4);font-style:italic;}

.reply-bar{flex-shrink:0;background:var(--wa-bg-header);border-top:1px solid var(--wa-border);padding:6px 12px;display:none;align-items:center;gap:8px;}
.reply-bar .rbi-icon{font-size:16px;color:var(--wa-teal);flex-shrink:0;}
.reply-bar .rbi-info{flex:1;min-width:0;}
.reply-bar .rbi-user{font-size:12px;font-weight:600;color:var(--wa-teal);}
.reply-bar .rbi-msg{font-size:12px;color:var(--wa-text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.reply-bar .rbi-close{background:none;border:none;color:var(--wa-text-muted);font-size:18px;cursor:pointer;padding:4px;}

.edit-area{display:flex;align-items:center;gap:6px;padding:2px 0;}
.edit-area input{flex:1;background:var(--wa-bg-chat);border:1px solid var(--wa-border);border-radius:6px;padding:6px 10px;color:var(--wa-text);font-size:14px;outline:none;font-family:inherit;}
.edit-area button{background:var(--wa-teal);border:none;color:#fff;border-radius:6px;padding:6px 10px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:600;}
.edit-area .edit-cancel{background:var(--wa-border);}

.input-area{flex-shrink:0;background:var(--wa-bg-header);border-top:1px solid var(--wa-border);padding:8px 12px;display:flex;align-items:center;gap:8px;}
.input-area input{flex:1;background:var(--wa-bg-input);border:none;border-radius:8px;padding:12px 16px;color:var(--wa-text);font-size:15px;outline:none;font-family:inherit;}
.input-area input::placeholder{color:var(--wa-text-muted);}
.input-area input:disabled{color:var(--wa-text-muted);cursor:not-allowed;}
.input-area button{width:42px;height:42px;border-radius:50%;border:none;background:var(--wa-teal);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.input-area button:disabled{opacity:.4;cursor:not-allowed;}
.restricted-msg{text-align:center;padding:10px;font-size:12px;color:var(--wa-text-muted);flex-shrink:0;border-top:1px solid var(--wa-border);background:var(--wa-bg-chat);}
.restricted-msg span{color:var(--wa-green);font-weight:600;}

.bottom-sheet{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;}
.bottom-sheet.open{display:block;}
.bs-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);animation:fadeIn .2s ease;}
.bs-menu{position:absolute;bottom:0;left:0;right:0;background:var(--wa-bg-header);border-radius:16px 16px 0 0;padding:8px 0 16px;border-top:1px solid var(--wa-border);animation:slideUp .2s ease;}
.bs-item{display:flex;align-items:center;gap:12px;padding:14px 20px;font-size:15px;color:var(--wa-text);cursor:pointer;transition:background .1s;}
.bs-item:hover{background:var(--wa-bg-hover);}
.bs-item .bs-icon{font-size:20px;width:28px;text-align:center;}
.bs-divider{height:1px;background:var(--wa-border);margin:4px 12px;}
.bs-cancel{margin:8px 12px 0;padding:14px;text-align:center;font-size:15px;color:var(--wa-text);background:var(--wa-bg-input);border-radius:12px;cursor:pointer;font-weight:600;}

@media(min-width:768px){.bottom-sheet .bs-menu,.bottom-sheet .bs-cancel{max-width:400px;margin-left:auto;margin-right:auto;}}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
</style>
</head>
<body>

<div class="chat-header">
  <button class="back-btn" id="backBtn">&#8592;</button>
  <div class="avatar" id="avatarEl"></div>
  <div class="info">
    <div class="name" id="nameEl"></div>
    <div class="status" id="statusEl"></div>
  </div>
</div>

<div class="messages" id="messages"></div>

<div class="reply-bar" id="replyBar">
  <span class="rbi-icon">&#128172;</span>
  <div class="rbi-info">
    <div class="rbi-user" id="replyUser"></div>
    <div class="rbi-msg" id="replyMsg"></div>
  </div>
  <button class="rbi-close" id="replyClose">&times;</button>
</div>

<div class="input-area" id="inputArea">
  <input type="text" id="msgInput" placeholder="Escribe un mensaje" maxlength="2000">
  <button id="sendBtn">&#10148;</button>
</div>
<div class="restricted-msg" id="restrictedMsg" style="display:none">&#128274; Solo <span>Owners</span> y <span>Admins</span> pueden enviar mensajes</div>

<div class="bottom-sheet" id="bottomSheet">
  <div class="bs-overlay" id="bsOverlay"></div>
  <div class="bs-menu">
    <div class="bs-item" id="bsReply"><span class="bs-icon">&#128172;</span> Responder</div>
    <div class="bs-item" id="bsEdit"><span class="bs-icon">&#9998;&#65039;</span> Editar</div>
    <div class="bs-item" id="bsDelete"><span class="bs-icon">&#128465;&#65039;</span> Eliminar</div>
    <div class="bs-cancel" id="bsCancel">Cancelar</div>
  </div>
</div>

<script>
var API_URL = 'https://script.google.com/macros/s/AKfycbyIrIlhsgjpNcpOcT-aWnpjSSc-HdiDQTu3HqI1I5ZfOWqL_lBoyYj05034THSy1gKEyQ/exec';
var sessionUser = localStorage.getItem('sessionUser');
var sessionPass = localStorage.getItem('sessionPass');
if (!sessionUser || !sessionPass) window.location.href = 'login.html';

var room = location.search.match(/room=([^&]+)/)?.[1] || 'general';
var profileData = null;
try{var s=localStorage.getItem('userProfile');if(s)profileData=JSON.parse(s);}catch(e){}
var userRole = profileData && profileData.rol ? profileData.rol : '';
var canWrite = room !== 'anuncios' || (userRole === 'Owner' || userRole === 'Admin' || userRole === 'App');

var rooms = {
  general:{name:'General',initial:'G',status:'en l\u00ednea'},
  soporte:{name:'Soporte',initial:'S',status:'en l\u00ednea'},
  anuncios:{name:'Anuncios',initial:'\uD83D\uDCF0',status:'<span class="admin-badge">Solo admins</span>'}
};

var info = rooms[room] || rooms.general;
document.getElementById('avatarEl').textContent = info.initial;
document.getElementById('nameEl').textContent = info.name;
document.getElementById('statusEl').innerHTML = info.status;

var messages = [];
var lastFetch = null;
var pollTimer = null;
var userPhotos = {};
var replyTo = null;
var selectedMsgId = null;
var selectedMsgEl = null;
var initialLoadDone = false;

var allRooms = ['general','soporte','anuncios'];
var roomIndexMap = { general:0, soporte:1, anuncios:2 };

if (!canWrite) {
  document.getElementById('msgInput').disabled = true;
  document.getElementById('msgInput').placeholder = 'Solo admins pueden escribir...';
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('restrictedMsg').style.display = 'block';
} else {
  document.getElementById('msgInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  });
}

document.getElementById('sendBtn').addEventListener('click', sendMsg);
document.getElementById('backBtn').addEventListener('click', function() {
  window.parent.postMessage({type:'closeChat'},'*');
});
document.getElementById('replyClose').addEventListener('click', cancelReply);
document.getElementById('bsOverlay').addEventListener('click', closeSheet);
document.getElementById('bsCancel').addEventListener('click', closeSheet);
document.getElementById('bsReply').addEventListener('click', function() { iniciarRespuesta(); closeSheet(); });
document.getElementById('bsEdit').addEventListener('click', function() { iniciarEdicion(); closeSheet(); });
document.getElementById('bsDelete').addEventListener('click', function() { eliminarMsg(); closeSheet(); });

function escHtml(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function jsonp(data) {
  return new Promise(function(resolve, reject) {
    var cb = 'jpcb_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
    var params = [];
    for (var key in data) { if (data.hasOwnProperty(key)) params.push(encodeURIComponent(key)+'='+encodeURIComponent(data[key])); }
    params.push('callback=' + cb);
    var url = API_URL + '?' + params.join('&');
    window[cb] = function(resp) { delete window[cb]; if (script.parentNode) script.parentNode.removeChild(script); resolve(resp); };
    var script = document.createElement('script');
    script.src = url;
    script.onerror = function() { delete window[cb]; if (script.parentNode) script.parentNode.removeChild(script); reject(new Error('Error')); };
    document.body.appendChild(script);
    setTimeout(function(){if(window[cb]){delete window[cb];if(script.parentNode)script.parentNode.removeChild(script);reject(new Error('Timeout'));}},30000);
  });
}

function formatTime(fs) {
  if (!fs) return '';
  var d = new Date(fs);
  if (isNaN(d.getTime())) return '';
  return d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
}

function getUserInitial(name) {
  return (name || '?').charAt(0).toUpperCase();
}

function createMsgEl(msg) {
  var isOwn = msg.user === sessionUser;
  var row = document.createElement('div');
  row.className = 'msg-row' + (isOwn ? ' own' : ' other');

  var inner = document.createElement('div');
  inner.className = 'msg-row-inner';

  if (!isOwn) {
    var av = document.createElement('div');
    av.className = 'msg-avatar';
    var photo = userPhotos[msg.user];
    if (photo) {
      var img = document.createElement('img');
      img.src = photo;
      img.onerror = function(){this.style.display='none';this.parentNode.textContent=getUserInitial(msg.user);};
      av.appendChild(img);
    } else {
      av.textContent = getUserInitial(msg.user);
    }
    inner.appendChild(av);
  }

  var bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.setAttribute('data-msgid', msg.id);

  if (msg.replyTo) {
    var rp = document.createElement('div');
    rp.className = 'msg-reply-preview';
    var ru = document.createElement('div');
    ru.className = 'mrp-user';
    ru.textContent = (msg.replyToUser || '') + ':';
    rp.appendChild(ru);
    var rt = document.createElement('div');
    rt.className = 'mrp-text';
    rt.textContent = msg.replyToMsg || '';
    rp.appendChild(rt);
    bubble.appendChild(rp);
  }

  if (!isOwn) {
    var un = document.createElement('div');
    un.className = 'msg-username';
    un.textContent = msg.user;
    bubble.appendChild(un);
  }

  var txt = document.createElement('div');
  txt.className = 'msg-text';
  txt.textContent = msg.msg;
  bubble.appendChild(txt);

  var footer = document.createElement('div');
  footer.className = 'msg-footer';
  var tm = document.createElement('span');
  tm.className = 'msg-time';
  tm.textContent = formatTime(msg.fecha);
  footer.appendChild(tm);
  if (msg.editado && msg.editado !== 'false') {
    var eb = document.createElement('span');
    eb.className = 'msg-edited-badge';
    eb.textContent = 'editado';
    footer.appendChild(eb);
  }
  bubble.appendChild(footer);
  inner.appendChild(bubble);
  row.appendChild(inner);

  bubble.addEventListener('dblclick', function(e) {
    e.stopPropagation();
    abrirSheet(msg.id, row);
  });
  bubble.addEventListener('touchend', function(e) {
    if (this._lastTap) { clearTimeout(this._lastTap); this._lastTap = null; abrirSheet(msg.id, row); return; }
    this._lastTap = setTimeout(function(){ this._lastTap = null; }.bind(this), 300);
  });

  return row;
}

function appendMsg(msg) {
  var el = document.getElementById('messages');
  el.appendChild(createMsgEl(msg));
  el.scrollTop = el.scrollHeight;
}

function renderAllMsgs() {
  var el = document.getElementById('messages');
  var frag = document.createDocumentFragment();
  for (var i = 0; i < messages.length; i++) frag.appendChild(createMsgEl(messages[i]));
  el.innerHTML = '';
  el.appendChild(frag);
  el.scrollTop = el.scrollHeight;
}

function updateMsgInDom(msgId, updater) {
  var el = document.getElementById('messages');
  for (var i = 0; i < el.children.length; i++) {
    var row = el.children[i];
    var bubble = row.querySelector('.msg-bubble');
    if (bubble && bubble.getAttribute('data-msgid') === msgId) {
      updater(row);
      return;
    }
  }
}

function abrirSheet(msgId, rowEl) {
  selectedMsgId = msgId;
  selectedMsgEl = rowEl;
  var msg = null;
  for (var i = 0; i < messages.length; i++) {
    if (messages[i].id === msgId) { msg = messages[i]; break; }
  }
  document.getElementById('bottomSheet').classList.add('open');
}

function closeSheet() {
  document.getElementById('bottomSheet').classList.remove('open');
  selectedMsgId = null;
  selectedMsgEl = null;
}

function getMsgById(id) {
  for (var i = 0; i < messages.length; i++) {
    if (messages[i].id === id) return messages[i];
  }
  return null;
}

function iniciarRespuesta() {
  var msg = getMsgById(selectedMsgId);
  if (!msg) return;
  replyTo = msg;
  document.getElementById('replyUser').textContent = 'Respondiendo a ' + msg.user;
  document.getElementById('replyMsg').textContent = msg.msg;
  document.getElementById('replyBar').style.display = 'flex';
  document.getElementById('msgInput').focus();
}

function cancelReply() {
  replyTo = null;
  document.getElementById('replyBar').style.display = 'none';
}

function iniciarEdicion() {
  var msg = getMsgById(selectedMsgId);
  if (!msg) return;
  var row = selectedMsgEl;
  if (!row) return;
  var bubble = row.querySelector('.msg-bubble');
  var txtEl = row.querySelector('.msg-text');
  if (!txtEl) return;
  var originalText = msg.msg;
  txtEl.style.display = 'none';
  var ea = document.createElement('div');
  ea.className = 'edit-area';
  var inp = document.createElement('input');
  inp.type = 'text';
  inp.value = originalText;
  inp.maxLength = 2000;
  var saveBtn = document.createElement('button');
  saveBtn.textContent = 'Guardar';
  var cancelBtn = document.createElement('button');
  cancelBtn.className = 'edit-cancel';
  cancelBtn.textContent = 'Cancelar';
  ea.appendChild(inp);
  ea.appendChild(saveBtn);
  ea.appendChild(cancelBtn);
  txtEl.parentNode.insertBefore(ea, txtEl.nextSibling);

  var cleanup = function() {
    txtEl.style.display = '';
    if (ea.parentNode) ea.parentNode.removeChild(ea);
  };

  var doSave = function() {
    var newText = inp.value.trim();
    if (!newText || newText === originalText) { cleanup(); return; }
    saveBtn.disabled = true;
    cancelBtn.disabled = true;
    jsonp({ action:'editMessage', user:sessionUser, pass:sessionPass, msgId:msg.id, newMsg:newText, room:room }).then(function(resp) {
      try {
        var r = typeof resp === 'string' ? JSON.parse(resp) : resp;
        if (r.status === 'OK') {
          msg.msg = newText;
          msg.editado = 'true ' + new Date().toISOString();
          txtEl.textContent = newText;
          cleanup();
          var footer = bubble.querySelector('.msg-footer');
          if (footer) {
            var existingBadge = footer.querySelector('.msg-edited-badge');
            if (!existingBadge) {
              var eb = document.createElement('span');
              eb.className = 'msg-edited-badge';
              eb.textContent = 'editado';
              footer.appendChild(eb);
            }
          }
        } else {
          alert('Error al editar: ' + (r.message || 'desconocido'));
        }
      } catch(e) {}
      saveBtn.disabled = false;
      cancelBtn.disabled = false;
    }).catch(function() { saveBtn.disabled = false; cancelBtn.disabled = false; });
  };

  inp.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSave(); }
    if (e.key === 'Escape') cleanup();
  });
  saveBtn.addEventListener('click', doSave);
  cancelBtn.addEventListener('click', cleanup);
  inp.focus();
  inp.setSelectionRange(inp.value.length, inp.value.length);
}

function eliminarMsg() {
  var msg = getMsgById(selectedMsgId);
  if (!msg) return;
  if (!confirm('Eliminar este mensaje?')) return;
  jsonp({ action:'deleteMessage', user:sessionUser, pass:sessionPass, msgId:msg.id, room:room }).then(function(resp) {
    try {
      var r = typeof resp === 'string' ? JSON.parse(resp) : resp;
      if (r.status === 'OK') {
        for (var i = 0; i < messages.length; i++) {
          if (messages[i].id === msg.id) { messages.splice(i,1); break; }
        }
        if (selectedMsgEl && selectedMsgEl.parentNode) selectedMsgEl.parentNode.removeChild(selectedMsgEl);
        if (replyTo && replyTo.id === msg.id) cancelReply();
      } else {
        alert('Error al eliminar');
      }
    } catch(e) {}
  }).catch(function(){});
}

function fetchMsgs() {
  var params = { action:'getMessages', user:sessionUser, pass:sessionPass, room:room };
  if (lastFetch) params.since = lastFetch;
  return jsonp(params).then(function(resp) {
    try {
      var data = typeof resp === 'string' ? JSON.parse(resp) : resp;
      if (data.status !== 'OK' || !data.messages) return;
      if (data.fotos) { for (var fu in data.fotos) { if (data.fotos.hasOwnProperty(fu)) userPhotos[fu] = data.fotos[fu]; } }
      var newMsgs = data.messages;
      if (!newMsgs.length) return;
      if (!lastFetch) {
        messages = [];
        for (var k = 0; k < newMsgs.length; k++) {
          if (newMsgs[k].replyTo) {
            for (var ri = 0; ri < newMsgs.length; ri++) {
              if (newMsgs[ri].id === newMsgs[k].replyTo) {
                newMsgs[k].replyToUser = newMsgs[ri].user;
                newMsgs[k].replyToMsg = newMsgs[ri].msg;
                break;
              }
            }
          }
          messages.push(newMsgs[k]);
        }
        renderAllMsgs();
        if (!initialLoadDone && newMsgs.length) {
          initialLoadDone = true;
          localStorage.setItem('lastRead_' + room, newMsgs[newMsgs.length - 1].fecha);
          localStorage.setItem('unread_' + room, '0');
          try{window.parent.postMessage({type:'unreadUpdate', room:room, count:0},'*');}catch(e){}
        }
      } else {
        for (var i = 0; i < newMsgs.length; i++) {
          var exists = false;
          for (var j = 0; j < messages.length; j++) {
            if (messages[j].id === newMsgs[i].id) { exists = true; break; }
          }
          if (!exists) {
            if (newMsgs[i].replyTo) {
              for (var ri2 = 0; ri2 < newMsgs.length; ri2++) {
                if (newMsgs[ri2].id === newMsgs[i].replyTo) {
                  newMsgs[i].replyToUser = newMsgs[ri2].user;
                  newMsgs[i].replyToMsg = newMsgs[ri2].msg;
                  break;
                }
              }
              if (!newMsgs[i].replyToUser) {
                for (var ri3 = 0; ri3 < messages.length; ri3++) {
                  if (messages[ri3].id === newMsgs[i].replyTo) {
                    newMsgs[i].replyToUser = messages[ri3].user;
                    newMsgs[i].replyToMsg = messages[ri3].msg;
                    break;
                  }
                }
              }
            }
            messages.push(newMsgs[i]);
            appendMsg(newMsgs[i]);
          }
        }
      }
      lastFetch = newMsgs[newMsgs.length - 1].fecha;
    } catch(e) {}
  }).catch(function(){});
}

function sendMsg() {
  if (!canWrite) return;
  var input = document.getElementById('msgInput');
  var text = input.value.trim();
  if (!text) return;
  var tempId = '_temp_' + Date.now();

  var optMsg = { id:tempId, user:sessionUser, msg:text, fecha:new Date().toISOString() };
  if (replyTo) {
    optMsg.replyTo = replyTo.id;
    optMsg.replyToUser = replyTo.user;
    optMsg.replyToMsg = replyTo.msg;
  }
  messages.push(optMsg);
  appendMsg(optMsg);
  input.value = '';
  var rp = replyTo ? replyTo.id : '';
  cancelReply();

  var apiParams = { action:'sendMessage', user:sessionUser, pass:sessionPass, msg:text, room:room };
  if (rp) apiParams.replyTo = rp;
  jsonp(apiParams).then(function(resp) {
    try {
      var r = typeof resp === 'string' ? JSON.parse(resp) : resp;
      if (r.status === 'OK') {
        for (var oi = 0; oi < messages.length; oi++) {
          if (messages[oi].id === tempId) { messages[oi].id = r.id; break; }
        }
      } else {
        for (var ri = 0; ri < messages.length; ri++) {
          if (messages[ri].id === tempId) { messages.splice(ri,1); renderAllMsgs(); break; }
        }
      }
    } catch(e) {}
  }).catch(function(){});
}

fetchMsgs();
pollTimer = setInterval(fetchMsgs, 1000);

setInterval(function() {
  allRooms.forEach(function(r) {
    if (r === room) return;
    jsonp({ action:'getMessages', user:sessionUser, pass:sessionPass, room:r }).then(function(resp) {
      try {
        var data = typeof resp === 'string' ? JSON.parse(resp) : resp;
        if (data.status !== 'OK' || !data.messages) return;
        if (data.fotos) { for (var fu in data.fotos) { if (data.fotos.hasOwnProperty(fu)) userPhotos[fu] = data.fotos[fu]; } }
        var msgs = data.messages;
        var lastRead = localStorage.getItem('lastRead_' + r);
        if (!lastRead) {
          var c = msgs.length > 0 ? Math.min(2, msgs.length) : 0;
          localStorage.setItem('unread_' + r, String(c));
          try{window.parent.postMessage({type:'unreadUpdate', room:r, count:c},'*');}catch(e){}
          return;
        }
        var count = 0;
        for (var i = 0; i < msgs.length; i++) {
          if (msgs[i].fecha > lastRead) count++;
        }
        var prev = localStorage.getItem('unread_' + r);
        localStorage.setItem('unread_' + r, String(count));
        if (String(count) !== prev) {
          try{window.parent.postMessage({type:'unreadUpdate', room:r, count:count},'*');}catch(e){}
        }
      } catch(e) {}
    }).catch(function(){});
  });
}, 5000);
</script>
