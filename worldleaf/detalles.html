<div class="detail-container" id="detailContainer">
  <button class="detail-close" id="detailClose" title="Cerrar">&times;</button>

  <div class="detail-card">
    <div class="detail-banner" id="detailBanner">
      <div class="detail-slider" id="detailSlider"></div>
      <div class="detail-nav" id="detailNav"></div>
      <div class="detail-arrows">
        <button class="detail-arrow" id="detailPrev">&lsaquo;</button>
        <button class="detail-arrow" id="detailNext">&rsaquo;</button>
      </div>
    </div>

    <div class="detail-body">
      <div class="detail-badges" id="detailBadges"></div>
      <h2 class="detail-title" id="detailTitle"></h2>
      <div class="detail-meta" id="detailMeta"></div>
      <div class="detail-desc" id="detailDesc"></div>
      <div class="detail-footer" id="detailFooter"></div>
    </div>
  </div>
</div>
