<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Perfil - WorldLeaf App</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-void: #060a0f; --bg-body: #0b1120; --bg-card: #111827; --bg-card2: #162032;
      --bg-topbar: rgba(6,10,15,0.92); --bg-sidebar: #0d1729;
      --primary: #22c55e; --primary-light: #4ade80; --primary-dark: #16a34a;
      --primary-bg: rgba(34,197,94,0.09); --primary-glow: rgba(34,197,94,0.25);
      --primary-gradient: linear-gradient(135deg,#4ade80,#22c55e);
      --amber: #f59e0b; --amber-light: #fbbf24; --amber-bg: rgba(245,158,11,0.10); --amber-glow: rgba(245,158,11,0.22);
      --blue: #3b82f6; --blue-light: #60a5fa; --blue-bg: rgba(59,130,246,0.10);
      --info: #06b6d4; --info-bg: rgba(6,182,212,0.10);
      --owner-gradient: linear-gradient(135deg,#fcd34d,#f59e0b);
      --admin-gradient: linear-gradient(135deg,#60a5fa,#3b82f6);
      --app-gradient: linear-gradient(135deg,#c084fc,#a855f7);
      --text: #f0f6ff; --text-secondary: #94a3b8; --text-muted: #4b5e78; --text-light: #2d3f57;
      --border: #1e2f48; --border-light: #131f30; --surface: #162032; --surface-2: #1e2f48;
      --shadow: 0 4px 16px rgba(0,0,0,0.5); --shadow-md: 0 8px 28px rgba(0,0,0,0.6);
      --shadow-lg: 0 20px 48px rgba(0,0,0,0.7); --shadow-glow: 0 0 24px var(--primary-glow);
      --success: #22c55e; --success-bg: rgba(34,197,94,0.10);
      --danger: #ef4444; --danger-bg: rgba(239,68,68,0.10);
      --warning: #f59e0b; --warning-bg: rgba(245,158,11,0.10);
      --radius: 14px; --radius-sm: 9px;
      --overlay: rgba(0,0,0,0.72);
      --viewer-bg: #090d16; --viewer-body: #0f172a; --viewer-text: #f8fafc;
      --viewer-text-muted: #64748b; --viewer-text-light: #cbd5e1;
      --viewer-comment-bg: #1e293b; --viewer-comment-text: #cbd5e1;
      --viewer-border: #334155; --viewer-btn-bg: rgba(255,255,255,0.1);
      --viewer-btn-hover: rgba(255,255,255,0.2); --viewer-primary: #22c55e;
      --input-bg: #1e293b; --input-text: #f8fafc; --input-border: #334155;
    }
    [data-theme="dark"] {
      --bg-body: #0b1120; --bg-card: #1e293b; --bg-topbar: rgba(6,10,15,0.92);
      --bg-sidebar: #0d1729; --primary: #22c55e; --primary-light: #4ade80;
      --primary-bg: rgba(34,197,94,0.09); --primary-dark: #16a34a;
      --primary-gradient: linear-gradient(135deg,#4ade80,#22c55e);
      --primary-glow: rgba(34,197,94,0.25); --text: #f0f6ff;
      --text-secondary: #94a3b8; --text-muted: #4b5e78; --text-light: #2d3f57;
      --border: #1e2f48; --border-light: #131f30;
      --shadow: 0 4px 16px rgba(0,0,0,0.5); --shadow-md: 0 8px 28px rgba(0,0,0,0.6);
    }
    [data-scheme="blue"] { --primary: #3b82f6; --primary-light: #60a5fa; --primary-bg: rgba(59,130,246,0.1); --primary-dark: #2563eb; --primary-gradient: linear-gradient(135deg,#60a5fa,#3b82f6); --viewer-primary: #60a5fa; }
    [data-scheme="purple"] { --primary: #8b5cf6; --primary-light: #a78bfa; --primary-bg: rgba(139,92,246,0.1); --primary-dark: #7c3aed; --primary-gradient: linear-gradient(135deg,#a78bfa,#8b5cf6); --viewer-primary: #a78bfa; }
    [data-scheme="orange"] { --primary: #f97316; --primary-light: #fb923c; --primary-bg: rgba(249,115,22,0.1); --primary-dark: #ea580c; --primary-gradient: linear-gradient(135deg,#fb923c,#f97316); --viewer-primary: #fb923c; }
    *,::before,::after{box-sizing:border-box;margin:0;padding:0;}
    ::-webkit-scrollbar{width:6px;height:6px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
    ::-webkit-scrollbar-thumb:hover{background:var(--surface-2);}
    body{
      font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
      background:var(--bg-body);min-height:100vh;color:var(--text);
      transition:background-color 0.3s ease, color 0.3s ease;
      overflow-x:hidden;width:100%;max-width:100%;
    }
    body::before{
      content:'';position:fixed;inset:0;z-index:-2;pointer-events:none;
      background-image:linear-gradient(var(--border-light) 1px,transparent 1px),linear-gradient(90deg,var(--border-light) 1px,transparent 1px);
      background-size:28px 28px;opacity:0.35;
    }
    body::after{
      content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
      background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(34,197,94,0.07) 0%,transparent 70%);
    }
    .page{padding:0 16px 40px;max-width:720px;margin:0 auto;animation:fadeIn 0.4s ease-out;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
    .page-title{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;color:var(--text);letter-spacing:-0.5px;margin:20px 0 16px;display:flex;align-items:center;gap:10px;}
    .section-title{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;}
    .stat-number{font-family:'Rajdhani',sans-serif;font-size:32px;font-weight:700;color:var(--primary);}
    .skeleton{text-align:center;padding:60px 20px;color:var(--text-secondary);font-size:15px;}
    .skeleton .spinner{width:32px;height:32px;border:4px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none;font-weight:500;}
    .msg.error{display:block;background:var(--danger-bg);color:var(--danger);border:1px solid rgba(239,68,68,0.2);}
    .msg.success{display:block;background:var(--primary-bg);color:var(--primary);border:1px solid var(--primary-glow);}

    .profile-header{position:relative;margin-bottom:20px;}
    .cover-wrap{position:relative;width:100%;height:180px;border-radius:var(--radius);overflow:hidden;background:var(--primary-gradient);}
    .cover-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
    .cover-gradient{position:absolute;bottom:0;left:0;right:0;height:60%;background:linear-gradient(transparent 30%,var(--bg-body));}
    .profile-row{display:flex;align-items:flex-end;gap:16px;margin-top:-48px;padding:0 4px;position:relative;z-index:2;}
    .avatar-wrap{position:relative;width:96px;height:96px;border-radius:50%;padding:3px;background:var(--primary-gradient);flex-shrink:0;}
    .avatar-inner{width:100%;height:100%;border-radius:50%;overflow:hidden;background:var(--bg-body);}
    .avatar-inner img{width:100%;height:100%;object-fit:cover;display:block;}
    .avatar-inner .avatar-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:700;color:var(--primary);background:var(--primary-bg);}
    .profile-meta{flex:1;min-width:0;padding-top:36px;}
    .profile-name{font-size:22px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .badge-rol{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;padding:3px 11px;border-radius:20px;display:inline-flex;align-items:center;}
    .badge-owner{background:linear-gradient(135deg,#fcd34d,#f59e0b);color:#fff;box-shadow:0 2px 8px rgba(245,158,11,0.35);}
    .badge-admin{background:linear-gradient(135deg,#60a5fa,#3b82f6);color:#fff;box-shadow:0 2px 8px rgba(59,130,246,0.30);}
    .badge-app{background:linear-gradient(135deg,#c084fc,#a855f7);color:#fff;box-shadow:0 2px 8px rgba(168,85,247,0.30);}
    .badge-user{background:var(--primary-bg);color:var(--primary);}
    .profile-details{margin-top:8px;display:flex;flex-direction:column;gap:4px;font-size:13px;color:var(--text-secondary);}
    .profile-details span{display:flex;align-items:center;gap:6px;}
    .profile-details .label{color:var(--text-muted);font-weight:500;}
    .profile-details .val{color:var(--text);font-weight:600;}
    .status-active{color:var(--primary);font-weight:600;}
    .status-inactive{color:var(--danger);font-weight:600;}
    .btn-edit-profile{
      position:absolute;top:12px;right:12px;z-index:5;
      width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,0.5);
      background:rgba(0,0,0,0.4);color:#fff;font-size:17px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      backdrop-filter:blur(4px);transition:all .2s;
    }
    .btn-edit-profile:hover{background:rgba(0,0,0,0.7);border-color:#fff;transform:scale(1.05);}

    .bio-card{background:var(--bg-card);border-radius:var(--radius);padding:16px;margin-bottom:16px;position:relative;overflow:hidden;box-shadow:var(--shadow);}
    .bio-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--primary-gradient);}
    .bio-card .label{font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
    .bio-card .text{font-size:14px;color:var(--text);line-height:1.6;white-space:pre-wrap;word-break:break-word;}
    .bio-card .empty{font-size:14px;color:var(--text-light);font-style:italic;}

    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
    .stat-card{background:var(--bg-card);border-radius:var(--radius);padding:16px;position:relative;overflow:hidden;box-shadow:var(--shadow);text-align:center;}
    .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--primary-gradient);}
    .stat-card .num{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;color:var(--primary);}
    .stat-card .lbl{font-size:12px;color:var(--text-secondary);font-weight:500;margin-top:2px;}

    .section-card{background:var(--bg-card);border-radius:var(--radius);padding:16px;margin-bottom:16px;position:relative;overflow:hidden;box-shadow:var(--shadow);}
    .section-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--primary-gradient);}
    .section-card .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
    .section-card .head .st{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--text);}

    .foro-card{background:var(--bg-card2);border-radius:12px;overflow:hidden;margin-bottom:12px;cursor:pointer;transition:transform .2s ease,box-shadow .2s ease;border:1px solid var(--border-light);}
    .foro-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
    .foro-card-header{padding:12px 14px 0;display:flex;justify-content:space-between;align-items:center;}
    .foro-card-user{font-size:13px;font-weight:600;color:var(--primary);}
    .foro-card-date{font-size:11px;color:var(--text-muted);}
    .foro-card-snippet{padding:8px 14px 0;font-size:13px;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word;line-height:1.5;}
    .foro-card-imgs{margin-top:8px;display:grid;gap:2px;overflow:hidden;}
    .foro-card-imgs img{width:100%;height:100%;object-fit:cover;display:block;}
    .foro-card-imgs.single img{max-height:200px;}
    .foro-card-imgs.double{grid-template-columns:1fr 1fr;}
    .foro-card-imgs.double img{height:150px;}
    .foro-card-imgs.triple{grid-template-columns:2fr 1fr;grid-template-rows:80px 80px;}
    .foro-card-imgs.triple img:first-child{grid-row:1/3;height:162px;}
    .foro-card-imgs.triple img:not(:first-child){height:80px;}
    .foro-card-imgs.quad{grid-template-columns:1fr 1fr;grid-template-rows:80px 80px;}
    .foro-card-imgs.quad img{height:80px;}
    .foro-card-imgs.quint{grid-template-columns:1fr 1fr 1fr;grid-template-rows:80px 80px;}
    .foro-card-imgs.quint img:first-child{grid-column:1/3;grid-row:1/3;height:162px;}
    .foro-card-imgs.quint img:not(:first-child){height:80px;}
    .foro-card-stats{padding:8px 14px 12px;display:flex;gap:14px;font-size:12px;color:var(--text-secondary);}
    .tipo-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;background:var(--primary-bg);color:var(--primary);text-transform:uppercase;}
    .sin-items{text-align:center;color:var(--text-light);font-size:14px;padding:20px 0;}

    .coin-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border-light);}
    .coin-item:last-child{border-bottom:none;}
    .coin-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
    .coin-icon.plus{background:var(--success-bg);color:var(--success);}
    .coin-icon.minus{background:var(--danger-bg);color:var(--danger);}
    .coin-info{flex:1;min-width:0;}
    .coin-desc{font-size:14px;font-weight:600;color:var(--text);}
    .coin-date{font-size:11px;color:var(--text-secondary);}
    .coin-amount{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;}
    .coin-amount.plus{color:var(--success);}
    .coin-amount.minus{color:var(--danger);}

    .modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--overlay);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;padding:20px;}
    .modal-overlay.active{display:flex;}
    .modal{background:var(--bg-card);border-radius:16px;padding:28px 24px;max-width:440px;width:100%;position:relative;box-shadow:var(--shadow-lg);max-height:90vh;overflow-y:auto;}
    .modal-close{position:absolute;top:10px;right:14px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-secondary);line-height:1;}
    .modal h3{font-size:18px;font-weight:700;color:var(--text);margin-bottom:16px;}
    .modal .form-group{margin-bottom:14px;}
    .modal .form-group label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;}
    .modal .form-group input,.modal .form-group textarea{
      width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);
      font-size:14px;color:var(--text);outline:none;transition:all .2s;
      font-family:'Inter',sans-serif;background:var(--bg-card2);
    }
    .modal .form-group input:focus,.modal .form-group textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow);}
    .modal .form-group textarea{resize:vertical;min-height:80px;}
    .btn-modal{
      width:100%;padding:12px;border:none;border-radius:var(--radius-sm);
      font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;
      cursor:pointer;transition:all .2s;background:var(--primary);color:#fff;
      letter-spacing:0.5px;margin-top:4px;
    }
    .btn-modal:hover{background:var(--primary-dark);}
    .btn-modal:disabled{opacity:0.5;cursor:not-allowed;}
    .btn-modal-sec{background:var(--text-muted);}
    .btn-modal-sec:hover{background:var(--text-secondary);}
    .edit-link-row{display:flex;align-items:center;gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border-light);}
    .edit-link-row a{font-size:13px;color:var(--primary);text-decoration:none;font-weight:600;}
    .edit-link-row a:hover{text-decoration:underline;}

    .viewer{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--viewer-bg);z-index:300;display:flex;flex-direction:column;overflow-y:auto;}
    .viewer-close{position:fixed;top:16px;right:20px;z-index:310;background:var(--viewer-btn-bg);color:#fff;border:none;font-size:28px;width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
    .viewer-close:hover{background:var(--viewer-btn-hover);transform:scale(1.05);}
    .viewer-topbar{padding:20px 24px 0;display:flex;justify-content:space-between;align-items:center;}
    .viewer-user{color:var(--viewer-primary);font-size:15px;font-weight:700;}
    .viewer-date{color:var(--viewer-text-muted);font-size:13px;}
    .viewer-carousel{position:relative;display:flex;align-items:center;justify-content:center;padding:24px;max-height:55vh;}
    .carousel-track{display:flex;overflow-x:auto;gap:16px;padding:0 40px;scroll-behavior:smooth;max-width:100%;}
    .carousel-track img{max-height:50vh;border-radius:12px;object-fit:contain;cursor:pointer;flex-shrink:0;box-shadow:0 8px 24px rgba(0,0,0,0.4);}
    .carousel-btn{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;background:var(--viewer-btn-bg);color:#fff;border:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;transition:all .2s;}
    .carousel-btn:hover{background:var(--viewer-btn-hover);transform:scale(1.05) translateY(-50%);}
    .carousel-prev{left:12px;}
    .carousel-next{right:12px;}
    .viewer-dots{display:flex;justify-content:center;gap:8px;padding:0 24px 16px;flex-wrap:wrap;}
    .viewer-dot{width:10px;height:10px;border-radius:50%;background:var(--viewer-border);border:none;cursor:pointer;padding:0;transition:all .2s;}
    .viewer-dot.active{background:var(--viewer-primary);transform:scale(1.2);}
    .viewer-body{background:var(--viewer-body);border-radius:24px 24px 0 0;padding:24px;flex:1;border-top:1px solid var(--viewer-border);}
    .viewer-desc{color:var(--viewer-text);font-size:15px;line-height:1.6;white-space:pre-wrap;word-break:break-word;max-height:220px;overflow-y:auto;margin-bottom:16px;}
    .viewer-actions{display:flex;gap:16px;margin-bottom:20px;}
    .viewer-actions .vbtn{background:none;border:1px solid var(--viewer-border);color:var(--viewer-text-light);padding:8px 20px;border-radius:24px;cursor:pointer;font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;transition:all .2s;}
    .viewer-actions .vbtn:hover{border-color:var(--viewer-primary);color:var(--viewer-primary);background:var(--viewer-btn-bg);}
    .viewer-actions .vbtn.liked{border-color:var(--viewer-primary);color:var(--viewer-primary);background:color-mix(in srgb, var(--viewer-primary) 15%, transparent);}
    .viewer-comments h4{color:var(--viewer-text-light);font-size:16px;font-weight:700;margin-bottom:12px;}
    .viewer-comments #viewerCommentsList{margin-bottom:16px;}
    .ver-mas-coms{display:block;width:100%;text-align:center;padding:10px;font-size:14px;font-weight:600;border:1px solid var(--viewer-border);border-radius:10px;background:none;color:var(--viewer-text-light);cursor:pointer;margin-top:6px;transition:all .2s;}
    .ver-mas-coms:hover{border-color:var(--viewer-primary);color:var(--viewer-primary);background:var(--viewer-btn-bg);}
    .viewer-comment{background:var(--viewer-comment-bg);border-radius:12px;padding:12px 16px;margin-bottom:10px;border:1px solid var(--viewer-border);}
    .viewer-comment-user{font-size:13px;font-weight:700;color:var(--viewer-primary);margin-bottom:4px;}
    .viewer-comment-text{font-size:14px;color:var(--viewer-comment-text);line-height:1.5;word-break:break-word;}
    .viewer-comment-date{font-size:11px;color:var(--viewer-text-muted);margin-top:6px;}
    .comment-form textarea{width:100%;padding:12px;border:1px solid var(--input-border);border-radius:10px;background:var(--input-bg);color:var(--input-text);font-size:14px;resize:vertical;min-height:48px;font-family:inherit;outline:none;margin-bottom:10px;transition:border-color .2s;}
    .comment-form textarea:focus{border-color:var(--primary);}
    .comment-form .btn-modal{width:100%;padding:12px;border:none;border-radius:10px;font-size:16px;font-weight:700;font-family:'Rajdhani',sans-serif;cursor:pointer;background:var(--primary);color:#fff;transition:all .2s;}
    .comment-form .btn-modal:hover{background:var(--primary-dark);box-shadow:0 4px 12px var(--primary-glow);}

    .blocked-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;}
    .blocked-overlay .block-icon{font-size:72px;margin-bottom:16px;animation:pulseBlock 2s infinite;}
    @keyframes pulseBlock{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.1);opacity:0.8;}}
    .blocked-overlay h2{font-size:24px;font-weight:800;color:#ef4444;margin-bottom:8px;}
    .blocked-overlay p{font-size:15px;color:#cbd5e1;max-width:480px;line-height:1.6;margin-bottom:16px;}
    .blocked-overlay .razones{text-align:left;color:#94a3b8;font-size:14px;line-height:1.8;margin-bottom:24px;}
    .blocked-overlay .razones li{margin-bottom:4px;}
    .blocked-overlay .btn-soporte{display:inline-block;padding:14px 40px;border-radius:12px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;font-size:16px;font-weight:700;text-decoration:none;transition:all .2s;box-shadow:0 4px 16px rgba(59,130,246,0.3);}
    .blocked-overlay .btn-soporte:hover{transform:scale(1.05);box-shadow:0 8px 24px rgba(59,130,246,0.5);}
  </style>
</head>
<body>

<div id="loading" class="skeleton"><div class="spinner"></div>Cargando perfil...</div>

<div id="pageContent" class="page" style="display:none;">
  <div id="msgGlobal" class="msg"></div>

  <div class="profile-header">
    <div class="cover-wrap" id="coverWrap">
      <img id="coverImg" src="" alt="" style="display:none">
      <div class="cover-gradient"></div>
      <button class="btn-edit-profile" id="btnEdit" onclick="abrirEditModal()">&#9998;</button>
    </div>
    <div class="profile-row">
      <div class="avatar-wrap">
        <div class="avatar-inner">
          <div class="avatar-placeholder" id="avatarPlaceholder">U</div>
          <img id="avatarImg" src="" alt="" style="display:none">
        </div>
      </div>
      <div class="profile-meta">
        <div class="profile-name">
          <span id="userName"></span>
          <span class="badge-rol" id="userRol"></span>
        </div>
        <div class="profile-details">
          <span><span class="label">Email:</span><span class="val" id="userEmail"></span></span>
          <span><span class="label">Miembro desde:</span><span class="val" id="userJoinDate"></span></span>
          <span><span class="label">Coins:</span><span class="val" id="userCoins"></span></span>
          <span><span class="label">Estado:</span><span class="val" id="userStatus"></span></span>
        </div>
      </div>
    </div>
  </div>

  <div class="bio-card">
    <div class="label">Biograf&iacute;a</div>
    <div class="text" id="bioText"></div>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><div class="num" id="statPosts">0</div><div class="lbl">Publicaciones</div></div>
    <div class="stat-card"><div class="num" id="statLikes">0</div><div class="lbl">Likes recibidos</div></div>
    <div class="stat-card"><div class="num" id="statComments">0</div><div class="lbl">Comentarios</div></div>
    <div class="stat-card"><div class="num" id="statMemberSince">-</div><div class="lbl">Miembro desde</div></div>

  <div class="section-card" id="sectionForos">
    <div class="head"><span class="st">Mis publicaciones</span></div>
    <div id="forosList"></div>
  </div>

  <div class="section-card" id="sectionCoins">
    <div class="head"><span class="st">Movimientos de Coins</span></div>
    <div id="coinsList"></div>
  </div>
</div>

<div class="modal-overlay" id="modalEdit">
  <div class="modal">
    <button class="modal-close" onclick="cerrarModal('modalEdit')">&times;</button>
    <h3>Editar perfil</h3>
    <div id="editMsg" class="msg"></div>
    <div class="form-group">
      <label>Foto de perfil (URL)</label>
      <input type="text" id="editFotoUrl" placeholder="https://ejemplo.com/avatar.jpg">
    </div>
    <div class="form-group">
      <label>Biograf&iacute;a</label>
      <textarea id="editBio" placeholder="Cu&eacute;ntanos sobre ti..." maxlength="500"></textarea>
    </div>
    <button class="btn-modal" id="btnGuardarEdit" onclick="guardarEdit()">Guardar cambios</button>
    <div class="edit-link-row">
      <a href="Ajustes.html" target="_parent">Cambiar contrase&ntilde;a &rarr;</a>
    </div>
  </div>
</div>

<div class="viewer" id="viewerModal" style="display:none;">
  <button class="viewer-close" onclick="cerrarViewer()">&times;</button>
  <div class="viewer-topbar">
    <span class="viewer-user" id="viewerUser"></span>
    <span class="viewer-date" id="viewerDate"></span>
  </div>
  <div class="viewer-carousel" id="viewerCarousel">
    <button class="carousel-btn carousel-prev" onclick="carouselPrev()">&#10094;</button>
    <div class="carousel-track" id="carouselTrack"></div>
    <button class="carousel-btn carousel-next" onclick="carouselNext()">&#10095;</button>
  </div>
  <div class="viewer-dots" id="viewerDots"></div>
  <div class="viewer-body">
    <div class="viewer-desc" id="viewerDesc"></div>

      <button class="vbtn like" id="viewerLikeBtn" onclick="darLike()">&#128077; <span id="viewerLikes">0</span></button>
      <button class="vbtn dislike" id="viewerDislikeBtn" onclick="darDislike()">&#128078; <span id="viewerDislikes">0</span></button>

        <textarea id="commentInput" placeholder="Escribe un comentario..." rows="2"></textarea>

      <div id="viewerCommentsList"></div>

</div>

<script>
(function(){
  var t = localStorage.getItem('tema');
  if (t === 'oscuro') document.documentElement.setAttribute('data-theme', 'dark');
  var e = localStorage.getItem('esquema');
  if (e && e !== 'default') document.documentElement.setAttribute('data-scheme', e);
  var cp = localStorage.getItem('colorPrimario');
  if (cp) { document.documentElement.style.setProperty('--primary', cp); document.documentElement.style.setProperty('--primary-light', cp); document.documentElement.style.setProperty('--viewer-primary', cp); }
  var cf = localStorage.getItem('colorFondo');
  if (cf) document.documentElement.style.setProperty('--bg-body', cf);
})();

var API_URL = 'https://script.google.com/macros/s/AKfycbyIrIlhsgjpNcpOcT-aWnpjSSc-HdiDQTu3HqI1I5ZfOWqL_lBoyYj05034THSy1gKEyQ/exec';
var sessionUser = localStorage.getItem('sessionUser');
var sessionPass = localStorage.getItem('sessionPass');
if (!sessionUser || !sessionPass) { window.location.href = 'login.html'; }

function jsonp(data) {
  return new Promise(function(resolve, reject) {
    var cb = 'jpcb_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
    var params = [];
    for (var key in data) { if (data.hasOwnProperty(key)) params.push(encodeURIComponent(key) + '=' + encodeURIComponent(data[key])); }
    params.push('callback=' + cb);
    var url = API_URL + '?' + params.join('&');
    window[cb] = function(resp) { delete window[cb]; if (script.parentNode) script.parentNode.removeChild(script); resolve(resp); };
    var script = document.createElement('script');
    script.src = url;
    script.onerror = function() { delete window[cb]; if (script.parentNode) script.parentNode.removeChild(script); reject(new Error('Error de conexi&oacute;n')); };
    document.body.appendChild(script);
    setTimeout(function() { if (window[cb]) { delete window[cb]; if (script.parentNode) script.parentNode.removeChild(script); reject(new Error('Tiempo de espera agotado')); } }, 60000);
  });
}

function escHtml(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function tiempoRelativo(fs) {
  if (!fs) return ''; var d = new Date(fs); if (isNaN(d.getTime())) return fs;
  var seg = Math.floor((Date.now() - d.getTime()) / 1000);
  if (seg < 60) return 'hace ' + seg + ' segundos'; var min = Math.floor(seg / 60);
  if (min < 60) return 'hace ' + min + (min === 1 ? ' minuto' : ' minutos'); var hor = Math.floor(min / 60);
  if (hor < 24) return 'hace ' + hor + (hor === 1 ? ' hora' : ' horas'); var dia = Math.floor(hor / 24);
  if (dia < 30) return 'hace ' + dia + (dia === 1 ? ' d&iacute;a' : ' d&iacute;as'); var mes = Math.floor(dia / 30);
  if (mes < 12) return 'hace ' + mes + (mes === 1 ? ' mes' : ' meses'); var anio = Math.floor(mes / 12);
  return 'hace ' + anio + (anio === 1 ? ' a&ntilde;o' : ' a&ntilde;os');
}

function mostrarAlerta(id, texto, tipo) {
  var el = document.getElementById(id);
  el.textContent = texto; el.className = 'msg ' + tipo;
  el.style.display = 'block';
  if (tipo !== 'loading') setTimeout(function() { el.style.display = 'none'; }, 5000);
}

function abrirModal(id) { document.getElementById(id).classList.add('active'); }
function cerrarModal(id) { document.getElementById(id).classList.remove('active'); }

function mostrarCuentaInactiva() {
  var overlay = document.createElement('div');
  overlay.className = 'blocked-overlay';
  overlay.innerHTML = '<div class="block-icon">&#128683;</div>'
    + '<h2>Cuenta Desactivada</h2>'
    + '<p>Tu cuenta ha sido desactivada. Esto pudo deberse a las siguientes razones:</p>'
    + '<ul class="razones">'
    + '<li>1. Romper las reglas o pol&iacute;ticas de la plataforma.</li>'
    + '<li>2. No respetar a los usuarios de la plataforma.</li>'
    + '<li>3. Hacer spam de contenido.</li>'
    + '<li>4. Usar palabras obscenas.</li>'
    + '<li>5. Funar o difamar informaci&oacute;n falsa de otros usuarios.</li>'
    + '</ul>'
    + '<p style="font-weight:600;color:#f8fafc;">Para reactivar tu cuenta, comun&iacute;cate con soporte y cu&eacute;ntanos tu situaci&oacute;n.</p>'
    + '<a class="btn-soporte" href="https://soporte.com" target="_blank">Contactar Soporte</a>';
  document.body.appendChild(overlay);
}

function verificarCuenta() {
  jsonp({ action:'checkAccount', user:sessionUser }).then(function(r) {
    try { var d = typeof r === 'string' ? JSON.parse(r) : r;
      if (!d.exists || d.exists === false) { localStorage.removeItem('sessionUser'); localStorage.removeItem('sessionPass'); localStorage.removeItem('userProfile'); window.location.href = 'login.html'; }
      else if (d.status === 'Inactivo') { mostrarCuentaInactiva(); }
    } catch(e) {}
  }).catch(function(){});
}
verificarCuenta();

var profileData = null;
var forosCache = [];

function cargarPerfil() {
  var cached = localStorage.getItem('userProfile');
  if (cached) {
    try { profileData = JSON.parse(cached); mostrarPerfil(profileData); } catch(e) {}
  }
  jsonp({ action:'getProfile', user:sessionUser, pass:sessionPass }).then(function(resp) {
    try {
      var data = typeof resp === 'string' ? JSON.parse(resp) : resp;
      if (data.status === 'PROFILE_OK' && data.profile) {
        profileData = data.profile;
        localStorage.setItem('userProfile', JSON.stringify(profileData));
        mostrarPerfil(profileData);
      }
    } catch(e) {}
  }).catch(function(){});
}

function mostrarPerfil(p) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('pageContent').style.display = 'block';

  var nameEl = document.getElementById('userName');
  nameEl.textContent = p.user || sessionUser;

  var rolEl = document.getElementById('userRol');
  var rol = p.rol || 'User';
  rolEl.textContent = rol;
  rolEl.className = 'badge-rol ' + (rol === 'Owner' ? 'badge-owner' : rol === 'Admin' ? 'badge-admin' : rol === 'App' ? 'badge-app' : 'badge-user');

  document.getElementById('userEmail').textContent = p.email || p.correo || 'Oculto';

  var fd = p.fecha || p.fechaRegistro || p.miembroDesde || '';
  document.getElementById('userJoinDate').textContent = fd ? new Date(fd).toLocaleDateString('es-ES', { year:'numeric', month:'long', day:'numeric' }) : 'Desconocido';

  var coins = p.coins || p.monedas || 0;
  document.getElementById('userCoins').textContent = coins;

  var statusEl = document.getElementById('userStatus');
  var st = p.status || p.estado || 'Activo';
  statusEl.textContent = st;
  statusEl.className = 'val ' + (st === 'Activo' ? 'status-active' : 'status-inactive');

  if (p.fotoPortada) {
    document.getElementById('coverImg').src = p.fotoPortada;
    document.getElementById('coverImg').style.display = 'block';
  } else {
    document.getElementById('coverImg').style.display = 'none';
  }

  if (p.fotoPerfil) {
    document.getElementById('avatarImg').src = p.fotoPerfil;
    document.getElementById('avatarImg').style.display = 'block';
    document.getElementById('avatarPlaceholder').style.display = 'none';
  } else {
    var u = p.user || sessionUser;
    document.getElementById('avatarPlaceholder').textContent = u.charAt(0).toUpperCase();
    document.getElementById('avatarImg').style.display = 'none';
    document.getElementById('avatarPlaceholder').style.display = 'flex';
  }

  var bio = p.descripcion || p.bio || '';
  var bioEl = document.getElementById('bioText');
  if (bio) { bioEl.textContent = bio; bioEl.className = 'text'; }
  else { bioEl.textContent = 'A&uacute;n no has escrito una biograf&iacute;a.'; bioEl.className = 'empty'; }

  var ms = fd ? new Date(fd).toLocaleDateString('es-ES', { month:'short', year:'numeric' }) : '-';
  document.getElementById('statMemberSince').textContent = ms;
}

function cargarForos() {
  var cached = localStorage.getItem('forosCache');
  if (cached) {
    try { forosCache = JSON.parse(cached); renderForos(); } catch(e) {}
  }
  jsonp({ action:'getForos' }).then(function(resp) {
    try {
      var data = typeof resp === 'string' ? JSON.parse(resp) : resp;
      if (data.status === 'FOROS_OK') {
        forosCache = data.foros || [];
        localStorage.setItem('forosCache', JSON.stringify(forosCache));
        renderForos();
      }
    } catch(e) {}
    renderForos();
  }).catch(function() { renderForos(); });
}

function renderForos() {
  var el = document.getElementById('forosList');
  var misForos = forosCache.filter(function(f) { return f.user === sessionUser; });

  document.getElementById('statPosts').textContent = misForos.length;

  var totalLikes = 0;
  misForos.forEach(function(f) { totalLikes += (f.likes || 0); });
  document.getElementById('statLikes').textContent = totalLikes;

  if (!misForos.length) {
    el.innerHTML = '<div class="sin-items">No tienes publicaciones a&uacute;n.</div>';
    return;
  }
  var html = '';
  misForos.forEach(function(f) {
    var snippet = (f.descripcion || '').slice(0, 200);
    var imgs = f.imagenes ? f.imagenes.split('|').filter(Boolean) : [];
    var ic = imgs.length;
    var imgClass = ic === 1 ? 'single' : ic === 2 ? 'double' : ic === 3 ? 'triple' : ic === 4 ? 'quad' : 'quint';
    html += '<div class="foro-card" onclick="abrirViewer(\'' + f.id + '\')">'
      + '<div class="foro-card-header">'
      + '<span class="foro-card-user">' + escHtml(f.user || '') + '</span>'
      + '<span class="foro-card-date">' + (f.tipo && f.tipo !== 'foro' ? '<span class="tipo-badge">' + escHtml(f.tipo) + '</span> ' : '') + tiempoRelativo(f.fecha) + '</span>'
      + '</div>'
      + (imgs.length ? '<div class="foro-card-imgs ' + imgClass + '">' + imgs.map(function(url) { return '<img src="' + url + '" loading="lazy">'; }).join('') + '</div>' : '')
      + '<div class="foro-card-snippet">' + escHtml(snippet) + '</div>'
      + '<div class="foro-card-stats">'
      + '<span>&#128077; ' + (f.likes || 0) + '</span>'
      + '<span>&#128078; ' + (f.dislikes || 0) + '</span>'
      + '</div></div>';
  });
  el.innerHTML = html;
}

function cargarCoins() {
  jsonp({ action:'getProfile', user:sessionUser, pass:sessionPass }).then(function(resp) {
    try {
      var data = typeof resp === 'string' ? JSON.parse(resp) : resp;
      if (data.status === 'PROFILE_OK' && data.profile) {
        var transacciones = data.profile.transacciones || data.profile.coinHistory || [];
        renderCoins(transacciones);
      }
    } catch(e) {}
  }).catch(function(){});
}

function renderCoins(txns) {
  var el = document.getElementById('coinsList');
  if (!txns || !txns.length) {
    el.innerHTML = '<div class="sin-items">Sin movimientos recientes.</div>';
    return;
  }
  var html = '';
  txns.forEach(function(t) {
    var amount = parseInt(t.monto || t.cantidad || t.amount || 0);
    var tipo = amount >= 0 ? 'plus' : 'minus';
    var icon = amount >= 0 ? '+' : '-';
    html += '<div class="coin-item">'
      + '<div class="coin-icon ' + tipo + '">' + icon + '</div>'
      + '<div class="coin-info">'
      + '<div class="coin-desc">' + escHtml(t.descripcion || t.concepto || t.desc || 'Transacci&oacute;n') + '</div>'
      + '<div class="coin-date">' + tiempoRelativo(t.fecha || t.date || '') + '</div>'
      + '</div>'
      + '<div class="coin-amount ' + tipo + '">' + (amount >= 0 ? '+' : '') + amount + '</div>'
      + '</div>';
  });
  el.innerHTML = html;
}

function abrirEditModal() {
  document.getElementById('editMsg').style.display = 'none';
  document.getElementById('editFotoUrl').value = profileData ? (profileData.fotoPerfil || '') : '';
  document.getElementById('editBio').value = profileData ? (profileData.descripcion || profileData.bio || '') : '';
  document.getElementById('btnGuardarEdit').disabled = false;
  abrirModal('modalEdit');
}

var _guardando = false;

function guardarEdit() {
  if (_guardando) return;
  var foto = document.getElementById('editFotoUrl').value.trim();
  var bio = document.getElementById('editBio').value.trim().slice(0, 500);
  _guardando = true;
  document.getElementById('btnGuardarEdit').disabled = true;
  document.getElementById('btnGuardarEdit').textContent = 'Guardando...';
  jsonp({ action:'updateProfile', user:sessionUser, pass:sessionPass, bio:bio, fotoPerfil:foto }).then(function(resp) {
    _guardando = false;
    document.getElementById('btnGuardarEdit').disabled = false;
    document.getElementById('btnGuardarEdit').textContent = 'Guardar cambios';
    try {
      var data = typeof resp === 'string' ? JSON.parse(resp) : resp;
      if (data.status === 'PROFILE_UPDATED') {
        if (data.profile) { profileData = data.profile; localStorage.setItem('userProfile', JSON.stringify(profileData)); mostrarPerfil(profileData); }
        cerrarModal('modalEdit');
        mostrarAlerta('msgGlobal', 'Perfil actualizado correctamente.', 'success');
      } else if (data.status === 'AUTH_ERROR') {
        mostrarAlerta('editMsg', 'Error de autenticaci&oacute;n. Vuelve a iniciar sesi&oacute;n.', 'error');
      } else {
        mostrarAlerta('editMsg', 'Error: ' + (data.mensaje || data.status || 'Error desconocido'), 'error');
      }
    } catch(e) {
      mostrarAlerta('editMsg', 'Error al procesar la respuesta.', 'error');
    }
  }).catch(function(err) {
    _guardando = false;
    document.getElementById('btnGuardarEdit').disabled = false;
    document.getElementById('btnGuardarEdit').textContent = 'Guardar cambios';
    mostrarAlerta('editMsg', 'Error de conexi&oacute;n.', 'error');
  });
}

document.addEventListener('click', function(e) {
  var me = document.getElementById('modalEdit');
  if (me && e.target === me) cerrarModal('modalEdit');
  var vo = document.getElementById('viewerModal');
  if (vo && e.target === vo) cerrarViewer();
});

var viewerForo = null, viewerComs = [], carouselIdx = 0, comentariosMax = 6;

function abrirViewer(foroId) {
  var cached = null;
  for (var i = 0; i < forosCache.length; i++) { if (forosCache[i].id === foroId) { cached = forosCache[i]; break; } }
  if (cached) { viewerForo = cached; viewerComs = []; mostrarViewer(); }
  jsonp({ action:'getForo', foroId:foroId }).then(function(resp) {
    try { var d = typeof resp === 'string' ? JSON.parse(resp) : resp; if (d.status === 'FORO_OK' && viewerForo && viewerForo.id === foroId) { for (var k in d.foro) viewerForo[k] = d.foro[k]; viewerComs = d.comentarios || []; mostrarViewer(); } } catch(e) {}
  }).catch(function() {});
}

function mostrarViewer() {
  if (!viewerForo) return;
  comentariosMax = 6;
  document.getElementById('viewerUser').textContent = escHtml(viewerForo.user || '');
  document.getElementById('viewerDate').textContent = tiempoRelativo(viewerForo.fecha);
  document.getElementById('viewerLikes').textContent = viewerForo.likes || 0;
  document.getElementById('viewerDislikes').textContent = viewerForo.dislikes || 0;
  var imgs = viewerForo.imagenes ? viewerForo.imagenes.split('|').filter(Boolean) : [];
  var track = document.getElementById('carouselTrack');
  if (imgs.length) {
    track.innerHTML = imgs.map(function(u) { return '<img src="' + u + '" onclick="window.open(\'' + u + '\',\'_blank\')">'; }).join('');
    var dots = document.getElementById('viewerDots');
    dots.innerHTML = imgs.map(function(_, i) { return '<button class="viewer-dot' + (i === 0 ? ' active' : '') + '" onclick="irAImg(' + i + ')"></button>'; }).join('');
    carouselIdx = 0; track.scrollLeft = 0;
  } else { track.innerHTML = '<p style="color:#666;padding:40px;">Sin im&aacute;genes</p>'; document.getElementById('viewerDots').innerHTML = ''; }
  document.getElementById('viewerDesc').textContent = viewerForo.descripcion || '';
  actualizarVotoUI();
  renderComentarios();
  document.getElementById('viewerModal').style.display = 'flex';
}

function cerrarViewer() { document.getElementById('viewerModal').style.display = 'none'; viewerForo = null; viewerComs = []; }
function carouselNext() { var t = document.getElementById('carouselTrack'), imgs = t.querySelectorAll('img'); if (!imgs.length) return; irAImg(Math.min(carouselIdx + 1, imgs.length - 1)); }
function carouselPrev() { irAImg(Math.max(carouselIdx - 1, 0)); }
function irAImg(idx) {
  var t = document.getElementById('carouselTrack'), imgs = t.querySelectorAll('img');
  if (!imgs.length) return; carouselIdx = idx; imgs[idx].scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
  document.querySelectorAll('.viewer-dot').forEach(function(d, i) { d.classList.toggle('active', i === idx); });
}

function userVoteState(foro) {
  var u = sessionUser;
  if (!u || !foro) return 0;
  if ((foro.likesUsers || '').split(',').indexOf(u) !== -1) return 1;
  if ((foro.dislikesUsers || '').split(',').indexOf(u) !== -1) return -1;
  return 0;
}

function actualizarVotoUI() {
  var s = userVoteState(viewerForo);
  document.getElementById('viewerLikeBtn').classList.toggle('liked', s === 1);
  document.getElementById('viewerDislikeBtn').classList.toggle('liked', s === -1);
}

function darLike() {
  if (!viewerForo) return;
  var s = userVoteState(viewerForo);
  var foroId = viewerForo.id;
  if (s === 1) { viewerForo.likes--; viewerForo.likesUsers = (viewerForo.likesUsers || '').split(',').filter(function(x) { return x !== sessionUser; }).join(','); }
  else {
    if (s === -1) { viewerForo.dislikes--; viewerForo.dislikesUsers = (viewerForo.dislikesUsers || '').split(',').filter(function(x) { return x !== sessionUser; }).join(','); }
    viewerForo.likes = (viewerForo.likes || 0) + 1;
    viewerForo.likesUsers = ((viewerForo.likesUsers || '').split(',').filter(Boolean).concat([sessionUser])).join(',');
  }
  document.getElementById('viewerLikes').textContent = viewerForo.likes;
  document.getElementById('viewerDislikes').textContent = viewerForo.dislikes;
  actualizarVotoUI();
  jsonp({ action:'likeForo', foroId:foroId, user:sessionUser }).then(function(resp) {
    try { var d = typeof resp === 'string' ? JSON.parse(resp) : resp; if (d.status === 'FORO_RATED') {
      viewerForo.likes = d.likes; viewerForo.dislikes = d.dislikes;
      viewerForo.likesUsers = d.likesUsers || ''; viewerForo.dislikesUsers = d.dislikesUsers || '';
      document.getElementById('viewerLikes').textContent = d.likes; document.getElementById('viewerDislikes').textContent = d.dislikes;
      actualizarVotoUI();
      actualizarForoEnCache(viewerForo.id, d.likes, d.dislikes);
    } } catch(e) {}
  }).catch(function() {});
}

function darDislike() {
  if (!viewerForo) return;
  var s = userVoteState(viewerForo);
  var foroId = viewerForo.id;
  if (s === -1) { viewerForo.dislikes--; viewerForo.dislikesUsers = (viewerForo.dislikesUsers || '').split(',').filter(function(x) { return x !== sessionUser; }).join(','); }
  else {
    if (s === 1) { viewerForo.likes--; viewerForo.likesUsers = (viewerForo.likesUsers || '').split(',').filter(function(x) { return x !== sessionUser; }).join(','); }
    viewerForo.dislikes = (viewerForo.dislikes || 0) + 1;
    viewerForo.dislikesUsers = ((viewerForo.dislikesUsers || '').split(',').filter(Boolean).concat([sessionUser])).join(',');
  }
  document.getElementById('viewerLikes').textContent = viewerForo.likes;
  document.getElementById('viewerDislikes').textContent = viewerForo.dislikes;
  actualizarVotoUI();
  jsonp({ action:'dislikeForo', foroId:foroId, user:sessionUser }).then(function(resp) {
    try { var d = typeof resp === 'string' ? JSON.parse(resp) : resp; if (d.status === 'FORO_RATED') {
      viewerForo.likes = d.likes; viewerForo.dislikes = d.dislikes;
      viewerForo.likesUsers = d.likesUsers || ''; viewerForo.dislikesUsers = d.dislikesUsers || '';
      document.getElementById('viewerLikes').textContent = d.likes; document.getElementById('viewerDislikes').textContent = d.dislikes;
      actualizarVotoUI();
      actualizarForoEnCache(viewerForo.id, d.likes, d.dislikes);
    } } catch(e) {}
  }).catch(function() {});
}

function actualizarForoEnCache(id, likes, dislikes) {
  for (var i = 0; i < forosCache.length; i++) {
    if (forosCache[i].id === id) {
      forosCache[i].likes = likes; forosCache[i].dislikes = dislikes;
      localStorage.setItem('forosCache', JSON.stringify(forosCache));
      renderForos();
      break;
    }
  }
}

function renderComentarios() {
  var el = document.getElementById('viewerCommentsList');
  if (!viewerComs.length) { el.innerHTML = '<p style="color:#555;font-size:13px;">No hay comentarios todav&iacute;a.</p>'; return; }
  var mostrar = viewerComs.slice(0, comentariosMax);
  var html = mostrar.map(function(c) {
    return '<div class="viewer-comment"><div class="viewer-comment-user">' + escHtml(c.user || '') + '</div><div class="viewer-comment-text">' + escHtml(c.comentario || '') + '</div><div class="viewer-comment-date">' + tiempoRelativo(c.fecha) + '</div></div>';
  }).join('');
  if (viewerComs.length > comentariosMax) {
    html += '<button class="vbtn ver-mas-coms" onclick="comentariosMax=9999;renderComentarios()">Ver m&aacute;s (' + (viewerComs.length - comentariosMax) + ' restantes)</button>';
  }
  el.innerHTML = html;
}

function enviarComentario() {
  if (!viewerForo) return;
  var texto = document.getElementById('commentInput').value.trim();
  if (!texto) return;
  document.getElementById('commentInput').value = '';
  var tempComment = { id:'temp_' + Date.now(), user:sessionUser, comentario:texto, fecha:new Date().toISOString() };
  viewerComs.unshift(tempComment);
  renderComentarios();
  jsonp({ action:'addComentario', user:sessionUser, pass:sessionPass, foroId:viewerForo.id, comentario:texto }).then(function(resp) {
    try { var d = typeof resp === 'string' ? JSON.parse(resp) : resp; if (d.status !== 'COMENTARIO_OK') { viewerComs = viewerComs.filter(function(c) { return c !== tempComment; }); renderComentarios(); } } catch(e) { viewerComs = viewerComs.filter(function(c) { return c !== tempComment; }); renderComentarios(); }
  }).catch(function() { viewerComs = viewerComs.filter(function(c) { return c !== tempComment; }); renderComentarios(); });
}

cargarPerfil();
cargarForos();
cargarCoins();
</script>
