<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script>!function(){var ua=navigator.userAgent.toLowerCase(),wv=/wv|webview/.test(ua),ios=/iphone|ipad|ipod/.test(ua),nosaf=!/safari|cribrowser|fxios|edgios|opios/.test(ua);if(!wv&&!(ios&&nosaf)&&!navigator.standalone){window.location.href='descarga.html'}}();</script>
  <title>WorldLeaf App</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-void: #060a0f;
      --bg-body: #0b1120;
      --bg-card: #111827;
      --bg-card2: #162032;
      --bg-topbar: rgba(6,10,15,0.92);
      --bg-sidebar: #0d1729;

      --primary: #22c55e;
      --primary-light: #4ade80;
      --primary-dark: #16a34a;
      --primary-bg: rgba(34,197,94,0.09);
      --primary-glow: rgba(34,197,94,0.25);
      --primary-gradient: linear-gradient(135deg,#4ade80,#22c55e);

      --amber: #f59e0b;
      --amber-light: #fbbf24;
      --amber-bg: rgba(245,158,11,0.10);
      --amber-glow: rgba(245,158,11,0.22);

      --blue: #3b82f6;
      --blue-light: #60a5fa;
      --blue-bg: rgba(59,130,246,0.10);
      --info: #06b6d4;
      --info-bg: rgba(6,182,212,0.10);

      --owner-gradient: linear-gradient(135deg,#fcd34d,#f59e0b);
      --admin-gradient: linear-gradient(135deg,#60a5fa,#3b82f6);
      --app-gradient: linear-gradient(135deg,#c084fc,#a855f7);

      --text: #f0f6ff;
      --text-secondary: #94a3b8;
      --text-muted: #4b5e78;
      --text-light: #2d3f57;

      --border: #1e2f48;
      --border-light: #131f30;
      --surface: #162032;
      --surface-2: #1e2f48;

      --shadow: 0 4px 16px rgba(0,0,0,0.5);
      --shadow-md: 0 8px 28px rgba(0,0,0,0.6);
      --shadow-lg: 0 20px 48px rgba(0,0,0,0.7);
      --shadow-glow: 0 0 24px var(--primary-glow);

      --success: #22c55e; --success-bg: rgba(34,197,94,0.10);
      --danger: #ef4444; --danger-bg: rgba(239,68,68,0.10);
      --warning: #f59e0b; --warning-bg: rgba(245,158,11,0.10);

      --radius: 14px;
      --radius-sm: 9px;
      --overlay: rgba(0,0,0,0.72);

      --input-bg: #1e293b;
      --input-text: #f8fafc;
      --input-border: #334155;
    }
    [data-theme="dark"] {
      --bg-body: #0b1120;
      --bg-card: #1e293b;
      --bg-topbar: rgba(6,10,15,0.92);
      --bg-bottombar: rgba(6,10,15,0.92);
      --bg-sidebar: #0d1729;
      --primary: #22c55e;
      --primary-light: #4ade80;
      --primary-bg: rgba(34,197,94,0.09);
      --primary-dark: #16a34a;
      --primary-gradient: linear-gradient(135deg,#4ade80,#22c55e);
      --primary-glow: rgba(34,197,94,0.25);
      --text: #f0f6ff;
      --text-secondary: #94a3b8;
      --text-muted: #4b5e78;
      --text-light: #2d3f57;
      --border: #1e2f48;
      --border-light: #131f30;
      --shadow: 0 4px 16px rgba(0,0,0,0.5);
      --shadow-md: 0 8px 28px rgba(0,0,0,0.6);
    }
    [data-scheme="blue"] { --primary: #3b82f6; --primary-light: #60a5fa; --primary-bg: rgba(59,130,246,0.1); --primary-dark: #2563eb; --primary-gradient: linear-gradient(135deg,#60a5fa,#3b82f6); }
    [data-scheme="purple"] { --primary: #8b5cf6; --primary-light: #a78bfa; --primary-bg: rgba(139,92,246,0.1); --primary-dark: #7c3aed; --primary-gradient: linear-gradient(135deg,#a78bfa,#8b5cf6); }
    [data-scheme="orange"] { --primary: #f97316; --primary-light: #fb923c; --primary-bg: rgba(249,115,22,0.1); --primary-dark: #ea580c; --primary-gradient: linear-gradient(135deg,#fb923c,#f97316); }

    *,::before,::after{box-sizing:border-box;margin:0;padding:0;}

    ::-webkit-scrollbar{width:6px;height:6px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
    ::-webkit-scrollbar-thumb:hover{background:var(--surface-2);}

    html,body{height:100%;}

    body{
      font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
      background:var(--bg-body);
      padding-top:76px;
      padding-bottom:84px;
      color:var(--text);
      transition:background-color 0.3s ease, color 0.3s ease;
      overflow-x:hidden;width:100%;max-width:100%;
    }
    body::before{
      content:'';position:fixed;inset:0;z-index:-2;pointer-events:none;
      background-image:linear-gradient(var(--border-light) 1px, transparent 1px),linear-gradient(90deg, var(--border-light) 1px, transparent 1px);
      background-size:28px 28px;opacity:0.35;
    }
    body::after{
      content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
      background:radial-gradient(ellipse 80% 60% at 50% -10%, rgba(34,197,94,0.07) 0%, transparent 70%);
    }

    .topbar{
      position:fixed;top:0;left:0;right:0;height:60px;
      background:rgba(6,10,15,0.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      display:flex;align-items:center;justify-content:space-between;
      padding:0 20px;box-shadow:0 2px 20px rgba(0,0,0,0.5);z-index:100;
      border-bottom:1px solid var(--border);
    }
    .topbar-left{display:flex;align-items:center;}
    .hamburger{
      background:none;border:none;font-size:24px;color:var(--primary);
      cursor:pointer;padding:8px;border-radius:10px;
      transition:all 0.2s ease;line-height:1;
      display:flex;align-items:center;justify-content:center;
    }
    .hamburger:hover{background:var(--primary-bg);transform:scale(1.05);}
    .topbar-center{display:flex;align-items:center;justify-content:center;flex:1;}
    .topbar-center img{height:34px;width:auto;object-fit:contain;}
    .topbar-right{display:flex;align-items:center;}
    .profile-circle{
      width:38px;height:38px;border-radius:50%;
      background:var(--primary-gradient);
      display:flex;align-items:center;justify-content:center;
      color:#fff;font-weight:700;font-size:15px;cursor:pointer;
      overflow:hidden;border:2px solid var(--bg-card);
      box-shadow:0 2px 8px rgba(0,0,0,.15);transition:all 0.2s ease;
    }
    .profile-circle:hover{transform:scale(1.1);box-shadow:0 4px 12px var(--primary-bg);}
    .profile-circle img{width:100%;height:100%;object-fit:cover;}

    .sidebar-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--overlay);backdrop-filter:blur(4px);z-index:200;display:none;opacity:0;transition:opacity .3s;}
    .sidebar-overlay.active{display:block;opacity:1;}
    .sidebar{
      position:fixed;top:0;left:-280px;bottom:0;width:280px;
      background:var(--bg-sidebar);z-index:201;
      transition:left 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow:4px 0 24px var(--shadow-md);
      display:flex;flex-direction:column;
      border-right:1px solid var(--border);
    }
    .sidebar.open{left:0;}
    .sidebar-header{
      display:flex;align-items:center;justify-content:space-between;
      padding:20px;border-bottom:1px solid var(--border);
    }
    .sidebar-header h2{font-size:20px;color:var(--primary);font-weight:800;letter-spacing:-0.5px;}
    .sidebar-close{
      background:var(--bg-body);border:none;font-size:20px;
      color:var(--text-secondary);cursor:pointer;width:32px;height:32px;
      border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all 0.2s;
    }
    .sidebar-close:hover{background:var(--border);color:var(--text);}
    .sidebar-menu{flex:1;overflow-y:auto;padding:12px 8px;}
    .sidebar-item,a.sidebar-item{
      display:flex;align-items:center;gap:12px;padding:12px 16px;
      font-size:15px;font-weight:600;color:var(--text);cursor:pointer;
      transition:all 0.2s ease;border:none;border-radius:10px;
      background:none;width:100%;text-align:left;margin-bottom:4px;
      text-decoration:none;font-family:inherit;
    }
    .sidebar-item:hover,a.sidebar-item:hover{background:var(--primary-bg);color:var(--primary);}
    .sidebar-item .icon{font-size:20px;width:24px;text-align:center;color:var(--primary);}
    .sidebar-item .arrow-sub{font-size:10px;margin-left:auto;color:var(--text-secondary);transition:transform .2s;}
    .sidebar-item.open .arrow-sub{transform:rotate(180deg);}
    .submenu{overflow:hidden;max-height:0;transition:max-height .25s ease;background:var(--bg-body);border-radius:8px;}
    .submenu.open{max-height:120px;margin:2px 0 6px;}
    .submenu-item{
      display:flex;align-items:center;gap:12px;
      padding:10px 16px 10px 48px;font-size:14px;font-weight:500;
      color:var(--text-secondary);cursor:pointer;transition:all 0.15s;
      border:none;background:none;width:100%;text-align:left;border-radius:8px;
      font-family:inherit;
    }
    .submenu-item:hover{background:var(--primary-bg);color:var(--primary);}
    .submenu-item .icon{font-size:16px;width:20px;text-align:center;color:var(--primary);}
    .sidebar-footer{padding:16px 20px;border-top:1px solid var(--border);font-size:13px;color:var(--text-muted);font-weight:500;}

    .bottombar{
      position:fixed;bottom:0;left:0;right:0;height:64px;
      background:rgba(6,10,15,0.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      display:flex;align-items:center;justify-content:space-around;
      box-shadow:0 -2px 20px rgba(0,0,0,0.5);z-index:100;padding:0 8px;
      border-top:1px solid var(--border);
    }
    .bottombar-item{
      display:flex;flex-direction:column;align-items:center;gap:4px;
      padding:8px;border:none;background:none;cursor:pointer;
      color:var(--text-muted);transition:all 0.2s ease;
      font-size:10px;font-weight:700;font-family:'Rajdhani',sans-serif;
      text-transform:uppercase;letter-spacing:0.3px;
      min-width:64px;border-radius:10px;
    }
    .bottombar-item:hover{color:var(--primary);background:var(--primary-bg);}
    .bottombar-item.active{color:var(--primary);background:var(--primary-bg);}
    .bottombar-item .icon{font-size:20px;line-height:1;transition:transform 0.2s ease;}
    .bottombar-item:active .icon{transform:scale(0.9);}

    #mainFrame{
      width:100%;
      height:calc(100vh - 76px - 84px);
      border:none;
      display:block;
      background:var(--bg-body);
    }

    .page-title{font-family:'Rajdhani',sans-serif;font-size:30px;font-weight:700;color:var(--text);letter-spacing:-0.5px;}
    .section-title{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--text);}
    .stat-number{font-family:'Rajdhani',sans-serif;font-size:32px;font-weight:700;color:var(--primary);}
    .badge-rol{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;padding:3px 11px;border-radius:20px;display:inline-flex;align-items:center;}
    .badge-owner{background:linear-gradient(135deg,#fcd34d,#f59e0b);color:#fff;box-shadow:0 2px 8px rgba(245,158,11,0.35);}
    .badge-admin{background:linear-gradient(135deg,#60a5fa,#3b82f6);color:#fff;box-shadow:0 2px 8px rgba(59,130,246,0.30);}
    .badge-app{background:linear-gradient(135deg,#c084fc,#a855f7);color:#fff;box-shadow:0 2px 8px rgba(168,85,247,0.30);}
    .btn-sm{
      padding:5px 13px;border:none;border-radius:7px;
      font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;
      letter-spacing:0.4px;cursor:pointer;transition:all 0.2s;
    }
    input,textarea,select{
      padding:10px 14px;border:1px solid var(--border);border-radius:9px;
      background:var(--bg-card2);color:var(--text);
      font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:all 0.2s;
    }
    input:focus,textarea:focus,select:focus{
      border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow);
    }
    .msg-banner{
      padding:11px 16px;border-radius:9px;font-size:13px;font-weight:600;
      border-left:3px solid;display:none;margin-bottom:16px;animation:fadeIn 0.2s ease;
    }
    .msg-banner.show{display:block;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
    @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

    .blocked-overlay{
      position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;
      background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:40px 24px;text-align:center;
    }
    .blocked-overlay .block-icon{font-size:72px;margin-bottom:16px;animation:pulseBlock 2s infinite;}
    @keyframes pulseBlock{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.1);opacity:0.8;}}
    .blocked-overlay h2{font-size:24px;font-weight:800;color:#ef4444;margin-bottom:8px;}
    .blocked-overlay p{font-size:15px;color:#cbd5e1;max-width:480px;line-height:1.6;margin-bottom:16px;}
    .blocked-overlay .razones{text-align:left;color:#94a3b8;font-size:14px;line-height:1.8;margin-bottom:24px;}
    .blocked-overlay .razones li{margin-bottom:4px;}
    .blocked-overlay .btn-soporte{
      display:inline-block;padding:14px 40px;border-radius:12px;
      background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;
      font-size:16px;font-weight:700;text-decoration:none;
      transition:all 0.2s;box-shadow:0 4px 16px rgba(59,130,246,0.3);
    }
    .blocked-overlay .btn-soporte:hover{transform:scale(1.05);box-shadow:0 8px 24px rgba(59,130,246,0.5);}

    @media(max-width:480px){
      .sidebar{width:100%;left:-100%;}
    }

    @media(min-width:768px){
      body{padding-top:80px;padding-bottom:20px;}
      #mainFrame{height:calc(100vh - 80px - 20px);}
      .bottombar{
        top:0;bottom:auto;left:auto;right:20px;
        height:60px;background:transparent;border-top:none;
        box-shadow:none;width:auto;z-index:101;gap:12px;
      }
      .bottombar-item{
        flex-direction:row;padding:8px 16px;gap:8px;
        font-size:13px;height:40px;min-width:auto;
      }
      .topbar{padding:0 40px;}
      .topbar-center{justify-content:flex-start;padding-left:20px;}
      .topbar-right{margin-right:280px;}
      .bottombar{background:none!important;backdrop-filter:none!important;-webkit-backdrop-filter:none!important;}
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="topbar-left"><button class="hamburger" id="hamburgerBtn" onclick="toggleSidebar()">&#9776;</button></div>
    <div class="topbar-center"><img src="https://i.ibb.co/1GtKgjvP/Background-Eraser-20260531-013208695.png" alt="WorldLeaf"></div>
    <div class="topbar-right"><div class="profile-circle" id="profileCircle" onclick="irA('perfil')"><span id="profileInitial">U</span></div></div>
  </header>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header"><h2>Men&uacute;</h2><button class="sidebar-close" onclick="closeSidebar()">&times;</button></div>
    <div class="sidebar-menu">
      <button class="sidebar-item" onclick="irA('explorar')"><span class="icon">&#128270;</span> Explorar</button>
      <button class="sidebar-item" onclick="toggleSubmenu(this)"><span class="icon">&#9889;</span> Complementos<span class="arrow-sub">&#9660;</span></button>
      <div class="submenu">
        <button class="submenu-item" onclick="irA('addons')"><span class="icon">&#128752;</span> Addons (comunidad)</button>
        <button class="submenu-item" onclick="irA('marcketplace')"><span class="icon">&#128722;</span> Addons (Marketplace)</button>
      </div>
      <button class="sidebar-item" onclick="irA('perfil')"><span class="icon">&#128100;</span> Perfil</button>
      <button class="sidebar-item" onclick="irA('chat')"><span class="icon">&#128172;</span> Chat</button>
      <button class="sidebar-item" onclick="irA('coinas')"><span class="icon">&#128176;</span> Coins+</button>
      <button class="sidebar-item" id="panelAdminBtn" onclick="irA('paneladmin')"><span class="icon">&#128202;</span> Panel Admin</button>
      <button class="sidebar-item" onclick="irA('ajustes')"><span class="icon">&#9881;</span> Ajustes</button>
      <a class="sidebar-item" href="worldleaf/archivos" target="_top"><span class="icon">&#128193;</span> Archivos</a>
    </div>
    <div class="sidebar-footer">WorldLeaf App &copy; 2026</div>
  </nav>

  <iframe id="mainFrame" name="mainFrame" src="Explorar.html"></iframe>

  <nav class="bottombar" id="bottombar">
    <button class="bottombar-item" data-seccion="explorar" onclick="navegar('explorar')"><span class="icon">&#128270;</span> Explorar</button>
    <button class="bottombar-item" data-seccion="chat" onclick="navegar('chat')"><span class="icon">&#128172;</span> Chat</button>
    <button class="bottombar-item" data-seccion="perfil" onclick="navegar('perfil')"><span class="icon">&#128100;</span> Perfil</button>
    <button class="bottombar-item" data-seccion="ajustes" onclick="navegar('ajustes')"><span class="icon">&#9881;</span> Ajustes</button>
  </nav>

  <script>
    (function(){
      var t = localStorage.getItem('tema');
      if (t === 'oscuro') document.documentElement.setAttribute('data-theme', 'dark');
      var e = localStorage.getItem('esquema');
      if (e && e !== 'default') document.documentElement.setAttribute('data-scheme', e);
      var cp = localStorage.getItem('colorPrimario');
      if (cp) { document.documentElement.style.setProperty('--primary', cp); document.documentElement.style.setProperty('--primary-light', cp); }
      var cf = localStorage.getItem('colorFondo');
      if (cf) document.documentElement.style.setProperty('--bg-body', cf);
    })();

    var API_URL = 'https://script.google.com/macros/s/AKfycbyIrIlhsgjpNcpOcT-aWnpjSSc-HdiDQTu3HqI1I5ZfOWqL_lBoyYj05034THSy1gKEyQ/exec';
    var sessionUser = localStorage.getItem('sessionUser');
    var sessionPass = localStorage.getItem('sessionPass');
    if (!sessionUser || !sessionPass) window.top.location.href = 'login.html';

    var profileData = null;
    try { var s = localStorage.getItem('userProfile'); if (s) profileData = JSON.parse(s); } catch(e) {}
    var userRole = profileData && profileData.rol ? profileData.rol : '';
    function esAdmin() { return userRole === 'Owner' || userRole === 'Admin' || userRole === 'App'; }
    function actualizarPerfilUI() {
      var pi = document.getElementById('profileInitial');
      if (profileData && profileData.fotoPerfil) { pi.innerHTML = '<img src="' + profileData.fotoPerfil + '" alt="Perfil">'; }
      else { pi.textContent = sessionUser ? sessionUser.charAt(0).toUpperCase() : 'U'; }
    }
    actualizarPerfilUI();

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('active'); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('active'); document.querySelectorAll('.submenu.open').forEach(function(s){s.classList.remove('open');}); document.querySelectorAll('.sidebar-item.open').forEach(function(i){i.classList.remove('open');}); }
    function toggleSubmenu(el) { el.classList.toggle('open'); el.nextElementSibling.classList.toggle('open'); }

    function irA(seccion) {
      closeSidebar();
      document.querySelectorAll('.bottombar-item').forEach(function(el) {
        el.classList.toggle('active', el.getAttribute('data-seccion') === seccion);
      });
      var map = {
        explorar: 'Explorar.html',
        addons: 'Addons.html',
        marcketplace: 'Marcketplace.html',
        perfil: 'perfil.html',
        coinas: 'coins+.html',
        ajustes: 'Ajustes.html',
        chat: 'chat.html',
        paneladmin: 'paneladmin.html'
      };
      document.getElementById('mainFrame').src = map[seccion] || 'Explorar.html';
      window.location.hash = seccion;
    }

    function navegar(seccion) {
      document.querySelectorAll('.bottombar-item').forEach(function(el) {
        el.classList.toggle('active', el.getAttribute('data-seccion') === seccion);
      });
      irA(seccion);
    }

    function jsonp(data) {
      return new Promise(function(resolve, reject) {
        var cb = 'jpcb_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
        var params = [];
        for (var key in data) { if (data.hasOwnProperty(key)) params.push(encodeURIComponent(key) + '=' + encodeURIComponent(data[key])); }
        params.push('callback=' + cb);
        var url = API_URL + '?' + params.join('&');
        window[cb] = function(resp) { delete window[cb]; if (script.parentNode) script.parentNode.removeChild(script); resolve(resp); };
        var script = document.createElement('script');
        script.src = url;
        script.onerror = function() { delete window[cb]; if (script.parentNode) script.parentNode.removeChild(script); reject(new Error('Error de conexi&oacute;n')); };
        document.body.appendChild(script);
        setTimeout(function() { if (window[cb]) { delete window[cb]; if (script.parentNode) script.parentNode.removeChild(script); reject(new Error('Tiempo de espera agotado')); } }, 60000);
      });
    }

    function mostrarCuentaInactiva() {
      var overlay = document.createElement('div');
      overlay.className = 'blocked-overlay';
      overlay.innerHTML = '<div class="block-icon">&#128683;</div>'
        + '<h2>Cuenta Desactivada</h2>'
        + '<p>Tu cuenta ha sido desactivada. Esto pudo deberse a las siguientes razones:</p>'
        + '<ul class="razones">'
        + '<li>1. Romper las reglas o pol&iacute;ticas de la plataforma.</li>'

      document.body.appendChild(overlay);
    }

    function verificarCuenta() {
      jsonp({ action:'checkAccount', user:sessionUser }).then(function(r) {
        try { var d = typeof r === 'string' ? JSON.parse(r) : r; if (!d.exists || d.exists === false) { localStorage.removeItem('sessionUser'); localStorage.removeItem('sessionPass'); localStorage.removeItem('userProfile'); window.location.href = 'login.html'; } else if (d.status === 'Inactivo') { mostrarCuentaInactiva(); } } catch(e) {}
      }).catch(function(){});
    }
    verificarCuenta();

    function escHtml(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function tiempoRelativo(fs) {
      if (!fs) return ''; var d = new Date(fs); if (isNaN(d.getTime())) return fs;
      var seg = Math.floor((Date.now() - d.getTime()) / 1000);
      if (seg < 60) return 'hace ' + seg + ' segundos'; var min = Math.floor(seg / 60);
      if (min < 60) return 'hace ' + min + (min === 1 ? ' minuto' : ' minutos'); var hor = Math.floor(min / 60);
      if (hor < 24) return 'hace ' + hor + (hor === 1 ? ' hora' : ' horas'); var dia = Math.floor(hor / 24);
      if (dia < 30) return 'hace ' + dia + (dia === 1 ? ' d&iacute;a' : ' d&iacute;as'); var mes = Math.floor(dia / 30);
      if (mes < 12) return 'hace ' + mes + (mes === 1 ? ' mes' : ' meses'); var anio = Math.floor(mes / 12);
      return 'hace ' + anio + (anio === 1 ? ' a&ntilde;o' : ' a&ntilde;os');
    }

    var panelBtn = document.getElementById('panelAdminBtn');
    if (panelBtn && !esAdmin()) panelBtn.style.display = 'none';

    window.addEventListener('hashchange', function() {
      var h = window.location.hash.replace('#', '') || 'explorar';
      navegar(h);
    });

    (function() {
      var hash = window.location.hash.replace('#', '') || 'explorar';
      navegar(hash);
    })();
