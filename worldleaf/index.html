<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WorldLeaf Chat</title>
  <style>
    :root {
      --wa-bg: #111b21;
      --wa-bg-chat: #0b141a;
      --wa-bg-input: #1f2c33;
      --wa-bg-header: #1f2c33;
      --wa-bg-bubble-own: #005c4b;
      --wa-bg-bubble-other: #1f2c33;
      --wa-green: #00a884;
      --wa-teal: #00a884;
      --wa-text: #e9edef;
      --wa-text-secondary: #aebac1;
      --wa-text-muted: #667781;
      --wa-border: #313d45;
      --wa-divider: #182229;
      --wa-bg-hover: #2a3942;
      --wa-bg-selected: #2a3942;
      --wa-bg-search: #1f2c33;
    }
    *,::before,::after{box-sizing:border-box;margin:0;padding:0;}
    ::-webkit-scrollbar{width:5px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--wa-border);border-radius:99px;}
    html,body{height:100%;overflow:hidden;}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      background:var(--wa-bg);color:var(--wa-text);
      -webkit-user-select:none;user-select:none;
      display:flex;flex-direction:column;
    }

    .app{display:flex;flex-direction:column;height:100%;max-width:100%;}

    .wa-header{
      height:56px;flex-shrink:0;
      background:var(--wa-bg-header);
      display:flex;align-items:center;padding:0 16px;
      border-bottom:1px solid var(--wa-border);
    }
    .wa-header .wa-header-left{display:flex;align-items:center;gap:12px;}
    .wa-header .wa-header-center{flex:1;display:flex;align-items:center;justify-content:center;}
    .wa-header .wa-header-right{display:flex;align-items:center;gap:6px;}
    .wa-header .wa-title{
      font-size:17px;font-weight:700;color:var(--wa-text);
      letter-spacing:-0.3px;
    }
    .wa-header-btn{
      width:40px;height:40px;border-radius:50%;
      background:none;border:none;color:var(--wa-text-secondary);
      font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:background 0.15s;
    }
    .wa-header-btn:hover{background:var(--wa-bg-hover);}

    .wa-search{
      display:flex;align-items:center;padding:8px 12px;
      background:var(--wa-bg);border-bottom:1px solid var(--wa-divider);
    }
    .wa-search-bar{
      flex:1;display:flex;align-items:center;gap:8px;
      background:var(--wa-bg-search);border-radius:8px;padding:6px 12px;
      height:36px;
    }
    .wa-search-bar input{
      flex:1;background:none;border:none;outline:none;
      color:var(--wa-text);font-size:14px;font-family:inherit;
    }
    .wa-search-bar input::placeholder{color:var(--wa-text-muted);}
    .wa-search-bar .wa-search-icon{color:var(--wa-text-muted);font-size:18px;}

    .wa-tabs{
      display:flex;background:var(--wa-bg-header);border-bottom:1px solid var(--wa-border);
      flex-shrink:0;
    }
    .wa-tab{
      flex:1;padding:12px 8px;text-align:center;
      font-size:12px;font-weight:600;color:var(--wa-text-muted);
      cursor:pointer;border:none;background:none;font-family:inherit;
      text-transform:uppercase;letter-spacing:0.3px;
      border-bottom:2px solid transparent;transition:all 0.15s;
      position:relative;
    }
    .wa-tab.active{color:var(--wa-teal);border-bottom-color:var(--wa-teal);}
    .wa-tab:hover{color:var(--wa-text);}
    .wa-tab .wa-badge{
      position:absolute;top:6px;right:10px;
      background:var(--wa-green);color:#fff;font-size:10px;
      min-width:18px;height:18px;border-radius:9px;
      display:flex;align-items:center;justify-content:center;
      font-weight:700;padding:0 5px;
    }

    .wa-content{flex:1;overflow:hidden;position:relative;}

    .wa-view{
      position:absolute;top:0;left:0;right:0;bottom:0;
      overflow-y:auto;display:none;flex-direction:column;
    }
    .wa-view.active{display:flex;}
    .wa-view iframe{width:100%;height:100%;border:none;background:transparent;}

    .chat-list{padding:0;}
    .chat-item{
      display:flex;align-items:center;gap:12px;padding:10px 16px;
      cursor:pointer;transition:background 0.1s;
      border-bottom:1px solid var(--wa-divider);
    }
    .chat-item:hover{background:var(--wa-bg-selected);}
    .chat-item .ci-avatar{
      width:49px;height:49px;border-radius:50%;flex-shrink:0;
      background:var(--wa-green);display:flex;align-items:center;justify-content:center;
      color:#fff;font-weight:700;font-size:18px;overflow:hidden;
    }
    .chat-item .ci-avatar img{width:100%;height:100%;object-fit:cover;}
    .chat-item .ci-info{flex:1;min-width:0;}
    .chat-item .ci-name{font-size:16px;font-weight:500;color:var(--wa-text);}
    .chat-item .ci-preview{font-size:13px;color:var(--wa-text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
    .chat-item .ci-right{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
    .chat-item .ci-time{font-size:11px;color:var(--wa-text-muted);}
    .chat-item .ci-unread{background:var(--wa-green);color:#fff;font-size:11px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px;}

    .chat-view{display:none;flex-direction:column;position:absolute;top:0;left:0;right:0;bottom:0;z-index:10;}
    .chat-view.open{display:flex;}
    .chat-view iframe{width:100%;height:100%;border:none;background:transparent;}

    .wa-empty{
      flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      color:var(--wa-text-muted);padding:40px;text-align:center;
    }
    .wa-empty .wa-empty-icon{font-size:64px;margin-bottom:16px;opacity:0.5;}
    .wa-empty h3{font-size:20px;font-weight:600;color:var(--wa-text);margin-bottom:8px;}
    .wa-empty p{font-size:14px;line-height:1.5;}

    @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

    @media(min-width:768px){
      .app{max-width:768px;margin:0 auto;border-left:1px solid var(--wa-border);border-right:1px solid var(--wa-border);}
    }
  </style>
</head>
<body>

<div class="app" id="app">
  <!-- HEADER -->
  <div class="wa-header">
    <div class="wa-header-left">
      <span class="wa-title">WorldLeaf</span>
    </div>
    <div class="wa-header-center"></div>
    <div class="wa-header-right">
      <button class="wa-header-btn" onclick="abrirPerfil()">&#128247;</button>
      <button class="wa-header-btn" onclick="toggleMenu()">&#8942;</button>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="wa-search">
    <div class="wa-search-bar">
      <span class="wa-search-icon">&#128269;</span>
      <input type="text" id="searchInput" placeholder="Busca un chat..." oninput="filtrarChats()">
    </div>
  </div>

  <!-- TABS -->
  <div class="wa-tabs" id="waTabs">
    <button class="wa-tab active" data-view="chats" onclick="cambiarView('chats')">&#128172; Chats</button>
    <button class="wa-tab" data-view="addons" onclick="cambiarView('addons')">&#128752; Addons</button>
    <button class="wa-tab" data-view="market" onclick="cambiarView('market')">&#128722; Mkt</button>
    <button class="wa-tab" data-view="coins" onclick="cambiarView('coins')">&#128176; Coins</button>
    <button class="wa-tab" data-view="perfil" onclick="cambiarView('perfil')">&#128100; Perfil</button>
  </div>

  <!-- CONTENT -->
  <div class="wa-content">
    <!-- CHATS VIEW -->
    <div class="wa-view active" id="viewChats">
      <div class="chat-list" id="chatList"></div>
    </div>

    <!-- ADDONS VIEW -->
    <div class="wa-view" id="viewAddons">
      <iframe src="Addons.html" loading="lazy"></iframe>
    </div>

    <!-- MARKETPLACE VIEW -->
    <div class="wa-view" id="viewMarket">
      <iframe src="Marcketplace.html" loading="lazy"></iframe>
    </div>

    <!-- COINS VIEW -->
    <div class="wa-view" id="viewCoins">
      <iframe src="coins+.html" loading="lazy"></iframe>
    </div>

    <!-- PERFIL VIEW -->
    <div class="wa-view" id="viewPerfil">
      <iframe src="perfil.html" loading="lazy"></iframe>
    </div>

    <!-- CHAT CONVERSATION VIEW -->
    <div class="chat-view" id="chatView">
      <iframe id="chatFrame" src="about:blank"></iframe>
    </div>
  </div>

  <!-- MENU DROPDOWN -->
  <div id="menuDropdown" style="display:none;position:fixed;top:56px;right:8px;background:var(--wa-bg-header);border:1px solid var(--wa-border);border-radius:8px;z-index:100;min-width:180px;box-shadow:0 4px 16px rgba(0,0,0,0.5);padding:4px 0;">
    <button style="display:flex;align-items:center;gap:12px;padding:10px 16px;border:none;background:none;color:var(--wa-text);width:100%;text-align:left;font-size:14px;cursor:pointer;font-family:inherit;transition:background 0.1s;" onmouseover="this.style.background='var(--wa-bg-hover)'" onmouseout="this.style.background='none'" onclick="nuevoGrupo()">&#128101; Nuevo grupo</button>
    <button style="display:flex;align-items:center;gap:12px;padding:10px 16px;border:none;background:none;color:var(--wa-text);width:100%;text-align:left;font-size:14px;cursor:pointer;font-family:inherit;transition:background 0.1s;" onmouseover="this.style.background='var(--wa-bg-hover)'" onmouseout="this.style.background='none'" onclick="cerrarMenu();abrirPerfil()">&#128100; Perfil</button>
    <button style="display:flex;align-items:center;gap:12px;padding:10px 16px;border:none;background:none;color:var(--wa-text);width:100%;text-align:left;font-size:14px;cursor:pointer;font-family:inherit;transition:background 0.1s;" onmouseover="this.style.background='var(--wa-bg-hover)'" onmouseout="this.style.background='none'" onclick="cerrarMenu();localStorage.clear();window.location.href='login.html'">&#128682; Cerrar sesi&oacute;n</button>
  </div>
</div>

<script>
  var sessionUser = localStorage.getItem('sessionUser');
  var sessionPass = localStorage.getItem('sessionPass');
  if (!sessionUser || !sessionPass) window.location.href = 'login.html';

  var users = [
    { name:'General', lastMsg:'Bienvenido al chat grupal', time:'12:30', unread:2, avatar:null },
    { name:'Soporte', lastMsg:'¿En qué podemos ayudarte?', time:'11:15', unread:0, avatar:null },
    { name:'Anuncios', lastMsg:'Nueva actualización disponible', time:'10:00', unread:1, avatar:null },
  ];

  var chatOpen = false;
  var chatFiles = { 0:'chat.html?room=general', 1:'chat.html?room=soporte', 2:'chat.html?room=anuncios' };

  function escHtml(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  // ─── Chat List ──────────────────────────────────────────
  function renderChats() {
    var el = document.getElementById('chatList');
    var html = '';
    users.forEach(function(u, i) {
      var initial = u.name.charAt(0).toUpperCase();
      var avatarHtml = u.avatar ? '<img src="'+escHtml(u.avatar)+'">' : initial;
      var unreadHtml = u.unread > 0 ? '<div class="ci-unread">'+u.unread+'</div>' : '';
      html += '<div class="chat-item" onclick="abrirChat('+i+')">'
        + '<div class="ci-avatar">'+avatarHtml+'</div>'
        + '<div class="ci-info">'
        + '<div class="ci-name">'+escHtml(u.name)+'</div>'
        + '<div class="ci-preview">'+escHtml(u.lastMsg)+'</div>'
        + '</div>'
        + '<div class="ci-right">'
        + '<div class="ci-time">'+u.time+'</div>'
        + unreadHtml
        + '</div>'
        + '</div>';
    });
    el.innerHTML = html || '<div class="wa-empty"><div class="wa-empty-icon">&#128172;</div><h3>Sin chats</h3><p>No tienes conversaciones a&uacute;n.</p></div>';
  }

  function filtrarChats() {
    var q = document.getElementById('searchInput').value.toLowerCase();
    var items = document.querySelectorAll('.chat-item');
    items.forEach(function(item) {
      var name = item.querySelector('.ci-name').textContent.toLowerCase();
      item.style.display = name.indexOf(q) === -1 ? 'none' : 'flex';
    });
  }

  // ─── Chat View ──────────────────────────────────────────
  function abrirChat(idx) {
    chatOpen = true;
    var u = users[idx];
    var frame = document.getElementById('chatFrame');
    frame.src = chatFiles[idx] || 'about:blank';
    document.getElementById('chatView').classList.add('open');
    u.unread = 0;
    renderChats();
  }

  function cerrarChat() {
    chatOpen = false;
    document.getElementById('chatView').classList.remove('open');
    document.getElementById('chatFrame').src = 'about:blank';
  }

  // ─── Tab Navigation ─────────────────────────────────────
  function cambiarView(view) {
    document.querySelectorAll('.wa-tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelector('.wa-tab[data-view="'+view+'"]').classList.add('active');
    document.querySelectorAll('.wa-view').forEach(function(v) { v.classList.remove('active'); });
    var viewMap = { chats:'viewChats', addons:'viewAddons', market:'viewMarket', coins:'viewCoins', perfil:'viewPerfil' };
    document.getElementById(viewMap[view]).classList.add('active');
    if (view !== 'chats') cerrarChat();
  }

  function abrirPerfil() {
    cambiarView('perfil');
  }

  // ─── Menu ───────────────────────────────────────────────
  function toggleMenu() {
    var m = document.getElementById('menuDropdown');
    m.style.display = m.style.display === 'none' ? 'block' : 'none';
  }
  function cerrarMenu() { document.getElementById('menuDropdown').style.display = 'none'; }
  document.addEventListener('click', function(e) {
    var m = document.getElementById('menuDropdown');
    if (m.style.display !== 'none' && !m.contains(e.target) && !e.target.closest('.wa-header-btn')) {
      m.style.display = 'none';
    }
  });

  function nuevoGrupo() {
    cerrarMenu();
    alert('Función de nuevo grupo próximamente.');
  }

  // ─── Listen for iframe messages ─────────────────────────
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'closeChat') cerrarChat();
  });

  // ─── Init ────────────────────────────────────────────────
  renderChats();

  window.addEventListener('hashchange', function() {
    var h = window.location.hash.replace('#','') || 'chats';
    if (['chats','addons','market','coins','perfil'].indexOf(h) !== -1) cambiarView(h);
  });

  (function() {
    var h = window.location.hash.replace('#','') || 'chats';
    if (['chats','addons','market','coins','perfil'].indexOf(h) !== -1) cambiarView(h);
  })();
</script>

</body>
</html>
