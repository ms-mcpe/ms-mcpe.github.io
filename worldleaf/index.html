<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldLeaf - Addons</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');

*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  background: #0a0a0f;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(34, 139, 34, 0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 50%, rgba(255, 165, 0, 0.04) 0%, transparent 50%);
  padding: 2rem;
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

/* ─── HEADER ─── */
.header {
  text-align: center;
  margin-bottom: 2.5rem;
  position: relative;
}
.header::after {
  content: '';
  position: absolute;
  bottom: -1rem;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 3px;
  background: linear-gradient(90deg, transparent, #f59e0b, #22c55e, transparent);
  border-radius: 2px;
}
.header-icon {
  font-size: 3.5rem;
  margin-bottom: 0.5rem;
  display: block;
}
.header h1 {
  font-size: 2.8rem;
  font-weight: 800;
  background: linear-gradient(135deg, #22c55e, #f59e0b, #22c55e);
  background-size: 200% 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradShift 4s ease-in-out infinite;
  letter-spacing: -0.5px;
}
@keyframes gradShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
.header p {
  color: rgba(255,255,255,0.4);
  font-size: 0.9rem;
  margin-top: 0.5rem;
  font-weight: 300;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.header p.loading {
  color: rgba(245, 158, 11, 0.6);
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.header p.error {
  color: rgba(239, 68, 68, 0.7);
}

/* ─── SEARCH ─── */
.search-wrap {
  max-width: 500px;
  margin: 0 auto 2.5rem;
  position: relative;
}
.search-wrap svg {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  width: 18px;
  height: 18px;
  opacity: 0.4;
  pointer-events: none;
}
.search-wrap input {
  width: 100%;
  padding: 0.9rem 1rem 0.9rem 3rem;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04);
  color: white;
  font-size: 0.95rem;
  font-family: 'Inter', sans-serif;
  outline: none;
  transition: all 0.3s ease;
}
.search-wrap input::placeholder { color: rgba(255,255,255,0.25); }
.search-wrap input:focus {
  border-color: rgba(34, 197, 94, 0.3);
  background: rgba(255,255,255,0.06);
  box-shadow: 0 0 30px rgba(34, 197, 94, 0.05);
}

.search-count {
  text-align: center;
  color: rgba(255,255,255,0.25);
  font-size: 0.8rem;
  margin-bottom: 1.5rem;
  letter-spacing: 0.5px;
}

/* ─── GRID ─── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1.25rem;
}

/* ─── CARD ─── */
.card {
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 18px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}
.card:hover {
  transform: translateY(-6px);
  border-color: rgba(255,255,255,0.1);
  box-shadow: 0 20px 40px -12px rgba(0,0,0,0.6);
}
.card:active {
  transform: translateY(-2px) scale(0.98);
}

.card-thumb {
  width: 100%;
  height: 180px;
  object-fit: cover;
  display: block;
  pointer-events: none;
  -webkit-user-drag: none;
  user-drag: none;
  background: #111;
  image-rendering: auto;
}

.card-body {
  padding: 1.1rem 1.2rem 1.2rem;
}

.card-badges {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
  margin-bottom: 0.6rem;
}

.card-badge {
  font-size: 0.6rem;
  font-weight: 600;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  padding: 0.2rem 0.6rem;
  border-radius: 100px;
}
.card-badge.cat {
  background: rgba(34, 197, 94, 0.15);
  color: #22c55e;
  border: 1px solid rgba(34, 197, 94, 0.2);
}
.card-badge.ver {
  background: rgba(245, 158, 11, 0.15);
  color: #f59e0b;
  border: 1px solid rgba(245, 158, 11, 0.2);
}

.card-name {
  font-size: 1.1rem;
  font-weight: 700;
  color: white;
  line-height: 1.3;
  margin-bottom: 0.35rem;
}
.card-name span {
  background: linear-gradient(135deg, #f59e0b, #ef4444);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.card-meta {
  display: flex;
  gap: 1rem;
  font-size: 0.75rem;
  color: rgba(255,255,255,0.35);
}
.card-meta strong { color: rgba(255,255,255,0.6); font-weight: 600; }

/* ─── DETAIL OVERLAY ─── */
.detail-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 999;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
}
.detail-backdrop.open {
  opacity: 1;
  pointer-events: auto;
}

.detail-container {
  position: fixed;
  inset: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
  overflow-y: auto;
}
.detail-container.open {
  opacity: 1;
  pointer-events: auto;
}

.detail-close {
  position: fixed;
  top: 1.25rem;
  right: 1.25rem;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.1);
  color: white;
  font-size: 1.6rem;
  cursor: pointer;
  z-index: 1001;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  line-height: 1;
}
.detail-close:hover {
  background: rgba(239, 68, 68, 0.3);
  border-color: rgba(239, 68, 68, 0.4);
  transform: rotate(90deg);
}

.detail-card {
  background: rgba(20, 20, 28, 0.97);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  overflow: hidden;
  max-width: 900px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 40px 80px rgba(0,0,0,0.8);
  animation: popIn 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}
@keyframes popIn {
  from { transform: scale(0.92) translateY(20px); opacity: 0; }
  to { transform: scale(1) translateY(0); opacity: 1; }
}
.detail-card::-webkit-scrollbar { width: 6px; }
.detail-card::-webkit-scrollbar-track { background: transparent; }
.detail-card::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

.detail-banner {
  position: relative;
  height: 300px;
  overflow: hidden;
  background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
  flex-shrink: 0;
}
.detail-banner::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent 40%, rgba(20,20,28,0.95) 100%);
  pointer-events: none;
  z-index: 1;
}
.detail-slider {
  display: flex;
  width: 100%;
  height: 100%;
  transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
}
.detail-slider img {
  min-width: 100%;
  height: 100%;
  object-fit: cover;
  pointer-events: none;
  -webkit-user-drag: none;
  user-drag: none;
  image-rendering: auto;
}
.detail-nav {
  position: absolute;
  bottom: 1.25rem;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 0.5rem;
  z-index: 5;
}
.detail-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.25);
  cursor: pointer;
  transition: all 0.3s ease;
  border: none;
}
.detail-dot.active {
  background: #f59e0b;
  width: 28px;
  border-radius: 4px;
  box-shadow: 0 0 12px rgba(245, 158, 11, 0.4);
}
.detail-arrows {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 0 1rem;
  z-index: 5;
  pointer-events: none;
}
.detail-arrow {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  border: 1px solid rgba(255,255,255,0.1);
  color: white;
  font-size: 1.2rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  pointer-events: auto;
}
.detail-arrow:hover {
  background: rgba(245, 158, 11, 0.3);
  border-color: rgba(245, 158, 11, 0.4);
}

.detail-body {
  padding: 2rem;
}

.detail-badges {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  margin-bottom: 1rem;
}
.detail-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  padding: 0.3rem 0.8rem;
  border-radius: 100px;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}
.detail-badge.space {
  background: rgba(139, 92, 246, 0.15);
  color: #8b5cf6;
  border: 1px solid rgba(139, 92, 246, 0.2);
}
.detail-badge.cat {
  background: rgba(34, 197, 94, 0.15);
  color: #22c55e;
  border: 1px solid rgba(34, 197, 94, 0.2);
}
.detail-badge.ver {
  background: rgba(245, 158, 11, 0.15);
  color: #f59e0b;
  border: 1px solid rgba(245, 158, 11, 0.2);
}
.detail-badge.dl {
  background: rgba(59, 130, 246, 0.15);
  color: #3b82f6;
  border: 1px solid rgba(59, 130, 246, 0.2);
}

.detail-title {
  font-size: 2rem;
  font-weight: 800;
  color: white;
  margin-bottom: 0.6rem;
  line-height: 1.2;
}
.detail-title span {
  background: linear-gradient(135deg, #f59e0b, #ef4444);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.detail-meta {
  display: flex;
  gap: 1.5rem;
  flex-wrap: wrap;
  margin-bottom: 1.25rem;
  padding-bottom: 1.25rem;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  font-size: 0.85rem;
  color: rgba(255,255,255,0.5);
}
.detail-meta strong { color: rgba(255,255,255,0.8); font-weight: 600; }

.detail-desc {
  color: rgba(255,255,255,0.7);
  line-height: 1.8;
  font-size: 0.95rem;
}
.detail-desc ul {
  list-style: none;
  padding: 0;
}
.detail-desc li {
  padding: 0.4rem 0 0.4rem 1.75rem;
  position: relative;
}
.detail-desc li::before {
  content: '▸';
  position: absolute;
  left: 0;
  top: 0.4rem;
  color: #f59e0b;
  font-size: 0.85rem;
}
.detail-desc p {
  margin-top: 1rem;
  padding: 1rem 1.25rem;
  background: rgba(255,255,255,0.03);
  border-left: 3px solid #f59e0b;
  border-radius: 0 12px 12px 0;
  color: rgba(255,255,255,0.55);
  font-style: italic;
}

.detail-desc .desc-raw {
  white-space: pre-wrap;
}

.detail-footer {
  margin-top: 1.5rem;
  padding-top: 1.25rem;
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 1rem;
}
.detail-stats {
  display: flex;
  gap: 1.5rem;
}
.detail-stat {
  text-align: center;
}
.detail-stat-num {
  font-size: 1.3rem;
  font-weight: 800;
  color: white;
  line-height: 1;
}
.detail-stat-label {
  font-size: 0.65rem;
  color: rgba(255,255,255,0.3);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 0.2rem;
}
.detail-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.85rem 2rem;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: white;
  text-decoration: none;
  border-radius: 12px;
  font-weight: 700;
  font-size: 0.95rem;
  transition: all 0.3s ease;
  box-shadow: 0 8px 24px rgba(34, 197, 94, 0.25);
  border: none;
  cursor: pointer;
}
.detail-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 32px rgba(34, 197, 94, 0.35);
  background: linear-gradient(135deg, #2dd35e, #15803d);
}
.detail-btn:active { transform: translateY(0); }

/* ─── VOTE BUTTONS ─── */
.vote-group {
  display: flex;
  gap: 0.5rem;
  align-items: center;
}
.vote-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.4rem 0.9rem;
  border-radius: 100px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.5);
  font-size: 0.8rem;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all 0.25s ease;
  font-weight: 600;
}
.vote-btn:hover {
  border-color: rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.08);
}
.vote-btn.like.active {
  color: #22c55e;
  border-color: rgba(34, 197, 94, 0.3);
  background: rgba(34, 197, 94, 0.1);
}
.vote-btn.like.active:hover {
  color: #ef4444;
  border-color: rgba(239, 68, 68, 0.3);
  background: rgba(239, 68, 68, 0.1);
}
.vote-btn.dislike.active {
  color: #ef4444;
  border-color: rgba(239, 68, 68, 0.3);
  background: rgba(239, 68, 68, 0.1);
}
.vote-btn.dislike.active:hover {
  color: #22c55e;
  border-color: rgba(34, 197, 94, 0.3);
  background: rgba(34, 197, 94, 0.1);
}
.vote-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.vote-btn .v-count {
  font-weight: 700;
}
.detail-main-actions {
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-wrap: wrap;
}

/* ─── VERIFICATION OVERLAY ─── */
.verify-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  z-index: 2000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
}
.verify-backdrop.open {
  opacity: 1;
  pointer-events: auto;
}
.verify-card {
  background: rgba(20, 20, 28, 0.98);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  padding: 2.5rem 2.5rem 2rem;
  max-width: 460px;
  width: 100%;
  text-align: center;
  box-shadow: 0 40px 80px rgba(0,0,0,0.8);
  animation: popIn 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}
.verify-icon {
  font-size: 4rem;
  margin-bottom: 1rem;
  display: block;
}
.verify-card h2 {
  font-size: 1.4rem;
  font-weight: 800;
  color: white;
  margin-bottom: 0.5rem;
}
.verify-card p {
  color: rgba(255,255,255,0.5);
  font-size: 0.9rem;
  line-height: 1.6;
  margin-bottom: 1.5rem;
}
.verify-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.9rem 2rem;
  background: linear-gradient(135deg, #f59e0b, #d97706);
  color: white;
  text-decoration: none;
  border-radius: 12px;
  font-weight: 700;
  font-size: 0.95rem;
  transition: all 0.3s ease;
  box-shadow: 0 8px 24px rgba(245, 158, 11, 0.25);
  border: none;
  cursor: pointer;
}
.verify-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 32px rgba(245, 158, 11, 0.35);
}
.verify-skip {
  display: block;
  margin: 1rem auto 0;
  background: none;
  border: none;
  color: rgba(255,255,255,0.25);
  font-size: 0.8rem;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: color 0.2s;
}
.verify-skip:hover { color: rgba(255,255,255,0.5); }
.verify-time {
  margin-top: 1.25rem;
  padding-top: 1rem;
  border-top: 1px solid rgba(255,255,255,0.06);
  font-size: 0.7rem;
  color: rgba(255,255,255,0.2);
  letter-spacing: 0.5px;
}
.verify-time strong { color: rgba(245, 158, 11, 0.6); font-weight: 600; }
.footer {
  text-align: center;
  margin-top: 3rem;
  color: rgba(255,255,255,0.1);
  font-size: 0.7rem;
  letter-spacing: 1px;
}

/* ─── NO RESULTS ─── */
.no-results {
  grid-column: 1 / -1;
  text-align: center;
  padding: 3rem;
  color: rgba(255,255,255,0.3);
  font-size: 1rem;
}
.no-results span {
  display: block;
  font-size: 2.5rem;
  margin-bottom: 0.75rem;
}

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  body { padding: 1rem; }
  .header h1 { font-size: 1.8rem; }
  .grid { grid-template-columns: 1fr; gap: 1rem; }
  .detail-container { padding: 1rem; align-items: flex-start; padding-top: 3rem; }
  .detail-banner { height: 200px; }
  .detail-body { padding: 1.25rem; }
  .detail-title { font-size: 1.4rem; }
  .detail-close { top: 0.75rem; right: 0.75rem; width: 38px; height: 38px; font-size: 1.3rem; }
}
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <span class="header-icon">🌿</span>
    <h1>WorldLeaf</h1>
    <p id="headerSub">Cargando addons...</p>
  </div>

  <div class="search-wrap" id="searchWrap" style="display:none">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="Buscar addon..." autocomplete="off">
  </div>

  <div class="search-count" id="searchCount"></div>
  <div class="grid" id="grid"></div>

  <div class="footer">WorldLeaf &copy; 2026 &mdash; Todos los derechos reservados</div>
</div>

<div class="detail-backdrop" id="detailBackdrop"></div>
<div class="detail-container" id="detailContainer">
  <button class="detail-close" id="detailClose">&times;</button>
  <div class="detail-card">
    <div class="detail-banner" id="detailBanner">
      <div class="detail-slider" id="detailSlider"></div>
      <div class="detail-nav" id="detailNav"></div>
      <div class="detail-arrows">
        <button class="detail-arrow" id="detailPrev">&lsaquo;</button>
        <button class="detail-arrow" id="detailNext">&rsaquo;</button>
      </div>
    </div>
    <div class="detail-body">
      <div class="detail-badges" id="detailBadges"></div>
      <h2 class="detail-title" id="detailTitle"></h2>
      <div class="detail-meta" id="detailMeta"></div>
      <div class="detail-desc" id="detailDesc"></div>
      <div class="detail-footer" id="detailFooter"></div>
    </div>
  </div>
</div>

<div class="verify-backdrop" id="verifyBackdrop">
  <div class="verify-card">
    <span class="verify-icon">🔒</span>
    <h2>Verificaci\u00f3n necesaria</h2>
    <p>Debes verificarte para poder descargar addons. La verificaci\u00f3n dura <strong>24 horas</strong>.</p>
    <a class="verify-btn" id="verifyLink" href="https://cuty.io/jWcXJCZxVE" target="_blank" rel="noopener noreferrer">🔓 Verificarse ahora</a>
    <button class="verify-skip" id="verifySkip">Ya me verifiqu\u00e9</button>
    <div class="verify-time" id="verifyTime"></div>
  </div>
</div>

<script>
(function() {
  // ─── ANTI-DEVTOOLS ───
  document.addEventListener('contextmenu', e => { e.preventDefault(); return false; });
  document.addEventListener('dragstart', e => { e.preventDefault(); return false; });
  document.addEventListener('copy', e => { e.preventDefault(); return false; });
  document.addEventListener('cut', e => { e.preventDefault(); return false; });
  document.addEventListener('paste', e => { e.preventDefault(); return false; });
  document.addEventListener('keydown', e => {
    if (
      e.key === 'F12' ||
      (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) ||
      (e.ctrlKey && (e.key === 'U' || e.key === 'u' || e.key === 'S' || e.key === 's'))
    ) {
      e.preventDefault();
      return false;
    }
  });

  // ─── CONFIG ───
  const SHEET_ID = '18kvhZoMXNX8W6C7shU8b3Zt5vJocymt0JnMjmglV1D4';
  const SHEET_GID = '835263859';
  const FILTER_SPACE = 'WorldLeaf';
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbx7yl9hxkU2MYE6ijNKDZDvLyDkZHI7oBt5LOzGGFn4RDtLoFpXijl07JBoQ3W7KFNk/exec';

  // ─── DOM REFS ───
  const headerSub = document.getElementById('headerSub');
  const searchWrap = document.getElementById('searchWrap');
  const searchInput = document.getElementById('searchInput');
  const searchCount = document.getElementById('searchCount');
  const grid = document.getElementById('grid');

  const backdrop = document.getElementById('detailBackdrop');
  const container = document.getElementById('detailContainer');
  const detailClose = document.getElementById('detailClose');
  const detailSlider = document.getElementById('detailSlider');
  const detailNav = document.getElementById('detailNav');
  const detailBadges = document.getElementById('detailBadges');
  const detailTitle = document.getElementById('detailTitle');
  const detailMeta = document.getElementById('detailMeta');
  const detailDesc = document.getElementById('detailDesc');
  const detailFooter = document.getElementById('detailFooter');

  let addons = [];
  let sliderTimer = null;
  let sliderIndex = 0;

  function slugify(text) {
    return text.toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-+|-+$/g, '');
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return dateStr;
    const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
  }

  function parseFeatures(desc) {
    if (!desc) return [];
    const lines = desc.split('\n').map(l => l.trim()).filter(l => /^[-+]/.test(l));
    if (lines.length) return lines.map(l => l.replace(/^[-+]\s*/, ''));
    return desc.trim() ? null : [];
  }

  function processRows(rows) {
    addons = rows
      .filter((r, i) => {
        if (i === 0 && r.c && r.c[0] && r.c[0].v === 'Espacio') return false;
        return true;
      })
      .map(r => {
        const cols = r.c || [];
        return {
          space: cols[0] ? cols[0].v || '' : '',
          name: cols[1] ? cols[1].v || '' : '',
          link: cols[2] ? cols[2].v || '' : '',
          imagesRaw: cols[3] ? cols[3].v || '' : '',
          category: cols[4] ? cols[4].v || '' : '',
          version: cols[5] ? cols[5].v || '' : '',
          description: cols[6] ? cols[6].v || '' : '',
          date: cols[7] ? cols[7].v || '' : '',
          likes: parseInt(cols[8] ? cols[8].v || 0 : 0),
          dislikes: parseInt(cols[9] ? cols[9].v || 0 : 0),
          downloads: parseInt(cols[10] ? cols[10].v || 0 : 0)
        };
      })
      .filter(a => a.space === FILTER_SPACE && a.name);

    addons.forEach(a => {
      a.id = slugify(a.name);
      a.images = a.imagesRaw ? a.imagesRaw.split('|').filter(Boolean) : [];
      a.thumbnail = a.images.length ? a.images[0].replace(/=s\d+/, '=s800') : '';
      a.dateFormatted = formatDate(a.date);
      a.features = parseFeatures(a.description);
    });

    if (!addons.length) {
      headerSub.textContent = 'No hay addons disponibles';
      headerSub.className = '';
      grid.innerHTML = '<div class="no-results"><span>📭</span>No se encontraron addons de WorldLeaf</div>';
      return;
    }

    headerSub.textContent = addons.length + ' addon' + (addons.length !== 1 ? 'es' : '') + ' disponibles';
    headerSub.className = '';
    searchWrap.style.display = 'block';
    renderGrid();
    if (location.hash) handleHash();
  }

  function fetchData() {
    headerSub.textContent = 'Cargando addons...';
    headerSub.className = 'loading';

    // Google gviz/tq endpoint calls google.visualization.Query.setResponse
    window.google = window.google || {};
    window.google.visualization = window.google.visualization || {};
    window.google.visualization.Query = window.google.visualization.Query || {};
    window.google.visualization.Query.setResponse = function(resp) {
      delete window.google.visualization.Query.setResponse;
      if (resp.status !== 'ok') {
        headerSub.textContent = 'Error: ' + resp.status;
        headerSub.className = 'error';
        return;
      }
      processRows(resp.table.rows);
    };

    const script = document.createElement('script');
    script.src = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&tq=&gid=' + SHEET_GID;
    script.onerror = function() {
      headerSub.textContent = 'Error al cargar datos: no se pudo conectar';
      headerSub.className = 'error';
      grid.innerHTML = '<div class="no-results"><span>⚠️</span>Error al conectar con Google Sheets<br><small>Verifica tu conexi\u00f3n a internet</small></div>';
    };
    document.head.appendChild(script);
  }

  // ─── RENDER GRID ───
  function renderGrid(filter) {
    const q = (filter || '').toLowerCase().trim();
    const filtered = q ? addons.filter(a =>
      a.name.toLowerCase().includes(q) ||
      a.category.toLowerCase().includes(q)
    ) : addons;

    if (!filtered.length) {
      grid.innerHTML = '<div class="no-results"><span>🔍</span>No se encontraron addons para "<strong>' + q + '</strong>"</div>';
      searchCount.textContent = '0 resultados';
      return;
    }

    searchCount.textContent = filtered.length + ' addon' + (filtered.length !== 1 ? 'es' : '');

    grid.innerHTML = filtered.map(a => `
      <div class="card" data-id="${a.id}">
        <img class="card-thumb" src="${a.thumbnail}" alt="${a.name}" draggable="false" loading="lazy">
        <div class="card-body">
          <div class="card-badges">
            <span class="card-badge cat">${a.category}</span>
            <span class="card-badge ver">v${a.version}</span>
          </div>
          <div class="card-name">${a.name}</div>
          <div class="card-meta">
            <span>⬇️ <strong>${a.downloads}</strong></span>
            <span>👍 <strong>${a.likes}</strong></span>
            <span>📅 <strong>${a.dateFormatted}</strong></span>
          </div>
        </div>
      </div>
    `).join('');

    grid.querySelectorAll('.card').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.dataset.id;
        location.hash = '#' + id;
      });
    });
  }

  searchInput.addEventListener('input', () => renderGrid(searchInput.value));

  // ─── DETAIL ───
  let currentAddon = null;
  let voting = false;

  function getVoteKey(addon) { return 'wl_vote_' + addon.id; }

  function getVoteState(addon) { return localStorage.getItem(getVoteKey(addon)) || ''; }

  function setVoteState(addon, state) {
    if (state) localStorage.setItem(getVoteKey(addon), state);
    else localStorage.removeItem(getVoteKey(addon));
  }

  function jsonpCall(url) {
    return new Promise(function(resolve, reject) {
      var cbName = 'wl_cb_' + Date.now();
      window[cbName] = function(data) {
        delete window[cbName];
        resolve(data);
      };
      var s = document.createElement('script');
      s.src = url + '&callback=' + cbName;
      s.onerror = function() { delete window[cbName]; reject(new Error('Network error')); };
      document.head.appendChild(s);
    });
  }

  function voteAddon(addon, voteType) {
    if (!GAS_URL || voting) return;
    voting = true;

    var currentVote = getVoteState(addon);
    var newVote, effectiveType;

    if (currentVote === voteType) {
      newVote = '';
      effectiveType = voteType === 'like' ? 'unlike' : 'undislike';
    } else {
      newVote = voteType;
      effectiveType = voteType;
    }

    // Optimistic UI update
    updateVoteUI(addon, newVote, effectiveType);

    var url = GAS_URL + '?action=rateAddon&user=anon&pass=anon&espacio=' + encodeURIComponent(addon.space) + '&nombre=' + encodeURIComponent(addon.name) + '&vote=' + effectiveType;
    jsonpCall(url).then(function(resp) {
      voting = false;
      if (resp && resp.status === 'OK') {
        addon.likes = resp.likes;
        addon.dislikes = resp.dislikes;
        setVoteState(addon, newVote);
        updateVoteUI(addon, newVote, null);
      } else {
        updateVoteUI(addon, currentVote, null);
      }
    }).catch(function() {
      voting = false;
      updateVoteUI(addon, currentVote, null);
    });
  }

  function updateVoteUI(addon, newVote, tempType) {
    var likeBtn = document.getElementById('voteLike');
    var dislikeBtn = document.getElementById('voteDislike');
    var likeCount = document.getElementById('voteLikeCount');
    var dislikeCount = document.getElementById('voteDislikeCount');
    if (!likeBtn) return;

    var likes = addon.likes;
    var dislikes = addon.dislikes;

    // Adjust optimistically
    if (tempType === 'like' || tempType === 'unlike') {
      if (tempType === 'like') { likes++; dislikes = Math.max(0, dislikes - 1); }
      else { likes = Math.max(0, likes - 1); }
    } else if (tempType === 'dislike' || tempType === 'undislike') {
      if (tempType === 'dislike') { dislikes++; likes = Math.max(0, likes - 1); }
      else { dislikes = Math.max(0, dislikes - 1); }
    }

    likeCount.textContent = likes;
    dislikeCount.textContent = dislikes;
    likeBtn.classList.toggle('active', newVote === 'like');
    dislikeBtn.classList.toggle('active', newVote === 'dislike');

    // Update badge
    var dlBadge = document.querySelector('.detail-badge.dl');
    if (dlBadge) dlBadge.textContent = '⬇️ ' + addon.downloads + ' descargas';
  }

  function registerDownload(addon) {
    if (!GAS_URL) return;
    var url = GAS_URL + '?action=registerDownload&user=anon&pass=anon&espacio=' + encodeURIComponent(addon.space) + '&nombre=' + encodeURIComponent(addon.name);
    jsonpCall(url).then(function(resp) {
      if (resp && resp.status === 'OK') {
        addon.downloads = resp.downloads;
        var dn = document.getElementById('dlCount');
        if (dn) dn.textContent = resp.downloads;
        var dlBadge = document.querySelector('.detail-badge.dl');
        if (dlBadge) dlBadge.textContent = '⬇️ ' + resp.downloads + ' descargas';
      }
    }).catch(function() {});
  }

  function openDetail(addon) {
    currentAddon = addon;
    sliderIndex = 0;
    document.body.style.overflow = 'hidden';

    var voteState = getVoteState(addon);

    detailBadges.innerHTML = `
      <span class="detail-badge space">🌍 ${addon.space}</span>
      <span class="detail-badge cat">🗺️ ${addon.category}</span>
      <span class="detail-badge ver">📦 v${addon.version}</span>
      <span class="detail-badge dl">⬇️ ${addon.downloads} descargas</span>
    `;

    detailTitle.textContent = addon.name;

    detailMeta.innerHTML = `
      <span>📅 <strong>${addon.dateFormatted}</strong></span>
      <div class="vote-group">
        <button class="vote-btn like${voteState === 'like' ? ' active' : ''}" id="voteLike" title="${voteState === 'like' ? 'Quitar like' : 'Me gusta'}">
          👍 <span class="v-count" id="voteLikeCount">${addon.likes}</span>
        </button>
        <button class="vote-btn dislike${voteState === 'dislike' ? ' active' : ''}" id="voteDislike" title="${voteState === 'dislike' ? 'Quitar dislike' : 'No me gusta'}">
          👎 <span class="v-count" id="voteDislikeCount">${addon.dislikes}</span>
        </button>
      </div>
    `;

    document.getElementById('voteLike').addEventListener('click', function() { voteAddon(addon, 'like'); });
    document.getElementById('voteDislike').addEventListener('click', function() { voteAddon(addon, 'dislike'); });

    // Description
    if (addon.features && addon.features.length) {
      let html = '<ul>';
      addon.features.forEach(f => { html += '<li>' + f + '</li>'; });
      html += '</ul>';
      detailDesc.innerHTML = html;
    } else if (addon.description) {
      detailDesc.innerHTML = '<div class="desc-raw">' + addon.description + '</div>';
    } else {
      detailDesc.innerHTML = '<p style="color:rgba(255,255,255,0.3)">Sin descripci\u00f3n disponible</p>';
    }

    // Footer
    detailFooter.innerHTML = `
      <div class="detail-stats">
        <div class="detail-stat">
          <div class="detail-stat-num" id="dlCount">${addon.downloads}</div>
          <div class="detail-stat-label">Descargas</div>
        </div>
        <div class="detail-stat">
          <div class="detail-stat-num">${addon.likes}</div>
          <div class="detail-stat-label">Likes</div>
        </div>
        <div class="detail-stat">
          <div class="detail-stat-num">${addon.dislikes}</div>
          <div class="detail-stat-label">Dislikes</div>
        </div>
      </div>
      <a class="detail-btn" href="${addon.link}" target="_blank" rel="noopener noreferrer" id="dlBtn">⬇ Descargar</a>
    `;

    document.getElementById('dlBtn').addEventListener('click', function(e) {
      if (!checkVerification(addon)) {
        e.preventDefault();
        showVerification();
      } else {
        registerDownload(addon);
      }
    });

    // Slider
    detailSlider.innerHTML = '';
    detailNav.innerHTML = '';

    const imgs = addon.images.length ? addon.images : [addon.thumbnail || ''];
    imgs.forEach((src, i) => {
      const img = document.createElement('img');
      img.src = src.replace(/=s\d+/, '=s0');
      img.alt = addon.name + ' ' + (i + 1);
      img.draggable = false;
      detailSlider.appendChild(img);

      const dot = document.createElement('button');
      dot.className = 'detail-dot' + (i === 0 ? ' active' : '');
      dot.addEventListener('click', () => goToSlide(i));
      detailNav.appendChild(dot);
    });

    function goToSlide(i) {
      sliderIndex = i;
      detailSlider.style.transform = 'translateX(-' + (sliderIndex * 100) + '%)';
      detailNav.querySelectorAll('.detail-dot').forEach((d, j) => {
        d.classList.toggle('active', j === sliderIndex);
      });
    }

    document.getElementById('detailPrev').onclick = () => {
      goToSlide(sliderIndex === 0 ? imgs.length - 1 : sliderIndex - 1);
      resetSliderTimer();
    };
    document.getElementById('detailNext').onclick = () => {
      goToSlide(sliderIndex === imgs.length - 1 ? 0 : sliderIndex + 1);
      resetSliderTimer();
    };

    function resetSliderTimer() {
      clearInterval(sliderTimer);
      if (imgs.length > 1) {
        sliderTimer = setInterval(() => {
          goToSlide(sliderIndex === imgs.length - 1 ? 0 : sliderIndex + 1);
        }, 5000);
      }
    }
    resetSliderTimer();

    backdrop.classList.add('open');
    container.classList.add('open');
  }

  function closeDetail() {
    document.body.style.overflow = '';
    clearInterval(sliderTimer);
    backdrop.classList.remove('open');
    container.classList.remove('open');
    if (location.hash) {
      history.replaceState(null, '', location.pathname + location.search);
    }
  }

  detailClose.addEventListener('click', closeDetail);
  backdrop.addEventListener('click', closeDetail);
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && container.classList.contains('open')) closeDetail();
  });

  // ─── HASH ROUTING ───
  function handleHash() {
    const hash = location.hash.replace(/^#/, '');
    if (!hash) return;
    const addon = addons.find(a => a.id === hash);
    if (addon) openDetail(addon);
  }

  window.addEventListener('hashchange', handleHash);

  // ─── VERIFICATION (24h) ───
  var VERIFY_KEY = 'wl_verified_ts';
  var VERIFY_DURATION = 24 * 60 * 60 * 1000; // 24h

  function initVerification() {
    // Check if returning from verification with ?verified=true
    var params = new URLSearchParams(location.search);
    if (params.get('verified') === 'true') {
      localStorage.setItem(VERIFY_KEY, Date.now().toString());
      // Clean URL without reload
      var clean = location.pathname + location.hash;
      history.replaceState(null, '', clean);
    }
  }

  function isVerified() {
    var ts = localStorage.getItem(VERIFY_KEY);
    if (!ts) return false;
    var elapsed = Date.now() - parseInt(ts);
    return elapsed < VERIFY_DURATION;
  }

  function getRemainingTime() {
    var ts = localStorage.getItem(VERIFY_KEY);
    if (!ts) return 0;
    var elapsed = Date.now() - parseInt(ts);
    var remaining = VERIFY_DURATION - elapsed;
    return Math.max(0, remaining);
  }

  function checkVerification(addon) {
    if (isVerified()) return true;
    return false;
  }

  var verifyBackdrop = document.getElementById('verifyBackdrop');
  var verifyLink = document.getElementById('verifyLink');
  var verifySkip = document.getElementById('verifySkip');
  var verifyTime = document.getElementById('verifyTime');

  function showVerification() {
    if (!verifyBackdrop) return;

    if (isVerified()) {
      // Was verified but maybe showing stale overlay
      verifyBackdrop.classList.remove('open');
      return;
    }

    // Update remaining time display
    var rem = getRemainingTime();
    if (rem > 0) {
      var hours = Math.floor(rem / 3600000);
      var mins = Math.floor((rem % 3600000) / 60000);
      verifyTime.innerHTML = 'Verificaci\u00f3n expirada. Vuelve a verificarte.';
    } else {
      verifyTime.innerHTML = '';
    }

    document.body.style.overflow = 'hidden';
    verifyBackdrop.classList.add('open');
  }

  function hideVerification() {
    document.body.style.overflow = '';
    verifyBackdrop.classList.remove('open');
  }

  // When user clicks the verification link, it opens in new tab
  // When they come back, we need to check if they verified
  verifyLink.addEventListener('click', function() {
    // Poll for when they come back
    var pollInterval = setInterval(function() {
      if (isVerified()) {
        clearInterval(pollInterval);
        hideVerification();
      }
    }, 1000);
    // Stop polling after 5 minutes
    setTimeout(function() { clearInterval(pollInterval); }, 300000);
  });

  verifySkip.addEventListener('click', function() {
    // Re-check verification status
    if (isVerified()) {
      hideVerification();
    } else {
      // Try to detect if URL has verified=true
      var params = new URLSearchParams(location.search);
      if (params.get('verified') === 'true') {
        localStorage.setItem(VERIFY_KEY, Date.now().toString());
        var clean = location.pathname + location.hash;
        history.replaceState(null, '', clean);
        hideVerification();
      }
    }
  });

  // ─── INIT ───
  initVerification();
  fetchData();
})();
</script>

</body>
</html>
