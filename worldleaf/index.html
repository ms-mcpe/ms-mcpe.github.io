<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldLeaf - Descargar APK</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(ellipse at 50% 0%, #0f2a1a 0%, #080c14 70%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #e8edf0;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-user-drag: none;
        }

        img {
            -webkit-user-drag: none;
            -khtml-user-drag: none;
            -moz-user-drag: none;
            -o-user-drag: none;
            user-drag: none;
            pointer-events: none;
        }

        .card {
            background: rgba(18, 28, 22, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(74, 222, 128, 0.12);
            border-radius: 28px;
            padding: 40px 32px 32px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -60%;
            left: -60%;
            width: 220%;
            height: 220%;
            background: radial-gradient(circle at 30% 20%, rgba(74, 222, 128, 0.04), transparent 60%);
            pointer-events: none;
        }

        .brand {
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #4ade80, #22c55e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
        }

        .brand::after {
            content: 'Leaf';
            font-weight: 300;
            background: linear-gradient(135deg, #a7f3d0, #6ee7b7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .icon-wrap {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            border-radius: 22%;
            overflow: hidden;
            background: rgba(0,0,0,0.3);
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .app-icon {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .version-badge {
            display: inline-block;
            background: rgba(74, 222, 128, 0.12);
            color: #86efac;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 12px;
            border-radius: 100px;
            margin-top: 8px;
            letter-spacing: 0.3px;
            border: 1px solid rgba(74, 222, 128, 0.15);
        }

        .subtitle {
            font-size: 13px;
            color: #8899a0;
            margin-top: 6px;
            font-weight: 400;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin: 28px 0 30px;
            padding: 18px 20px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.04);
        }

        .stat-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .stat-divider {
            width: 1px;
            background: rgba(255,255,255,0.06);
        }

        .stat-num {
            font-size: 26px;
            font-weight: 700;
            color: #e8edf0;
            line-height: 1.2;
            transition: opacity 0.4s ease;
            min-height: 31px;
        }

        .stat-num.loading {
            opacity: 0.3;
        }

        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #6a7a82;
            font-weight: 600;
        }

        .stat-icon {
            font-size: 14px;
            margin-bottom: 2px;
            opacity: 0.5;
        }

        .btn-download {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px 28px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #fff;
            font-size: 17px;
            font-weight: 700;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s ease, box-shadow 0.3s ease;
            box-shadow: 0 8px 28px rgba(34, 197, 94, 0.25);
            position: relative;
            letter-spacing: 0.3px;
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 36px rgba(34, 197, 94, 0.35);
        }

        .btn-download:active {
            transform: translateY(0);
            box-shadow: 0 4px 16px rgba(34, 197, 94, 0.2);
        }

        .btn-download svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .error-msg {
            font-size: 11px;
            color: #f87171;
            margin-top: 10px;
            display: none;
        }

        @media (max-width: 420px) {
            .card { padding: 28px 20px 24px; }
            .brand { font-size: 28px; }
            .stat-num { font-size: 22px; }
            .stats { gap: 16px; padding: 14px 12px; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="icon-wrap">
        <img src="icon.png" alt="WorldLeaf" class="app-icon" onerror="this.style.display='none'">
    </div>

    <div class="brand">World</div>

    <div class="version-badge">v1.10.0</div>

    <div class="subtitle">WorldLeaf — Complementos Minecraft Completamente gratis</div>

    <div class="stats">
        <div class="stat-item">
            <div class="stat-icon">📦</div>
            <div class="stat-num loading" id="addonCount">--</div>
            <div class="stat-label">Complementos</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
            <div class="stat-icon">⬇️</div>
            <div class="stat-num loading" id="downloadCount">--</div>
            <div class="stat-label">Descargas</div>
        </div>
    </div>

    <a href="https://mobidrive.com/sharelink/u/5wwTqSANRujfeHK6zGjUlO70qS7Vqrnne0pnCveBMRTz"
       class="btn-download" id="downloadBtn" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v12m0 0-4-4m4 4 4-4"/>
            <path d="M3 16v2a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-2"/>
        </svg>
        Descargar APK
    </a>

    <div class="error-msg" id="errorMsg">Error al conectar con el servidor</div>
</div>

<script>
(function() {
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbwCPig856nHfy0zRN4O9kdKpxs7VltqBFGEvD5WOlnFLLU7Db6SLkaux6t2Yi6g_HNC5w/exec';

    function fmt(n) { return n >= 1000000 ? (n/1000000).toFixed(1).replace(/\.0$/,'')+'M' : n >= 1000 ? (n/1000).toFixed(1).replace(/\.0$/,'')+'k' : String(n); }

    var dlEl = document.getElementById('downloadCount');
    var acEl = document.getElementById('addonCount');

    var cached = localStorage.getItem('wl_stats');
    if (cached) {
      try { var c = JSON.parse(cached); acEl.textContent = fmt(c.a); dlEl.textContent = fmt(c.d); } catch(e) {}
    }
    window._statsCb = function(d) {
      if (d && d.ok) {
        acEl.textContent = fmt(d.total_addons);
        dlEl.textContent = fmt(d.total_descargas);
        localStorage.setItem('wl_stats', JSON.stringify({a:d.total_addons, d:d.total_descargas}));
      }
    };
    var s = document.createElement('script');
    s.src = GAS_URL + '?action=getStats&callback=_statsCb&_=' + Date.now();
    document.body.appendChild(s);
    setTimeout(function() { document.body.removeChild(s); }, 2000);

    document.getElementById('downloadBtn').addEventListener('click', function() {
        dlEl.textContent = fmt((parseInt(dlEl.textContent) || 0) + 1);
        var s = document.createElement('script');
        s.src = GAS_URL + '?action=incrementDescargas&callback=_statsCb&_=' + Date.now();
        document.body.appendChild(s);
        setTimeout(function() { document.body.removeChild(s); }, 2000);
    });
})();
</script>

</body>
</html>
