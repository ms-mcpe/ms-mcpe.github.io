<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BlockVault — Minecraft Bedrock Addons</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#7c3aed" />

  <style>
    /* ══════════════════════════════════════════════════
   CSS VARIABLES + TEMAS
══════════════════════════════════════════════════ */
    :root {
      --bg-primary: #0a0a14;
      --bg-secondary: #12121f;
      --bg-card: #1a1a2e;
      --bg-glass: rgba(26, 26, 46, 0.85);
      --accent: #7c3aed;
      --accent-2: #06b6d4;
      --accent-glow: rgba(124, 58, 237, 0.35);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #475569;
      --border: rgba(124, 58, 237, 0.25);
      --border-bright: rgba(124, 58, 237, 0.6);
      --radius: 14px;
      --radius-sm: 8px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      --shadow-accent: 0 0 30px rgba(124, 58, 237, 0.4);
      --font-display: 'Orbitron', monospace;
      --font-body: 'Exo 2', sans-serif;
      --nav-h: 64px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="light"] {
      --bg-primary: #f0f4ff;
      --bg-secondary: #e8eeff;
      --bg-card: #ffffff;
      --bg-glass: rgba(255, 255, 255, 0.9);
      --text-primary: #0f172a;
      --text-secondary: #334155;
      --text-muted: #94a3b8;
      --border: rgba(124, 58, 237, 0.2);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }

    /* ══ Reset ══════════════════════════════════════ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      height: 100%;
      overflow: hidden
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: background var(--transition), color var(--transition);
      user-select: none;
      -webkit-user-select: none;
    }

    /* ══ Partículas de fondo ══════════════════════ */
    #particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      animation: float linear infinite;
      opacity: 0;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) scale(0);
        opacity: 0
      }

      10% {
        opacity: 0.6
      }

      90% {
        opacity: 0.3
      }

      100% {
        transform: translateY(-20px) scale(1);
        opacity: 0
      }
    }

    /* ══ Navbar ══════════════════════════════════ */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: var(--bg-glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }

    .nav-logo {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: var(--shadow-accent);
      animation: pulse-logo 3s ease-in-out infinite;
    }

    @keyframes pulse-logo {

      0%,
      100% {
        box-shadow: 0 0 20px var(--accent-glow)
      }

      50% {
        box-shadow: 0 0 40px var(--accent-glow), 0 0 60px rgba(6, 182, 212, 0.2)
      }
    }

    .nav-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.3rem;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .nav-btn {
      padding: 8px 18px;
      border: none;
      cursor: pointer;
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 600;
      transition: all var(--transition);
      position: relative;
      overflow: hidden;
    }

    .nav-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.1);
      opacity: 0;
      transition: opacity var(--transition);
    }

    .nav-btn:hover::after {
      opacity: 1
    }

    .nav-btn.primary {
      background: linear-gradient(135deg, var(--accent), #5b21b6);
      color: #fff;
      box-shadow: var(--shadow-accent);
    }

    .nav-btn.ghost {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .nav-btn.ghost:hover {
      color: var(--text-primary);
      border-color: var(--border-bright)
    }

    .theme-toggle {
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: var(--text-secondary);
      transition: all var(--transition);
    }

    .theme-toggle:hover {
      border-color: var(--border-bright);
      color: var(--accent);
      box-shadow: var(--shadow-accent);
    }

    /* ══ Iframe Container ════════════════════════ */
    #app-container {
      position: fixed;
      top: var(--nav-h);
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10;
      overflow: hidden;
    }

    #page-frame {
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      transition: opacity 0.4s ease;
    }

    #page-frame.loading {
      opacity: 0;
      pointer-events: none
    }

    /* ══ Loading Screen ══════════════════════════ */
    #loader {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    #loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none
    }

    .loader-logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      box-shadow: var(--shadow-accent);
      animation: spin-in 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes spin-in {
      from {
        transform: scale(0) rotate(-180deg);
        opacity: 0
      }

      to {
        transform: scale(1) rotate(0deg);
        opacity: 1
      }
    }

    .loader-text {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 4px;
      animation: fade-up 0.8s 0.3s both;
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .loader-bar-wrap {
      width: 240px;
      height: 3px;
      background: rgba(124, 58, 237, 0.2);
      border-radius: 2px;
      overflow: hidden;
      animation: fade-up 0.8s 0.5s both;
    }

    .loader-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-radius: 2px;
      animation: load-bar 1.5s 0.6s ease-out forwards;
    }

    @keyframes load-bar {
      to {
        width: 100%
      }
    }

    .loader-sub {
      font-size: 0.8rem;
      color: var(--text-muted);
      letter-spacing: 2px;
      animation: fade-up 0.8s 0.7s both;
    }

    /* ══ Toast ═══════════════════════════════════ */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 500;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast-item {
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-size: 0.85rem;
      box-shadow: var(--shadow);
      animation: toast-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: 320px;
    }

    .toast-item.success {
      border-color: #22c55e;
      color: #22c55e
    }

    .toast-item.error {
      border-color: #ef4444;
      color: #ef4444
    }

    @keyframes toast-in {
      from {
        opacity: 0;
        transform: translateX(100px)
      }

      to {
        opacity: 1;
        transform: translateX(0)
      }
    }

    @keyframes toast-out {
      from {
        opacity: 1;
        transform: translateX(0)
      }

      to {
        opacity: 0;
        transform: translateX(100px)
      }
    }
  </style>

  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3345712294617095"
     crossorigin="anonymous"></script>
</head>

<body>

  <!-- Partículas decorativas -->
  <div id="particles"></div>

  <!-- Loader inicial -->
  <div id="loader">
    <div class="loader-logo"><img src="icon-192.png" alt="Logo" style="width:80%; height:80%; object-fit:contain;">
    </div>
    <div class="loader-text">BLOCKVAULT</div>
    <div class="loader-bar-wrap">
      <div class="loader-bar"></div>
    </div>
    <div class="loader-sub">CARGANDO EXPERIENCIA · · ·</div>
  </div>

  <!-- Navbar -->
  <nav id="navbar">
    <div class="nav-brand" onclick="navigateTo('home')">
      <div class="nav-logo"><img src="icon-192.png" alt="Logo" style="width:70%; height:70%; object-fit:contain;"></div>
      <span class="nav-title">BLOCKVAULT</span>
    </div>
    <div class="nav-actions">
      <button class="nav-btn ghost" onclick="clearAllData()" style="padding: 6px 12px; font-size: 0.7rem; color: var(--text-muted); border-color: var(--border); margin-right: 4px;">
        🗑️ Borrar Datos
      </button>
      <button class="theme-toggle" onclick="toggleTheme()" title="Cambiar tema">🌙</button>
    </div>
  </nav>

  <!-- Contenedor principal con iframe -->
  <div id="app-container">
    <iframe id="page-frame" src="about:blank" title="BlockVault App"></iframe>
  </div>

  <!-- Toasts -->
  <div id="toast"></div>

  <script>
    // ════════════════════════════════════════════════════════════
    //  ANTI-INSPECT / ANTI-DEVTOOLS
    // ════════════════════════════════════════════════════════════
    (function () {
      // Deshabilitar clic derecho
      document.addEventListener('contextmenu', e => e.preventDefault());

      // Deshabilitar atajos de teclado de inspección
      document.addEventListener('keydown', e => {
        const k = e.key;
        if (e.ctrlKey && e.shiftKey && ['I', 'J', 'C', 'K'].includes(k.toUpperCase())) {
          e.preventDefault(); e.stopPropagation(); return false;
        }
        if (e.ctrlKey && k.toUpperCase() === 'U') { e.preventDefault(); return false; }
        if (k === 'F12') { e.preventDefault(); return false; }
      });

      // Detección de DevTools por dimensión
      let devOpen = false;
      function detectDevTools() {
        const threshold = 160;
        const widthDiff = window.outerWidth - window.innerWidth;
        const heightDiff = window.outerHeight - window.innerHeight;
        if ((widthDiff > threshold || heightDiff > threshold) && !devOpen) {
          devOpen = true;
          document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:monospace;font-size:1.2rem;color:#7c3aed;background:#0a0a14">⛔ Acceso denegado</div>';
        }
      }
      setInterval(detectDevTools, 1000);

      // Anti-debugger
      setInterval(() => {
        try { (function () { }).constructor('debugger')(); } catch (e) { }
      }, 3000);

      // Bloquear selección
      document.addEventListener('selectstart', e => {
        if (!['INPUT', 'TEXTAREA'].includes(e.target.tagName)) e.preventDefault();
      });

      // Bloquear drag
      document.addEventListener('dragstart', e => e.preventDefault());
    })();

    // ════════════════════════════════════════════════════════════
    //  CONFIGURACIÓN GLOBAL
    // ════════════════════════════════════════════════════════════
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzAFKX9RRSEbp5-kqDFHQHi3Rk17mLhBmhBq9Y3I9oTlfhNfc1wFXwUgv6P5LZ5sBkV/exec';

    const PAGES = {
      home: 'home.html',
      addons: 'addons.html',
      settings: 'settings.html',
      login: 'login.html',
      panel: 'panel.html',
      userpanel: 'Userpanel1.html',
    };

    const VERIFY_LINK = 'https://cuty.io/m8uEHt1ws';
    const VERIFY_DURATION = 15 * 60 * 60 * 1000; // 15 horas

    let currentPage = 'home';
    let appTheme = localStorage.getItem('bv_theme') || 'dark';
    let sessionData = null;
    let pendingData = null; // Para pasar filtros u otros datos al iframe

    // ════════════════════════════════════════════════════════════
    //  PARTÍCULAS
    // ════════════════════════════════════════════════════════════
    (function spawnParticles() {
      const container = document.getElementById('particles');
      const colors = ['#7c3aed', '#06b6d4', '#a78bfa', '#22d3ee'];
      for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 4 + 2;
        p.style.cssText = `
      width:${size}px;height:${size}px;
      left:${Math.random() * 100}%;
      background:${colors[Math.floor(Math.random() * colors.length)]};
      animation-duration:${Math.random() * 15 + 10}s;
      animation-delay:${Math.random() * 15}s;
    `;
        container.appendChild(p);
      }
    })();

    // ════════════════════════════════════════════════════════════
    //  TEMA
    // ════════════════════════════════════════════════════════════
    function applyTheme() {
      document.documentElement.setAttribute('data-theme', appTheme);
      document.querySelector('.theme-toggle').textContent = appTheme === 'dark' ? '🌙' : '☀️';
      // Aplicar custom vars del usuario
      const custom = JSON.parse(localStorage.getItem('bv_custom_theme') || '{}');
      Object.entries(custom).forEach(([k, v]) => document.documentElement.style.setProperty(k, v));
      // Propagar al iframe
      notifyFrame({ type: 'theme', theme: appTheme, custom });
    }
    function toggleTheme() {
      appTheme = appTheme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('bv_theme', appTheme);
      applyTheme();
    }
    applyTheme();

    // ════════════════════════════════════════════════════════════
    //  NAVEGACIÓN CON IFRAME
    // ════════════════════════════════════════════════════════════
    function navigateTo(page, data = null) {
      if (!PAGES[page]) return;
      currentPage = page;
      pendingData = data;

      const frame = document.getElementById('page-frame');
      frame.classList.add('loading');

      setTimeout(() => {
        frame.src = PAGES[page];
        frame.onload = () => {
          frame.classList.remove('loading');
          notifyFrame({
            type: 'init',
            theme: appTheme,
            session: sessionData,
            scriptUrl: SCRIPT_URL,
            data: pendingData
          });
          pendingData = null;
        };
      }, 150);
    }

    // ── Comunicación bidireccional iframe ──────────────────────
    window.addEventListener('message', e => {
      const d = e.data;
      if (!d || !d.type) return;

      switch (d.type) {
        case 'navigate': navigateTo(d.page, d.data); break;
        case 'toast': showToast(d.msg, d.style); break;
        case 'setSession':
          sessionData = d.session;
          updateNavSession();
          break;
        case 'logout': handleLogout(); break;
        case 'setTheme':
          appTheme = d.theme;
          localStorage.setItem('bv_theme', appTheme);
          applyTheme();
          break;
        case 'setCustomTheme':
          localStorage.setItem('bv_custom_theme', JSON.stringify(d.custom));
          applyTheme();
          break;
        case 'check-verification':
          const isVerified = checkVerification();
          notifyFrame({ type: 'verification-result', verified: isVerified, verifyLink: VERIFY_LINK });
          break;
      }
    });

    function checkVerification() {
      const verifiedTime = localStorage.getItem('bv_verified_time');
      if (!verifiedTime) return false;
      return (Date.now() - parseInt(verifiedTime)) < VERIFY_DURATION;
    }

    function notifyFrame(data) {
      try {
        const frame = document.getElementById('page-frame');
        if (frame && frame.contentWindow)
          frame.contentWindow.postMessage(data, '*');
      } catch (e) { }
    }

    // ════════════════════════════════════════════════════════════
    //  SESIÓN / AUTH
    // ════════════════════════════════════════════════════════════
    function updateNavSession() {
      const loginBtn = document.getElementById('nav-login-btn');
      const logoutBtn = document.getElementById('nav-logout-btn');
      if (sessionData) {
        loginBtn.style.display = 'none';
        logoutBtn.style.display = 'flex';
        logoutBtn.textContent = `👤 ${sessionData.usuario.Nombre} · Salir`;
      } else {
        loginBtn.style.display = '';
        logoutBtn.style.display = 'none';
      }
    }
    function handleLogout() {
      sessionData = null;
      localStorage.removeItem('bv_session');
      updateNavSession();
      navigateTo('home');
      showToast('Sesión cerrada', 'success');
    }

    // ════════════════════════════════════════════════════════════
    //  TOAST
    // ════════════════════════════════════════════════════════════
    function showToast(msg, style = 'info') {
      const container = document.getElementById('toast');
      const el = document.createElement('div');
      el.className = `toast-item ${style}`;
      const icons = { success: '✅', error: '❌', info: 'ℹ️', warn: '⚠️' };
      el.innerHTML = `<span>${icons[style] || 'ℹ️'}</span>${msg}`;
      container.appendChild(el);
      setTimeout(() => {
        el.style.animation = 'toast-out 0.4s ease forwards';
        setTimeout(() => el.remove(), 400);
      }, 3500);
    }

    // ════════════════════════════════════════════════════════════
    //  RESTAURAR SESIÓN
    // ════════════════════════════════════════════════════════════
    function restoreSession() {
      const saved = localStorage.getItem('bv_session');
      if (saved) {
        try { sessionData = JSON.parse(saved); updateNavSession(); } catch (e) { }
      }
    }
    restoreSession();

    // ════════════════════════════════════════════════════════════
    //  INICIO — ocultar loader y cargar home
    // ════════════════════════════════════════════════════════════
    // ════════════════════════════════════════════════════════════
    //  PWA / INSTALL LOGIC
    // ════════════════════════════════════════════════════════════
    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
      // Prevenir que Chrome muestre el prompt automáticamente
      e.preventDefault();
      // Guardar el evento para dispararlo luego
      deferredPrompt = e;
      // Avisar al frame que la app es instalable
      notifyFrame({ type: 'pwa-available' });
    });

    window.addEventListener('appinstalled', (evt) => {
      showToast('¡BlockVault instalado con éxito!', 'success');
      deferredPrompt = null;
    });

    // Registrar Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('SW registrado', reg))
          .catch(err => console.log('SW error', err));
      });
    }

    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('loader').classList.add('hidden');
        navigateTo('home');
      }, 2200);
    });

    // Escuchar mensajes adicionales para PWA
    window.addEventListener('message', e => {
      const d = e.data;
      if (!d || !d.type) return;

      if (d.type === 'pwa-install-request') {
        const link = document.createElement('a');
        link.href = 'BlockVault.apk';
        link.download = 'BlockVault.apk';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showToast('Iniciando descarga de BlockVault...', 'success');
      }

      // Asegurarse de avisar al frame si carga y el prompt ya estaba listo
      if (d.type === 'init' && deferredPrompt) {
        setTimeout(() => notifyFrame({ type: 'pwa-available' }), 1000);
      }
    });

    // ════════════════════════════════════════════════════════════
    //  LIMPIEZA DE DATOS
    // ════════════════════════════════════════════════════════════
    async function clearAllData() {
      if (!confirm("¿Estás seguro? Esto eliminará tu sesión de creador, tu tema personalizado y la verificación de descargas.")) return;
      
      // Limpiar Storages
      localStorage.clear();
      sessionStorage.clear();
      
      // Limpiar Caches de Service Worker
      if ('caches' in window) {
        const keys = await caches.keys();
        for (const key of keys) await caches.delete(key);
      }
      
      // Desregistrar Service Workers
      if ('serviceWorker' in navigator) {
        const registrations = await navigator.serviceWorker.getRegistrations();
        for (const reg of registrations) await reg.unregister();
      }
      
      // Recargar con fuerza desde el servidor
      window.location.reload(true);
    }

    // ════════════════════════════════════════════════════════════
    //  DETECCIÓN DE VERIFICACIÓN (Cuty.io)
    // ════════════════════════════════════════════════════════════
    (function () {
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('verified') === 'true') {
        localStorage.setItem('bv_verified_time', Date.now().toString());
        // Limpiar la URL para que no diga ?verified=true
        const newUrl = window.location.origin + window.location.pathname;
        window.history.replaceState({}, document.title, newUrl);
        
        // Mostrar mensaje de éxito tras un pequeño delay para que cargue la UI
        setTimeout(() => {
          showToast('¡Identidad verificada! Tienes 15 horas de acceso libre.', 'success');
        }, 2500);
      }
    })();
  </script>
</body>
