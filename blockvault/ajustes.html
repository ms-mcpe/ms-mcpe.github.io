<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlockVault — Ajustes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #08080C;
    --surface: #0F0F17;
    --surface-2: #161622;
    --border: rgba(255,255,255,0.06);
    --text: #F1F1F4;
    --text-muted: #8888A0;
    --accent: #6C63FF;
    --accent-rgb: 108,99,255;
    --font-head: 'Syne', sans-serif;
    --font-body: 'Outfit', sans-serif;
    --radius: 16px;
    --radius-sm: 10px;
  }

  [data-theme="light"] {
    --bg: #F8F9FB;
    --surface: #FFFFFF;
    --surface-2: #F0F2F5;
    --border: rgba(0,0,0,0.06);
    --text: #1A1A24;
    --text-muted: #6B6F80;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    transition: background 0.4s, color 0.4s;
    -webkit-font-smoothing: antialiased;
  }

  /* SECURITY */
  * { -webkit-user-select: none; -moz-user-select: none; user-select: none; -webkit-touch-callout: none; }
  input { -webkit-user-select: text; -moz-user-select: text; user-select: text; }

  .topbar {
    position: fixed; top: 0; left: 0; right: 0; height: 70px;
    background: rgba(var(--bg), 0.8);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 24px; z-index: 100;
  }
  .back-btn {
    background: none; border: none; color: var(--text); cursor: pointer;
    display: flex; align-items: center; gap: 8px; font-weight: 700; font-family: var(--font-head);
    text-decoration: none;
  }

  .container { padding-top: 100px; max-width: 600px; margin: 0 auto; padding-left: 16px; padding-right: 16px; }
  
  .section-title { font-family: var(--font-head); font-size: 2rem; font-weight: 800; margin-bottom: 32px; letter-spacing: -0.02em; }

  .settings-group { margin-bottom: 32px; }
  .group-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 12px; }
  
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  
  .row { display: flex; align-items: center; padding: 20px; gap: 16px; transition: background 0.2s; }
  .row:not(:last-child) { border-bottom: 1px solid var(--border); }
  .row:hover { background: var(--surface-2); }
  
  .row-icon { width: 40px; height: 40px; border-radius: 12px; background: rgba(var(--accent-rgb), 0.1); color: var(--accent); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .row-info { flex: 1; }
  .row-title { font-weight: 600; font-size: 0.95rem; }
  .row-desc { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }

  /* TOGGLE */
  .switch { position: relative; display: inline-block; width: 46px; height: 24px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; cursor: pointer; inset: 0; background-color: var(--surface-2); border: 1px solid var(--border); transition: .4s; border-radius: 34px; }
  .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: #fff; transition: .4s; border-radius: 50%; }
  input:checked + .slider { background-color: var(--accent); border-color: var(--accent); }
  input:checked + .slider:before { transform: translateX(22px); }

  /* ACCENT COLORS */
  .color-grid { display: flex; flex-wrap: wrap; gap: 12px; padding: 20px; }
  .color-btn { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2.5px solid transparent; transition: transform 0.2s; }
  .color-btn.active { border-color: #fff; box-shadow: 0 0 0 2px var(--accent); transform: scale(1.1); }

</style>
</head>
<body>

<div class="topbar">
  <a href="addons.html" class="back-btn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    Volver
  </a>
</div>

<div class="container">
  <h1 class="section-title">Ajustes</h1>

  <div class="settings-group">
    <div class="group-label">Apariencia</div>
    <div class="card">
      <div class="row">
        <div class="row-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></div>
        <div class="row-info">
          <div class="row-title">Tema Oscuro</div>
          <div class="row-desc">Personaliza la visualización de la app</div>
        </div>
        <label class="switch">
          <input type="checkbox" id="theme-toggle" onchange="toggleTheme(this.checked)">
          <span class="slider"></span>
        </label>
      </div>
    </div>
  </div>

  <div class="settings-group">
    <div class="group-label">Color de Acento</div>
    <div class="card">
      <div class="color-grid" id="accent-grid">
        <!-- JS Inserted -->
      </div>
    </div>
  </div>

  <div class="settings-group">
    <div class="group-label">Administración</div>
    <div class="card">
      <div class="row">
        <div class="row-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg></div>
        <div class="row-info">
          <div class="row-title">Modo Manager</div>
          <div class="row-desc">Habilita herramientas para gestionar addons</div>
        </div>
        <label class="switch">
          <input type="checkbox" id="admin-toggle" onchange="toggleAdmin(this.checked)">
          <span class="slider"></span>
        </label>
      </div>
    </div>
  </div>

</div>

<script>
(function() {
  /* ── ANTI-INSPECT ── */
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('keydown', e => {
    if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || (e.ctrlKey && e.key === 'U')) e.preventDefault();
  });

  const colors = ['#6C63FF', '#EF4444', '#10B981', '#F59E0B', '#3B82F6', '#EC4899', '#8B5CF6', '#F97316'];
  const curTheme = localStorage.getItem('bv_theme') || 'dark';
  const curAccent = localStorage.getItem('bv_accent') || '#6C63FF';
  const curAdmin = localStorage.getItem('bv_admin') === 'true';

  document.documentElement.setAttribute('data-theme', curTheme);
  document.getElementById('theme-toggle').checked = curTheme === 'dark';
  document.getElementById('admin-toggle').checked = curAdmin;

  const grid = document.getElementById('accent-grid');
  colors.forEach(c => {
    const b = document.createElement('div');
    b.className = 'color-btn' + (c === curAccent ? ' active' : '');
    b.style.background = c;
    b.onclick = () => {
      localStorage.setItem('bv_accent', c);
      location.reload();
    };
    grid.appendChild(b);
  });

  window.toggleTheme = function(v) {
    const t = v ? 'dark' : 'light';
    localStorage.setItem('bv_theme', t);
    document.documentElement.setAttribute('data-theme', t);
  };

  window.toggleAdmin = function(v) {
    localStorage.setItem('bv_admin', v);
  };

})();
</script>
</body>
</html>
