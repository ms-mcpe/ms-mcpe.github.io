<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descargar BlockVault - Instalador Profesional</title>
    <style>
        /* CSS Resets & Variables */
        :root {
            --bg-dark: #050814;
            --primary-purple: #7b2cbf;
            --secondary-cyan: #00f5d4;
            --dark-blue: #10002b;
            --text-light: #e0e1dd;
            --card-bg: rgba(20, 20, 35, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at 50% 0%, var(--dark-blue), var(--bg-dark) 80%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Centrar todo verticalmente */
            overflow-x: hidden;
        }

        /* --- BACKGROUND PARTICLES --- */
        .particles-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.35;
            animation: float-orb 15s ease-in-out infinite alternate;
        }

        .orb-1 { width: 400px; height: 400px; background: var(--primary-purple); top: -100px; left: -100px; }
        .orb-2 { width: 350px; height: 350px; background: var(--secondary-cyan); bottom: -100px; right: -100px; animation-delay: -7s; }

        @keyframes float-orb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(80px, 80px) scale(1.3); }
        }

        /* --- APP INSTALLER CARD --- */
        .installer-wrapper {
            position: relative;
            z-index: 20;
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .installer-card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: clamp(30px, 6vw, 50px);
            width: 100%;
            max-width: 650px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-icon {
            width: clamp(90px, 18vw, 130px);
            height: clamp(90px, 18vw, 130px);
            border-radius: 25%;
            margin-bottom: 25px;
            box-shadow: 0 15px 30px rgba(0, 245, 212, 0.5);
            border: 3px solid var(--secondary-cyan);
            animation: floating 4s ease-in-out infinite;
            background: #111;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }

        .app-title-container {
            margin-bottom: 20px;
        }

        .app-title {
            font-size: clamp(2.5rem, 8vw, 3.5rem);
            font-weight: 900;
            background: linear-gradient(135deg, #fff, var(--secondary-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1.5px;
        }

        .app-version {
            background: linear-gradient(45deg, var(--primary-purple), #9d4edd);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 700;
            display: inline-block;
            margin-top: 8px;
            box-shadow: 0 5px 15px rgba(123, 44, 191, 0.4);
        }

        .app-desc {
            font-size: clamp(1rem, 3.5vw, 1.2rem);
            line-height: 1.6;
            color: #d1d5db;
            margin-bottom: 40px;
            max-width: 550px;
        }

        .download-btn {
            background: linear-gradient(90deg, var(--primary-purple), #5a189a);
            color: white;
            text-decoration: none;
            padding: 18px 50px;
            border-radius: 50px;
            font-size: clamp(1.2rem, 4vw, 1.4rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(123, 44, 191, 0.5);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            border: 2px solid transparent;
        }

        .download-btn:hover {
            transform: scale(1.05) translateY(-5px);
            background: linear-gradient(90deg, #9d4edd, var(--secondary-cyan));
            box-shadow: 0 20px 40px rgba(0, 245, 212, 0.4);
            border-color: rgba(255,255,255,0.3);
        }

        .download-btn svg { width: 26px; height: 26px; fill: currentColor; }

    </style>
</head>
<body>

    <div class="particles-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="installer-wrapper">
        <div class="installer-card">
            <img src="icon-192.png" alt="BlockVault Icon" class="app-icon">
            
            <div class="app-title-container">
                <h1 class="app-title">BlockVault</h1>
                <span class="app-version">V1.0</span>
            </div>

            <p class="app-desc">
                BlockVault es la plataforma definitiva de addons para Minecraft Bedrock. Disfruta de una inmensa variedad de texturas, mapas y complementos de calidad profesional en una sola aplicación.
            </p>

            <a href="BlockVault.apk" download="BlockVault.apk" class="download-btn">
                <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                Descargar APK
            </a>
        </div>
    </div>

</body>
</html>
