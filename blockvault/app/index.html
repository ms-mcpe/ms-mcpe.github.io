<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BlockVault</title>
  
  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">
  
  <!-- Iconos (FontAwesome - asumiendo CDN para mockup, o descargar) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Estilos propios -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/layout.css">
</head>
<body class="shell-body">

  <!-- HEADER -->
  <header class="app-header">
    <div class="header-left">
      <button id="menu-toggle" class="menu-toggle">
        <i class="fa-solid fa-bars"></i>
      </button>
      <div class="app-title neon-text">BlockVault</div>
    </div>
    <div class="header-right" style="flex:1; display:flex; justify-content:flex-end;">
      <!-- Espacio reservado para iconos en el futuro -->
    </div>
  </header>

  <!-- MENÚ LATERAL (Sidebar) -->
  <div id="sidebar-overlay" class="sidebar-overlay"></div>
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <div class="app-title neon-text">BlockVault</div>
      <button id="sidebar-close" class="sidebar-close">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
    
    <div class="sidebar-content">
      <a href="#" class="sidebar-item" data-target="pages/inicio.html">
        <i class="fa-solid fa-house"></i>
        <span>Inicio</span>
      </a>
      <a href="#" class="sidebar-item" data-target="pages/ajustes.html">
        <i class="fa-solid fa-gear"></i>
        <span>Ajustes</span>
      </a>
      <!-- El traductor ahora está dentro de Ajustes -->
    </div>
    
    <div class="sidebar-footer">
      <button id="btn-upload" class="btn-upload">
        <i class="fa-solid fa-cloud-arrow-up"></i>
        Subir Addons
      </button>
    </div>
  </aside>

  <!-- CONTENEDOR PRINCIPAL (Iframe) -->
  <main id="app-container">
    <iframe id="page-frame" src="about:blank" title="Contenido de BlockVault"></iframe>
  </main>

  <!-- MENÚ INFERIOR (Bottom Navigation) -->
  <nav class="bottom-nav">
    <a href="#" class="nav-item active" data-target="pages/inicio.html">
      <i class="fa-solid fa-house"></i>
      <span>Inicio</span>
    </a>
    <a href="#" class="nav-item" data-target="pages/nuevos.html">
      <i class="fa-solid fa-bolt"></i>
      <span>Nuevos</span>
    </a>
    <a href="#" class="nav-item" data-target="pages/descargas.html">
      <i class="fa-solid fa-download"></i>
      <span>Descargas</span>
    </a>
    <a href="#" class="nav-item" data-target="pages/guia.html">
      <i class="fa-solid fa-circle-question"></i>
      <span>Guide</span>
    </a>
  </nav>

  <!-- Lógica Principal -->
  <script src="js/security.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
