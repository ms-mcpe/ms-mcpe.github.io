<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ajustes de Tema</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/pages.css">
  <style>
    .settings-section {
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
    }
    .settings-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.2rem;
      margin-bottom: 16px;
      color: var(--primary-color);
    }
    .theme-options {
      display: flex;
      gap: 16px;
    }
    .theme-card {
      flex: 1;
      border: 2px solid var(--border-color);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .theme-card.active {
      border-color: var(--primary-color);
      background: rgba(139, 92, 246, 0.1);
      box-shadow: 0 0 15px var(--neon-glow);
    }
    .theme-card i {
      font-size: 2rem;
      margin-bottom: 8px;
    }
    
    .color-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
      gap: 12px;
    }
    .color-btn {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .color-btn:hover {
      transform: scale(1.1);
    }
    .color-btn.active {
      border-color: #fff;
      box-shadow: 0 0 15px currentColor;
    }
  </style>
</head>
<body>
  
  <div class="page-container">
    <h2 class="section-title"><i class="fa-solid fa-gear neon-text"></i> Ajustes de Apariencia</h2>
    
    <div class="settings-section">
      <div class="settings-title">Modo de Pantalla</div>
      <div class="theme-options">
        <div class="theme-card" id="theme-light" onclick="setTheme('light')">
          <i class="fa-solid fa-sun" style="color: #f59e0b;"></i>
          <div>Claro</div>
        </div>
        <div class="theme-card active" id="theme-dark" onclick="setTheme('dark')">
          <i class="fa-solid fa-moon" style="color: #3b82f6;"></i>
          <div>Oscuro</div>
        </div>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-title">Color de Acento (Neón)</div>
      <div class="color-grid">
        <div class="color-btn" style="background-color: #8b5cf6;" onclick="setColor('#8b5cf6')"></div> <!-- Morado -->
        <div class="color-btn" style="background-color: #06b6d4;" onclick="setColor('#06b6d4')"></div> <!-- Celeste -->
        <div class="color-btn" style="background-color: #10b981;" onclick="setColor('#10b981')"></div> <!-- Verde -->
        <div class="color-btn" style="background-color: #ef4444;" onclick="setColor('#ef4444')"></div> <!-- Rojo -->
        <div class="color-btn" style="background-color: #f59e0b;" onclick="setColor('#f59e0b')"></div> <!-- Naranja -->
        <div class="color-btn" style="background-color: #ec4899;" onclick="setColor('#ec4899')"></div> <!-- Rosa -->
      </div>
    </div>
  </div>

  <script>
    // Inicializar UI basada en config guardada en padre
    window.addEventListener('message', e => {
      const d = e.data;
      if (!d) return;
      if (d.type === 'init-data') {
        const theme = d.theme || 'dark';
        const color = d.color || '#8b5cf6';
        
        // Aplicar localmente
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.style.setProperty('--primary-color', color);
        document.documentElement.style.setProperty('--border-neon', color);
        document.documentElement.style.setProperty('--neon-glow', color + '66');
        
        // Actualizar UI
        updateThemeUI(theme);
        updateColorUI(color);
      }
    });

    function setTheme(theme) {
      // Aplicar local
      document.documentElement.setAttribute('data-theme', theme);
      updateThemeUI(theme);
      
      // Enviar al padre para que guarde y aplique global
      window.parent.postMessage({ type: 'theme-change', theme: theme }, '*');
    }

    function setColor(color) {
      // Aplicar local
      document.documentElement.style.setProperty('--primary-color', color);
      document.documentElement.style.setProperty('--border-neon', color);
      document.documentElement.style.setProperty('--neon-glow', color + '66');
      updateColorUI(color);
      
      // Enviar al padre
      window.parent.postMessage({ type: 'color-change', color: color }, '*');
    }

    function updateThemeUI(theme) {
      document.getElementById('theme-light').classList.remove('active');
      document.getElementById('theme-dark').classList.remove('active');
      document.getElementById('theme-' + theme).classList.add('active');
    }

    function updateColorUI(color) {
      const btns = document.querySelectorAll('.color-btn');
      btns.forEach(btn => {
        btn.classList.remove('active');
        // Comparar hex (simplificado)
        if (btn.style.backgroundColor === hexToRgb(color)) {
          btn.classList.add('active');
        }
      });
    }

    // Helper para comparar hex con rgb string que devuelve backgroundColor
    function hexToRgb(hex) {
      var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result ? `rgb(${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)})` : null;
    }
  </script>
  <script src="../js/security.js"></script>
</body>
</html>
