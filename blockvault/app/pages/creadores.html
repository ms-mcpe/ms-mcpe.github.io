<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranking de Creadores — BlockVault</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/pages.css">
  <style>
    .verified-badge {
      display: inline-block;
      vertical-align: middle;
      width: 1.1em;
      height: 1.1em;
      fill: #22c55e;
      margin-left: 4px;
      margin-top: 0px;
    }
    .creators-page {
      padding: 20px;
      padding-bottom: 80px;
    }

    .creators-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .creators-header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2rem;
      margin-bottom: 10px;
    }

    /* Tabs */
    .creators-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      overflow-x: auto;
      padding-bottom: 10px;
      justify-content: center;
    }

    .tab-btn {
      padding: 10px 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border-color);
      background: var(--bg-panel);
      color: var(--text-muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.3s;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .tab-btn.active {
      background: var(--primary-color);
      color: #fff;
      border-color: var(--primary-color);
      box-shadow: 0 0 15px var(--neon-glow);
    }

    /* Hero Card for #1 */
    .hero-creator {
      background: linear-gradient(135deg, var(--bg-panel), rgba(var(--primary-color-rgb), 0.1));
      border: 1px solid var(--primary-color);
      border-radius: var(--radius-lg);
      padding: 30px;
      margin-bottom: 30px;
      text-align: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      animation: heroFloat 3s ease-in-out infinite;
    }

    @keyframes heroFloat {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-5px);
      }
    }

    .hero-creator::before {
      content: 'RANK #1';
      position: absolute;
      top: 15px;
      right: -30px;
      background: #ffd700;
      color: #000;
      padding: 5px 40px;
      font-weight: 900;
      font-size: 0.7rem;
      transform: rotate(45deg);
    }

    .hero-avatar {
      width: 100px;
      height: 100px;
      background: var(--primary-color);
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 800;
      color: #fff;
      box-shadow: 0 0 30px var(--neon-glow);
      border: 4px solid rgba(255, 255, 255, 0.1);
    }

    .hero-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2rem;
      margin-bottom: 5px;
    }

    .hero-stat {
      font-size: 1.2rem;
      color: var(--primary-color);
      font-weight: 800;
    }

    .hero-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* List for rest */
    .creators-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .creator-row {
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      transition: all 0.2s;
    }

    .creator-row:hover {
      border-color: rgba(255, 255, 255, 0.2);
      transform: scale(1.01);
    }

    .row-rank {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800;
      font-size: 1.2rem;
      color: var(--text-muted);
      width: 30px;
    }

    .row-avatar {
      width: 45px;
      height: 45px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: var(--text-main);
      border: 1px solid var(--border-color);
    }

    .row-info {
      flex: 1;
    }

    .row-name {
      font-weight: 600;
      font-size: 1rem;
    }

    .row-stat {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--primary-color);
    }

    .row-val {
      font-size: 0.75rem;
      color: var(--text-muted);
    }
  </style>
</head>

<body>

  <div class="creators-page">
    <div class="creators-header">
      <h1 class="neon-text">Creadores Destacados</h1>
      <p style="color:var(--text-muted);">Los mejores creadores de la comunidad BlockVault.</p>
    </div>

    <div class="creators-tabs">
      <button class="tab-btn active" onclick="switchTab('quantity', this)">Por Cantidad</button>
      <button class="tab-btn" onclick="switchTab('likes', this)">Más Amados</button>
      <button class="tab-btn" onclick="switchTab('downloads', this)">Más Populares</button>
    </div>

    <div id="ranking-content">
      <!-- Cargado por JS -->
      <div style="text-align:center; padding:50px;">
        <i class="fa-solid fa-spinner fa-spin" style="font-size:2rem; color:var(--primary-color);"></i>
      </div>
    </div>
  </div>

  <script>
    let allAddons = [];
    let creatorsData = [];
    let verifiedCreators = new Set();
    let currentCriteria = 'quantity';
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzAFKX9RRSEbp5-kqDFHQHi3Rk17mLhBmhBq9Y3I9oTlfhNfc1wFXwUgv6P5LZ5sBkV/exec';

    async function fetchVerifiedUsers() {
      try {
        const res = await fetch(`${SCRIPT_URL}?action=getUsers`);
        const data = await res.json();
        data.slice(1).forEach(u => {
          if (u[5] === 'Verificado') verifiedCreators.add(u[1]);
        });
      } catch (e) {}
    }

    window.addEventListener('message', e => {
      if (e.data && e.data.type === 'init-data') {
        document.documentElement.setAttribute('data-theme', e.data.theme || 'dark');
        if (e.data.color) {
          document.documentElement.style.setProperty('--primary-color', e.data.color);
          document.documentElement.style.setProperty('--border-neon', e.data.color);
          document.documentElement.style.setProperty('--neon-glow', e.data.color + '66');
        }
      }
    });

    async function loadCreators() {
      await fetchVerifiedUsers();
      try {
        const res = await fetch(`${SCRIPT_URL}?action=read`);
        allAddons = await res.json();
        processData();
        renderRanking();
      } catch (e) { console.error(e); }
    }

    function processData() {
      const dataMap = {};
      allAddons.forEach(a => {
        const name = a[8];
        const val = (parseInt(a[currentCriteria === 'quantity' ? 6 : (currentCriteria === 'likes' ? 5 : 6)]) || 0);

        if (!dataMap[name]) {
          dataMap[name] = {
            name: name,
            quantity: 0,
            likes: 0,
            downloads: 0,
            topAddonName: a[1],
            topAddonVal: -1
          };
        }

        dataMap[name].quantity++;
        const l = (parseInt(a[5]) || 0);
        const d = (parseInt(a[6]) || 0);
        dataMap[name].likes += l;
        dataMap[name].downloads += d;

        // Determinar el addon más destacado según el criterio actual
        let currentVal = 0;
        if (currentCriteria === 'quantity') currentVal = d; // Para cantidad, mostramos el más descargado
        else if (currentCriteria === 'likes') currentVal = l;
        else if (currentCriteria === 'downloads') currentVal = d;

        if (currentVal > dataMap[name].topAddonVal) {
          dataMap[name].topAddonVal = currentVal;
          dataMap[name].topAddonName = a[1];
        }
      });
      creatorsData = Object.values(dataMap);
    }

    function switchTab(criteria, el) {
      currentCriteria = criteria;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      renderRanking();
    }

    function renderRanking() {
      const content = document.getElementById('ranking-content');

      // Sort
      const sorted = [...creatorsData].sort((a, b) => b[currentCriteria] - a[currentCriteria]);

      if (sorted.length === 0) {
        content.innerHTML = '<div style="text-align:center;">No hay datos disponibles.</div>';
        return;
      }

      const top1 = sorted[0];
      const rest = sorted.slice(1);

      let label = 'Addons Publicados';
      if (currentCriteria === 'likes') label = 'Likes Totales';
      if (currentCriteria === 'downloads') label = 'Descargas Totales';

      let html = `
        <div class="hero-creator">
          <div class="hero-avatar">${top1.name.charAt(0).toUpperCase()}</div>
          <div class="hero-name">${top1.name} ${verifiedCreators.has(top1.name) ? `<svg class="verified-badge" width="22" height="22" viewBox="0 0 24 24" fill="#22c55e"><path d="M22.25 12c0-1.43-.88-2.67-2.19-3.34.46-1.39.2-2.97-.81-4.08s-2.47-1.49-3.89-1.29c-.83-1.12-2.11-1.84-3.57-1.84s-2.74.72-3.57 1.84c-1.41-.2-2.88.18-3.89 1.29s-1.27 2.69-.81 4.08c-1.31.67-2.19 1.91-2.19 3.34s.88 2.67 2.19 3.34c-.46 1.39-.2 2.97.81 4.08s2.47 1.49 3.89 1.29c.83 1.12 2.11 1.84 3.57 1.84s2.74-.72 3.57-1.84c1.41.2 2.88-.18 3.89-1.29s1.27-2.69.81-4.08c1.31-.67 2.19-1.91 2.19-3.34zm-11.71 4.2L6.8 12.46l1.41-1.42 2.26 2.26 4.8-5.23 1.47 1.35-6.2 6.78z"></path></svg>` : ''}</div>
          <div class="hero-stat">${top1[currentCriteria].toLocaleString()}</div>
          <div class="hero-label">${label}</div>
          <div style="margin-top:15px; font-size:0.85rem; background:rgba(0,0,0,0.2); padding:8px 15px; border-radius:20px; display:inline-block; border:1px solid rgba(255,255,255,0.1);">
            <svg style="width:12px; height:12px; fill:#ffd700;" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg> Top Addon: <b>${top1.topAddonName}</b>
          </div>
        </div>
        
        <div class="creators-list">
      `;

      rest.forEach((c, i) => {
        html += `
          <div class="creator-row">
            <div class="row-rank">#${i + 2}</div>
            <div class="row-avatar">${c.name.charAt(0).toUpperCase()}</div>
            <div class="row-info">
              <div class="row-name">${c.name} ${verifiedCreators.has(c.name) ? `<svg class="verified-badge" width="16" height="16" viewBox="0 0 24 24" fill="#22c55e"><path d="M22.25 12c0-1.43-.88-2.67-2.19-3.34.46-1.39.2-2.97-.81-4.08s-2.47-1.49-3.89-1.29c-.83-1.12-2.11-1.84-3.57-1.84s-2.74.72-3.57 1.84c-1.41-.2-2.88.18-3.89 1.29s-1.27 2.69-.81 4.08c-1.31.67-2.19 1.91-2.19 3.34s.88 2.67 2.19 3.34c-.46 1.39-.2 2.97.81 4.08s2.47 1.49 3.89 1.29c.83 1.12 2.11 1.84 3.57 1.84s2.74-.72 3.57-1.84c1.41.2 2.88-.18 3.89-1.29s1.27-2.69.81-4.08c1.31-.67 2.19-1.91 2.19-3.34zm-11.71 4.2L6.8 12.46l1.41-1.42 2.26 2.26 4.8-5.23 1.47 1.35-6.2 6.78z"></path></svg>` : ''}</div>
              <div class="row-val">Top Addon: <span style="color:var(--text-main)">${c.topAddonName}</span></div>
            </div>
            <div style="text-align:right;">
              <div class="row-stat">${c[currentCriteria].toLocaleString()}</div>
              <div class="row-val">${label.split(' ')[0]}</div>
            </div>
          </div>
        `;
      });

      html += `</div>`;
      content.innerHTML = html;
    }

    loadCreators();
  </script>
  <script src="../js/security.js"></script>
</body>

</html>
