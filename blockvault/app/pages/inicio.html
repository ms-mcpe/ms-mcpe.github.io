<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body>
  
  <div class="page-container">
    
    <!-- Categorías -->
    <div class="categories-scroll">
      <button class="cat-btn active" data-cat="Todos">Todos</button>
      <button class="cat-btn" data-cat="Addons"><i class="fa-solid fa-puzzle-piece"></i> Addons</button>
      <button class="cat-btn" data-cat="Mapas"><i class="fa-solid fa-map"></i> Mapas</button>
      <button class="cat-btn" data-cat="Texturas"><i class="fa-solid fa-palette"></i> Texturas</button>
      <button class="cat-btn" data-cat="Skins"><i class="fa-solid fa-user-astronaut"></i> Skins</button>
      <button class="cat-btn" data-cat="DLC"><i class="fa-solid fa-gem"></i> DLC</button>
      <button class="cat-btn" data-cat="Popurris"><i class="fa-solid fa-masks-theater"></i> Popurris</button>
    </div>

    <!-- Populares -->
    <h2 class="section-title"><i class="fa-solid fa-fire neon-text"></i> Popular</h2>
    <div class="popular-scroll" id="popular-container">
      <!-- Los addons populares se cargarán aquí por JS -->
      <div style="color:var(--text-muted); font-size:0.8rem;">Cargando populares...</div>
    </div>

    <!-- Más Gustados -->
    <h2 class="section-title"><i class="fa-solid fa-heart neon-text" style="color: #ef4444;"></i> Más Gustados</h2>
    <div class="popular-scroll" id="liked-container">
      <!-- Los addons más gustados se cargarán aquí por JS -->
      <div style="color:var(--text-muted); font-size:0.8rem;">Cargando más gustados...</div>
    </div>

    <!-- Todo el contenido -->
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <h2 class="section-title" style="margin-bottom:0;">Todo el contenido</h2>
      <span id="total-count" style="font-size:0.75rem; color:var(--text-muted);">Cargando...</span>
    </div>
    
    <div class="content-grid" id="all-content-container">
      <!-- Los addons se cargarán aquí por JS -->
    </div>

  </div>

  <!-- MODAL DE DETALLES -->
  <div id="addon-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:999; justify-content:center; align-items:center; backdrop-filter:blur(5px);">
    <div style="background:var(--bg-panel); width:90%; max-width:500px; border-radius:var(--radius-lg); overflow:hidden; border:1px solid var(--border-neon); box-shadow:0 0 20px var(--neon-glow); position:relative; display:flex; flex-direction:column; max-height:90vh;">
      <button onclick="document.getElementById('addon-modal').style.display='none'" style="position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.5); color:#fff; border:none; width:30px; height:30px; border-radius:50%; cursor:pointer; z-index:10;"><i class="fa-solid fa-xmark"></i></button>
      <div style="width:100%; height:200px; position:relative;">
        <img id="modal-img" src="" style="width:100%; height:100%; object-fit:cover;">
        <span id="modal-cat" class="badge-cat" style="top:10px; left:10px; font-size:0.8rem;">Cat</span>
      </div>
      <div style="padding:20px; overflow-y:auto; flex:1;">
        <h3 id="modal-title" style="font-size:1.4rem; font-family:'Space Grotesk', sans-serif; margin-bottom:5px; color:var(--text-main);">Titulo</h3>
        <div style="color:var(--primary-color); font-size:0.85rem; font-weight:bold; margin-bottom:15px;">Por: <span id="modal-author" style="color:var(--secondary-color);">Autor</span></div>
        <div style="display:flex; gap:15px; margin-bottom:15px; font-size:0.85rem; color:var(--text-muted);">
          <span><i class="fa-solid fa-download"></i> <span id="modal-downloads">0</span></span>
          <span><i class="fa-solid fa-heart"></i> <span id="modal-likes">0</span></span>
          <span><i class="fa-solid fa-tag"></i> <span id="modal-version">1.0</span></span>
        </div>
        <p id="modal-desc" style="font-size:0.95rem; line-height:1.5; color:var(--text-main); margin-bottom:20px;">Descripcion</p>
        <button id="modal-btn-descargar" class="cat-btn" style="width:100%; justify-content:center; background:var(--primary-color); color:#fff; border:none; font-size:1.1rem; padding:12px; font-weight:bold;"><i class="fa-solid fa-cloud-arrow-down"></i> Descargar</button>
      </div>
    </div>
  </div>

  <script src="../js/security.js"></script>
  <script>
    // Variables y configuración
    let SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzAFKX9RRSEbp5-kqDFHQHi3Rk17mLhBmhBq9Y3I9oTlfhNfc1wFXwUgv6P5LZ5sBkV/exec';
    let allAddons = [];

    // Escuchar datos de inicialización del padre
    window.addEventListener('message', e => {
      const d = e.data;
      if (!d) return;
      if (d.type === 'init-data') {
        document.documentElement.setAttribute('data-theme', d.theme || 'dark');
        if (d.color) {
          document.documentElement.style.setProperty('--primary-color', d.color);
          document.documentElement.style.setProperty('--border-neon', d.color);
          document.documentElement.style.setProperty('--neon-glow', d.color + '66');
        }
      }
    });

    // Filtros
    const catBtns = document.querySelectorAll('.cat-btn');
    catBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        catBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const cat = btn.getAttribute('data-cat');
        renderContent(cat);
      });
    });

    // Cargar datos
    async function fetchAddons() {
      try {
        const res = await fetch(`${SCRIPT_URL}?action=read`);
        const data = await res.json();
        
        // Estructura de data: [Fecha, Nombre, Link, Img, Categoria, Likes, Descargas, Semilla, SubidoPor, Version, Descripcion]
        // Índices: 0:Fecha, 1:Nombre, 2:Link, 3:Img, 4:Categoria, 5:Likes, 6:Descargas, 7:Semilla, 8:SubidoPor, 9:Version, 10:Descripcion
        
        // Formatear array de arrays a array de objetos para facilitar uso
        allAddons = data.map(row => ({
          fecha: row[0],
          nombre: row[1],
          url: row[2],
          img: row[3] || '../assets/placeholder.png',
          categoria: row[4],
          likes: parseInt(row[5]) || 0,
          descargas: parseInt(row[6]) || 0,
          creador: row[8],
          version: row[9],
          descripcion: row[10] || 'Sin descripción'
        }));

        document.getElementById('total-count').textContent = `${allAddons.length}+ elementos`;
        
        renderPopular();
        renderLiked();
        renderContent('Todos');

      } catch (error) {
        console.error("Error cargando addons:", error);
        document.getElementById('all-content-container').innerHTML = '<p>Error de conexión.</p>';
      }
    }

    function createHorizontalCard(addon) {
      // Formatear descargas
      let descTxt = addon.descargas >= 1000 ? (addon.descargas/1000).toFixed(1) + 'K' : addon.descargas;
      
      let catColor = 'var(--primary-color)';
      if(addon.categoria === 'Texturas') catColor = '#22c55e';
      else if(addon.categoria === 'Mapas') catColor = '#eab308';
      else if(addon.categoria === 'Skins') catColor = '#3b82f6';
      else if(addon.categoria === 'DLC') catColor = '#a855f7';
      else if(addon.categoria === 'Popurris') catColor = '#ec4899';
      else if(addon.categoria === 'Addons') catColor = '#14b8a6';

      return `
        <div class="addon-card-h" onclick="openDetails('${encodeURIComponent(addon.nombre)}')">
          <img src="${addon.img}" alt="${addon.nombre}" loading="lazy">
          <span class="badge-cat" style="background:${catColor}">${addon.categoria}</span>
          <i class="fa-regular fa-heart badge-like"></i>
          <div class="info-overlay">
            <div class="title">${addon.nombre}</div>
            <div class="downloads"><i class="fa-solid fa-download"></i> ${descTxt} descargas</div>
          </div>
        </div>
      `;
    }

    function createGridCard(addon) {
      let descTxt = addon.descargas >= 1000 ? (addon.descargas/1000).toFixed(1) + 'K' : addon.descargas;
      
      // Color de categoría
      let catColor = 'var(--primary-color)';
      if(addon.categoria === 'Texturas') catColor = '#22c55e'; // Verde
      else if(addon.categoria === 'Mapas') catColor = '#eab308'; // Amarillo
      else if(addon.categoria === 'Skins') catColor = '#3b82f6'; // Azul
      else if(addon.categoria === 'DLC') catColor = '#a855f7'; // Morado
      else if(addon.categoria === 'Popurris') catColor = '#ec4899'; // Rosa
      else if(addon.categoria === 'Addons') catColor = '#14b8a6'; // Cyan oscuro

      return `
        <div class="addon-card" onclick="openDetails('${encodeURIComponent(addon.nombre)}')">
          <div class="card-img-wrapper">
            <img src="${addon.img}" alt="${addon.nombre}" loading="lazy">
            <span class="badge-cat" style="background:${catColor}">${addon.categoria}</span>
            <i class="fa-regular fa-heart badge-like"></i>
          </div>
          <div class="card-body">
            <div class="card-title">${addon.nombre}</div>
            <div class="card-desc">${addon.descripcion}</div>
            <div class="card-footer">
              <span class="card-author">${addon.creador}</span>
              <span><i class="fa-solid fa-download"></i> ${descTxt}</span>
            </div>
          </div>
        </div>
      `;
    }

    function renderPopular() {
      const container = document.getElementById('popular-container');
      const sorted = [...allAddons].sort((a, b) => b.descargas - a.descargas).slice(0, 20);
      container.innerHTML = sorted.map(a => createHorizontalCard(a)).join('');
    }

    function renderLiked() {
      const container = document.getElementById('liked-container');
      const sorted = [...allAddons].sort((a, b) => b.likes - a.likes).slice(0, 20);
      container.innerHTML = sorted.map(a => createHorizontalCard(a)).join('');
    }

    function renderContent(cat) {
      const container = document.getElementById('all-content-container');
      let filtered = allAddons;
      if (cat !== 'Todos') {
        filtered = allAddons.filter(a => a.categoria === cat);
      }
      
      // Mostrar primeros 20 (se podría añadir paginación o scroll infinito luego)
      const toShow = filtered.slice(0, 20);
      
      if(toShow.length === 0) {
        container.innerHTML = '<p style="grid-column: 1/-1; text-align:center; padding: 20px; color: var(--text-muted);">No hay contenido en esta categoría.</p>';
      } else {
        container.innerHTML = toShow.map(a => createGridCard(a)).join('');
      }
    }

    function openDetails(encodedName) {
      const nombre = decodeURIComponent(encodedName);
      const addon = allAddons.find(a => a.nombre === nombre);
      if(!addon) return;

      document.getElementById('modal-img').src = addon.img;
      document.getElementById('modal-title').textContent = addon.nombre;
      document.getElementById('modal-cat').textContent = addon.categoria;
      document.getElementById('modal-author').textContent = addon.creador || 'Desconocido';
      document.getElementById('modal-downloads').textContent = addon.descargas;
      document.getElementById('modal-likes').textContent = addon.likes;
      document.getElementById('modal-version').textContent = addon.version || '1.0';
      document.getElementById('modal-desc').textContent = addon.descripcion;

      // Color de categoría
      let catColor = 'var(--primary-color)';
      if(addon.categoria === 'Texturas') catColor = '#22c55e';
      else if(addon.categoria === 'Mapas') catColor = '#eab308';
      else if(addon.categoria === 'Skins') catColor = '#3b82f6';
      else if(addon.categoria === 'DLC') catColor = '#a855f7';
      else if(addon.categoria === 'Popurris') catColor = '#ec4899';
      else if(addon.categoria === 'Addons') catColor = '#14b8a6';
      document.getElementById('modal-cat').style.background = catColor;

      // Evento de descarga
      const btnDescargar = document.getElementById('modal-btn-descargar');
      btnDescargar.onclick = function() {
        // En una app real usaríamos la URL de Cuty, aquí la abrimos
        window.open(addon.url, '_blank');
        
        // Guardar localmente
        let locales = JSON.parse(localStorage.getItem('bv_descargas_recientes') || '[]');
        if(!locales.find(a => a.nombre === addon.nombre)) {
           locales.push(addon);
           localStorage.setItem('bv_descargas_recientes', JSON.stringify(locales));
        }
      };

      document.getElementById('addon-modal').style.display = 'flex';
    }

    // Inicializar
    fetchAddons();
  </script>
</body>
</html>
