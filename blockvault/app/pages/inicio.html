<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body>
  
  <div class="page-container">
    
    <!-- Buscador Principal -->
    <div style="margin-bottom:20px; position:relative;">
      <i class="fa-solid fa-magnifying-glass" style="position:absolute; left:16px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:1rem;"></i>
      <input type="text" id="local-search" placeholder="Busca addons por similitudes, nombre o creador..." oninput="filterAddons(this.value)" style="width:100%; padding:14px 16px 14px 44px; border-radius:var(--radius-lg); border:1px solid var(--border-color); background:rgba(var(--bg-panel-rgb, 30,30,30), 0.6); color:var(--text-main); outline:none; font-family:var(--font-family); font-size:1rem; box-shadow:0 4px 15px rgba(0,0,0,0.1); backdrop-filter:blur(5px);">
    </div>

    <!-- Categorías -->
    <div class="categories-scroll" id="categories-section">
      <button class="cat-btn active" data-cat="Todos">Todos</button>
      <button class="cat-btn" data-cat="Addons"><i class="fa-solid fa-puzzle-piece"></i> Addons</button>
      <button class="cat-btn" data-cat="Mapas"><i class="fa-solid fa-map"></i> Mapas</button>
      <button class="cat-btn" data-cat="Texturas"><i class="fa-solid fa-palette"></i> Texturas</button>
      <button class="cat-btn" data-cat="Skins"><i class="fa-solid fa-user-astronaut"></i> Skins</button>
      <button class="cat-btn" data-cat="DLC"><i class="fa-solid fa-gem"></i> DLC</button>
      <button class="cat-btn" data-cat="Popurris"><i class="fa-solid fa-masks-theater"></i> Popurris</button>
    </div>

    <!-- Populares -->
    <h2 class="section-title" id="populares-title"><i class="fa-solid fa-fire neon-text"></i> Popular</h2>
    <div class="popular-scroll" id="popular-container">
      <!-- Los addons populares se cargarán aquí por JS -->
      <div style="color:var(--text-muted); font-size:0.8rem;">Cargando populares...</div>
    </div>

    <!-- Más Gustados -->
    <h2 class="section-title" id="liked-title"><i class="fa-solid fa-heart neon-text" style="color: #ef4444;"></i> Más Gustados</h2>
    <div class="popular-scroll" id="liked-container">
      <!-- Los addons más gustados se cargarán aquí por JS -->
      <div style="color:var(--text-muted); font-size:0.8rem;">Cargando más gustados...</div>
    </div>

    <!-- CREADORES DESTACADOS -->
    <section class="home-section" id="section-creators">
      <div class="section-header">
        <h2 class="section-title"><i class="fa-solid fa-trophy" style="color:#ffd700;"></i> Creadores Elite</h2>
      </div>
      <div class="creators-grid" id="creators-container">
        <!-- Cargado por JS -->
      </div>
    </section>

    <!-- Todo el contenido -->
    <h2 class="section-title" id="todo-title">Todo el contenido</h2>
    
    <div class="content-grid" id="all-content-container">
      <!-- Los addons se cargarán aquí por JS -->
    </div>

  </div>

  <!-- MODAL DE DETALLES PANTALLA COMPLETA -->
  <div id="addon-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg-app); z-index:9999; flex-direction:column; overflow-y:auto; transition:transform 0.3s ease;">
    
    <!-- Barra Superior del Modal -->
    <div style="position:sticky; top:0; z-index:10; background:rgba(var(--bg-panel-rgb, 30,30,30), 0.9); backdrop-filter:blur(10px); padding:16px; display:flex; align-items:center; border-bottom:1px solid var(--border-color);">
      <button onclick="document.getElementById('addon-modal').style.display='none'" style="background:transparent; border:none; color:var(--text-main); font-size:1.2rem; cursor:pointer; display:flex; align-items:center; gap:8px;">
        <i class="fa-solid fa-arrow-left"></i> <span style="font-family:'Space Grotesk', sans-serif; font-size:1rem;">Atrás</span>
      </button>
    </div>

    <!-- Contenido del Modal -->
    <div style="flex:1; display:flex; flex-direction:column; max-width:800px; margin:0 auto; width:100%;">
      
      <div style="width:100%; height:280px; position:relative;">
        <img id="modal-img" src="" style="width:100%; height:100%; object-fit:cover;">
        <span id="modal-cat" class="badge-cat" style="top:15px; left:15px; font-size:0.9rem; padding:6px 12px; box-shadow:0 4px 10px rgba(0,0,0,0.5);">Cat</span>
      </div>
      
      <div style="padding:24px;">
        <h3 id="modal-title" style="font-size:1.8rem; font-family:'Space Grotesk', sans-serif; margin-bottom:8px; color:var(--text-main);">Titulo</h3>
        
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:10px;">
          <div style="color:var(--primary-color); font-size:1rem; font-weight:bold;">Por: <span id="modal-author" style="color:var(--secondary-color);">Autor</span></div>
          
          <div style="display:flex; gap:16px; font-size:0.9rem; color:var(--text-muted); background:var(--bg-panel); padding:8px 16px; border-radius:var(--radius); border:1px solid var(--border-color);">
            <span><i class="fa-solid fa-download" style="color:var(--primary-color);"></i> <span id="modal-downloads">0</span></span>
            <span><i class="fa-solid fa-heart" style="color:#ef4444;"></i> <span id="modal-likes">0</span></span>
            <span><i class="fa-solid fa-tag"></i> <span id="modal-version">1.0</span></span>
          </div>
        </div>
        
        <!-- Botón movido arriba de la descripción -->
        <button id="modal-btn-descargar" class="cat-btn" style="width:auto; min-width:200px; margin:0 auto 24px auto; display:flex; justify-content:center; background:var(--primary-color); color:#fff; border:none; font-size:1.1rem; padding:12px 24px; font-weight:bold; border-radius:var(--radius-lg); box-shadow:0 0 20px var(--neon-glow); transition:transform 0.2s;">
          <i class="fa-solid fa-cloud-arrow-down"></i> Instalar Addon
        </button>
        
        <div style="background:var(--bg-panel); border:1px solid var(--border-color); border-radius:var(--radius); padding:20px; margin-bottom:24px;">
          <h4 style="margin-bottom:12px; color:var(--primary-color); font-size:1.1rem;"><i class="fa-solid fa-circle-info"></i> Descripción</h4>
          <p id="modal-desc" style="font-size:0.95rem; line-height:1.6; color:var(--text-main); white-space:pre-wrap;">Descripcion</p>
        </div>
        
      </div>
      
    </div>
  </div>

  <script src="../js/security.js"></script>
  <script>
    let SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzAFKX9RRSEbp5-kqDFHQHi3Rk17mLhBmhBq9Y3I9oTlfhNfc1wFXwUgv6P5LZ5sBkV/exec';
    let allAddons = [];

    window.addEventListener('message', e => {
      const d = e.data;
      if (!d) return;
      if (d.type === 'init-data') {
        document.documentElement.setAttribute('data-theme', d.theme || 'dark');
        if (d.color) {
          document.documentElement.style.setProperty('--primary-color', d.color);
          document.documentElement.style.setProperty('--border-neon', d.color);
          document.documentElement.style.setProperty('--neon-glow', d.color + '66');
        }
      }
    });

    const catBtns = document.querySelectorAll('.cat-btn');
    catBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        catBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const cat = btn.getAttribute('data-cat');
        const filtered = cat === 'Todos' ? allAddons : allAddons.filter(a => a.categoria === cat);
        renderContent(filtered);
      });
    });

    async function fetchAddons() {
      try {
        const res = await fetch(`${SCRIPT_URL}?action=read`);
        const data = await res.json();
        
        allAddons = data.slice(1).map(row => ({
          fecha: row[0],
          nombre: row[1],
          url: row[2],
          img: row[3],
          categoria: row[4],
          likes: parseInt(row[5]) || 0,
          descargas: parseInt(row[6]) || 0,
          descripcion: row[10] || '',
          creador: row[8] || '',
          version: row[9] || ''
        })).reverse();
        
        renderPopular();
        renderLiked();
        renderEliteCreators(data.slice(1));
        renderContent(allAddons);

      } catch (error) {
        console.error("Error cargando addons:", error);
        document.getElementById('all-content-container').innerHTML = '<p>Error de conexión.</p>';
      }
    }

    function createHorizontalCard(addon) {
      let descTxt = addon.descargas >= 1000 ? (addon.descargas/1000).toFixed(1) + 'K' : addon.descargas;
      let catColor = 'var(--primary-color)';
      return `
        <div class="addon-card-h" onclick="openDetails('${encodeURIComponent(addon.nombre)}')">
          <img src="${addon.img || '../assets/placeholder.png'}" alt="${addon.nombre}" loading="lazy">
          <span class="badge-cat" style="background:${catColor}">${addon.categoria}</span>
          <i class="fa-regular fa-heart badge-like"></i>
          <div class="info-overlay">
            <div class="title">${addon.nombre}</div>
            <div class="downloads"><i class="fa-solid fa-download"></i> ${descTxt} descargas</div>
          </div>
        </div>
      `;
    }

    function createGridCard(addon) {
      let descTxt = addon.descargas >= 1000 ? (addon.descargas/1000).toFixed(1) + 'K' : addon.descargas;
      let catColor = 'var(--primary-color)';
      return `
        <div class="addon-card" onclick="openDetails('${encodeURIComponent(addon.nombre)}')">
          <div class="card-img-wrapper">
            <img src="${addon.img || '../assets/placeholder.png'}" alt="${addon.nombre}" loading="lazy">
            <span class="badge-cat" style="background:${catColor}">${addon.categoria}</span>
            <i class="fa-regular fa-heart badge-like"></i>
          </div>
          <div class="card-body">
            <div class="card-title">${addon.nombre}</div>
            <div class="card-desc">${addon.descripcion}</div>
            <div class="card-footer">
              <span class="card-author">${addon.creador}</span>
              <span><i class="fa-solid fa-download"></i> ${descTxt}</span>
            </div>
          </div>
        </div>
      `;
    }

    function renderPopular() {
      const container = document.getElementById('popular-container');
      const sorted = [...allAddons].sort((a, b) => b.descargas - a.descargas).slice(0, 20);
      container.innerHTML = sorted.map(a => createHorizontalCard(a)).join('');
    }

    function renderLiked() {
      const container = document.getElementById('liked-container');
      const sorted = [...allAddons].sort((a, b) => b.likes - a.likes).slice(0, 20);
      container.innerHTML = sorted.map(a => createHorizontalCard(a)).join('');
    }

    function renderContent(addons) {
      const container = document.getElementById('all-content-container');
      container.innerHTML = addons.map(a => createGridCard(a)).join('');
      if(addons.length === 0) {
        container.innerHTML = '<p style="grid-column: 1/-1; text-align:center; padding: 20px; color: var(--text-muted);">No se encontraron resultados.</p>';
      }
    }

    function renderEliteCreators(addons) {
      const container = document.getElementById('creators-container');
      if (!container) return;

      const creatorsData = {};
      addons.forEach(a => {
        const c = a[8];
        if (!creatorsData[c]) creatorsData[c] = { name: c, count: 0, likes: 0, downloads: 0, topAddon: a };
        creatorsData[c].count++;
        creatorsData[c].likes += (parseInt(a[5]) || 0);
        creatorsData[c].downloads += (parseInt(a[6]) || 0);
        if ((parseInt(a[6]) || 0) > (parseInt(creatorsData[c].topAddon[6]) || 0)) creatorsData[c].topAddon = a;
      });

      const list = Object.values(creatorsData);
      
      // Top 3 categorías
      const mostAddons = [...list].sort((a,b) => b.count - a.count)[0];
      const mostLikes = [...list].sort((a,b) => b.likes - a.likes)[0];
      const mostDownloads = [...list].sort((a,b) => b.downloads - a.downloads)[0];

      const elites = [
        { ...mostAddons, label: 'Más Prolífico', icon: 'fa-box-open', val: mostAddons.count + ' addons' },
        { ...mostLikes, label: 'Más Amado', icon: 'fa-heart', val: mostLikes.likes + ' likes' },
        { ...mostDownloads, label: 'Más Popular', icon: 'fa-download', val: mostDownloads.downloads + ' descargas' }
      ];

      // Eliminar duplicados si un creador es top en varias cosas
      const uniqueElites = [];
      const seen = new Set();
      elites.forEach(e => {
        if (!seen.has(e.name)) {
          uniqueElites.push(e);
          seen.add(e.name);
        }
      });

      container.innerHTML = uniqueElites.map(e => `
        <div class="creator-mini-card" onclick="filterByCreator('${e.name}')">
          <div class="creator-badge-type">${e.label}</div>
          <div class="creator-mini-avatar">${e.name.charAt(0).toUpperCase()}</div>
          <div class="creator-mini-name">${e.name}</div>
          <div class="creator-mini-stat"><i class="fa-solid ${e.icon}"></i> ${e.val}</div>
        </div>
      `).join('');
    }

    function filterByCreator(name) {
      const searchInput = document.getElementById('addon-search');
      searchInput.value = name;
      filterAddons();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function openDetails(encodedName) {
      const nombre = decodeURIComponent(encodedName);
      const addon = allAddons.find(a => a.nombre === nombre);
      if(!addon) return;

      document.getElementById('modal-img').src = addon.img || '../assets/placeholder.png';
      document.getElementById('modal-title').textContent = addon.nombre;
      document.getElementById('modal-cat').textContent = addon.categoria;
      document.getElementById('modal-author').textContent = addon.creador || 'Desconocido';
      document.getElementById('modal-downloads').textContent = addon.descargas;
      document.getElementById('modal-likes').textContent = addon.likes;
      document.getElementById('modal-version').textContent = addon.version || '1.0';
      document.getElementById('modal-desc').textContent = addon.descripcion;

      const btnDescargar = document.getElementById('modal-btn-descargar');
      btnDescargar.onclick = function() {
        const verifiedTime = localStorage.getItem('bv_verified_time');
        const isVerified = verifiedTime && (Date.now() - parseInt(verifiedTime)) < 15 * 60 * 60 * 1000;
        
        if (isVerified) {
          window.open(addon.url, '_blank');
          
          // Guardar en descargas recientes localmente
          let recientes = JSON.parse(localStorage.getItem('bv_descargas_recientes') || '[]');
          if (!recientes.find(a => a.nombre === addon.nombre)) {
            recientes.push({
              nombre: addon.nombre,
              img: addon.img,
              categoria: addon.categoria,
              url: addon.url
            });
            localStorage.setItem('bv_descargas_recientes', JSON.stringify(recientes));
          }
        } else {
          // Notificar al shell principal para que redirija a la página de verificación (Cuty.io)
          window.parent.postMessage({ type: 'go-verify' }, '*');
        }
      };

      document.getElementById('addon-modal').style.display = 'flex';
    }

    function filterAddons(term) {
      term = term.toLowerCase().trim();
      const isSearching = term !== '';
      
      // Mostrar u ocultar elementos si se está buscando
      const elsToHide = [
        document.getElementById('categories-section'),
        document.getElementById('populares-title'),
        document.getElementById('popular-container'),
        document.getElementById('liked-title'),
        document.getElementById('liked-container'),
        document.getElementById('todo-title')
      ];
      
      elsToHide.forEach(el => {
        if(el) el.style.display = isSearching ? 'none' : '';
      });

      if (isSearching) {
        const filtered = allAddons.filter(a => 
          a.nombre.toLowerCase().includes(term) || 
          a.creador.toLowerCase().includes(term) || 
          a.descripcion.toLowerCase().includes(term)
        );
        renderContent(filtered);
      } else {
        // Restaurar estado de la categoría activa
        const activeBtn = document.querySelector('.cat-btn.active');
        const cat = activeBtn ? activeBtn.getAttribute('data-cat') : 'Todos';
        const filtered = cat === 'Todos' ? allAddons : allAddons.filter(a => a.categoria === cat);
        renderContent(filtered);
      }
    }

    window.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'search') {
        const inputLocal = document.getElementById('local-search');
        if(inputLocal) inputLocal.value = e.data.term;
        filterAddons(e.data.term);
      }
    });

    fetchAddons();
  </script>
</body>
</html>
