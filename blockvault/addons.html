<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlockVault — Addons</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  * { -webkit-user-select: none; -moz-user-select: none; user-select: none; -webkit-user-drag: none; }
  input { -webkit-user-select: text; -moz-user-select: text; user-select: text; }
  img { pointer-events: none; -webkit-user-drag: none; }
  :root {
    --bg:#F4F4F6; --surface:#FFFFFF; --surface-2:#EBEBEF;
    --border:rgba(0,0,0,0.08); --text:#13131A; --text-muted:#6B6F80;
    --accent:#6C63FF; --accent-rgb:108,99,255;
    --radius:14px; --radius-sm:8px;
    --shadow:0 2px 16px rgba(0,0,0,0.06); --shadow-lg:0 8px 40px rgba(0,0,0,0.12);
    --font-head:'Syne',sans-serif; --font-body:'Manrope',sans-serif;
    --topbar-h:64px; --sidebar-w:260px;
    --star-yellow:#F59E0B; --star-blue:#3B82F6; --star-red:#EF4444;
  }
  [data-theme="dark"] { --bg:#0C0C10; --surface:#14141C; --surface-2:#1E1E2A; --border:rgba(255,255,255,0.07); --text:#EAEAF2; --text-muted:#8888A0; --shadow:0 2px 16px rgba(0,0,0,0.4); --shadow-lg:0 8px 40px rgba(0,0,0,0.6); }
  html,body { height:100%; background:var(--bg); color:var(--text); font-family:var(--font-body); -webkit-font-smoothing:antialiased; transition:background .3s,color .3s; overflow-x:hidden; }

  /* TOPBAR */
  .topbar { position:fixed; top:0; left:0; right:0; z-index:100; height:var(--topbar-h); background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; gap:12px; box-shadow:var(--shadow); }
  .topbar-btn { background:none; border:none; cursor:pointer; width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--text-muted); transition:background .2s,color .2s; flex-shrink:0; }
  .topbar-btn:hover { background:var(--surface-2); color:var(--text); }
  .topbar-logo { flex:1; text-align:center; font-family:var(--font-head); font-size:1.25rem; font-weight:800; letter-spacing:-.02em; background:linear-gradient(135deg,var(--accent),#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .avatar { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,var(--accent),#a78bfa); display:flex; align-items:center; justify-content:center; font-family:var(--font-head); font-size:.85rem; font-weight:700; color:#fff; cursor:pointer; overflow:hidden; border:2px solid rgba(var(--accent-rgb),.35); flex-shrink:0; transition:transform .2s; }
  .avatar:hover { transform:scale(1.06); }
  .avatar img { width:100%; height:100%; object-fit:cover; pointer-events:none; }

  /* SIDEBAR */
  .sidebar-overlay { position:fixed; inset:0; z-index:89; background:rgba(0,0,0,.45); backdrop-filter:blur(3px); opacity:0; pointer-events:none; transition:opacity .3s; }
  .sidebar-overlay.show { opacity:1; pointer-events:all; }
  .sidebar { position:fixed; top:var(--topbar-h); left:0; bottom:0; width:var(--sidebar-w); z-index:90; background:var(--surface); border-right:1px solid var(--border); transform:translateX(-100%); transition:transform .3s cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column; padding:16px 12px; overflow-y:auto; }
  .sidebar.open { transform:translateX(0); }
  .nav-item { display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:var(--radius-sm); cursor:pointer; transition:background .2s,color .2s; color:var(--text-muted); font-weight:500; font-size:.92rem; }
  .nav-item:hover,.nav-item.active { background:rgba(var(--accent-rgb),.1); color:var(--accent); }
  .nav-item.danger:hover { background:rgba(239,68,68,.1); color:#ef4444; }
  .nav-item svg { flex-shrink:0; }
  .sidebar-spacer { flex:1; }
  .sidebar-section { font-size:.68rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--text-muted); padding:8px 16px 4px; margin-top:8px; }

  /* ── VISTA LISTA ─────────────────────────────── */
  .page-content { padding-top:var(--topbar-h); min-height:100vh; }
  #view-list { display:block; }
  #view-detail { display:none; }

  .search-wrap { position:sticky; top:var(--topbar-h); z-index:50; background:var(--bg); padding:14px 16px 10px; border-bottom:1px solid var(--border); }
  .search-row { display:flex; gap:10px; align-items:center; }
  .search-box { flex:1; display:flex; align-items:center; gap:10px; background:var(--surface); border:1.5px solid var(--border); border-radius:999px; padding:9px 16px; transition:border-color .2s,box-shadow .2s; }
  .search-box:focus-within { border-color:var(--accent); box-shadow:0 0 0 3px rgba(var(--accent-rgb),.12); }
  .search-box input { flex:1; background:none; border:none; outline:none; color:var(--text); font-family:var(--font-body); font-size:.9rem; }
  .search-box input::placeholder { color:var(--text-muted); }
  .filter-btn { background:var(--surface); border:1.5px solid var(--border); border-radius:999px; padding:9px 16px; cursor:pointer; font-family:var(--font-body); font-size:.85rem; font-weight:600; color:var(--text-muted); display:flex; align-items:center; gap:7px; transition:background .2s,border-color .2s,color .2s; white-space:nowrap; flex-shrink:0; }
  .filter-btn:hover { border-color:var(--accent); color:var(--accent); }
  .filter-btn.active { background:rgba(var(--accent-rgb),.1); border-color:var(--accent); color:var(--accent); }

  /* DROPDOWN FILTRO */
  .filter-dd { position:absolute; top:calc(var(--topbar-h) + 66px); right:16px; z-index:200; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow-lg); min-width:220px; overflow:hidden; display:none; animation:fdDown .15s ease; }
  .filter-dd.show { display:block; }
  @keyframes fdDown { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
  .fd-section { padding:10px 14px 4px; font-size:.66rem; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--text-muted); display:flex; align-items:center; justify-content:space-between; cursor:pointer; user-select:none; -webkit-user-select:none; }
  .fd-section svg { transition:transform .2s; }
  .fd-section.open svg { transform:rotate(180deg); }
  .fd-items { }
  .fd-items.collapsed { display:none; }
  .fd-item { display:flex; align-items:center; gap:10px; padding:10px 18px; cursor:pointer; font-size:.86rem; font-weight:500; color:var(--text); transition:background .15s; }
  .fd-item:hover { background:var(--surface-2); }
  .fd-item.selected { color:var(--accent); font-weight:700; }
  .fd-item.selected::after { content:'✓'; margin-left:auto; font-size:.8rem; }
  .fd-sep { height:1px; background:var(--border); margin:4px 0; }

  /* LISTA DE ADDONS */
  .list-container { max-width:720px; margin:0 auto; padding:12px 16px 80px; }
  .addon-row { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); display:flex; align-items:stretch; overflow:hidden; margin-bottom:10px; cursor:pointer; transition:transform .15s,box-shadow .15s; box-shadow:var(--shadow); animation:fadeUp .3s ease both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .addon-row:hover { transform:translateY(-2px); box-shadow:var(--shadow-lg); }
  .addon-row-img { width:130px; min-height:90px; object-fit:cover; flex-shrink:0; display:block; }
  .addon-row-placeholder { width:130px; flex-shrink:0; background:linear-gradient(135deg,rgba(var(--accent-rgb),.12),rgba(var(--accent-rgb),.04)); display:flex; align-items:center; justify-content:center; }
  .addon-row-body { padding:12px 14px; flex:1; display:flex; flex-direction:column; justify-content:center; gap:4px; min-width:0; }
  .addon-row-name { font-family:var(--font-head); font-size:.95rem; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .addon-row-by { font-size:.77rem; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .addon-row-cat { display:inline-flex; align-items:center; font-size:.65rem; font-weight:700; letter-spacing:.04em; text-transform:uppercase; padding:2px 8px; border-radius:999px; }
  .addon-row-rating { display:flex; align-items:center; gap:5px; font-size:.78rem; font-weight:600; margin-top:2px; }

  /* CATEGORÍA COLORES */
  .cat-Addons      { background:rgba(108,99,255,.12); color:#6C63FF; }
  .cat-Mapas       { background:rgba(14,165,233,.12);  color:#0284c7; }
  .cat-Texturas    { background:rgba(168,85,247,.12);  color:#9333ea; }
  .cat-Marketplace { background:rgba(34,197,94,.12);   color:#16a34a; }

  /* ESTRELLAS */
  .star { font-size:1rem; line-height:1; }
  .star-yellow { color:var(--star-yellow); }
  .star-blue   { color:var(--star-blue); }
  .star-red    { color:var(--star-red); }

  /* ── VISTA DETALLE ───────────────────────────── */
  .detail-topbar { position:fixed; top:0; left:0; right:0; z-index:100; height:var(--topbar-h); background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 16px; gap:10px; box-shadow:var(--shadow); }
  .detail-back { background:none; border:none; cursor:pointer; display:flex; align-items:center; gap:7px; color:var(--text); font-family:var(--font-head); font-size:1rem; font-weight:700; padding:8px 0; transition:color .2s; flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .detail-back:hover { color:var(--accent); }
  .detail-back svg { flex-shrink:0; }
  .detail-content { padding-top:var(--topbar-h); }
  .detail-hero { width:100%; max-height:280px; object-fit:cover; display:block; }
  .detail-hero-placeholder { width:100%; height:220px; background:linear-gradient(135deg,rgba(var(--accent-rgb),.15),rgba(var(--accent-rgb),.04)); display:flex; align-items:center; justify-content:center; }
  .detail-body { max-width:680px; margin:0 auto; padding:18px 16px 80px; }
  .detail-top-row { display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-bottom:16px; }
  .detail-rating-block { display:flex; align-items:center; gap:8px; flex:1; }
  .detail-star { font-size:1.4rem; }
  .detail-rating-val { font-family:var(--font-head); font-size:1.3rem; font-weight:800; }
  .detail-rating-count { font-size:.82rem; color:var(--text-muted); }
  .detail-vote-btns { display:flex; align-items:center; gap:8px; }
  .vote-btn { display:flex; align-items:center; gap:6px; padding:8px 16px; border-radius:999px; border:1.5px solid var(--border); background:none; cursor:pointer; font-family:var(--font-body); font-size:.84rem; font-weight:600; color:var(--text-muted); transition:all .2s; }
  .vote-btn:hover { border-color:var(--text-muted); color:var(--text); }
  .vote-btn.like-active   { background:rgba(34,197,94,.12);  border-color:#22c55e; color:#16a34a; }
  .vote-btn.dislike-active{ background:rgba(239,68,68,.12);  border-color:#ef4444; color:#ef4444; }
  .vote-btn:disabled { opacity:.5; cursor:not-allowed; }
  .detail-dl-btn { display:flex; align-items:center; gap:8px; padding:10px 22px; border-radius:var(--radius-sm); background:var(--accent); color:#fff; border:none; font-family:var(--font-body); font-size:.88rem; font-weight:700; cursor:pointer; text-decoration:none; transition:filter .2s,transform .2s; flex-shrink:0; }
  .detail-dl-btn:hover { filter:brightness(1.1); transform:translateY(-1px); }
  .detail-dl-btn.no-url { background:var(--surface-2); color:var(--text-muted); cursor:not-allowed; pointer-events:none; }
  .detail-cat-row { display:flex; align-items:center; gap:8px; margin-bottom:14px; }
  .detail-by { font-size:.82rem; color:var(--text-muted); }
  .detail-desc { font-size:.9rem; color:var(--text); line-height:1.7; word-break:break-word; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; }
  .detail-desc-title { font-family:var(--font-head); font-weight:700; font-size:.95rem; margin-bottom:8px; }

  /* MISC */
  .spin-wrap { text-align:center; padding:60px 20px; }
  .spinner { width:28px; height:28px; border-radius:50%; border:3px solid var(--border); border-top-color:var(--accent); animation:sp .7s linear infinite; display:inline-block; }
  .sp-sm { width:14px; height:14px; border-width:2px; border-color:rgba(255,255,255,.3); border-top-color:#fff; }
  @keyframes sp { to{transform:rotate(360deg)} }
  .empty-wrap { text-align:center; padding:60px 20px; color:var(--text-muted); }
  .empty-title { font-family:var(--font-head); font-size:1.05rem; font-weight:700; margin-bottom:5px; }
  #toast-wrap { position:fixed; bottom:80px; right:16px; z-index:999; display:flex; flex-direction:column; gap:8px; align-items:flex-end; }
  .toast { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:11px 16px; box-shadow:var(--shadow-lg); font-size:.85rem; font-weight:500; animation:tIn .3s ease,tOut .4s 2.6s forwards; max-width:280px; }
  .toast.success { border-left:3px solid #22c55e; }
  .toast.error   { border-left:3px solid #ef4444; }
  @keyframes tIn  { from{transform:translateX(110%);opacity:0} to{transform:translateX(0);opacity:1} }
  @keyframes tOut { from{opacity:1} to{opacity:0;pointer-events:none} }
  ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
</style>
</head>
<body>

<!-- TOPBAR LISTA -->
<div class="topbar" id="topbar-list">
  <button class="topbar-btn" onclick="toggleSidebar()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div class="topbar-logo">Addons</div>
  <div class="avatar" id="top-av" onclick="location.href='perfil.html'"><span id="top-av-ltr"></span></div>
</div>

<!-- TOPBAR DETALLE -->
<div class="detail-topbar" id="topbar-detail" style="display:none">
  <button class="detail-back" id="back-btn" onclick="volverLista()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    <span id="back-label">Addons</span>
  </button>
</div>

<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>
<nav class="sidebar" id="sidebar">
  <div class="sidebar-section">Navegación</div>
  <a class="nav-item" onclick="location.href='main.html'">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Inicio
  </a>
 
  <a class="nav-item active">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>Addons
  </a>
  <a class="nav-item" onclick="location.href='usuarios.html'">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>Usuarios
  </a>
  <div class="sidebar-spacer"></div>
  <div class="sidebar-section">Más</div>
  <a class="nav-item" onclick="location.href='sugerencias.html'">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Sugerencias
  </a>
  <a class="nav-item" onclick="location.href='ajustes.html'">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Ajustes
  </a>
  <a class="nav-item danger" onclick="logout()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Cerrar sesión
  </a>
</nav>

<!-- VISTA LISTA -->
<div class="page-content" id="view-list">
  <div class="search-wrap">
    <div class="search-row">
      <div class="search-box">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="Buscar..." oninput="buscar(this.value)" autocomplete="off">
      </div>
      <button class="filter-btn" id="filter-btn" onclick="toggleFiltro()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Filtrar
        <svg id="filter-arrow" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="transition:transform .2s"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
    </div>
  </div>

  <!-- DROPDOWN FILTROS -->
  <div class="filter-dd" id="filter-dd">
    <!-- ORDEN -->
    <div class="fd-section open" id="sec-orden" onclick="toggleSec('orden')">
      <span style="display:flex;align-items:center;gap:7px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="17" y2="12"/><line x1="3" y1="18" x2="13" y2="18"/></svg>Orden
      </span>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
    </div>
    <div class="fd-items" id="items-orden">
      <div class="fd-item selected" data-orden="nuevos"  onclick="setOrden(this,'nuevos')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Más nuevos
      </div>
      <div class="fd-item" data-orden="viejos" onclick="setOrden(this,'viejos')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 8 14"/></svg>Más viejos
      </div>
      <div class="fd-item" data-orden="mejor"  onclick="setOrden(this,'mejor')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Mejor valorados
      </div>
      <div class="fd-item" data-orden="peor"   onclick="setOrden(this,'peor')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Peor valorados
      </div>
    </div>
    <div class="fd-sep"></div>
    <!-- TIPO -->
    <div class="fd-section open" id="sec-tipo" onclick="toggleSec('tipo')">
      <span style="display:flex;align-items:center;gap:7px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>Tipo
      </span>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
    </div>
    <div class="fd-items" id="items-tipo">
      <div class="fd-item selected" data-tipo="" onclick="setTipo(this,'')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>Todos
      </div>
      <div class="fd-item" data-tipo="Addons"      onclick="setTipo(this,'Addons')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg>Add-Ons
      </div>
      <div class="fd-item" data-tipo="Texturas"    onclick="setTipo(this,'Texturas')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>Texturas
      </div>
      <div class="fd-item" data-tipo="Mapas"       onclick="setTipo(this,'Mapas')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>Mundos
      </div>
      <div class="fd-item" data-tipo="Marketplace" onclick="setTipo(this,'Marketplace')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>Marketplace
      </div>
    </div>
  </div>

  <div class="list-container">
    <div id="list-area"><div class="spin-wrap"><div class="spinner"></div></div></div>
  </div>
</div>

<!-- VISTA DETALLE -->
<div id="view-detail" style="display:none">
  <div class="detail-content">
    <div id="detail-hero-wrap"></div>
    <div class="detail-body">
      <div class="detail-top-row">
        <div class="detail-rating-block">
          <span class="detail-star" id="d-star">⭐</span>
          <span class="detail-rating-val" id="d-rating-val">0.0</span>
          <span class="detail-rating-count" id="d-rating-count">(0 votos)</span>
        </div>
        <div class="detail-vote-btns">
          <button class="vote-btn" id="btn-like" onclick="votar('like')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M14 9V5a3 3 0 00-3-3l-4 9v11h11.28a2 2 0 002-1.7l1.38-9a2 2 0 00-2-2.3H14z"/><path d="M7 22H4a2 2 0 01-2-2v-7a2 2 0 012-2h3"/></svg>
            <span id="like-count">0</span>
          </button>
          <button class="vote-btn" id="btn-dislike" onclick="votar('dislike')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="transform:rotate(180deg)"><path d="M14 9V5a3 3 0 00-3-3l-4 9v11h11.28a2 2 0 002-1.7l1.38-9a2 2 0 00-2-2.3H14z"/><path d="M7 22H4a2 2 0 01-2-2v-7a2 2 0 012-2h3"/></svg>
            <span id="dislike-count">0</span>
          </button>
        </div>
        <a class="detail-dl-btn" id="d-dl-btn" href="#" target="_blank" rel="noopener">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Descargar
        </a>
      </div>
      <div class="detail-cat-row">
        <span class="addon-row-cat" id="d-cat"></span>
        <span class="detail-by" id="d-by"></span>
      </div>
      <div class="detail-desc">
        <div class="detail-desc-title">Descripción</div>
        <div id="d-desc"></div>
      </div>
    </div>
  </div>
</div>

<div id="toast-wrap"></div>

<script>
(function () {
  var API = 'https://script.google.com/macros/s/AKfycby_q9XZ8vYBsnr0G5PZGapHZh1iZ-GFBJqychgMnZ-hs3Napp1fWE_RfisJ91B2ZBwQ/exec';

  var ses = null;
  try { ses = JSON.parse(localStorage.getItem('bv_session') || 'null'); } catch(e) {}
  if (!ses) { location.href = 'index.html'; return; }

  function applyAccent(hex) {
    try { var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); document.documentElement.style.setProperty('--accent',hex); document.documentElement.style.setProperty('--accent-rgb',r+','+g+','+b); } catch(e) {}
  }
  
  function post(p){ return fetch(API,{method:'POST',body:JSON.stringify(p)}).then(function(r){return r.json();}); }

  /* ── PING LOOP ── */
  post({action:'ping', uuid:ses.uuid});
  setInterval(function(){ post({action:'ping', uuid:ses.uuid}); }, 30000);

  document.documentElement.setAttribute('data-theme', localStorage.getItem('bv_theme')||'light');
  applyAccent(localStorage.getItem('bv_accent')||'#6C63FF');

  var av = document.getElementById('top-av');
  if (ses.fotoPerfil) av.innerHTML = '<img src="'+ses.fotoPerfil+'" alt="">';
  else document.getElementById('top-av-ltr').textContent = (ses.nombre||'?')[0].toUpperCase();

  window.logout        = function(){ localStorage.removeItem('bv_session'); location.href='index.html'; };
  window.toggleSidebar = function(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); };
  window.closeSidebar  = function(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); };

  function post(p){ return fetch(API,{method:'POST',body:JSON.stringify(p)}).then(function(r){return r.json();}); }
  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fmt(d){ try{ return new Date(d).toLocaleDateString('es',{day:'numeric',month:'short',year:'numeric'}); }catch(_){return '';} }
  function toast(msg,t){ var el=document.createElement('div'); el.className='toast '+(t||'info'); el.textContent=msg; document.getElementById('toast-wrap').appendChild(el); setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},3100); }

  /* ── ESTADO ── */
  var todosAddons = [];
  var ordenActual = 'nuevos';
  var tipoActual  = '';
  var queryActual = '';
  var addonActual = null; // addon en detalle

  /* ── FILTRO DROPDOWN ── */
  document.addEventListener('click', function(e) {
    if (!e.target.closest('#filter-dd') && !e.target.closest('#filter-btn')) {
      cerrarFiltro();
    }
  });

  window.toggleFiltro = function() {
    var dd = document.getElementById('filter-dd');
    var open = dd.classList.contains('show');
    if (open) cerrarFiltro(); else abrirFiltro();
  };
  function abrirFiltro() {
    document.getElementById('filter-dd').classList.add('show');
    document.getElementById('filter-btn').classList.add('active');
    document.getElementById('filter-arrow').style.transform = 'rotate(180deg)';
  }
  function cerrarFiltro() {
    document.getElementById('filter-dd').classList.remove('show');
    document.getElementById('filter-btn').classList.remove('active');
    document.getElementById('filter-arrow').style.transform = '';
  }
  window.toggleSec = function(id) {
    var sec  = document.getElementById('sec-'+id);
    var items= document.getElementById('items-'+id);
    sec.classList.toggle('open');
    items.classList.toggle('collapsed');
  };

  window.setOrden = function(el, val) {
    document.querySelectorAll('[data-orden]').forEach(function(e){ e.classList.remove('selected'); });
    el.classList.add('selected');
    ordenActual = val;
    aplicarFiltros();
    cerrarFiltro();
  };
  window.setTipo = function(el, val) {
    document.querySelectorAll('[data-tipo]').forEach(function(e){ e.classList.remove('selected'); });
    el.classList.add('selected');
    tipoActual = val;
    aplicarFiltros();
    cerrarFiltro();
  };

  /* ── BÚSQUEDA ── */
  window.buscar = function(q) {
    queryActual = q.trim().toLowerCase();
    aplicarFiltros();
  };

  /* ── CARGAR ── */
  function cargar() {
    document.getElementById('list-area').innerHTML = '<div class="spin-wrap"><div class="spinner"></div></div>';
    post({ action:'obtenerAddons', categoria:'', orden:'nuevos' })
      .then(function(res) {
        if (!res||!res.ok) { document.getElementById('list-area').innerHTML='<div class="empty-wrap"><p>Error al cargar addons.</p></div>'; return; }
        todosAddons = res.addons || [];
        aplicarFiltros();
      })
      .catch(function(){ document.getElementById('list-area').innerHTML='<div class="empty-wrap"><p>No se pudo conectar.</p></div>'; });
  }

  function aplicarFiltros() {
    var lista = todosAddons.slice();

    // Filtro tipo
    if (tipoActual) lista = lista.filter(function(a){ return a.categoria === tipoActual; });

    // Búsqueda por iniciales
    if (queryActual) {
      lista = lista.filter(function(a){
        return a.nombre.toLowerCase().indexOf(queryActual) === 0 ||
               a.nombreCreador.toLowerCase().indexOf(queryActual) === 0;
      });
    }

    // Ordenar
    if (ordenActual === 'viejos') {
      lista.reverse();
    } else if (ordenActual === 'mejor') {
      lista.sort(function(a,b){ return b.rating - a.rating; });
    } else if (ordenActual === 'peor') {
      lista.sort(function(a,b){ return a.rating - b.rating; });
    }
    // 'nuevos' ya viene del servidor en orden inverso

    renderLista(lista);
  }

  /* ── RENDER LISTA ── */
  function ratingInfo(r) {
    var ico, cls;
    if (r < 0)   { ico='💔'; cls='star-red'; }
    else if (r >= 5.0) { ico='💖'; cls='star-blue'; }
    else               { ico='❤️'; cls='star-yellow'; }
    return { ico:ico, cls:cls };
  }

  function renderLista(lista) {
    if (!lista.length) {
      document.getElementById('list-area').innerHTML =
        '<div class="empty-wrap"><div class="empty-title">'+(tipoActual||queryActual ? 'Sin resultados' : 'Aún no hay addons')+'</div>'
        +'<p style="font-size:.83rem">Prueba con otros filtros o términos.</p></div>';
      return;
    }
    var html = lista.map(function(a) {
      var ri  = ratingInfo(a.rating);
      var imgH = a.imagen
        ? '<img class="addon-row-img" src="'+esc(a.imagen)+'" alt="" loading="lazy">'
        : '<div class="addon-row-placeholder"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" opacity="0.25"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg></div>';
      return '<div class="addon-row" onclick="abrirDetalle(\''+esc(a.uuid)+'\')">'
        + imgH
        + '<div class="addon-row-body">'
        + '<div class="addon-row-name">'+esc(a.nombre)+'</div>'
        + '<div class="addon-row-by">by '+esc(a.nombreCreador)+'</div>'
        + '<span class="addon-row-cat cat-'+esc(a.categoria)+'">'+esc(a.categoria)+'</span>'
        + '<div class="addon-row-rating"><span class="star '+ri.cls+'">'+ri.ico+'</span><span>'+a.rating.toFixed(1)+'</span></div>'
        + '</div></div>';
    }).join('');
    document.getElementById('list-area').innerHTML = html;
  }

  /* ── DETALLE ── */
  window.abrirDetalle = function(uuid) {
    var a = todosAddons.find(function(x){ return x.uuid === uuid; });
    if (!a) return;
    addonActual = a;

    // Topbars
    document.getElementById('topbar-list').style.display   = 'none';
    document.getElementById('topbar-detail').style.display = 'flex';
    document.getElementById('back-label').textContent      = a.nombre;
    document.getElementById('view-list').style.display     = 'none';
    document.getElementById('view-detail').style.display   = 'block';

    // Hero
    document.getElementById('detail-hero-wrap').innerHTML = a.imagen
      ? '<img class="detail-hero" src="'+esc(a.imagen)+'" alt="'+esc(a.nombre)+'">'
      : '<div class="detail-hero-placeholder"><svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg></div>';

    // Rating
    renderDetalleStar(a.rating, a.likes, a.dislikes);

    // Desc
    document.getElementById('d-desc').textContent = a.descripcion || '';
    document.getElementById('d-cat').className = 'addon-row-cat cat-'+a.categoria;
    document.getElementById('d-cat').textContent = a.categoria;
    document.getElementById('d-by').textContent = 'by '+a.nombreCreador;

  // Descarga

    var dlBtn = document.getElementById('d-dl-btn');
    if (a.urlDescarga) {
      dlBtn.href = a.urlDescarga;
      dlBtn.className = 'detail-dl-btn';
    } else {
      dlBtn.href = '#';
      dlBtn.className = 'detail-dl-btn no-url';
    }

    // Botones voto
    resetVoteBtns();
    // Cargar voto del usuario
    post({ action:'obtenerVotoUsuario', uuidAddon:a.uuid, uuidUsuario:ses.uuid })
      .then(function(res) {
        if (res && res.ok && res.voto) aplicarVotoVisual(res.voto);
      });

    window.scrollTo(0, 0);
  };

  window.volverLista = function() {
    document.getElementById('topbar-detail').style.display = 'none';
    document.getElementById('topbar-list').style.display   = 'flex';
    document.getElementById('view-detail').style.display   = 'none';
    document.getElementById('view-list').style.display     = 'block';
    addonActual = null;
  };

  function renderDetalleStar(rating, likes, dislikes) {
    var ri = ratingInfo(rating);
    document.getElementById('d-star').textContent      = ri.ico;
    document.getElementById('d-star').className        = 'detail-star '+ri.cls;
    document.getElementById('d-rating-val').textContent= rating.toFixed(1);
    var total = (likes||0) + (dislikes||0);
    document.getElementById('d-rating-count').textContent = '('+total+' voto'+(total!==1?'s':'')+ ')';
    document.getElementById('like-count').textContent    = likes||0;
    document.getElementById('dislike-count').textContent = dislikes||0;
  }

  function resetVoteBtns() {
    document.getElementById('btn-like').classList.remove('like-active');
    document.getElementById('btn-dislike').classList.remove('dislike-active');
    document.getElementById('btn-like').disabled    = false;
    document.getElementById('btn-dislike').disabled = false;
  }

  function aplicarVotoVisual(tipo) {
    resetVoteBtns();
    if (tipo === 'like')    document.getElementById('btn-like').classList.add('like-active');
    if (tipo === 'dislike') document.getElementById('btn-dislike').classList.add('dislike-active');
  }

  window.votar = function(tipo) {
    if (!addonActual) return;
    document.getElementById('btn-like').disabled    = true;
    document.getElementById('btn-dislike').disabled = true;

    post({ action:'votarAddon', uuidAddon:addonActual.uuid, tipo:tipo, uuidUsuario:ses.uuid })
      .then(function(res) {
        document.getElementById('btn-like').disabled    = false;
        document.getElementById('btn-dislike').disabled = false;
        if (!res||!res.ok) { toast(res?(res.msg||'Error'):'Error de conexión','error'); return; }
        // Actualizar datos locales
        addonActual.likes    = res.likes;
        addonActual.dislikes = res.dislikes;
        addonActual.rating   = res.rating;
        // Actualizar en lista también
        var idx = todosAddons.findIndex(function(x){ return x.uuid === addonActual.uuid; });
        if (idx >= 0) { todosAddons[idx].likes=res.likes; todosAddons[idx].dislikes=res.dislikes; todosAddons[idx].rating=res.rating; }
        renderDetalleStar(res.likes - res.dislikes >= 0 ? res.rating : res.rating, res.likes, res.dislikes);
        aplicarVotoVisual(res.miVoto);
      })
      .catch(function() {
        document.getElementById('btn-like').disabled    = false;
        document.getElementById('btn-dislike').disabled = false;
        toast('Error de conexión','error');
      });
  };

  /* ── INICIO ── */
  cargar();
})();
</script>
</body>
</html>
