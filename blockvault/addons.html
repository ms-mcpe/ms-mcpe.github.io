<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlockVault — Addons</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #08080C;
    --surface: #0F0F17;
    --surface-2: #161622;
    --border: rgba(255,255,255,0.06);
    --text: #F1F1F4;
    --text-muted: #8888A0;
    --accent: #6C63FF;
    --accent-rgb: 108,99,255;
    --font-head: 'Syne', sans-serif;
    --font-body: 'Outfit', sans-serif;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  [data-theme="light"] {
    --bg: #F8F9FB;
    --surface: #FFFFFF;
    --surface-2: #F0F2F5;
    --border: rgba(0,0,0,0.06);
    --text: #1A1A24;
    --text-muted: #6B6F80;
    --shadow: 0 4px 20px rgba(0,0,0,0.05);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    transition: background 0.4s, color 0.4s;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* SECURITY & LOCK */
  * { -webkit-user-select: none; -moz-user-select: none; user-select: none; -webkit-touch-callout: none; }
  input, textarea, select { -webkit-user-select: text; -moz-user-select: text; user-select: text; }
  img { pointer-events: none; -webkit-user-drag: none; }

  /* NAVIGATION */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; height: 70px;
    background: rgba(var(--bg), 0.8);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 24px; z-index: 100;
  }
  .logo { font-family: var(--font-head); font-size: 1.4rem; font-weight: 800; letter-spacing: -0.04em; color: var(--text); text-decoration: none; }
  .logo span { color: var(--accent); }
  .top-actions { margin-left: auto; display: flex; gap: 12px; }
  .icon-btn {
    width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    background: var(--surface-2); color: var(--text-muted); border: 1px solid var(--border);
    cursor: pointer; transition: all 0.2s;
  }
  .icon-btn:hover { background: var(--border); color: var(--text); transform: translateY(-2px); }

  /* CONTENT */
  .page-content { padding-top: 90px; max-width: 1000px; margin: 0 auto; padding-left: 16px; padding-right: 16px; padding-bottom: 100px; }
  
  .section-header { margin-bottom: 24px; animation: fadeUp 0.6s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
  .section-title { font-family: var(--font-head); font-size: 1.8rem; font-weight: 800; letter-spacing: -0.02em; }

  /* FILTER BAR */
  .filters { display: flex; gap: 10px; margin-bottom: 32px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
  .filters::-webkit-scrollbar { display: none; }
  .filter-chip {
    padding: 8px 18px; border-radius: 999px; background: var(--surface-2); border: 1px solid var(--border);
    font-size: 0.85rem; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 4px 15px rgba(var(--accent-rgb), 0.3); }

  /* SEARCH */
  .search-wrap { margin-bottom: 24px; position: relative; }
  .search-input {
    width: 100%; padding: 14px 48px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-family: var(--font-body); font-size: 1rem;
    transition: all 0.2s; outline: none;
  }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(var(--accent-rgb), 0.1); }
  .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

  /* GRID */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
  
  /* CARD */
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; cursor: pointer; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    animation: fadeUp 0.6s ease both;
  }
  .card:hover { transform: translateY(-6px); border-color: rgba(var(--accent-rgb), 0.4); box-shadow: var(--shadow); }
  .card-img { width: 100%; height: 160px; object-fit: cover; }
  .card-body { padding: 18px; }
  .card-cat { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); margin-bottom: 6px; }
  .card-title { font-family: var(--font-head); font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 14px; margin-top: 14px; }
  .card-stat { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); }
  
  /* FAB */
  .fab {
    position: fixed; bottom: 32px; right: 32px; width: 56px; height: 56px; border-radius: 50%;
    background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 10px 30px rgba(var(--accent-rgb), 0.4); border: none; cursor: pointer;
    transition: all 0.3s; z-index: 90; display: none;
  }
  .fab:hover { transform: scale(1.1) rotate(90deg); filter: brightness(1.1); }

  /* MODAL */
  .modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
    display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal-content {
    background: var(--surface); border: 1px solid var(--border); border-radius: 24px;
    width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; padding: 32px;
    position: relative; animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes slideIn { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* FORM ELEMENTS */
  .field { margin-bottom: 20px; }
  .field label { display: block; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 8px; }
  .input {
    width: 100%; padding: 12px 16px; background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text); font-family: var(--font-body); outline: none; transition: border-color 0.2s;
  }
  .input:focus { border-color: var(--accent); }
  .btn {
    width: 100%; padding: 14px; border-radius: var(--radius-sm); font-weight: 700; border: none; cursor: pointer;
    transition: all 0.2s; font-family: var(--font-body);
  }
  .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 4px 15px rgba(var(--accent-rgb), 0.3); }
  .btn-primary:hover { filter: brightness(1.1); transform: translateY(-2px); }

  /* LOADERS */
  .loader-wrap { display: flex; flex-direction: column; align-items: center; padding: 100px 0; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TOAST */
  #toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: var(--surface-2); padding: 12px 24px; border-radius: 999px;
    border: 1px solid var(--border); font-weight: 600; font-size: 0.9rem;
    box-shadow: var(--shadow); z-index: 2000; display: none; animation: popUp 0.3s ease;
  }
  @keyframes popUp { from { transform: translate(-50%, 20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }

</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="logo">Block<span>Vault</span></a>
  <div class="top-actions">
    <button class="icon-btn" onclick="location.href='ajustes.html'"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1-1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"></path></svg></button>
  </div>
</div>

<div class="page-content">
  <div class="section-header">
    <h1 class="section-title">Explorar Addons</h1>
  </div>

  <div class="search-wrap">
    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    <input type="text" class="search-input" id="search-input" placeholder="Buscar por nombre o categoría..." oninput="handleSearch(this.value)">
  </div>

  <div class="filters" id="cat-filters">
    <div class="filter-chip active" onclick="setCat('')">Todos</div>
    <div class="filter-chip" onclick="setCat('Addons')">Add-Ons</div>
    <div class="filter-chip" onclick="setCat('Mapas')">Mapas</div>
    <div class="filter-chip" onclick="setCat('Texturas')">Texturas</div>
    <div class="filter-chip" onclick="setCat('Marketplace')">Marketplace</div>
  </div>

  <div id="grid-wrap">
    <div class="loader-wrap"><div class="spinner"></div></div>
  </div>
</div>

<!-- FAB: SOLO ADMIN -->
<button class="fab" id="admin-fab" onclick="showAddModal()">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
</button>

<!-- MODAL ADD/EDIT -->
<div class="modal" id="modal-editor">
  <div class="modal-content">
    <h2 id="modal-title" style="margin-bottom:24px; font-family:var(--font-head);">Nuevo Addon</h2>
    <div class="field"><label>Nombre</label><input class="input" id="f-nombre" type="text" placeholder="Ej: Super Swords"></div>
    <div class="field">
      <label>Categoría</label>
      <select class="input" id="f-cat">
        <option value="Addons">Addons</option>
        <option value="Mapas">Mapas</option>
        <option value="Texturas">Texturas</option>
        <option value="Marketplace">Marketplace</option>
      </select>
    </div>
    <div class="field"><label>Descripción</label><textarea class="input" id="f-desc" rows="3" placeholder="Descripción detallada..."></textarea></div>
    <div class="field"><label>Imagen URL</label><input class="input" id="f-img" type="text" placeholder="https://..."></div>
    <div class="field"><label>Descarga (Cuty.io u otro)</label><input class="input" id="f-url" type="text" placeholder="https://..."></div>
    <div style="display:flex; gap:10px;">
      <button class="btn btn-primary" onclick="submitAddon()" id="btn-save">Publicar</button>
      <button class="btn" style="background:var(--surface-2);" onclick="closeModals()">Cancelar</button>
    </div>
  </div>
</div>

<!-- MODAL DETAIL -->
<div class="modal" id="modal-detail">
  <div class="modal-content" style="max-width:650px;">
    <button onclick="closeModals()" style="position:absolute; top:20px; right:20px; background:none; border:none; color:var(--text-muted); cursor:pointer;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
    <img id="d-img" style="width:100%; height:280px; object-fit:cover; border-radius:16px; margin-bottom:24px;">
    <div id="d-cat" class="card-cat">CATEGORIA</div>
    <h2 id="d-title" style="font-family:var(--font-head); font-size:2rem; margin-bottom:12px;">Título</h2>
    <p id="d-desc" style="color:var(--text-muted); line-height:1.6; margin-bottom:32px;">Descripción...</p>
    
    <div style="display:flex; align-items:center; gap:16px;">
      <a id="d-dl" href="#" target="_blank" class="btn btn-primary" style="flex:1; text-align:center; text-decoration:none;">Descargar</a>
      <div id="admin-actions" style="display:none; gap:10px;">
        <button class="btn" style="background:#ef4444; color:#fff;" onclick="deleteAddon()">Eliminar</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
(function() {
  const API = 'https://script.google.com/macros/s/AKfycby_q9XZ8vYBsnr0G5PZGapHZh1iZ-GFBJqychgMnZ-hs3Napp1fWE_RfisJ91B2ZBwQ/exec';
  let allAddons = [];
  let filterCat = '';
  let query = '';
  let isAdmin = localStorage.getItem('bv_admin') === 'true';
  let selectedId = null;

  /* ── ANTI-INSPECT ── */
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('keydown', e => {
    if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || (e.ctrlKey && e.key === 'U')) e.preventDefault();
  });

  const theme = localStorage.getItem('bv_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', theme);

  if (isAdmin) document.getElementById('admin-fab').style.display = 'flex';

  function fetchAddons() {
    fetch(API, { method: 'POST', body: JSON.stringify({ action: 'obtenerAddons' }) })
      .then(r => r.json())
      .then(res => {
        if (res.ok) {
          allAddons = res.addons;
          renderGrid();
        }
      });
  }

  window.setCat = function(c) {
    filterCat = c;
    document.querySelectorAll('.filter-chip').forEach(ch => {
      ch.classList.toggle('active', ch.textContent === (c === '' ? 'Todos' : (c === 'Mapas' ? 'Mapas' : c)));
    });
    renderGrid();
  };

  window.handleSearch = function(v) {
    query = v.toLowerCase();
    renderGrid();
  };

  function renderGrid() {
    const list = allAddons.filter(a => {
      const matchCat = filterCat === '' || a.categoria === filterCat;
      const matchSearch = a.nombre.toLowerCase().includes(query) || a.categoria.toLowerCase().includes(query);
      return matchCat && matchSearch;
    });

    const wrap = document.getElementById('grid-wrap');
    if (list.length === 0) {
      wrap.innerHTML = '<div style="text-align:center; padding:60px 0; color:var(--text-muted);">No se encontraron addons.</div>';
      return;
    }

    wrap.innerHTML = '<div class="grid">' + list.map(a => `
      <div class="card" onclick="openDetail('${a.uuid}')">
        ${a.imagen ? `<img class="card-img" src="${a.imagen}" loading="lazy">` : `<div class="card-img" style="background:var(--surface-2); display:flex; align-items:center; justify-content:center; color:var(--border);"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg></div>`}
        <div class="card-body">
          <div class="card-cat">${a.categoria}</div>
          <h3 class="card-title">${a.nombre}</h3>
          <div class="card-footer">
            <div class="card-stat"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg> ${a.vistas || 0}</div>
            <div class="card-stat">
              <span style="color:var(--accent);">⭐</span> ${a.rating.toFixed(1)}
            </div>
          </div>
        </div>
      </div>
    `).join('') + '</div>';
  }

  window.openDetail = function(id) {
    selectedId = id;
    const a = allAddons.find(x => x.uuid === id);
    if (!a) return;

    document.getElementById('d-img').src = a.imagen || '';
    document.getElementById('d-title').textContent = a.nombre;
    document.getElementById('d-cat').textContent = a.categoria;
    document.getElementById('d-desc').textContent = a.descripcion;
    document.getElementById('d-dl').href = a.urlDescarga || '#';
    
    if (isAdmin) document.getElementById('admin-actions').style.display = 'flex';
    document.getElementById('modal-detail').style.display = 'flex';

    // Registrar vista
    fetch(API, { method: 'POST', body: JSON.stringify({ action: 'registrarVista', uuidAddon: id }) });
  };

  window.showAddModal = function() {
    selectedId = null;
    document.getElementById('modal-title').textContent = 'Nuevo Addon';
    document.getElementById('f-nombre').value = '';
    document.getElementById('f-desc').value = '';
    document.getElementById('f-img').value = '';
    document.getElementById('f-url').value = '';
    document.getElementById('modal-editor').style.display = 'flex';
  };

  window.closeModals = function() {
    document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
  };

  window.submitAddon = function() {
    const data = {
      nombre: document.getElementById('f-nombre').value,
      categoria: document.getElementById('f-cat').value,
      descripcion: document.getElementById('f-desc').value,
      imagen: document.getElementById('f-img').value,
      urlDescarga: document.getElementById('f-url').value
    };

    if (!data.nombre) return showToast('El nombre es requerido');
    
    document.getElementById('btn-save').textContent = 'Publicando...';
    document.getElementById('btn-save').disabled = true;

    fetch(API, { method: 'POST', body: JSON.stringify({ action: 'crearAddon', datos: data }) })
      .then(r => r.json())
      .then(res => {
        document.getElementById('btn-save').textContent = 'Publicar';
        document.getElementById('btn-save').disabled = false;
        if (res.ok) {
          showToast('¡Addon publicado!');
          closeModals();
          fetchAddons();
        }
      });
  };

  window.deleteAddon = function() {
    if (!confirm('¿Seguro que quieres eliminar este addon?')) return;
    fetch(API, { method: 'POST', body: JSON.stringify({ action: 'eliminarAddon', uuid: selectedId, uuidSolicitante: 'admin' }) })
      .then(r => r.json())
      .then(res => {
        if (res.ok) {
          showToast('Eliminado');
          closeModals();
          fetchAddons();
        }
      });
  };

  function showToast(m) {
    const t = document.getElementById('toast');
    t.textContent = m; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2500);
  }

  fetchAddons();
})();
</script>
</body>
</html>
