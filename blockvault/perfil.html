<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlockVault — Perfil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  * { -webkit-user-select: none; -moz-user-select: none; user-select: none; -webkit-user-drag: none; }
  input, textarea { -webkit-user-select: text; -moz-user-select: text; user-select: text; }
  img { pointer-events: none; -webkit-user-drag: none; }
  :root {
    --bg:#F4F4F6; --surface:#FFFFFF; --surface-2:#EBEBEF;
    --border:rgba(0,0,0,0.08); --text:#13131A; --text-muted:#6B6F80;
    --accent:#6C63FF; --accent-rgb:108,99,255;
    --radius:14px; --radius-sm:8px;
    --shadow:0 2px 16px rgba(0,0,0,0.06); --shadow-lg:0 8px 40px rgba(0,0,0,0.12);
    --font-head:'Syne',sans-serif; --font-body:'Manrope',sans-serif;
    --topbar-h:64px; --sidebar-w:260px;
    --rol-usuario:#6B6F80; --rol-admin:#3B82F6; --rol-owner:#F59E0B;
  }
  [data-theme="dark"] { --bg:#0C0C10; --surface:#14141C; --surface-2:#1E1E2A; --border:rgba(255,255,255,0.07); --text:#EAEAF2; --text-muted:#8888A0; --shadow:0 2px 16px rgba(0,0,0,0.4); --shadow-lg:0 8px 40px rgba(0,0,0,0.6); }
  html,body { height:100%; background:var(--bg); color:var(--text); font-family:var(--font-body); -webkit-font-smoothing:antialiased; transition:background .3s,color .3s; overflow-x:hidden; }

  .topbar { position:fixed; top:0; left:0; right:0; z-index:100; height:var(--topbar-h); background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; gap:12px; box-shadow:var(--shadow); }
  .topbar-btn { background:none; border:none; cursor:pointer; width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--text-muted); transition:background .2s,color .2s; flex-shrink:0; }
  .topbar-btn:hover { background:var(--surface-2); color:var(--text); }
  .topbar-logo { flex:1; text-align:center; font-family:var(--font-head); font-size:1.25rem; font-weight:800; letter-spacing:-.02em; background:linear-gradient(135deg,var(--accent),#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .avatar { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,var(--accent),#a78bfa); display:flex; align-items:center; justify-content:center; font-family:var(--font-head); font-size:.85rem; font-weight:700; color:#fff; cursor:pointer; overflow:hidden; border:2px solid rgba(var(--accent-rgb),.35); flex-shrink:0; transition:transform .2s; }
  .avatar:hover { transform:scale(1.06); }
  .avatar img { width:100%; height:100%; object-fit:cover; pointer-events:none; }
  .sidebar-overlay { position:fixed; inset:0; z-index:89; background:rgba(0,0,0,.45); backdrop-filter:blur(3px); opacity:0; pointer-events:none; transition:opacity .3s; }
  .sidebar-overlay.show { opacity:1; pointer-events:all; }
  .sidebar { position:fixed; top:var(--topbar-h); left:0; bottom:0; width:var(--sidebar-w); z-index:90; background:var(--surface); border-right:1px solid var(--border); transform:translateX(-100%); transition:transform .3s cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column; padding:16px 12px; overflow-y:auto; }
  .sidebar.open { transform:translateX(0); }
  .nav-item { display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:var(--radius-sm); cursor:pointer; transition:background .2s,color .2s; color:var(--text-muted); font-weight:500; font-size:.92rem; }
  .nav-item:hover,.nav-item.active { background:rgba(var(--accent-rgb),.1); color:var(--accent); }
  .nav-item.danger:hover { background:rgba(239,68,68,.1); color:#ef4444; }
  .sidebar-spacer { flex:1; }
  .sidebar-section { font-size:.68rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--text-muted); padding:8px 16px 4px; margin-top:8px; }
  .page-content { padding-top:var(--topbar-h); min-height:100vh; }
  .container { max-width:680px; margin:0 auto; padding:20px 16px 80px; }

  /* PERFIL CARD */
  /* overflow:visible para que el avatar pueda sobresalir sobre el banner */
  .profile-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:visible; box-shadow:var(--shadow); margin-bottom:20px; animation:fadeUp .4s ease both; }
  /* El banner SÍ necesita overflow:hidden para recortar la imagen de portada */
  .profile-card > .profile-banner:first-child { border-radius:var(--radius) var(--radius) 0 0; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

  /* BANNER / PORTADA */
  .profile-banner {
    height:150px;
    background:linear-gradient(135deg,rgba(var(--accent-rgb),.5),rgba(var(--accent-rgb),.15));
    background-size:cover; background-position:center; background-repeat:no-repeat;
    position:relative; overflow:hidden;
  }
  .profile-banner-img { width:100%; height:100%; object-fit:cover; display:block; pointer-events:none; }
  .profile-banner-overlay { position:absolute; inset:0; background:rgba(0,0,0,0); transition:background .2s; }
  .profile-banner.editable:hover .profile-banner-overlay { background:rgba(0,0,0,.3); }
  .profile-banner-edit-btn {
    position:absolute; bottom:10px; right:10px; background:rgba(0,0,0,.55);
    border:none; border-radius:var(--radius-sm); color:#fff; cursor:pointer;
    font-family:var(--font-body); font-size:.75rem; font-weight:600;
    padding:6px 12px; display:none; align-items:center; gap:6px;
    transition:background .2s;
  }
  .profile-banner.editable:hover .profile-banner-edit-btn { display:flex; }
  .profile-banner-edit-btn:hover { background:rgba(0,0,0,.75); }

  .profile-info { padding:0 20px 20px; }
  .profile-info-row { display:flex; align-items:flex-end; gap:14px; margin-top:-44px; margin-bottom:12px; position:relative; z-index:5; }
  .profile-av-lg { width:82px; height:82px; border-radius:50%; background:linear-gradient(135deg,var(--accent),#a78bfa); display:flex; align-items:center; justify-content:center; font-family:var(--font-head); font-size:2rem; font-weight:800; color:#fff; overflow:hidden; flex-shrink:0; border:3px solid var(--surface); box-shadow:var(--shadow-lg); position:relative; z-index:5; }
  .profile-av-lg img { width:100%; height:100%; object-fit:cover; pointer-events:none; }
  .profile-actions { display:flex; gap:8px; margin-left:auto; padding-bottom:6px; flex-wrap:wrap; }
  .profile-name-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:2px; }
  .profile-name { font-family:var(--font-head); font-size:1.25rem; font-weight:800; }
  .profile-desc { font-size:.87rem; color:var(--text-muted); line-height:1.6; margin-top:4px; }
  .profile-no-desc { font-size:.82rem; color:var(--text-muted); font-style:italic; }

  /* ROL BADGE */
  .rol-badge { display:inline-flex; align-items:center; font-size:.62rem; font-weight:700; letter-spacing:.05em; text-transform:uppercase; padding:2px 6px; border-radius:999px; border:1px solid currentColor; line-height:1.4; flex-shrink:0; }
  .rol-badge.usuario { color:var(--rol-usuario); border-color:var(--rol-usuario); background:rgba(107,111,128,.08); }
  .rol-badge.admin    { color:var(--rol-admin);   border-color:var(--rol-admin);   background:rgba(59,130,246,.1); }
  .rol-badge.owner    { color:var(--rol-owner);   border-color:var(--rol-owner);   background:rgba(245,158,11,.1); }

  .section-label { font-family:var(--font-head); font-size:.9rem; font-weight:700; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
  .section-label::after { content:''; flex:1; height:1px; background:var(--border); }

  /* POST CARD */
  .post-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); transition:box-shadow .2s; margin-bottom:12px; animation:fadeUp .35s ease both; }
  .post-card:hover { box-shadow:var(--shadow-lg); }
  .post-header { display:flex; align-items:center; padding:14px 16px 8px; position:relative; }
  .post-date { font-size:.73rem; color:var(--text-muted); }
  .post-body { padding:2px 16px 12px; }
  .post-title { font-family:var(--font-head); font-weight:700; font-size:.97rem; margin-bottom:4px; }
  .post-desc { font-size:.87rem; color:var(--text-muted); line-height:1.55; word-break:break-word; }
  .ver-mas-btn, .ver-menos-btn { background:none; border:none; cursor:pointer; color:var(--accent); font-size:.82rem; font-weight:700; padding:0; font-family:var(--font-body); }
  .ver-mas-btn:hover, .ver-menos-btn:hover { text-decoration:underline; }
  .desc-full { display:none; }
  .desc-full.visible { display:inline; }
  .desc-truncated.hidden { display:none; }
  .post-img { width:100%; max-height:360px; object-fit:cover; display:block; }

  /* MENÚ 3 PUNTOS */
  .post-menu-wrap { position:absolute; top:10px; right:10px; }
  .post-menu-btn { background:none; border:none; cursor:pointer; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--text-muted); transition:background .2s,color .2s; }
  .post-menu-btn:hover { background:var(--surface-2); color:var(--text); }
  .post-dropdown { position:absolute; top:34px; right:0; z-index:50; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); box-shadow:var(--shadow-lg); min-width:150px; overflow:hidden; animation:fadeDown .15s ease; }
  @keyframes fadeDown { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
  .post-dropdown-item { display:flex; align-items:center; gap:10px; padding:11px 16px; cursor:pointer; font-size:.87rem; font-weight:500; color:var(--text); transition:background .15s; }
  .post-dropdown-item:hover { background:var(--surface-2); }
  .post-dropdown-item.danger { color:#ef4444; }
  .post-dropdown-item.danger:hover { background:rgba(239,68,68,.08); }

  /* COMENTARIOS */
  .post-footer { border-top:1px solid var(--border); padding:8px 16px; display:flex; }
  .comments-toggle { background:none; border:none; cursor:pointer; color:var(--text-muted); font-size:.82rem; font-weight:600; font-family:var(--font-body); display:flex; align-items:center; gap:6px; padding:5px 8px; border-radius:var(--radius-sm); transition:background .2s,color .2s; }
  .comments-toggle:hover { background:var(--surface-2); color:var(--text); }
  .comments-toggle.active { color:var(--accent); }
  .comments-panel { border-top:1px solid var(--border); background:var(--surface-2); display:none; }
  .comments-panel.open { display:block; }
  .comments-list { padding:12px 14px 0; max-height:280px; overflow-y:auto; }
  .comments-list::-webkit-scrollbar{width:3px} .comments-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
  .comment-item { display:flex; gap:9px; margin-bottom:10px; align-items:flex-start; }
  .comment-av { width:28px; height:28px; border-radius:50%; background:linear-gradient(135deg,var(--accent),#a78bfa); display:flex; align-items:center; justify-content:center; font-size:.68rem; font-weight:700; color:#fff; flex-shrink:0; overflow:hidden; }
  .comment-av img { width:100%; height:100%; object-fit:cover; }
  .comment-body { flex:1; min-width:0; }
  .comment-bubble { background:var(--surface); border-radius:0 var(--radius-sm) var(--radius-sm) var(--radius-sm); padding:7px 10px; display:inline-block; max-width:100%; }
  .comment-author-row { display:flex; align-items:center; gap:5px; flex-wrap:wrap; margin-bottom:2px; }
  .comment-author { font-size:.77rem; font-weight:700; }
  .comment-text { font-size:.83rem; color:var(--text); line-height:1.5; word-break:break-word; }
  .comment-meta { display:flex; align-items:center; gap:8px; margin-top:3px; }
  .comment-time { font-size:.68rem; color:var(--text-muted); }
  .comment-del { background:none; border:none; cursor:pointer; color:var(--text-muted); padding:0; display:flex; align-items:center; transition:color .2s; }
  .comment-del:hover { color:#ef4444; }
  .comments-empty { text-align:center; padding:16px; color:var(--text-muted); font-size:.83rem; }
  .comments-loading { text-align:center; padding:12px; color:var(--text-muted); font-size:.82rem; }
  .comment-input-wrap { padding:10px 14px 12px; display:flex; gap:8px; align-items:center; border-top:1px solid var(--border); }
  .comment-input { flex:1; padding:8px 14px; background:var(--surface); border:1.5px solid var(--border); border-radius:20px; color:var(--text); font-family:var(--font-body); font-size:.85rem; outline:none; transition:border-color .2s; }
  .comment-input:focus { border-color:var(--accent); }
  .comment-send { background:var(--accent); border:none; cursor:pointer; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; flex-shrink:0; transition:filter .2s,transform .2s; }
  .comment-send:hover { filter:brightness(1.1); transform:scale(1.08); }
  .comment-send:disabled { opacity:.5; cursor:not-allowed; transform:none; }

  /* BOTONES */
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:7px; padding:9px 18px; border-radius:var(--radius-sm); font-family:var(--font-body); font-weight:600; font-size:.87rem; cursor:pointer; transition:all .2s; border:1.5px solid transparent; }
  .btn-primary { background:var(--accent); color:#fff; border-color:var(--accent); }
  .btn-primary:hover { filter:brightness(1.1); transform:translateY(-1px); }
  .btn-secondary { background:transparent; color:var(--text); border-color:var(--border); }
  .btn-secondary:hover { background:var(--surface-2); }
  .btn-danger { background:#ef4444; color:#fff; border-color:#ef4444; }
  .btn-danger:hover { filter:brightness(1.1); }
  .btn:disabled { opacity:.5; cursor:not-allowed; transform:none; filter:none; }
  .btn-full { width:100%; }

  /* MODALES */
  .modal-bg { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,.55); backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:opacity .25s; }
  .modal-bg.show { opacity:1; pointer-events:all; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:28px; width:100%; max-width:480px; box-shadow:var(--shadow-lg); transform:translateY(20px); transition:transform .25s; max-height:90vh; overflow-y:auto; }
  .modal-bg.show .modal { transform:translateY(0); }
  .modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .modal-title { font-family:var(--font-head); font-size:1.1rem; font-weight:700; }
  .modal-close { background:var(--surface-2); border:none; cursor:pointer; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--text-muted); transition:background .2s; }
  .modal-close:hover { background:var(--border); }
  .field { margin-bottom:14px; }
  .field label { display:block; margin-bottom:5px; font-size:.73rem; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--text-muted); }
  .input { width:100%; padding:11px 14px; background:var(--surface-2); border:1.5px solid var(--border); border-radius:var(--radius-sm); color:var(--text); font-family:var(--font-body); font-size:.93rem; transition:border-color .2s,box-shadow .2s; outline:none; }
  .input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(var(--accent-rgb),.15); background:var(--surface); }
  textarea.input { resize:vertical; min-height:80px; }

  /* BANNER PICKER en modal */
  .banner-picker { width:100%; height:100px; border:2px dashed var(--border); border-radius:var(--radius-sm); cursor:pointer; overflow:hidden; position:relative; display:flex; align-items:center; justify-content:center; transition:border-color .2s,background .2s; background:var(--surface-2); }
  .banner-picker:hover { border-color:var(--accent); background:rgba(var(--accent-rgb),.03); }
  .banner-picker input { display:none; }
  .banner-picker-preview { width:100%; height:100%; object-fit:cover; display:none; }
  .banner-picker-hint { font-size:.82rem; color:var(--text-muted); display:flex; align-items:center; gap:6px; }

  .img-picker { border:2px dashed var(--border); border-radius:var(--radius-sm); padding:14px; cursor:pointer; transition:border-color .2s,background .2s; }
  .img-picker:hover { border-color:var(--accent); background:rgba(var(--accent-rgb),.03); }
  .img-picker input { display:none; }
  .img-picker-row { display:flex; align-items:center; gap:12px; }
  .img-picker-thumb { width:52px; height:52px; border-radius:50%; flex-shrink:0; background:var(--surface-2); border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .img-picker-thumb img { width:100%; height:100%; object-fit:cover; }
  .img-picker-label { font-size:.85rem; font-weight:600; color:var(--accent); }
  .img-picker-sub { font-size:.73rem; color:var(--text-muted); }
  .img-picker-hint { font-size:.82rem; color:var(--text-muted); }
  .img-preview { width:100%; max-height:160px; object-fit:contain; border-radius:var(--radius-sm); display:none; margin-bottom:8px; }

  .err-msg { background:rgba(239,68,68,.08); border:1px solid rgba(239,68,68,.2); color:#ef4444; font-size:.82rem; font-weight:500; padding:10px 14px; border-radius:var(--radius-sm); margin-top:10px; display:none; }
  .confirm-text { font-size:.92rem; color:var(--text-muted); margin-bottom:20px; line-height:1.6; }
  .confirm-btns { display:flex; gap:10px; }
  #toast-container { position:fixed; bottom:20px; right:20px; z-index:999; display:flex; flex-direction:column; gap:10px; align-items:flex-end; }
  .toast { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px 18px; box-shadow:var(--shadow-lg); font-size:.87rem; font-weight:500; animation:toastIn .3s ease,toastOut .4s 2.6s forwards; max-width:300px; }
  .toast.success{border-left:3px solid #22c55e} .toast.error{border-left:3px solid #ef4444}
  @keyframes toastIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
  @keyframes toastOut{from{opacity:1}to{opacity:0;pointer-events:none}}
  .spinner-wrap { text-align:center; padding:40px; }
  .spinner { width:28px; height:28px; border-radius:50%; border:3px solid var(--border); border-top-color:var(--accent); animation:spin .7s linear infinite; display:inline-block; }
  .spinner-sm { width:14px; height:14px; border-width:2px; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .empty-state { text-align:center; padding:40px 20px; color:var(--text-muted); font-size:.9rem; }
  ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
</style>
</head>

  </a>

    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Sugerencias
  </a>
  <a class="nav-item" onclick="location.href='ajustes.html'"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Ajustes</a>
  <a class="nav-item danger" onclick="logout()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Cerrar sesión</a>
</nav>

    <!-- PORTADA -->

<div id="toast-container"></div>

<script>
(function () {
  var API = 'https://script.google.com/macros/s/AKfycby_q9XZ8vYBsnr0G5PZGapHZh1iZ-GFBJqychgMnZ-hs3Napp1fWE_RfisJ91B2ZBwQ/exec';
  var session=null; try{session=JSON.parse(localStorage.getItem('bv_session')||'null');}catch(e){}
  if(!session){location.href='index.html';return;}

  var miRol        = session.rol||'usuario';
  var puedeModerar = (miRol==='admin'||miRol==='owner');

  function api(p){return fetch(API,{method:'POST',body:JSON.stringify(p)}).then(function(r){return r.json();});}

  /* ── PING LOOP ── */
  api({action:'ping', uuid:session.uuid});
  setInterval(function(){ api({action:'ping', uuid:session.uuid}); }, 30000);

  function applyAccent(hex){try{var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);document.documentElement.style.setProperty('--accent',hex);document.documentElement.style.setProperty('--accent-rgb',r+','+g+','+b);}catch(e){}}
  document.documentElement.setAttribute('data-theme',localStorage.getItem('bv_theme')||'light');
  applyAccent(localStorage.getItem('bv_accent')||'#6C63FF');

  var av=document.getElementById('top-avatar');
  if(session.fotoPerfil)av.innerHTML='<img src="'+session.fotoPerfil+'" alt="">';
  else document.getElementById('top-av-letter').textContent=(session.nombre||'?')[0].toUpperCase();

  var viewUUID = localStorage.getItem('bv_view_profile') || session.uuid;
  var isOwn    = (viewUUID === session.uuid);
  var profileData=null, editFoto='', editBanner='', editBannerQuitar=false;
  var postsCache={}, epubUuid='', epubImg='', epubQuitarFlag=false, elimUuid='';

  window.miPerfil      = function(){localStorage.removeItem('bv_view_profile');location.href='perfil.html';};
  window.logout        = function(){localStorage.removeItem('bv_session');location.href='index.html';};
  window.toggleSidebar = function(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');};
  window.closeSidebar  = function(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show');};

  function api(p){return fetch(API,{method:'POST',body:JSON.stringify(p)}).then(function(r){return r.json();});}
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function fmtDate(d){try{var dt=new Date(d),diff=(new Date()-dt)/1000;if(diff<60)return 'ahora mismo';if(diff<3600)return Math.floor(diff/60)+' min';if(diff<86400)return Math.floor(diff/3600)+'h';return dt.toLocaleDateString('es',{day:'numeric',month:'short',year:'numeric'});}catch(_){return '';}}
  function toast(msg,type){var t=document.createElement('div');t.className='toast '+(type||'info');t.textContent=msg;document.getElementById('toast-container').appendChild(t);setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t);},3100);}
  function rolBadge(rol){var lbl=rol==='owner'?'👑 owner':rol==='admin'?'🛡 admin':'usuario';return '<span class="rol-badge '+rol+'">'+lbl+'</span>';}

  document.addEventListener('click',function(e){if(!e.target.closest('.post-menu-wrap'))document.querySelectorAll('.post-dropdown').forEach(function(d){d.remove();});});

  // ── "Ver más" ─────────────────────────────────────────────
  function buildDesc(texto){
    if(!texto)return '';
    var words=texto.trim().split(/\s+/);
    if(words.length<=100)return '<p class="post-desc">'+esc(texto)+'</p>';
    var short=words.slice(0,100).join(' ');
    return '<p class="post-desc"><span class="desc-truncated">'+esc(short)+'... <button class="ver-mas-btn" onclick="verMas(this)">ver más</button></span>'
      +'<span class="desc-full">'+esc(texto)+' <button class="ver-menos-btn" onclick="verMenos(this)">ver menos</button></span></p>';
  }
  window.verMas=function(btn){var p=btn.closest('.post-desc');p.querySelector('.desc-truncated').classList.add('hidden');p.querySelector('.desc-full').classList.add('visible');};
  window.verMenos=function(btn){var p=btn.closest('.post-desc');p.querySelector('.desc-truncated').classList.remove('hidden');p.querySelector('.desc-full').classList.remove('visible');};

  // ── PERFIL ────────────────────────────────────────────────
  function loadProfile(){
    api({action:'obtenerPerfil',uuid:viewUUID}).then(function(res){
      if(!res||!res.ok){document.getElementById('profile-card').innerHTML='<div style="padding:30px;text-align:center;color:var(--text-muted)">Perfil no encontrado</div>';return;}
      profileData=res; renderProfile(res); loadPosts();
    }).catch(function(){document.getElementById('profile-card').innerHTML='<div style="padding:30px;text-align:center;color:var(--text-muted)">Error al cargar</div>';});
  }

  function renderProfile(p){
    // Banner
    var bannerStyle = p.fotoBanner
      ? 'style="background-image:url(\''+p.fotoBanner+'\');background-size:cover;background-position:center;"'
      : '';
    var editableClass = isOwn ? ' editable' : '';
    var bannerEditBtn = isOwn
      ? '<div class="profile-banner-overlay"></div>'
        + '<button class="profile-banner-edit-btn" onclick="openEditPerfil()">'
        + '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>'
        + 'Cambiar portada</button>'
      : '';

    // Avatar
    var avH = p.fotoPerfil ? '<img src="'+p.fotoPerfil+'" alt="">' : (p.nombre||'?')[0].toUpperCase();
    var editBtn = isOwn
      ? '<button class="btn btn-secondary" onclick="openEditPerfil()">'
        +'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Editar</button>'
      : '';

    document.getElementById('profile-card').innerHTML =
      '<div class="profile-banner'+editableClass+'" '+bannerStyle+'>'+bannerEditBtn+'</div>'
      +'<div class="profile-info">'
      +'<div class="profile-info-row"><div class="profile-av-lg">'+avH+'</div><div class="profile-actions">'+editBtn+'</div></div>'
      +'<div class="profile-name-row"><span class="profile-name">'+esc(p.nombre)+'</span>'+rolBadge(p.rol||'usuario')+'</div>'
      +(p.descripcion?'<div class="profile-desc">'+esc(p.descripcion)+'</div>':(isOwn?'<div class="profile-no-desc">Sin descripción aún. ¡Edita tu perfil!</div>':''))
      +'</div>';
  }

  // ── POSTS ─────────────────────────────────────────────────
  var commentsLoaded = {};
  function loadPosts(){
    document.getElementById('posts-label').style.display='';
    document.getElementById('posts-container').innerHTML='<div class="spinner-wrap"><div class="spinner"></div></div>';
    api({action:'obtenerPublicacionesUsuario',uuid:viewUUID}).then(function(res){
      var c=document.getElementById('posts-container');
      if(!res||!res.ok||!res.publicaciones||!res.publicaciones.length){c.innerHTML='<div class="empty-state">Sin publicaciones aún</div>';return;}
      postsCache={};
      res.publicaciones.forEach(function(p){postsCache[p.uuidPub]=p;});
      c.innerHTML=res.publicaciones.map(buildPostCard).join('');
    }).catch(function(){document.getElementById('posts-container').innerHTML='<div class="empty-state">Error</div>';});
  }

  function buildPostCard(p){
    var esMio=(p.uuidUsuario===session.uuid);
    var puedoMenu=esMio||puedeModerar;
    var menuWrap=puedoMenu?'<div class="post-menu-wrap"><button class="post-menu-btn" onclick="toggleMenu(event,\''+p.uuidPub+'\')"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg></button></div>':'';
    var imgH=p.imagen?'<img class="post-img" src="'+p.imagen+'" alt="">':'';
    var numC=p.numComentarios||0;
    var labelC=numC===1?'1 comentario':numC+' comentarios';

    return '<div class="post-card">'
      +'<div class="post-header"><div class="post-date">'+fmtDate(p.fecha)+'</div>'+menuWrap+'</div>'
      +'<div class="post-body"><div class="post-title">'+esc(p.titulo)+'</div>'+buildDesc(p.descripcion)+'</div>'
      +imgH
      +'<div class="post-footer"><button class="comments-toggle" id="ctoggle-'+p.uuidPub+'" onclick="toggleComments(\''+p.uuidPub+'\')">'
      +'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>'
      +'<span id="clabel-'+p.uuidPub+'">'+labelC+'</span></button></div>'
      +'<div class="comments-panel" id="cpanel-'+p.uuidPub+'">'
      +'<div class="comments-list" id="clist-'+p.uuidPub+'"><div class="comments-loading"><div class="spinner spinner-sm" style="display:inline-block"></div></div></div>'
      +'<div class="comment-input-wrap">'
      +'<input class="comment-input" id="cinput-'+p.uuidPub+'" placeholder="Escribe un comentario..." maxlength="500" onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();sendComment(\''+p.uuidPub+'\');}">'
      +'<button class="comment-send" id="csend-'+p.uuidPub+'" onclick="sendComment(\''+p.uuidPub+'\')">'
      +'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>'
      +'</button></div></div>'
      +'</div>';
  }

  // ── MENÚ ─────────────────────────────────────────────────
  window.toggleMenu=function(e,uuidPub){
    e.stopPropagation();
    var existing=document.querySelector('.post-dropdown[data-pub="'+uuidPub+'"]');
    document.querySelectorAll('.post-dropdown').forEach(function(d){d.remove();});
    if(existing)return;
    var p=postsCache[uuidPub]; var esMio=p&&p.uuidUsuario===session.uuid;
    var dd=document.createElement('div'); dd.className='post-dropdown'; dd.dataset.pub=uuidPub;
    if(esMio||puedeModerar){var ei=document.createElement('div');ei.className='post-dropdown-item';ei.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Editar';ei.onclick=function(){document.querySelectorAll('.post-dropdown').forEach(function(d){d.remove();});openEditPub(uuidPub);};dd.appendChild(ei);}
    if(esMio||puedeModerar){var di=document.createElement('div');di.className='post-dropdown-item danger';di.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>Eliminar';di.onclick=function(){document.querySelectorAll('.post-dropdown').forEach(function(d){d.remove();});openConfirmar(uuidPub);};dd.appendChild(di);}
    e.currentTarget.closest('.post-menu-wrap').appendChild(dd);
  };

  // ── COMENTARIOS ───────────────────────────────────────────
  window.toggleComments=function(uuidPub){
    var panel=document.getElementById('cpanel-'+uuidPub);
    var toggle=document.getElementById('ctoggle-'+uuidPub);
    var isOpen=panel.classList.contains('open');
    panel.classList.toggle('open');
    toggle.classList.toggle('active');
    if(!isOpen&&!commentsLoaded[uuidPub])loadComments(uuidPub);
  };

  function loadComments(uuidPub){
    api({action:'obtenerComentarios',uuidPub:uuidPub}).then(function(res){
      commentsLoaded[uuidPub]=true;
      renderComments(uuidPub, res.comentarios||[]);
    }).catch(function(){document.getElementById('clist-'+uuidPub).innerHTML='<div class="comments-empty">Error al cargar</div>';});
  }

  function renderComments(uuidPub, comentarios){
    var list=document.getElementById('clist-'+uuidPub);
    var pub=postsCache[uuidPub];
    var esDuenoPub=pub&&pub.uuidUsuario===session.uuid;
    if(!comentarios.length){
      list.innerHTML='<div class="comments-empty">Sin comentarios aún. ¡Sé el primero!</div>';
    } else {
      list.innerHTML=comentarios.map(function(c){
        var puedoBorrar=(c.uuidUsuario===session.uuid)||esDuenoPub||puedeModerar;
        var avH=c.fotoUsuario?'<img src="'+c.fotoUsuario+'" alt="">':(c.nombreUsuario||'?')[0].toUpperCase();
        var delBtn=puedoBorrar?'<button class="comment-del" onclick="delComment(\''+c.uuidComentario+'\',\''+uuidPub+'\')" title="Eliminar"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>':'';
        return '<div class="comment-item"><div class="comment-av">'+avH+'</div>'
          +'<div class="comment-body"><div class="comment-bubble"><div class="comment-author-row"><span class="comment-author">'+esc(c.nombreUsuario)+'</span>'+rolBadge(c.rolUsuario||'usuario')+'</div>'
          +'<div class="comment-text">'+esc(c.texto)+'</div></div>'
          +'<div class="comment-meta"><span class="comment-time">'+fmtDate(c.fecha)+'</span>'+delBtn+'</div></div></div>';
      }).join('');
    }
    var numC=comentarios.length;
    var lbl=document.getElementById('clabel-'+uuidPub);
    if(lbl)lbl.textContent=numC===1?'1 comentario':numC+' comentarios';
    if(postsCache[uuidPub])postsCache[uuidPub].numComentarios=numC;
  }

  window.sendComment=function(uuidPub){
    var input=document.getElementById('cinput-'+uuidPub);
    var texto=input.value.trim(); if(!texto)return;
    var btn=document.getElementById('csend-'+uuidPub); btn.disabled=true;
    api({action:'crearComentario',datos:{uuidPub:uuidPub,uuidUsuario:session.uuid,nombreUsuario:session.nombre,texto:texto}})
      .then(function(res){btn.disabled=false;if(!res.ok){toast(res.msg||'Error','error');return;}input.value='';loadComments(uuidPub);})
      .catch(function(){btn.disabled=false;toast('Error de conexión','error');});
  };
  window.delComment=function(uuidComentario,uuidPub){
    api({action:'eliminarComentario',uuidComentario:uuidComentario,uuidSolicitante:session.uuid})
      .then(function(res){if(!res.ok){toast(res.msg||'Error','error');return;}loadComments(uuidPub);})
      .catch(function(){toast('Error de conexión','error');});
  };

  // ── EDITAR PERFIL (con banner) ────────────────────────────
  window.openEditPerfil=function(){
    if(!profileData)return;
    document.getElementById('edit-nombre').value=profileData.nombre||'';
    document.getElementById('edit-desc').value=profileData.descripcion||'';
    var th=document.getElementById('edit-thumb');
    if(profileData.fotoPerfil)th.innerHTML='<img src="'+profileData.fotoPerfil+'" alt="" style="width:100%;height:100%;object-fit:cover;">';
    // Banner
    var bPrev=document.getElementById('banner-preview');
    var bHint=document.getElementById('banner-hint');
    var bQBtn=document.getElementById('btn-quitar-banner');
    if(profileData.fotoBanner){bPrev.src=profileData.fotoBanner;bPrev.style.display='block';bHint.style.display='none';bQBtn.style.display='inline-block';}
    else{bPrev.style.display='none';bHint.style.display='flex';bQBtn.style.display='none';}
    editFoto=''; editBanner=''; editBannerQuitar=false;
    document.getElementById('edit-err').style.display='none';
    document.getElementById('modal-editar-perfil').classList.add('show');
  };
  window.closeEditPerfil=function(){document.getElementById('modal-editar-perfil').classList.remove('show');editFoto='';editBanner='';editBannerQuitar=false;};
  window.previewFoto=function(input){var f=input.files[0];if(!f)return;if(f.size>3*1024*1024){toast('Máx 3MB','error');return;}var r=new FileReader();r.onload=function(e){editFoto=e.target.result;document.getElementById('edit-thumb').innerHTML='<img src="'+editFoto+'" alt="" style="width:100%;height:100%;object-fit:cover;">';};r.readAsDataURL(f);};
  window.previewBanner=function(input){
    var f=input.files[0];if(!f)return;if(f.size>5*1024*1024){toast('Máx 5MB','error');return;}
    var r=new FileReader();r.onload=function(e){editBanner=e.target.result;editBannerQuitar=false;
      var p=document.getElementById('banner-preview');p.src=editBanner;p.style.display='block';
      document.getElementById('banner-hint').style.display='none';
      document.getElementById('btn-quitar-banner').style.display='inline-block';
    };r.readAsDataURL(f);
  };
  window.quitarBanner=function(){editBannerQuitar=true;editBanner='';document.getElementById('banner-preview').style.display='none';document.getElementById('banner-hint').style.display='flex';document.getElementById('btn-quitar-banner').style.display='none';};

  window.doGuardarPerfil=function(){
    var nombre=document.getElementById('edit-nombre').value.trim();
    var desc=document.getElementById('edit-desc').value.trim();
    var err=document.getElementById('edit-err');
    if(!nombre||nombre.length<3){err.textContent='Mínimo 3 caracteres.';err.style.display='block';return;}
    err.style.display='none';
    var btn=document.getElementById('btn-guardar-perfil');btn.disabled=true;btn.textContent='Guardando...';
    api({action:'editarPerfil',datos:{uuid:session.uuid,nombre:nombre,descripcion:desc,fotoPerfil:editFoto,fotoBanner:editBanner,quitarBanner:editBannerQuitar}})
      .then(function(res){
        btn.disabled=false;btn.textContent='Guardar cambios';
        if(!res.ok){err.textContent=res.msg;err.style.display='block';return;}
        var s=null;try{s=JSON.parse(localStorage.getItem('bv_session'));}catch(e){}
        if(s){s.nombre=res.nombre;s.fotoPerfil=res.fotoPerfil;s.descripcion=res.descripcion;s.fotoBanner=res.fotoBanner;localStorage.setItem('bv_session',JSON.stringify(s));}
        profileData=Object.assign({},profileData,res);
        window.closeEditPerfil(); renderProfile(profileData); toast('Perfil actualizado','success');
        var ta=document.getElementById('top-avatar');
        if(res.fotoPerfil)ta.innerHTML='<img src="'+res.fotoPerfil+'" alt="">';
        else ta.innerHTML='<span>'+(res.nombre||'?')[0].toUpperCase()+'</span>';
      }).catch(function(){btn.disabled=false;btn.textContent='Guardar cambios';toast('Error de conexión','error');});
  };

  // ── EDITAR PUBLICACIÓN ────────────────────────────────────
  window.openEditPub=function(uuidPub){var p=postsCache[uuidPub];if(!p)return;epubUuid=uuidPub;epubImg='';epubQuitarFlag=false;document.getElementById('epub-titulo').value=p.titulo||'';document.getElementById('epub-desc').value=p.descripcion||'';var prev=document.getElementById('epub-img-preview'),hint=document.getElementById('epub-img-hint'),qBtn=document.getElementById('btn-epub-quitar');if(p.imagen){prev.src=p.imagen;prev.style.display='block';hint.style.display='none';qBtn.style.display='inline-block';}else{prev.style.display='none';hint.style.display='';qBtn.style.display='none';}document.getElementById('modal-editar-pub').classList.add('show');};
  window.closeEditPub=function(){document.getElementById('modal-editar-pub').classList.remove('show');epubUuid='';epubImg='';epubQuitarFlag=false;};
  window.previewEpubImg=function(input){var f=input.files[0];if(!f)return;if(f.size>5*1024*1024){toast('Máx 5MB','error');return;}var r=new FileReader();r.onload=function(e){epubImg=e.target.result;epubQuitarFlag=false;var p=document.getElementById('epub-img-preview');p.src=epubImg;p.style.display='block';document.getElementById('epub-img-hint').style.display='none';document.getElementById('btn-epub-quitar').style.display='inline-block';};r.readAsDataURL(f);};
  window.epubQuitarImg=function(){epubQuitarFlag=true;epubImg='';document.getElementById('epub-img-preview').style.display='none';document.getElementById('epub-img-hint').style.display='';document.getElementById('btn-epub-quitar').style.display='none';};
  window.doGuardarPub=function(){var titulo=document.getElementById('epub-titulo').value.trim(),desc=document.getElementById('epub-desc').value.trim();if(!titulo){toast('Título requerido','error');return;}var btn=document.getElementById('btn-guardar-pub');btn.disabled=true;btn.textContent='Guardando...';api({action:'editarPublicacion',uuidSolicitante:session.uuid,datos:{uuidPub:epubUuid,titulo:titulo,descripcion:desc,imagen:epubImg,quitarImagen:epubQuitarFlag}}).then(function(res){btn.disabled=false;btn.textContent='Guardar cambios';if(!res.ok){toast(res.msg||'Error','error');return;}window.closeEditPub();toast('Publicación editada','success');loadPosts();}).catch(function(){btn.disabled=false;btn.textContent='Guardar cambios';toast('Error de conexión','error');});};

  // ── ELIMINAR PUBLICACIÓN ──────────────────────────────────
  window.openConfirmar=function(uuidPub){elimUuid=uuidPub;document.getElementById('modal-confirmar').classList.add('show');};
  window.closeConfirmar=function(){document.getElementById('modal-confirmar').classList.remove('show');elimUuid='';};
  window.doEliminar=function(){if(!elimUuid)return;var btn=document.getElementById('btn-confirmar-elim');btn.disabled=true;btn.textContent='Eliminando...';api({action:'eliminarPublicacion',uuidPub:elimUuid,uuidSolicitante:session.uuid}).then(function(res){btn.disabled=false;btn.textContent='Eliminar';if(!res.ok){toast(res.msg||'Error','error');window.closeConfirmar();return;}window.closeConfirmar();toast('Publicación eliminada','success');loadPosts();}).catch(function(){btn.disabled=false;btn.textContent='Eliminar';toast('Error de conexión','error');});};

  loadProfile();
})();
</script>
</body>
</html>
