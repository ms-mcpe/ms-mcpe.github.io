<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlockVault — Perfil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  * { -webkit-user-select: none; -moz-user-select: none; user-select: none; -webkit-user-drag: none; }
  input, textarea { -webkit-user-select: text; -moz-user-select: text; user-select: text; }
  img { pointer-events: none; -webkit-user-drag: none; }
  :root {
    --bg:#F4F4F6; --surface:#FFFFFF; --surface-2:#EBEBEF;
    --border:rgba(0,0,0,0.08); --text:#13131A; --text-muted:#6B6F80;
    --accent:#6C63FF; --accent-rgb:108,99,255;
    --radius:14px; --radius-sm:8px;
    --shadow:0 2px 16px rgba(0,0,0,0.06); --shadow-lg:0 8px 40px rgba(0,0,0,0.12);
    --font-head:'Syne',sans-serif; --font-body:'Manrope',sans-serif;
    --topbar-h:64px; --sidebar-w:260px;
    --rol-usuario:#6B6F80; --rol-admin:#3B82F6; --rol-owner:#F59E0B;
  }
  [data-theme="dark"] { --bg:#0C0C10; --surface:#14141C; --surface-2:#1E1E2A; --border:rgba(255,255,255,0.07); --text:#EAEAF2; --text-muted:#8888A0; --shadow:0 2px 16px rgba(0,0,0,0.4); --shadow-lg:0 8px 40px rgba(0,0,0,0.6); }
  html,body { height:100%; background:var(--bg); color:var(--text); font-family:var(--font-body); -webkit-font-smoothing:antialiased; transition:background .3s,color .3s; overflow-x:hidden; }
  .topbar { position:fixed; top:0; left:0; right:0; z-index:100; height:var(--topbar-h); background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; gap:12px; box-shadow:var(--shadow); }
  .topbar-btn { background:none; border:none; cursor:pointer; width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--text-muted); transition:background .2s,color .2s; flex-shrink:0; }
  .topbar-btn:hover { background:var(--surface-2); color:var(--text); }
  .topbar-logo { flex:1; text-align:center; font-family:var(--font-head); font-size:1.25rem; font-weight:800; letter-spacing:-.02em; background:linear-gradient(135deg,var(--accent),#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .avatar { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,var(--accent),#a78bfa); display:flex; align-items:center; justify-content:center; font-family:var(--font-head); font-size:.85rem; font-weight:700; color:#fff; cursor:pointer; overflow:hidden; border:2px solid rgba(var(--accent-rgb),.35); flex-shrink:0; transition:transform .2s; }
  .avatar:hover { transform:scale(1.06); }
  .avatar img { width:100%; height:100%; object-fit:cover; pointer-events:none; }
  .sidebar-overlay { position:fixed; inset:0; z-index:89; background:rgba(0,0,0,.45); backdrop-filter:blur(3px); opacity:0; pointer-events:none; transition:opacity .3s; }
  .sidebar-overlay.show { opacity:1; pointer-events:all; }
  .sidebar { position:fixed; top:var(--topbar-h); left:0; bottom:0; width:var(--sidebar-w); z-index:90; background:var(--surface); border-right:1px solid var(--border); transform:translateX(-100%); transition:transform .3s cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column; padding:16px 12px; overflow-y:auto; }
  .sidebar.open { transform:translateX(0); }
  .nav-item { display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:var(--radius-sm); cursor:pointer; transition:background .2s,color .2s; color:var(--text-muted); font-weight:500; font-size:.92rem; }
  .nav-item:hover,.nav-item.active { background:rgba(var(--accent-rgb),.1); color:var(--accent); }
  .nav-item.danger:hover { background:rgba(239,68,68,.1); color:#ef4444; }
  .sidebar-spacer { flex:1; }
  .sidebar-section { font-size:.68rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--text-muted); padding:8px 16px 4px; margin-top:8px; }
  .page-content { padding-top:var(--topbar-h); min-height:100vh; }
  .container { max-width:680px; margin:0 auto; padding:20px 16px 80px; }
  .profile-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); margin-bottom:20px; animation:fadeUp .4s ease both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .profile-banner { height:110px; background:linear-gradient(135deg,rgba(var(--accent-rgb),.5),rgba(var(--accent-rgb),.15)); }
  .profile-info { padding:0 20px 20px; }
  .profile-info-row { display:flex; align-items:flex-end; gap:14px; margin-top:-44px; margin-bottom:12px; }
  .profile-av-lg { width:82px; height:82px; border-radius:50%; background:linear-gradient(135deg,var(--accent),#a78bfa); display:flex; align-items:center; justify-content:center; font-family:var(--font-head); font-size:2rem; font-weight:800; color:#fff; overflow:hidden; flex-shrink:0; border:3px solid var(--surface); box-shadow:var(--shadow-lg); }
  .profile-av-lg img { width:100%; height:100%; object-fit:cover; pointer-events:none; }
  .profile-actions { display:flex; gap:8px; margin-left:auto; padding-bottom:6px; flex-wrap:wrap; }
  .profile-name-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:2px; }
  .profile-name { font-family:var(--font-head); font-size:1.25rem; font-weight:800; }
  .profile-desc { font-size:.87rem; color:var(--text-muted); line-height:1.6; margin-top:4px; }
  .profile-no-desc { font-size:.82rem; color:var(--text-muted); font-style:italic; }
  .rol-badge { display:inline-flex; align-items:center; font-size:.65rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; padding:2px 7px; border-radius:999px; border:1px solid currentColor; line-height:1.4; flex-shrink:0; }
  .rol-badge.usuario { color:var(--rol-usuario); border-color:var(--rol-usuario); background:rgba(107,111,128,.08); }
  .rol-badge.admin    { color:var(--rol-admin);   border-color:var(--rol-admin);   background:rgba(59,130,246,.1); }
  .rol-badge.owner    { color:var(--rol-owner);   border-color:var(--rol-owner);   background:rgba(245,158,11,.1); }
  .section-label { font-family:var(--font-head); font-size:.9rem; font-weight:700; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
  .section-label::after { content:''; flex:1; height:1px; background:var(--border); }
  .post-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); transition:transform .2s; margin-bottom:12px; animation:fadeUp .35s ease both; position:relative; }
  .post-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-lg); }
  .post-header { display:flex; align-items:center; padding:14px 16px 8px; position:relative; }
  .post-date { font-size:.73rem; color:var(--text-muted); }
  .post-body { padding:2px 16px 14px; }
  .post-title { font-family:var(--font-head); font-weight:700; font-size:.97rem; margin-bottom:4px; }
  .post-desc { font-size:.87rem; color:var(--text-muted); line-height:1.55; word-break:break-word; }
  .post-img { width:100%; max-height:360px; object-fit:cover; display:block; }
  .post-menu-btn { position:absolute; top:10px; right:10px; background:none; border:none; cursor:pointer; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--text-muted); transition:background .2s,color .2s; }
  .post-menu-btn:hover { background:var(--surface-2); color:var(--text); }
  .post-menu-wrap { position:absolute; top:10px; right:10px; }
  .post-dropdown { position:absolute; top:34px; right:0; z-index:50; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); box-shadow:var(--shadow-lg); min-width:150px; overflow:hidden; animation:fadeDown .15s ease; }
  @keyframes fadeDown { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
  .post-dropdown-item { display:flex; align-items:center; gap:10px; padding:11px 16px; cursor:pointer; font-size:.87rem; font-weight:500; color:var(--text); transition:background .15s; }
  .post-dropdown-item:hover { background:var(--surface-2); }
  .post-dropdown-item.danger { color:#ef4444; }
  .post-dropdown-item.danger:hover { background:rgba(239,68,68,.08); }
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:7px; padding:9px 18px; border-radius:var(--radius-sm); font-family:var(--font-body); font-weight:600; font-size:.87rem; cursor:pointer; transition:all .2s; border:1.5px solid transparent; }
  .btn-primary { background:var(--accent); color:#fff; border-color:var(--accent); }
  .btn-primary:hover { filter:brightness(1.1); transform:translateY(-1px); }
  .btn-secondary { background:transparent; color:var(--text); border-color:var(--border); }
  .btn-secondary:hover { background:var(--surface-2); }
  .btn-danger { background:#ef4444; color:#fff; border-color:#ef4444; }
  .btn-danger:hover { filter:brightness(1.1); }
  .btn:disabled { opacity:.5; cursor:not-allowed; transform:none; filter:none; }
  .btn-full { width:100%; }
  .modal-bg { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,.55); backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:opacity .25s; }
  .modal-bg.show { opacity:1; pointer-events:all; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:28px; width:100%; max-width:480px; box-shadow:var(--shadow-lg); transform:translateY(20px); transition:transform .25s; max-height:90vh; overflow-y:auto; }
  .modal-bg.show .modal { transform:translateY(0); }
  .modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .modal-title { font-family:var(--font-head); font-size:1.1rem; font-weight:700; }
  .modal-close { background:var(--surface-2); border:none; cursor:pointer; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--text-muted); transition:background .2s; }
  .modal-close:hover { background:var(--border); }
  .field { margin-bottom:14px; }
  .field label { display:block; margin-bottom:5px; font-size:.73rem; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--text-muted); }
  .input { width:100%; padding:11px 14px; background:var(--surface-2); border:1.5px solid var(--border); border-radius:var(--radius-sm); color:var(--text); font-family:var(--font-body); font-size:.93rem; transition:border-color .2s,box-shadow .2s; outline:none; }
  .input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(var(--accent-rgb),.15); background:var(--surface); }
  textarea.input { resize:vertical; min-height:80px; }
  .img-picker { border:2px dashed var(--border); border-radius:var(--radius-sm); padding:14px; cursor:pointer; transition:border-color .2s,background .2s; }
  .img-picker:hover { border-color:var(--accent); background:rgba(var(--accent-rgb),.03); }
  .img-picker input { display:none; }
  .img-picker-row { display:flex; align-items:center; gap:12px; }
  .img-picker-thumb { width:52px; height:52px; border-radius:50%; flex-shrink:0; background:var(--surface-2); border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .img-picker-thumb img { width:100%; height:100%; object-fit:cover; }
  .img-picker-label { font-size:.85rem; font-weight:600; color:var(--accent); }
  .img-picker-sub { font-size:.73rem; color:var(--text-muted); }
  .img-picker-hint { font-size:.82rem; color:var(--text-muted); }
  .img-preview { width:100%; max-height:180px; object-fit:contain; border-radius:var(--radius-sm); display:none; margin-bottom:8px; }
  .err-msg { background:rgba(239,68,68,.08); border:1px solid rgba(239,68,68,.2); color:#ef4444; font-size:.82rem; font-weight:500; padding:10px 14px; border-radius:var(--radius-sm); margin-top:10px; display:none; }
  .confirm-text { font-size:.92rem; color:var(--text-muted); margin-bottom:20px; line-height:1.6; }
  .confirm-btns { display:flex; gap:10px; }
  #toast-container { position:fixed; bottom:20px; right:20px; z-index:999; display:flex; flex-direction:column; gap:10px; align-items:flex-end; }
  .toast { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px 18px; box-shadow:var(--shadow-lg); font-size:.87rem; font-weight:500; animation:toastIn .3s ease,toastOut .4s 2.6s forwards; max-width:300px; }
  .toast.success{border-left:3px solid #22c55e} .toast.error{border-left:3px solid #ef4444}
  @keyframes toastIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
  @keyframes toastOut{from{opacity:1}to{opacity:0;pointer-events:none}}
  .spinner-wrap { text-align:center; padding:40px; }
  .spinner { width:28px; height:28px; border-radius:50%; border:3px solid var(--border); border-top-color:var(--accent); animation:spin .7s linear infinite; display:inline-block; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .empty-state { text-align:center; padding:40px 20px; color:var(--text-muted); font-size:.9rem; }
  ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
</style>
</head>

<!-- MODAL EDITAR PERFIL -->
<div class="modal-bg" id="modal-editar-perfil">

    <div class="modal-header"><div class="modal-title">Editar perfil</div><button class="modal-close" onclick="closeEditPerfil()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>

<script>
(function () {
  var API = 'https://script.google.com/macros/s/AKfycby_q9XZ8vYBsnr0G5PZGapHZh1iZ-GFBJqychgMnZ-hs3Napp1fWE_RfisJ91B2ZBwQ/exec';
  var session=null; try{session=JSON.parse(localStorage.getItem('bv_session')||'null');}catch(e){}
  if(!session){location.href='index.html';return;}

  var miRol = session.rol||'usuario';
  var puedeModerar = (miRol==='admin'||miRol==='owner');

  function applyAccent(hex){try{var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);document.documentElement.style.setProperty('--accent',hex);document.documentElement.style.setProperty('--accent-rgb',r+','+g+','+b);}catch(e){}}
  document.documentElement.setAttribute('data-theme',localStorage.getItem('bv_theme')||'light');
  applyAccent(localStorage.getItem('bv_accent')||'#6C63FF');

  var av=document.getElementById('top-avatar');
  if(session.fotoPerfil)av.innerHTML='<img src="'+session.fotoPerfil+'" alt="">';
  else document.getElementById('top-av-letter').textContent=(session.nombre||'?')[0].toUpperCase();

  var viewUUID=localStorage.getItem('bv_view_profile')||session.uuid;
  var isOwn=(viewUUID===session.uuid);
  var profileData=null, editFoto='', postsCache={}, epubUuid='', epubImg='', epubQuitarFlag=false, elimUuid='';

  window.miPerfil=function(){localStorage.removeItem('bv_view_profile');location.href='perfil.html';};
  window.logout=function(){localStorage.removeItem('bv_session');location.href='index.html';};
  window.toggleSidebar=function(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');};
  window.closeSidebar=function(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show');};

  function api(p){return fetch(API,{method:'POST',body:JSON.stringify(p)}).then(function(r){return r.json();});}
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function fmtDate(d){try{var dt=new Date(d),diff=(new Date()-dt)/1000;if(diff<60)return 'ahora mismo';if(diff<3600)return Math.floor(diff/60)+' min';if(diff<86400)return Math.floor(diff/3600)+'h';return dt.toLocaleDateString('es',{day:'numeric',month:'short',year:'numeric'});}catch(_){return '';}}
  function toast(msg,type){var t=document.createElement('div');t.className='toast '+(type||'info');t.textContent=msg;document.getElementById('toast-container').appendChild(t);setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t);},3100);}
  function rolBadge(rol){var lbl=rol==='owner'?'👑 owner':rol==='admin'?'🛡 admin':'usuario';return '<span class="rol-badge '+rol+'">'+lbl+'</span>';}

  document.addEventListener('click',function(e){if(!e.target.closest('.post-menu-wrap'))document.querySelectorAll('.post-dropdown').forEach(function(d){d.remove();});});

  // ── Perfil ────────────────────────────────────────────────
  function loadProfile(){
    api({action:'obtenerPerfil',uuid:viewUUID}).then(function(res){
      if(!res||!res.ok){document.getElementById('profile-card').innerHTML='<div style="padding:30px;text-align:center;color:var(--text-muted)">Perfil no encontrado</div>';return;}
      profileData=res; renderProfile(res); loadPosts();
    }).catch(function(){document.getElementById('profile-card').innerHTML='<div style="padding:30px;text-align:center;color:var(--text-muted)">Error al cargar</div>';});
  }

  function renderProfile(p){
    var avH=p.fotoPerfil?'<img src="'+p.fotoPerfil+'" alt="">':(p.nombre||'?')[0].toUpperCase();
    var editBtn=isOwn?'<button class="btn btn-secondary" onclick="openEditPerfil()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Editar</button>':'';
    document.getElementById('profile-card').innerHTML=
      '<div class="profile-banner"></div><div class="profile-info"><div class="profile-info-row"><div class="profile-av-lg">'+avH+'</div><div class="profile-actions">'+editBtn+'</div></div>'
      +'<div class="profile-name-row"><span class="profile-name">'+esc(p.nombre)+'</span>'+rolBadge(p.rol||'usuario')+'</div>'
      +(p.descripcion?'<div class="profile-desc">'+esc(p.descripcion)+'</div>':(isOwn?'<div class="profile-no-desc">Sin descripción aún. ¡Edita tu perfil!</div>':''))
      +'</div>';
  }

  // ── Posts ─────────────────────────────────────────────────
  function loadPosts(){
    document.getElementById('posts-label').style.display='';
    document.getElementById('posts-container').innerHTML='<div class="spinner-wrap"><div class="spinner"></div></div>';
    api({action:'obtenerPublicacionesUsuario',uuid:viewUUID}).then(function(res){
      var c=document.getElementById('posts-container');
      if(!res||!res.ok||!res.publicaciones||!res.publicaciones.length){c.innerHTML='<div class="empty-state">Sin publicaciones aún</div>';return;}
      postsCache={};
      res.publicaciones.forEach(function(p){postsCache[p.uuidPub]=p;});
      c.innerHTML=res.publicaciones.map(function(p){
        var esMio=(p.uuidUsuario===session.uuid);
        var puedoMenu=esMio||puedeModerar;
        var menuWrap=puedoMenu?'<div class="post-menu-wrap"><button class="post-menu-btn" onclick="toggleMenu(event,\''+p.uuidPub+'\')"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg></button></div>':'';
        var imgH=p.imagen?'<img class="post-img" src="'+p.imagen+'" alt="">':'';
        return '<div class="post-card"><div class="post-header"><div class="post-date">'+fmtDate(p.fecha)+'</div>'+menuWrap+'</div>'
          +'<div class="post-body"><div class="post-title">'+esc(p.titulo)+'</div>'+(p.descripcion?'<div class="post-desc">'+esc(p.descripcion)+'</div>':'')+'</div>'+imgH+'</div>';
      }).join('');
    }).catch(function(){document.getElementById('posts-container').innerHTML='<div class="empty-state">Error</div>';});
  }

  window.toggleMenu=function(e,uuidPub){
    e.stopPropagation();
    var existing=document.querySelector('.post-dropdown[data-pub="'+uuidPub+'"]');
    document.querySelectorAll('.post-dropdown').forEach(function(d){d.remove();});
    if(existing)return;
    var p=postsCache[uuidPub]; var esMio=p&&p.uuidUsuario===session.uuid;
    var dd=document.createElement('div'); dd.className='post-dropdown'; dd.dataset.pub=uuidPub;
    if(esMio||puedeModerar){var ei=document.createElement('div');ei.className='post-dropdown-item';ei.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Editar';ei.onclick=function(){document.querySelectorAll('.post-dropdown').forEach(function(d){d.remove();});openEditPub(uuidPub);};dd.appendChild(ei);}
    if(esMio||puedeModerar){var di=document.createElement('div');di.className='post-dropdown-item danger';di.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>Eliminar';di.onclick=function(){document.querySelectorAll('.post-dropdown').forEach(function(d){d.remove();});openConfirmar(uuidPub);};dd.appendChild(di);}
    e.currentTarget.closest('.post-menu-wrap').appendChild(dd);
  };

  // ── Editar perfil ─────────────────────────────────────────
  window.openEditPerfil=function(){if(!profileData)return;document.getElementById('edit-nombre').value=profileData.nombre||'';document.getElementById('edit-desc').value=profileData.descripcion||'';var th=document.getElementById('edit-thumb');if(profileData.fotoPerfil)th.innerHTML='<img src="'+profileData.fotoPerfil+'" alt="" style="width:100%;height:100%;object-fit:cover;">';editFoto='';document.getElementById('edit-err').style.display='none';document.getElementById('modal-editar-perfil').classList.add('show');};
  window.closeEditPerfil=function(){document.getElementById('modal-editar-perfil').classList.remove('show');editFoto='';};
  window.previewFoto=function(input){var f=input.files[0];if(!f)return;if(f.size>3*1024*1024){toast('Máx 3MB','error');return;}var r=new FileReader();r.onload=function(e){editFoto=e.target.result;document.getElementById('edit-thumb').innerHTML='<img src="'+editFoto+'" alt="" style="width:100%;height:100%;object-fit:cover;">';};r.readAsDataURL(f);};
  window.doGuardarPerfil=function(){var nombre=document.getElementById('edit-nombre').value.trim();var desc=document.getElementById('edit-desc').value.trim();var err=document.getElementById('edit-err');if(!nombre||nombre.length<3){err.textContent='Mínimo 3 caracteres.';err.style.display='block';return;}err.style.display='none';var btn=document.getElementById('btn-guardar-perfil');btn.disabled=true;btn.textContent='Guardando...';api({action:'editarPerfil',datos:{uuid:session.uuid,nombre:nombre,descripcion:desc,fotoPerfil:editFoto}}).then(function(res){btn.disabled=false;btn.textContent='Guardar cambios';if(!res.ok){err.textContent=res.msg;err.style.display='block';return;}var s=null;try{s=JSON.parse(localStorage.getItem('bv_session'));}catch(e){}if(s){s.nombre=res.nombre;s.fotoPerfil=res.fotoPerfil;s.descripcion=res.descripcion;localStorage.setItem('bv_session',JSON.stringify(s));}profileData=Object.assign({},profileData,res);window.closeEditPerfil();renderProfile(profileData);toast('Perfil actualizado','success');var ta=document.getElementById('top-avatar');if(res.fotoPerfil)ta.innerHTML='<img src="'+res.fotoPerfil+'" alt="">';else ta.innerHTML='<span>'+(res.nombre||'?')[0].toUpperCase()+'</span>';}).catch(function(){btn.disabled=false;btn.textContent='Guardar cambios';toast('Error de conexión','error');});};

  // ── Editar publicación ────────────────────────────────────
  window.openEditPub=function(uuidPub){var p=postsCache[uuidPub];if(!p)return;epubUuid=uuidPub;epubImg='';epubQuitarFlag=false;document.getElementById('epub-titulo').value=p.titulo||'';document.getElementById('epub-desc').value=p.descripcion||'';var prev=document.getElementById('epub-img-preview');var hint=document.getElementById('epub-img-hint');var qBtn=document.getElementById('btn-epub-quitar');if(p.imagen){prev.src=p.imagen;prev.style.display='block';hint.style.display='none';qBtn.style.display='inline-block';}else{prev.style.display='none';hint.style.display='';qBtn.style.display='none';}document.getElementById('modal-editar-pub').classList.add('show');};
  window.closeEditPub=function(){document.getElementById('modal-editar-pub').classList.remove('show');epubUuid='';epubImg='';epubQuitarFlag=false;};
  window.previewEpubImg=function(input){var f=input.files[0];if(!f)return;if(f.size>5*1024*1024){toast('Máx 5MB','error');return;}var r=new FileReader();r.onload=function(e){epubImg=e.target.result;epubQuitarFlag=false;var p=document.getElementById('epub-img-preview');p.src=epubImg;p.style.display='block';document.getElementById('epub-img-hint').style.display='none';document.getElementById('btn-epub-quitar').style.display='inline-block';};r.readAsDataURL(f);};
  window.epubQuitarImg=function(){epubQuitarFlag=true;epubImg='';document.getElementById('epub-img-preview').style.display='none';document.getElementById('epub-img-hint').style.display='';document.getElementById('btn-epub-quitar').style.display='none';};
  window.doGuardarPub=function(){var titulo=document.getElementById('epub-titulo').value.trim();var desc=document.getElementById('epub-desc').value.trim();if(!titulo){toast('Título requerido','error');return;}var btn=document.getElementById('btn-guardar-pub');btn.disabled=true;btn.textContent='Guardando...';api({action:'editarPublicacion',uuidSolicitante:session.uuid,datos:{uuidPub:epubUuid,titulo:titulo,descripcion:desc,imagen:epubImg,quitarImagen:epubQuitarFlag}}).then(function(res){btn.disabled=false;btn.textContent='Guardar cambios';if(!res.ok){toast(res.msg||'Error','error');return;}window.closeEditPub();toast('Publicación editada','success');loadPosts();}).catch(function(){btn.disabled=false;btn.textContent='Guardar cambios';toast('Error de conexión','error');});};

  // ── Eliminar publicación ──────────────────────────────────
  window.openConfirmar=function(uuidPub){elimUuid=uuidPub;document.getElementById('modal-confirmar').classList.add('show');};
  window.closeConfirmar=function(){document.getElementById('modal-confirmar').classList.remove('show');elimUuid='';};
  window.doEliminar=function(){if(!elimUuid)return;var btn=document.getElementById('btn-confirmar-elim');btn.disabled=true;btn.textContent='Eliminando...';api({action:'eliminarPublicacion',uuidPub:elimUuid,uuidSolicitante:session.uuid}).then(function(res){btn.disabled=false;btn.textContent='Eliminar';if(!res.ok){toast(res.msg||'Error','error');window.closeConfirmar();return;}window.closeConfirmar();toast('Publicación eliminada','success');loadPosts();}).catch(function(){btn.disabled=false;btn.textContent='Eliminar';toast('Error de conexión','error');});};

  loadProfile();
})();
</script>
</body>
</html>
