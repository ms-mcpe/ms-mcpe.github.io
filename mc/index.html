<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#060a0f">
<title>BlockVault</title>
<link rel="icon" href="icon-192.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* ─── DESIGN TOKENS ─────────────────────────────── */
:root {
  --bg:      #060a0f;
  --bg2:     #0c1118;
  --bg3:     #131b24;
  --panel:   #0e151d;
  --border:  rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.12);
  --em:      #00e5a0;
  --em-d:    rgba(0,229,160,0.18);
  --em-dd:   rgba(0,229,160,0.08);
  --am:      #ff7a00;
  --am-d:    rgba(255,122,0,0.2);
  --txt:     #e8f0f8;
  --txt2:    #6b7f96;
  --txt3:    #4a5c6e;
  --danger:  #ff4545;
  --danger-d:rgba(255,69,69,0.18);
  --ease:    cubic-bezier(.22,1,.36,1);
}

/* ─── RESET ──────────────────────────────────────── */
*,*::before,*::after {
  margin:0;padding:0;box-sizing:border-box;
  -webkit-user-select:none;user-select:none;
  -webkit-tap-highlight-color:transparent;
}
html,body { width:100%;height:100%;overflow:hidden; }

body {
  background:var(--bg);
  font-family:'DM Sans',sans-serif;
  color:var(--txt);
  -webkit-font-smoothing:antialiased;
}

/* ─── GRID BACKGROUND ────────────────────────────── */
body::before {
  content:'';
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(var(--border) 1px,transparent 1px),
    linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:44px 44px;
  mask-image:radial-gradient(ellipse 90% 70% at 50% 50%,black 20%,transparent 100%);
  opacity:.5;
}

/* ─── CANVAS PARTICLES ───────────────────────────── */
#canvas-bg {
  position:fixed;inset:0;z-index:1;pointer-events:none;
}

/* ─── GLOW ORBS ──────────────────────────────────── */
.orb {
  position:fixed;border-radius:50%;pointer-events:none;filter:blur(80px);z-index:1;
}
.orb-1 {
  width:400px;height:400px;
  background:radial-gradient(circle,rgba(0,229,160,.12),transparent 70%);
  top:-100px;left:-100px;
  animation:orbDrift 12s ease-in-out infinite alternate;
}
.orb-2 {
  width:350px;height:350px;
  background:radial-gradient(circle,rgba(255,122,0,.10),transparent 70%);
  bottom:-80px;right:-80px;
  animation:orbDrift 15s ease-in-out infinite alternate-reverse;
}
@keyframes orbDrift {
  from{transform:translate(0,0);}
  to{transform:translate(40px,30px);}
}

/* ─── APP IFRAME ─────────────────────────────────── */
.app-frame {
  position:absolute;inset:0;display:none;z-index:5;
}
.app-frame iframe { width:100%;height:100%;border:none;display:block; }

/* ─── STATUS OVERLAY ─────────────────────────────── */
#status-overlay {
  position:fixed;inset:0;z-index:9000;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:28px;
  transition:opacity .45s var(--ease);
}

/* ── Spinner ── */
.bv-spinner {
  position:relative;width:72px;height:72px;margin-bottom:28px;
}
.sp-ring {
  position:absolute;inset:0;border-radius:50%;
  border:2px solid transparent;
}
.sp-ring-1 {
  border-top-color:var(--em);
  border-right-color:rgba(0,229,160,.3);
  animation:spinR .9s linear infinite;
}
.sp-ring-2 {
  inset:10px;
  border-bottom-color:var(--am);
  border-left-color:rgba(255,122,0,.25);
  animation:spinR 1.4s linear infinite reverse;
}
.sp-icon {
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;
  background:linear-gradient(135deg,var(--em),var(--am));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
@keyframes spinR { to { transform:rotate(360deg); } }

/* ── Error icon ── */
.err-icon {
  display:none;margin-bottom:28px;
  animation:errPulse 2s ease-in-out infinite;
}
.err-icon i { font-size:3rem;color:var(--danger);filter:drop-shadow(0 0 16px var(--danger-d)); }
@keyframes errPulse {
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.06);}
}

.st-label {
  font-family:'JetBrains Mono',monospace;
  font-size:.68rem;letter-spacing:2px;color:var(--txt3);
  text-transform:uppercase;margin-bottom:8px;
}
.st-text {
  font-family:'Bebas Neue',sans-serif;
  font-size:1.4rem;letter-spacing:3px;color:var(--em);
  filter:drop-shadow(0 0 8px var(--em-d));
}
.st-dots::after {
  content:'';
  animation:dots3 1.4s steps(4,end) infinite;
}
@keyframes dots3 {
  0%{content:'';}25%{content:'.';}50%{content:'..';}75%{content:'...';}
}

/* ── Error block ── */
.err-block {
  display:none;margin-top:22px;
  max-width:360px;padding:20px 24px;
  background:rgba(255,69,69,.06);
  border:1px solid rgba(255,69,69,.2);
  border-radius:16px;
  font-size:.85rem;color:var(--txt2);line-height:1.7;
  animation:riseUp .5s var(--ease) both;
  text-align:center;
}
.err-block strong { color:var(--danger);font-size:.9rem; }

.retry-btn {
  display:none;margin-top:18px;
  padding:12px 28px;
  background:transparent;border:1px solid var(--em);
  color:var(--em);border-radius:10px;cursor:pointer;
  font-family:'JetBrains Mono',monospace;
  font-size:.72rem;letter-spacing:1.5px;text-transform:uppercase;
  transition:.25s;
}
.retry-btn:hover { background:var(--em-dd);box-shadow:0 0 20px var(--em-d); }

/* ─── ANIMATIONS ─────────────────────────────────── */
@keyframes riseUp {
  from{opacity:0;transform:translateY(12px);}
  to{opacity:1;transform:none;}
}
</style>
</head>
<body oncontextmenu="return false;">

<!-- Glow orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<canvas id="canvas-bg"></canvas>

<!-- Adblock bait -->
<div id="adblock-bait"
  class="ads ad adsbox doubleclick ad-placement carbon-ads pub_300x250"
  style="width:1px;height:1px;position:absolute;left:-9999px;top:-9999px;pointer-events:none;"
  aria-hidden="true"></div>

<!-- ── STATUS OVERLAY ── -->
<div id="status-overlay">
  <div class="bv-spinner" id="spinner-wrap">
    <div class="sp-ring sp-ring-1"></div>
    <div class="sp-ring sp-ring-2"></div>
    <div class="sp-icon"><i class="fas fa-cube"></i></div>
  </div>
  <div class="err-icon" id="err-icon"><i class="fas fa-ban"></i></div>

  <div class="st-label" id="st-label">Sistema de seguridad</div>
  <div class="st-text"><span class="st-dots" id="st-text">Verificando acceso</span></div>

  <div class="err-block" id="err-block">
    <strong><i class="fas fa-exclamation-triangle" style="margin-right:6px;"></i>Bloqueador de anuncios detectado</strong><br><br>
    Para usar BlockVault debes desactivar tu bloqueador de anuncios. Tenerlo activo impide la conexión con los servidores.<br><br>
    Desactívalo y recarga la página.
  </div>

  <button class="retry-btn" id="retry-btn" onclick="location.reload()">
    <i class="fas fa-redo" style="margin-right:8px;"></i>REINTENTAR
  </button>
</div>

<!-- ── MAIN APP ── -->
<div class="app-frame" id="main-app">
  <iframe src="https://script.google.com/macros/s/AKfycby_q9XZ8vYBsnr0G5PZGapHZh1iZ-GFBJqychgMnZ-hs3Napp1fWE_RfisJ91B2ZBwQ/exec" allow="clipboard-read; clipboard-write"></iframe>
</div>

<script>
"use strict";

/* ════════════════════════════
   CANVAS PARTICLES
════════════════════════════ */
(function initCanvas() {
  const canvas = document.getElementById('canvas-bg');
  const ctx    = canvas.getContext('2d');
  let W, H, dots = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function createDots() {
    dots = [];
    const n = Math.floor((W * H) / 18000);
    for (let i = 0; i < n; i++) {
      dots.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.2 + .3,
        vx: (Math.random() - .5) * .4,
        vy: (Math.random() - .5) * .4,
        a: Math.random() * .5 + .1,
        c: Math.random() > .5 ? '0,229,160' : '255,122,0'
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    dots.forEach(d => {
      d.x += d.vx; d.y += d.vy;
      if (d.x < 0) d.x = W; if (d.x > W) d.x = 0;
      if (d.y < 0) d.y = H; if (d.y > H) d.y = 0;
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${d.c},${d.a})`;
      ctx.fill();
    });

    // connections
    for (let i = 0; i < dots.length; i++) {
      for (let j = i + 1; j < dots.length; j++) {
        const dx = dots[i].x - dots[j].x;
        const dy = dots[i].y - dots[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 120) {
          ctx.beginPath();
          ctx.moveTo(dots[i].x, dots[i].y);
          ctx.lineTo(dots[j].x, dots[j].y);
          ctx.strokeStyle = `rgba(0,229,160,${.06 * (1 - dist/120)})`;
          ctx.lineWidth = .5;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }

  resize(); createDots(); draw();
  window.addEventListener('resize', () => { resize(); createDots(); });
})();

/* ════════════════════════════
   ADBLOCK DETECTION
════════════════════════════ */
function detectByBait() {
  return new Promise(resolve => {
    const bait = document.getElementById('adblock-bait');
    if (!bait) { resolve(false); return; }
    setTimeout(() => {
      const s = window.getComputedStyle(bait);
      resolve(
        bait.offsetParent === null ||
        bait.offsetHeight === 0    ||
        s.display === 'none'       ||
        s.visibility === 'hidden'  ||
        s.opacity === '0'
      );
    }, 150);
  });
}

function detectByFetch() {
  return new Promise(resolve => {
    const t = setTimeout(() => resolve(false), 2000);
    const c = new AbortController();
    setTimeout(() => c.abort(), 1800);
    fetch('https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js', {
      method:'HEAD', mode:'no-cors', signal:c.signal, cache:'no-store'
    }).then(() => { clearTimeout(t); resolve(false); })
      .catch(() => { clearTimeout(t); resolve(true); });
  });
}

function detectByScript() {
  return new Promise(resolve => {
    const s = document.createElement('script');
    s.src = 'https://cdn.googlesyndication.com/pagead/js/adsbygoogle.js';
    const t = setTimeout(() => { s.remove(); resolve(false); }, 2000);
    s.onload  = () => { clearTimeout(t); s.remove(); resolve(false); };
    s.onerror = () => { clearTimeout(t); s.remove(); resolve(true); };
    document.head.appendChild(s);
  });
}

async function hasAdBlocker() {
  const results = await Promise.all([detectByBait(), detectByFetch(), detectByScript()]);
  return results.filter(Boolean).length >= 2;
}

/* ════════════════════════════
   UI HELPERS
════════════════════════════ */
function setStatusText(msg) {
  document.getElementById('st-text').textContent = msg;
  document.getElementById('st-text').classList.add('st-dots');
}

function showError() {
  document.getElementById('spinner-wrap').style.display = 'none';
  document.getElementById('err-icon').style.display     = 'block';
  document.getElementById('st-label').textContent       = 'Acceso denegado';
  const st = document.getElementById('st-text');
  st.textContent  = 'BLOQUEADOR DETECTADO';
  st.className    = '';
  st.style.cssText= 'font-family:"Bebas Neue",sans-serif;font-size:1.4rem;letter-spacing:3px;color:var(--danger);filter:drop-shadow(0 0 8px var(--danger-d));';
  document.getElementById('err-block').style.display  = 'block';
  document.getElementById('retry-btn').style.display  = 'inline-flex';
}

/* ════════════════════════════
   MAIN FLOW
════════════════════════════ */
async function checkSystem() {
  setStatusText('Verificando acceso');
  const blocked = await hasAdBlocker();

  if (blocked) { showError(); return; }

  const overlay = document.getElementById('status-overlay');
  overlay.style.opacity = '0';
  setTimeout(() => {
    overlay.style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
  }, 450);
}

/* ════════════════════════════
   SECURITY
════════════════════════════ */
document.addEventListener('contextmenu', e => e.preventDefault());
document.onkeydown = e => {
  if (e.keyCode === 123) return false;
  if (e.ctrlKey && e.shiftKey && ['I','C','J'].includes(String.fromCharCode(e.keyCode))) return false;
  if (e.ctrlKey && e.keyCode === 85) return false;
};

/* ════════════════════════════
   BOOT
════════════════════════════ */
window.addEventListener('load', () => {
  checkSystem();
});
</script>
</body>
</html>
