<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlockVault — Iniciar Sesión</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  * { -webkit-user-select: none; -moz-user-select: none; user-select: none; }
  input { -webkit-user-select: text; -moz-user-select: text; user-select: text; }
  img { pointer-events: none; -webkit-user-drag: none; }
  :root {
    --bg:#F4F4F6; --surface:#FFFFFF; --surface-2:#EBEBEF;
    --border:rgba(0,0,0,0.08); --text:#13131A; --text-muted:#6B6F80;
    --accent:#6C63FF; --accent-rgb:108,99,255;
    --radius:14px; --radius-sm:8px;
    --shadow:0 2px 16px rgba(0,0,0,0.06); --shadow-lg:0 8px 40px rgba(0,0,0,0.12);
    --font-head:'Syne',sans-serif; --font-body:'Manrope',sans-serif;
  }
  [data-theme="dark"] { --bg:#0C0C10; --surface:#14141C; --surface-2:#1E1E2A; --border:rgba(255,255,255,0.07); --text:#EAEAF2; --text-muted:#8888A0; --shadow:0 2px 16px rgba(0,0,0,0.4); --shadow-lg:0 8px 40px rgba(0,0,0,0.6); }
  html,body { height:100%; background:var(--bg); color:var(--text); font-family:var(--font-body); -webkit-font-smoothing:antialiased; overflow-x:hidden; transition:background .3s,color .3s; }
  .page { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px 16px; background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(var(--accent-rgb),.15) 0%,transparent 70%); }
  .bg-deco { position:fixed; pointer-events:none; z-index:0; }
  .bg-deco-1 { top:-100px; left:-100px; width:400px; height:400px; border-radius:50%; background:radial-gradient(circle,rgba(var(--accent-rgb),.08) 0%,transparent 70%); }
  .bg-deco-2 { bottom:-100px; right:-100px; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle,rgba(255,107,157,.06) 0%,transparent 70%); }
  .auth-box { position:relative; z-index:1; background:var(--surface); border:1px solid var(--border); border-radius:24px; padding:36px 32px; width:100%; max-width:420px; box-shadow:var(--shadow-lg); animation:fadeUp .5s ease both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
  .brand { text-align:center; margin-bottom:28px; }
  .brand-icon { width:56px; height:56px; border-radius:16px; background:linear-gradient(135deg,var(--accent),#a78bfa); display:inline-flex; align-items:center; justify-content:center; margin-bottom:12px; box-shadow:0 6px 20px rgba(var(--accent-rgb),.35); }
  .brand-name { font-family:var(--font-head); font-size:1.6rem; font-weight:800; background:linear-gradient(135deg,var(--text),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; letter-spacing:-.03em; }
  .brand-tagline { font-size:.8rem; color:var(--text-muted); margin-top:2px; }
  .tabs { display:flex; background:var(--surface-2); border-radius:var(--radius-sm); padding:3px; margin-bottom:24px; }
  .tab-btn { flex:1; padding:9px; text-align:center; background:none; border:none; cursor:pointer; font-family:var(--font-body); font-size:.88rem; font-weight:600; color:var(--text-muted); border-radius:6px; transition:background .2s,color .2s; }
  .tab-btn.active { background:var(--surface); color:var(--accent); box-shadow:var(--shadow); }
  .form-panel { display:none; } .form-panel.active { display:block; animation:fadeUp .3s ease; }
  .field { margin-bottom:14px; }
  .field label { display:block; margin-bottom:5px; font-size:.75rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--text-muted); }
  .input { width:100%; padding:11px 14px; background:var(--surface-2); border:1.5px solid var(--border); border-radius:var(--radius-sm); color:var(--text); font-family:var(--font-body); font-size:.93rem; transition:border-color .2s,box-shadow .2s; outline:none; }
  .input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(var(--accent-rgb),.15); background:var(--surface); }
  .img-picker { border:2px dashed var(--border); border-radius:var(--radius-sm); padding:16px 12px; cursor:pointer; transition:border-color .2s,background .2s; }
  .img-picker:hover { border-color:var(--accent); background:rgba(var(--accent-rgb),.03); }
  .img-picker input { display:none; }
  .img-picker-row { display:flex; align-items:center; gap:12px; }
  .img-picker-thumb { width:48px; height:48px; border-radius:50%; flex-shrink:0; background:var(--surface-2); border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .img-picker-thumb img { width:100%; height:100%; object-fit:cover; display:none; }
  .img-picker-label { font-size:.85rem; font-weight:600; color:var(--accent); }
  .img-picker-sub { font-size:.75rem; color:var(--text-muted); }
  .btn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:13px; border-radius:var(--radius-sm); background:var(--accent); color:#fff; border:none; font-family:var(--font-body); font-size:.95rem; font-weight:700; cursor:pointer; margin-top:6px; transition:filter .2s,transform .2s,box-shadow .2s; }
  .btn:hover { filter:brightness(1.1); transform:translateY(-1px); box-shadow:0 6px 20px rgba(var(--accent-rgb),.4); }
  .btn:disabled { opacity:.55; cursor:not-allowed; transform:none; filter:none; }
  .err-msg { background:rgba(239,68,68,.08); border:1px solid rgba(239,68,68,.2); color:#ef4444; font-size:.82rem; font-weight:500; padding:10px 14px; border-radius:var(--radius-sm); margin-top:10px; display:none; }
  .spinner { width:18px; height:18px; border-radius:50%; border:2.5px solid rgba(255,255,255,.3); border-top-color:#fff; animation:spin .7s linear infinite; display:inline-block; }
  @keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>
<div class="bg-deco bg-deco-1"></div>
<div class="bg-deco bg-deco-2"></div>
<div class="page">
  <div class="auth-box">
    <div class="brand">
      <div class="brand-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      </div>
      <div class="brand-name">BlockVault</div>
      <div class="brand-tagline">Tu espacio seguro de contenido</div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Iniciar Sesión</button>
      <button class="tab-btn" onclick="switchTab('register')">Registrarse</button>
    </div>
    <div class="form-panel active" id="panel-login">
      <div class="field"><label>Nombre de usuario</label><input class="input" type="text" id="login-nombre" placeholder="Tu nombre" autocomplete="off"></div>
      <div class="field"><label>Contraseña</label><input class="input" type="password" id="login-pass" placeholder="••••••••"></div>
      <div class="err-msg" id="login-err"></div>
      <button class="btn" id="btn-login" onclick="doLogin()">Entrar</button>
    </div>
    <div class="form-panel" id="panel-register">
      <div class="field"><label>Nombre de usuario</label><input class="input" type="text" id="reg-nombre" placeholder="Elige un nombre único" autocomplete="off"></div>
      <div class="field"><label>Contraseña</label><input class="input" type="password" id="reg-pass" placeholder="Mínimo 4 caracteres"></div>
      <div class="field">
        <label>Foto de perfil <span style="color:var(--text-muted);font-weight:400;text-transform:none;letter-spacing:0">(opcional)</span></label>
        <div class="img-picker" onclick="document.getElementById('reg-foto-input').click()">
          <input type="file" id="reg-foto-input" accept="image/*" onchange="previewAvatar(this)">
          <div class="img-picker-row">
            <div class="img-picker-thumb" id="avatar-thumb">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" opacity="0.4"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
              <img id="avatar-preview" src="" alt="">
            </div>
            <div><div class="img-picker-label">Subir foto</div><div class="img-picker-sub">JPG, PNG, WEBP · Máx 3MB</div></div>
          </div>
        </div>
      </div>
      <div class="err-msg" id="reg-err"></div>
      <button class="btn" id="btn-reg" onclick="doRegister()">Crear cuenta</button>
    </div>
  </div>
</div>
<script>
(function () {
  var API = 'https://script.google.com/macros/s/AKfycby_q9XZ8vYBsnr0G5PZGapHZh1iZ-GFBJqychgMnZ-hs3Napp1fWE_RfisJ91B2ZBwQ/exec';
  var t = localStorage.getItem('bv_theme') || 'light';
  var a = localStorage.getItem('bv_accent') || '#6C63FF';
  document.documentElement.setAttribute('data-theme', t);
  applyAccent(a);
  function applyAccent(hex) {
    try { var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); document.documentElement.style.setProperty('--accent',hex); document.documentElement.style.setProperty('--accent-rgb',r+','+g+','+b); } catch(e) {}
  }
  try { if (JSON.parse(localStorage.getItem('bv_session')||'null')) { location.href='main.html'; return; } } catch(e) {}
  function api(p){ return fetch(API,{method:'POST',body:JSON.stringify(p)}).then(function(r){return r.json();}); }
  function showErr(id,msg){ var el=document.getElementById(id); el.textContent=msg; el.style.display='block'; }
  function hideErr(id){ document.getElementById(id).style.display='none'; }
  function setLoading(id,on){ var b=document.getElementById(id); b.disabled=on; b.innerHTML=on?'<span class="spinner"></span>':(id==='btn-login'?'Entrar':'Crear cuenta'); }
  window.switchTab=function(tab){ document.querySelectorAll('.tab-btn').forEach(function(b,i){b.classList.toggle('active',(i===0)===(tab==='login'));}); document.getElementById('panel-login').classList.toggle('active',tab==='login'); document.getElementById('panel-register').classList.toggle('active',tab==='register'); };
  var avatarBase64='';
  window.previewAvatar=function(input){ var f=input.files[0]; if(!f)return; if(f.size>3*1024*1024){showErr('reg-err','Máx 3MB.');return;} var r=new FileReader(); r.onload=function(e){ avatarBase64=e.target.result; var img=document.getElementById('avatar-preview'); img.src=avatarBase64; img.style.display='block'; document.querySelector('#avatar-thumb svg').style.display='none'; }; r.readAsDataURL(f); };
  window.doLogin=function(){ hideErr('login-err'); var nombre=document.getElementById('login-nombre').value.trim(); var pass=document.getElementById('login-pass').value; if(!nombre||!pass)return showErr('login-err','Completa todos los campos.'); setLoading('btn-login',true); api({action:'iniciarSesion',nombre:nombre,contrasena:pass}).then(function(res){ setLoading('btn-login',false); if(!res.ok)return showErr('login-err',res.msg); localStorage.setItem('bv_session',JSON.stringify(res)); location.href='main.html'; }).catch(function(){ setLoading('btn-login',false); showErr('login-err','Error de conexión.'); }); };
  window.doRegister=function(){ hideErr('reg-err'); var nombre=document.getElementById('reg-nombre').value.trim(); var pass=document.getElementById('reg-pass').value; if(!nombre||!pass)return showErr('reg-err','Completa todos los campos.'); if(nombre.length<3)return showErr('reg-err','Mínimo 3 caracteres.'); if(pass.length<4)return showErr('reg-err','Contraseña de al menos 4 caracteres.'); setLoading('btn-reg',true); api({action:'registrarUsuario',datos:{nombre:nombre,contrasena:pass,fotoPerfil:avatarBase64}}).then(function(res){ setLoading('btn-reg',false); if(!res.ok)return showErr('reg-err',res.msg); localStorage.setItem('bv_session',JSON.stringify(res)); location.href='main.html'; }).catch(function(){ setLoading('btn-reg',false); showErr('reg-err','Error de conexión.'); }); };
  document.addEventListener('keydown',function(e){ if(e.key!=='Enter')return; var p=document.querySelector('.form-panel.active').id; if(p==='panel-login')window.doLogin(); else window.doRegister(); });
})();
</script>
</body>
</html>
