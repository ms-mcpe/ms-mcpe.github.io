<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlockVault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  * { -webkit-user-select: none; -moz-user-select: none; user-select: none; -webkit-user-drag: none; }
  input, textarea { -webkit-user-select: text; -moz-user-select: text; user-select: text; }
  img { pointer-events: none; -webkit-user-drag: none; }
  :root {
    --bg:#F4F4F6; --surface:#FFFFFF; --surface-2:#EBEBEF;
    --border:rgba(0,0,0,0.08); --text:#13131A; --text-muted:#6B6F80;
    --accent:#6C63FF; --accent-rgb:108,99,255;
    --radius:14px; --radius-sm:8px;
    --shadow:0 2px 16px rgba(0,0,0,0.06); --shadow-lg:0 8px 40px rgba(0,0,0,0.12);
    --font-head:'Syne',sans-serif; --font-body:'Manrope',sans-serif;
    --topbar-h:64px; --sidebar-w:260px;
    --rol-usuario:#6B6F80; --rol-admin:#3B82F6; --rol-owner:#F59E0B;
  }
  [data-theme="dark"] { --bg:#0C0C10; --surface:#14141C; --surface-2:#1E1E2A; --border:rgba(255,255,255,0.07); --text:#EAEAF2; --text-muted:#8888A0; --shadow:0 2px 16px rgba(0,0,0,0.4); --shadow-lg:0 8px 40px rgba(0,0,0,0.6); }
  html,body { height:100%; background:var(--bg); color:var(--text); font-family:var(--font-body); -webkit-font-smoothing:antialiased; transition:background .3s,color .3s; overflow-x:hidden; }

  .topbar { position:fixed; top:0; left:0; right:0; z-index:100; height:var(--topbar-h); background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; gap:12px; box-shadow:var(--shadow); }
  .topbar-btn { background:none; border:none; cursor:pointer; width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--text-muted); transition:background .2s,color .2s; flex-shrink:0; }
  .topbar-btn:hover { background:var(--surface-2); color:var(--text); }
  .topbar-logo { flex:1; text-align:center; font-family:var(--font-head); font-size:1.25rem; font-weight:800; letter-spacing:-.02em; background:linear-gradient(135deg,var(--accent),#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .avatar { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,var(--accent),#a78bfa); display:flex; align-items:center; justify-content:center; font-family:var(--font-head); font-size:.85rem; font-weight:700; color:#fff; cursor:pointer; overflow:hidden; border:2px solid rgba(var(--accent-rgb),.35); flex-shrink:0; transition:transform .2s; }
  .avatar:hover { transform:scale(1.06); }
  .avatar img { width:100%; height:100%; object-fit:cover; pointer-events:none; }

  .sidebar-overlay { position:fixed; inset:0; z-index:89; background:rgba(0,0,0,.45); backdrop-filter:blur(3px); opacity:0; pointer-events:none; transition:opacity .3s; }
  .sidebar-overlay.show { opacity:1; pointer-events:all; }
  .sidebar { position:fixed; top:var(--topbar-h); left:0; bottom:0; width:var(--sidebar-w); z-index:90; background:var(--surface); border-right:1px solid var(--border); transform:translateX(-100%); transition:transform .3s cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column; padding:16px 12px; overflow-y:auto; }
  .sidebar.open { transform:translateX(0); }
  .nav-item { display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:var(--radius-sm); cursor:pointer; transition:background .2s,color .2s; color:var(--text-muted); font-weight:500; font-size:.92rem; }
  .nav-item:hover,.nav-item.active { background:rgba(var(--accent-rgb),.1); color:var(--accent); }
  .nav-item.danger:hover { background:rgba(239,68,68,.1); color:#ef4444; }
  .nav-item svg { flex-shrink:0; }
  .sidebar-spacer { flex:1; }
  .sidebar-section { font-size:.68rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--text-muted); padding:8px 16px 4px; margin-top:8px; }

  .page-content { padding-top:var(--topbar-h); min-height:100vh; }
  .feed { max-width:620px; margin:0 auto; padding:20px 16px 100px; }

  /* ROL BADGE */
  .rol-badge { display:inline-flex; align-items:center; font-size:.62rem; font-weight:700; letter-spacing:.05em; text-transform:uppercase; padding:2px 6px; border-radius:999px; border:1px solid currentColor; line-height:1.4; flex-shrink:0; }
  .rol-badge.usuario { color:var(--rol-usuario); border-color:var(--rol-usuario); background:rgba(107,111,128,.08); }
  .rol-badge.admin    { color:var(--rol-admin);   border-color:var(--rol-admin);   background:rgba(59,130,246,.1); }
  .rol-badge.owner    { color:var(--rol-owner);   border-color:var(--rol-owner);   background:rgba(245,158,11,.1); }

  /* POST CARD */
  .post-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); transition:box-shadow .2s; margin-bottom:14px; animation:fadeUp .35s ease both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .post-card:hover { box-shadow:var(--shadow-lg); }
  .post-header { display:flex; align-items:center; gap:11px; padding:14px 16px 8px; position:relative; }
  .post-av { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,var(--accent),#a78bfa); display:flex; align-items:center; justify-content:center; font-family:var(--font-head); font-size:.8rem; font-weight:700; color:#fff; overflow:hidden; flex-shrink:0; border:1.5px solid rgba(var(--accent-rgb),.2); }
  .post-av img { width:100%; height:100%; object-fit:cover; }
  .post-meta { flex:1; min-width:0; }
  .post-author-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .post-author { font-weight:700; font-size:.87rem; cursor:pointer; transition:color .2s; }
  .post-author:hover { color:var(--accent); }
  .post-date { font-size:.72rem; color:var(--text-muted); }
  .post-body { padding:2px 16px 12px; }
  .post-title { font-family:var(--font-head); font-weight:700; font-size:1rem; margin-bottom:5px; }
  .post-desc { font-size:.87rem; color:var(--text-muted); line-height:1.55; word-break:break-word; }

  /* VER MÁS */
  .ver-mas-btn, .ver-menos-btn { background:none; border:none; cursor:pointer; color:var(--accent); font-size:.82rem; font-weight:700; padding:0; font-family:var(--font-body); }
  .ver-mas-btn:hover, .ver-menos-btn:hover { text-decoration:underline; }
  .desc-full { display:none; }
  .desc-full.visible { display:inline; }
  .desc-truncated.hidden { display:none; }

  .post-img { width:100%; max-height:380px; object-fit:cover; display:block; }

  /* MENÚ 3 PUNTOS */
  .post-menu-wrap { position:relative; flex-shrink:0; }
  .post-menu-btn { background:none; border:none; cursor:pointer; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--text-muted); transition:background .2s,color .2s; }
  .post-menu-btn:hover { background:var(--surface-2); color:var(--text); }
  .post-dropdown { position:absolute; top:34px; right:0; z-index:50; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); box-shadow:var(--shadow-lg); min-width:150px; overflow:hidden; animation:fadeDown .15s ease; }
  @keyframes fadeDown { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
  .post-dropdown-item { display:flex; align-items:center; gap:10px; padding:11px 16px; cursor:pointer; font-size:.87rem; font-weight:500; color:var(--text); transition:background .15s; }
  .post-dropdown-item:hover { background:var(--surface-2); }
  .post-dropdown-item.danger { color:#ef4444; }
  .post-dropdown-item.danger:hover { background:rgba(239,68,68,.08); }

  /* POST FOOTER & COMENTARIOS */
  .post-footer { border-top:1px solid var(--border); padding:8px 16px; display:flex; align-items:center; }
  .comments-toggle { background:none; border:none; cursor:pointer; color:var(--text-muted); font-size:.82rem; font-weight:600; font-family:var(--font-body); display:flex; align-items:center; gap:6px; padding:5px 8px; border-radius:var(--radius-sm); transition:background .2s,color .2s; }
  .comments-toggle:hover { background:var(--surface-2); color:var(--text); }
  .comments-toggle.active { color:var(--accent); }
  .comments-panel { border-top:1px solid var(--border); background:var(--surface-2); display:none; }
  .comments-panel.open { display:block; }
  .comments-list { padding:12px 14px 0; max-height:320px; overflow-y:auto; }
  .comments-list::-webkit-scrollbar{width:3px} .comments-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
  .comment-item { display:flex; gap:9px; margin-bottom:10px; align-items:flex-start; }
  .comment-av { width:28px; height:28px; border-radius:50%; background:linear-gradient(135deg,var(--accent),#a78bfa); display:flex; align-items:center; justify-content:center; font-size:.68rem; font-weight:700; color:#fff; flex-shrink:0; overflow:hidden; }
  .comment-av img { width:100%; height:100%; object-fit:cover; }
  .comment-body { flex:1; min-width:0; }
  .comment-bubble { background:var(--surface); border-radius:0 var(--radius-sm) var(--radius-sm) var(--radius-sm); padding:7px 10px; position:relative; display:inline-block; max-width:100%; }
  .comment-author-row { display:flex; align-items:center; gap:5px; flex-wrap:wrap; margin-bottom:2px; }
  .comment-author { font-size:.77rem; font-weight:700; }
  .comment-text { font-size:.83rem; color:var(--text); line-height:1.5; word-break:break-word; }
  .comment-meta { display:flex; align-items:center; gap:8px; margin-top:3px; }
  .comment-time { font-size:.68rem; color:var(--text-muted); }
  .comment-del { background:none; border:none; cursor:pointer; color:var(--text-muted); padding:0; display:flex; align-items:center; transition:color .2s; font-size:.68rem; }
  .comment-del:hover { color:#ef4444; }
  .comments-empty { text-align:center; padding:16px; color:var(--text-muted); font-size:.83rem; }
  .comments-loading { text-align:center; padding:12px; color:var(--text-muted); font-size:.82rem; }
  .comment-input-wrap { padding:10px 14px 12px; display:flex; gap:8px; align-items:center; border-top:1px solid var(--border); }
  .comment-input { flex:1; padding:8px 14px; background:var(--surface); border:1.5px solid var(--border); border-radius:20px; color:var(--text); font-family:var(--font-body); font-size:.85rem; outline:none; transition:border-color .2s; }
  .comment-input:focus { border-color:var(--accent); }
  .comment-send { background:var(--accent); border:none; cursor:pointer; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; flex-shrink:0; transition:filter .2s,transform .2s; }
  .comment-send:hover { filter:brightness(1.1); transform:scale(1.08); }
  .comment-send:disabled { opacity:.5; cursor:not-allowed; transform:none; }

  /* FAB */
  .fab { position:fixed; bottom:28px; right:24px; z-index:95; width:54px; height:54px; background:var(--accent); color:#fff; border:none; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 4px 20px rgba(var(--accent-rgb),.45); transition:transform .2s; }
  .fab:hover { transform:scale(1.1) rotate(45deg); }

  /* MODALES */
  .modal-bg { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,.55); backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:opacity .25s; }
  .modal-bg.show { opacity:1; pointer-events:all; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:28px; width:100%; max-width:480px; box-shadow:var(--shadow-lg); transform:translateY(20px); transition:transform .25s; max-height:90vh; overflow-y:auto; }
  .modal-bg.show .modal { transform:translateY(0); }
  .modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .modal-title { font-family:var(--font-head); font-size:1.1rem; font-weight:700; }
  .modal-close { background:var(--surface-2); border:none; cursor:pointer; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--text-muted); transition:background .2s; }
  .modal-close:hover { background:var(--border); }
  .field { margin-bottom:14px; }
  .field label { display:block; margin-bottom:5px; font-size:.73rem; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--text-muted); }
  .input { width:100%; padding:11px 14px; background:var(--surface-2); border:1.5px solid var(--border); border-radius:var(--radius-sm); color:var(--text); font-family:var(--font-body); font-size:.93rem; transition:border-color .2s,box-shadow .2s; outline:none; }
  .input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(var(--accent-rgb),.15); background:var(--surface); }
  textarea.input { resize:vertical; min-height:90px; }
  .img-picker { border:2px dashed var(--border); border-radius:var(--radius-sm); padding:18px; text-align:center; cursor:pointer; transition:border-color .2s,background .2s; }
  .img-picker:hover { border-color:var(--accent); background:rgba(var(--accent-rgb),.03); }
  .img-picker input { display:none; }
  .img-picker-hint { font-size:.82rem; color:var(--text-muted); }
  .img-preview { width:100%; max-height:180px; object-fit:contain; border-radius:var(--radius-sm); display:none; margin-bottom:8px; }
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:10px 22px; border-radius:var(--radius-sm); font-family:var(--font-body); font-weight:600; font-size:.9rem; cursor:pointer; transition:all .2s; border:1.5px solid transparent; }
  .btn-primary { background:var(--accent); color:#fff; border-color:var(--accent); }
  .btn-primary:hover { filter:brightness(1.1); transform:translateY(-1px); }
  .btn-primary:disabled { opacity:.5; cursor:not-allowed; transform:none; filter:none; }
  .btn-danger { background:#ef4444; color:#fff; border-color:#ef4444; }
  .btn-danger:hover { filter:brightness(1.1); }
  .btn-secondary { background:transparent; color:var(--text); border-color:var(--border); }
  .btn-secondary:hover { background:var(--surface-2); }
  .btn-full { width:100%; }
  .confirm-text { font-size:.92rem; color:var(--text-muted); margin-bottom:20px; line-height:1.6; }
  .confirm-btns { display:flex; gap:10px; }
  .empty-state { text-align:center; padding:60px 20px; color:var(--text-muted); }
  .spinner-wrap { text-align:center; padding:40px; }
  .spinner { width:28px; height:28px; border-radius:50%; border:3px solid var(--border); border-top-color:var(--accent); animation:spin .7s linear infinite; display:inline-block; }
  .spinner-sm { width:14px; height:14px; border-width:2px; }
  @keyframes spin { to{transform:rotate(360deg)} }
  #toast-container { position:fixed; bottom:90px; right:20px; z-index:999; display:flex; flex-direction:column; gap:10px; align-items:flex-end; }
  .toast { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px 18px; box-shadow:var(--shadow-lg); font-size:.87rem; font-weight:500; animation:toastIn .3s ease,toastOut .4s 2.6s forwards; max-width:300px; }
  .toast.success { border-left:3px solid #22c55e; }
  .toast.error   { border-left:3px solid #ef4444; }
  @keyframes toastIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
  @keyframes toastOut { from{opacity:1} to{opacity:0;pointer-events:none} }
  ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
</style>
</head>
<body>

<div class="topbar">
  <button class="topbar-btn" onclick="toggleSidebar()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div class="topbar-logo">BlockVault</div>
  <div class="avatar" id="top-avatar" onclick="location.href='perfil.html'"><span id="top-avatar-letter"></span></div>
</div>

<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>
<nav class="sidebar" id="sidebar">
  <div class="sidebar-section">Navegación</div>
  <a class="nav-item active" onclick="closeSidebar()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Inicio
  </a>
  <a class="nav-item" onclick="location.href='perfil.html'">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>Mi Perfil
  </a>
  <div class="sidebar-spacer"></div>
  <div class="sidebar-section">Ajustes</div>
  <a class="nav-item" onclick="location.href='ajustes.html'">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Ajustes
  </a>
  <a class="nav-item danger" onclick="logout()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Cerrar sesión
  </a>
</nav>

<div class="page-content">
  <div class="feed" id="feed"><div class="spinner-wrap"><div class="spinner"></div></div></div>
</div>

<button class="fab" onclick="openCreateModal()">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- MODAL CREAR -->
<div class="modal-bg" id="modal-crear">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Nueva publicación</div>
      <button class="modal-close" onclick="closeCreateModal()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="field"><label>Título *</label><input class="input" id="crear-titulo" type="text" placeholder="¿Sobre qué trata?" maxlength="120"></div>
    <div class="field"><label>Descripción</label><textarea class="input" id="crear-desc" placeholder="Cuéntanos más..." maxlength="2000" rows="4"></textarea></div>
    <div class="field">
      <label>Imagen <span style="color:var(--text-muted);font-weight:400;text-transform:none;letter-spacing:0">(opcional)</span></label>
      <div class="img-picker" onclick="document.getElementById('crear-img-input').click()">
        <input type="file" id="crear-img-input" accept="image/*" onchange="previewCrearImg(this)">
        <img class="img-preview" id="crear-img-preview" src="" alt="">
        <p class="img-picker-hint" id="crear-img-hint">Haz clic para subir imagen</p>
      </div>
    </div>
    <button class="btn btn-primary btn-full" id="btn-crear" onclick="doCrear()">Publicar</button>
  </div>
</div>

<!-- MODAL EDITAR PUB -->
<div class="modal-bg" id="modal-editar-pub">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Editar publicación</div>
      <button class="modal-close" onclick="closeEditPubModal()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="field"><label>Título *</label><input class="input" id="editar-titulo" type="text" maxlength="120"></div>
    <div class="field"><label>Descripción</label><textarea class="input" id="editar-desc" maxlength="2000" rows="4"></textarea></div>
    <div class="field">
      <label>Imagen</label>
      <div class="img-picker" onclick="document.getElementById('editar-img-input').click()">
        <input type="file" id="editar-img-input" accept="image/*" onchange="previewEditarImg(this)">
        <img class="img-preview" id="editar-img-preview" src="" alt="">
        <p class="img-picker-hint" id="editar-img-hint">Haz clic para cambiar imagen</p>
      </div>
      <button type="button" id="btn-quitar-img" onclick="quitarImagen()" style="display:none;margin-top:8px;background:none;border:none;cursor:pointer;font-size:.8rem;color:#ef4444;font-weight:600;padding:0;">✕ Quitar imagen</button>
    </div>
    <button class="btn btn-primary btn-full" id="btn-guardar-pub" onclick="doEditarPub()">Guardar cambios</button>
  </div>
</div>

<!-- MODAL CONFIRMAR ELIMINAR -->
<div class="modal-bg" id="modal-confirmar">
  <div class="modal" style="max-width:380px">
    <div class="modal-header"><div class="modal-title">Eliminar publicación</div></div>
    <p class="confirm-text">¿Estás seguro? Esta acción no se puede deshacer.</p>
    <div class="confirm-btns">
      <button class="btn btn-secondary" style="flex:1" onclick="closeConfirmarModal()">Cancelar</button>
      <button class="btn btn-danger" style="flex:1" id="btn-confirmar-elim" onclick="doEliminar()">Eliminar</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
(function () {
  var API = 'https://script.google.com/macros/s/AKfycby_q9XZ8vYBsnr0G5PZGapHZh1iZ-GFBJqychgMnZ-hs3Napp1fWE_RfisJ91B2ZBwQ/exec';
  var session = null;
  try { session = JSON.parse(localStorage.getItem('bv_session') || 'null'); } catch(e) {}
  if (!session) { location.href = 'index.html'; return; }

  var miRol        = session.rol || 'usuario';
  var puedeModerar = (miRol === 'admin' || miRol === 'owner');

  function applyAccent(hex) {
    try { var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); document.documentElement.style.setProperty('--accent',hex); document.documentElement.style.setProperty('--accent-rgb',r+','+g+','+b); } catch(e) {}
  }
  document.documentElement.setAttribute('data-theme', localStorage.getItem('bv_theme')||'light');
  applyAccent(localStorage.getItem('bv_accent')||'#6C63FF');

  var av = document.getElementById('top-avatar');
  if (session.fotoPerfil) av.innerHTML = '<img src="'+session.fotoPerfil+'" alt="">';
  else document.getElementById('top-avatar-letter').textContent = (session.nombre||'?')[0].toUpperCase();

  function api(p) { return fetch(API, {method:'POST', body:JSON.stringify(p)}).then(function(r){return r.json();}); }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fmtDate(d) { try { var dt=new Date(d),diff=(new Date()-dt)/1000; if(diff<60)return 'ahora mismo'; if(diff<3600)return Math.floor(diff/60)+' min'; if(diff<86400)return Math.floor(diff/3600)+'h'; return dt.toLocaleDateString('es',{day:'numeric',month:'short',year:'numeric'}); } catch(_){return '';} }
  function toast(msg,type) { var t=document.createElement('div'); t.className='toast '+(type||'info'); t.textContent=msg; document.getElementById('toast-container').appendChild(t); setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t);},3100); }
  function rolBadge(rol) { var lbl=rol==='owner'?'👑 owner':rol==='admin'?'🛡 admin':'usuario'; return '<span class="rol-badge '+rol+'">'+lbl+'</span>'; }

  window.logout        = function() { localStorage.removeItem('bv_session'); location.href='index.html'; };
  window.toggleSidebar = function() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); };
  window.closeSidebar  = function() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); };
  window.verPerfil     = function(uuid) { localStorage.setItem('bv_view_profile', uuid); location.href='perfil.html'; };

  document.addEventListener('click', function(e) {
    if (!e.target.closest('.post-menu-wrap')) document.querySelectorAll('.post-dropdown').forEach(function(d){d.remove();});
  });

  // ── DESC: "ver más" si supera 100 palabras ─────────────────
  function buildDesc(texto) {
    if (!texto) return '';
    var words = texto.trim().split(/\s+/);
    if (words.length <= 100) {
      return '<p class="post-desc">'+esc(texto)+'</p>';
    }
    var short = words.slice(0, 100).join(' ');
    return '<p class="post-desc">'
      + '<span class="desc-truncated">'+esc(short)+'... <button class="ver-mas-btn" onclick="verMas(this)">ver más</button></span>'
      + '<span class="desc-full">'+esc(texto)+' <button class="ver-menos-btn" onclick="verMenos(this)">ver menos</button></span>'
      + '</p>';
  }
  window.verMas   = function(btn) { var p=btn.closest('.post-desc'); p.querySelector('.desc-truncated').classList.add('hidden'); p.querySelector('.desc-full').classList.add('visible'); };
  window.verMenos = function(btn) { var p=btn.closest('.post-desc'); p.querySelector('.desc-truncated').classList.remove('hidden'); p.querySelector('.desc-full').classList.remove('visible'); };

  // ── FEED ──────────────────────────────────────────────────
  var postsCache = {};
  function loadFeed() {
    api({action:'obtenerPublicaciones'}).then(function(res) {
      var feed = document.getElementById('feed');
      if (!res||!res.ok) { feed.innerHTML='<div class="empty-state">Error al cargar.</div>'; return; }
      if (!res.publicaciones||!res.publicaciones.length) { feed.innerHTML='<div class="empty-state">Aún no hay publicaciones.<br>¡Sé el primero!</div>'; return; }
      postsCache = {};
      res.publicaciones.forEach(function(p){ postsCache[p.uuidPub] = p; });
      feed.innerHTML = res.publicaciones.map(buildCard).join('');
    }).catch(function(){ document.getElementById('feed').innerHTML='<div class="empty-state">No se pudo conectar.</div>'; });
  }

  function buildCard(p) {
    var esMio     = (p.uuidUsuario === session.uuid);
    var puedoMenu = esMio || puedeModerar;
    var avH = p.fotoAutor ? '<div class="post-av"><img src="'+p.fotoAutor+'" alt=""></div>' : '<div class="post-av">'+(p.nombreUsuario||'?')[0].toUpperCase()+'</div>';
    var menuBtn = puedoMenu
      ? '<div class="post-menu-wrap"><button class="post-menu-btn" onclick="toggleMenu(event,\''+p.uuidPub+'\')"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg></button></div>'
      : '';
    var imgH     = p.imagen ? '<img class="post-img" src="'+p.imagen+'" alt="">' : '';
    var numC     = p.numComentarios || 0;
    var labelC   = numC === 1 ? '1 comentario' : numC + ' comentarios';

    return '<div class="post-card" id="card-'+p.uuidPub+'">'
      + '<div class="post-header">'+avH
      + '<div class="post-meta"><div class="post-author-row"><span class="post-author" onclick="verPerfil(\''+p.uuidUsuario+'\')">'+esc(p.nombreUsuario)+'</span>'+rolBadge(p.rolAutor||'usuario')+'</div>'
      + '<div class="post-date">'+fmtDate(p.fecha)+'</div></div>'
      + menuBtn + '</div>'
      + '<div class="post-body"><div class="post-title">'+esc(p.titulo)+'</div>'
      + buildDesc(p.descripcion) + '</div>'
      + imgH
      + '<div class="post-footer">'
      + '<button class="comments-toggle" id="ctoggle-'+p.uuidPub+'" onclick="toggleComments(\''+p.uuidPub+'\')">'
      + '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>'
      + '<span id="clabel-'+p.uuidPub+'">'+labelC+'</span></button>'
      + '</div>'
      + '<div class="comments-panel" id="cpanel-'+p.uuidPub+'">'
      + '<div class="comments-list" id="clist-'+p.uuidPub+'"><div class="comments-loading"><div class="spinner spinner-sm" style="display:inline-block"></div></div></div>'
      + '<div class="comment-input-wrap">'
      + '<input class="comment-input" id="cinput-'+p.uuidPub+'" placeholder="Escribe un comentario..." maxlength="500" onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();sendComment(\''+p.uuidPub+'\');}">'
      + '<button class="comment-send" id="csend-'+p.uuidPub+'" onclick="sendComment(\''+p.uuidPub+'\')">'
      + '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>'
      + '</button></div></div>'
      + '</div>';
  }

  // ── MENÚ 3 PUNTOS ─────────────────────────────────────────
  window.toggleMenu = function(e, uuidPub) {
    e.stopPropagation();
    var existing = document.querySelector('.post-dropdown[data-pub="'+uuidPub+'"]');
    document.querySelectorAll('.post-dropdown').forEach(function(d){d.remove();});
    if (existing) return;
    var p = postsCache[uuidPub], esMio = p && p.uuidUsuario === session.uuid;
    var dd = document.createElement('div'); dd.className='post-dropdown'; dd.dataset.pub=uuidPub;
    if (esMio||puedeModerar) {
      var ei=document.createElement('div'); ei.className='post-dropdown-item';
      ei.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Editar';
      ei.onclick=function(){document.querySelectorAll('.post-dropdown').forEach(function(d){d.remove();}); openEditPubModal(uuidPub);};
      dd.appendChild(ei);
    }
    if (esMio||puedeModerar) {
      var di=document.createElement('div'); di.className='post-dropdown-item danger';
      di.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>Eliminar';
      di.onclick=function(){document.querySelectorAll('.post-dropdown').forEach(function(d){d.remove();}); openConfirmarModal(uuidPub);};
      dd.appendChild(di);
    }
    e.currentTarget.closest('.post-menu-wrap').appendChild(dd);
  };

  // ── COMENTARIOS ───────────────────────────────────────────
  var commentsLoaded = {};

  window.toggleComments = function(uuidPub) {
    var panel  = document.getElementById('cpanel-'+uuidPub);
    var toggle = document.getElementById('ctoggle-'+uuidPub);
    var isOpen = panel.classList.contains('open');
    panel.classList.toggle('open');
    toggle.classList.toggle('active');
    if (!isOpen && !commentsLoaded[uuidPub]) {
      loadComments(uuidPub);
    }
  };

  function loadComments(uuidPub) {
    api({action:'obtenerComentarios', uuidPub:uuidPub}).then(function(res) {
      commentsLoaded[uuidPub] = true;
      renderComments(uuidPub, res.comentarios || []);
    }).catch(function() {
      document.getElementById('clist-'+uuidPub).innerHTML = '<div class="comments-empty">Error al cargar comentarios</div>';
    });
  }

  function renderComments(uuidPub, comentarios) {
    var list = document.getElementById('clist-'+uuidPub);
    var pub  = postsCache[uuidPub];
    var esDuenoPub = pub && pub.uuidUsuario === session.uuid;

    if (!comentarios.length) {
      list.innerHTML = '<div class="comments-empty">Sin comentarios aún. ¡Sé el primero!</div>';
    } else {
      list.innerHTML = comentarios.map(function(c) {
        var puedoBorrar = (c.uuidUsuario === session.uuid) || esDuenoPub || puedeModerar;
        var avH = c.fotoUsuario ? '<img src="'+c.fotoUsuario+'" alt="">' : (c.nombreUsuario||'?')[0].toUpperCase();
        var delBtn = puedoBorrar
          ? '<button class="comment-del" onclick="delComment(\''+c.uuidComentario+'\',\''+uuidPub+'\')" title="Eliminar">'
            + '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>'
          : '';
        return '<div class="comment-item" id="comment-'+c.uuidComentario+'">'
          + '<div class="comment-av">'+avH+'</div>'
          + '<div class="comment-body">'
          + '<div class="comment-bubble">'
          + '<div class="comment-author-row"><span class="comment-author">'+esc(c.nombreUsuario)+'</span>'+rolBadge(c.rolUsuario||'usuario')+'</div>'
          + '<div class="comment-text">'+esc(c.texto)+'</div>'
          + '</div>'
          + '<div class="comment-meta"><span class="comment-time">'+fmtDate(c.fecha)+'</span>'+delBtn+'</div>'
          + '</div></div>';
      }).join('');
    }
    // Actualizar conteo
    var numC = comentarios.length;
    var lbl = document.getElementById('clabel-'+uuidPub);
    if (lbl) lbl.textContent = numC === 1 ? '1 comentario' : numC + ' comentarios';
    if (postsCache[uuidPub]) postsCache[uuidPub].numComentarios = numC;
  }

  window.sendComment = function(uuidPub) {
    var input = document.getElementById('cinput-'+uuidPub);
    var texto = input.value.trim();
    if (!texto) return;
    var btn = document.getElementById('csend-'+uuidPub);
    btn.disabled = true;
    api({action:'crearComentario', datos:{uuidPub:uuidPub, uuidUsuario:session.uuid, nombreUsuario:session.nombre, texto:texto}})
      .then(function(res) {
        btn.disabled = false;
        if (!res.ok) { toast(res.msg||'Error','error'); return; }
        input.value = '';
        loadComments(uuidPub); // recargar comentarios
      }).catch(function() { btn.disabled=false; toast('Error de conexión','error'); });
  };

  window.delComment = function(uuidComentario, uuidPub) {
    api({action:'eliminarComentario', uuidComentario:uuidComentario, uuidSolicitante:session.uuid})
      .then(function(res) {
        if (!res.ok) { toast(res.msg||'Error','error'); return; }
        loadComments(uuidPub);
      }).catch(function() { toast('Error de conexión','error'); });
  };

  // ── CREAR publicación ─────────────────────────────────────
  var crearImg = '';
  window.openCreateModal  = function() { document.getElementById('modal-crear').classList.add('show'); };
  window.closeCreateModal = function() {
    document.getElementById('modal-crear').classList.remove('show');
    document.getElementById('crear-titulo').value=''; document.getElementById('crear-desc').value='';
    document.getElementById('crear-img-preview').style.display='none'; document.getElementById('crear-img-hint').style.display=''; crearImg='';
  };
  window.previewCrearImg = function(input) {
    var f=input.files[0]; if(!f)return; if(f.size>5*1024*1024){toast('Máx 5MB','error');return;}
    var r=new FileReader(); r.onload=function(e){crearImg=e.target.result;var p=document.getElementById('crear-img-preview');p.src=crearImg;p.style.display='block';document.getElementById('crear-img-hint').style.display='none';}; r.readAsDataURL(f);
  };
  window.doCrear = function() {
    var titulo=document.getElementById('crear-titulo').value.trim(), desc=document.getElementById('crear-desc').value.trim();
    if(!titulo){toast('El título es requerido','error');return;}
    var btn=document.getElementById('btn-crear'); btn.disabled=true; btn.innerHTML='<div class="spinner" style="width:18px;height:18px;border-width:2px"></div>';
    api({action:'crearPublicacion',datos:{uuidUsuario:session.uuid,nombreUsuario:session.nombre,titulo:titulo,descripcion:desc,imagen:crearImg}})
      .then(function(res){btn.disabled=false;btn.textContent='Publicar';if(!res.ok){toast(res.msg||'Error','error');return;}window.closeCreateModal();toast('¡Publicado!','success');loadFeed();})
      .catch(function(){btn.disabled=false;btn.textContent='Publicar';toast('Error de conexión','error');});
  };

  // ── EDITAR publicación ────────────────────────────────────
  var editPubUuid='', editPubImg='', editPubQuitarImg=false;
  window.openEditPubModal = function(uuidPub) {
    var p=postsCache[uuidPub]; if(!p)return;
    editPubUuid=uuidPub; editPubImg=''; editPubQuitarImg=false;
    document.getElementById('editar-titulo').value=p.titulo||''; document.getElementById('editar-desc').value=p.descripcion||'';
    var prev=document.getElementById('editar-img-preview'), hint=document.getElementById('editar-img-hint'), qBtn=document.getElementById('btn-quitar-img');
    if(p.imagen){prev.src=p.imagen;prev.style.display='block';hint.style.display='none';qBtn.style.display='inline-block';}
    else{prev.style.display='none';hint.style.display='';qBtn.style.display='none';}
    document.getElementById('modal-editar-pub').classList.add('show');
  };
  window.closeEditPubModal = function() { document.getElementById('modal-editar-pub').classList.remove('show'); editPubUuid='';editPubImg='';editPubQuitarImg=false; };
  window.previewEditarImg  = function(input) {
    var f=input.files[0];if(!f)return;if(f.size>5*1024*1024){toast('Máx 5MB','error');return;}
    var r=new FileReader();r.onload=function(e){editPubImg=e.target.result;editPubQuitarImg=false;var p=document.getElementById('editar-img-preview');p.src=editPubImg;p.style.display='block';document.getElementById('editar-img-hint').style.display='none';document.getElementById('btn-quitar-img').style.display='inline-block';};r.readAsDataURL(f);
  };
  window.quitarImagen = function() { editPubQuitarImg=true;editPubImg='';document.getElementById('editar-img-preview').style.display='none';document.getElementById('editar-img-hint').style.display='';document.getElementById('btn-quitar-img').style.display='none'; };
  window.doEditarPub = function() {
    var titulo=document.getElementById('editar-titulo').value.trim(), desc=document.getElementById('editar-desc').value.trim();
    if(!titulo){toast('El título es requerido','error');return;}
    var btn=document.getElementById('btn-guardar-pub');btn.disabled=true;btn.textContent='Guardando...';
    api({action:'editarPublicacion',uuidSolicitante:session.uuid,datos:{uuidPub:editPubUuid,titulo:titulo,descripcion:desc,imagen:editPubImg,quitarImagen:editPubQuitarImg}})
      .then(function(res){btn.disabled=false;btn.textContent='Guardar cambios';if(!res.ok){toast(res.msg||'Error','error');return;}window.closeEditPubModal();toast('Publicación editada','success');loadFeed();})
      .catch(function(){btn.disabled=false;btn.textContent='Guardar cambios';toast('Error de conexión','error');});
  };

  // ── ELIMINAR publicación ──────────────────────────────────
  var elimUuid='';
  window.openConfirmarModal  = function(uuidPub){elimUuid=uuidPub;document.getElementById('modal-confirmar').classList.add('show');};
  window.closeConfirmarModal = function(){document.getElementById('modal-confirmar').classList.remove('show');elimUuid='';};
  window.doEliminar = function() {
    if(!elimUuid)return;
    var btn=document.getElementById('btn-confirmar-elim');btn.disabled=true;btn.textContent='Eliminando...';
    api({action:'eliminarPublicacion',uuidPub:elimUuid,uuidSolicitante:session.uuid})
      .then(function(res){btn.disabled=false;btn.textContent='Eliminar';if(!res.ok){toast(res.msg||'Error','error');window.closeConfirmarModal();return;}window.closeConfirmarModal();toast('Publicación eliminada','success');loadFeed();})
      .catch(function(){btn.disabled=false;btn.textContent='Eliminar';toast('Error de conexión','error');});
  };

  loadFeed();
})();
</script>
</body>
</html>
