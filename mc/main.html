<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlockVault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  * { -webkit-user-select: none; -moz-user-select: none; user-select: none; -webkit-user-drag: none; }
  input, textarea { -webkit-user-select: text; -moz-user-select: text; user-select: text; }
  img { pointer-events: none; -webkit-user-drag: none; }
  :root {
    --bg:#F4F4F6; --surface:#FFFFFF; --surface-2:#EBEBEF;
    --border:rgba(0,0,0,0.08); --text:#13131A; --text-muted:#6B6F80;
    --accent:#6C63FF; --accent-rgb:108,99,255;
    --radius:14px; --radius-sm:8px;
    --shadow:0 2px 16px rgba(0,0,0,0.06); --shadow-lg:0 8px 40px rgba(0,0,0,0.12);
    --font-head:'Syne',sans-serif; --font-body:'Manrope',sans-serif;
    --topbar-h:64px; --sidebar-w:260px;
  }
  [data-theme="dark"] { --bg:#0C0C10; --surface:#14141C; --surface-2:#1E1E2A; --border:rgba(255,255,255,0.07); --text:#EAEAF2; --text-muted:#8888A0; --shadow:0 2px 16px rgba(0,0,0,0.4); --shadow-lg:0 8px 40px rgba(0,0,0,0.6); }
  html,body { height:100%; background:var(--bg); color:var(--text); font-family:var(--font-body); -webkit-font-smoothing:antialiased; transition:background .3s,color .3s; overflow-x:hidden; }
  .topbar { position:fixed; top:0; left:0; right:0; z-index:100; height:var(--topbar-h); background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; gap:12px; box-shadow:var(--shadow); }
  .topbar-btn { background:none; border:none; cursor:pointer; width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--text-muted); transition:background .2s,color .2s; flex-shrink:0; }
  .topbar-btn:hover { background:var(--surface-2); color:var(--text); }
  .topbar-logo { flex:1; text-align:center; font-family:var(--font-head); font-size:1.25rem; font-weight:800; letter-spacing:-.02em; background:linear-gradient(135deg,var(--accent),#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .avatar { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,var(--accent),#a78bfa); display:flex; align-items:center; justify-content:center; font-family:var(--font-head); font-size:.85rem; font-weight:700; color:#fff; cursor:pointer; overflow:hidden; border:2px solid rgba(var(--accent-rgb),.35); flex-shrink:0; transition:transform .2s; }
  .avatar:hover { transform:scale(1.06); }
  .avatar img { width:100%; height:100%; object-fit:cover; pointer-events:none; }
  .sidebar-overlay { position:fixed; inset:0; z-index:89; background:rgba(0,0,0,.45); backdrop-filter:blur(3px); opacity:0; pointer-events:none; transition:opacity .3s; }
  .sidebar-overlay.show { opacity:1; pointer-events:all; }
  .sidebar { position:fixed; top:var(--topbar-h); left:0; bottom:0; width:var(--sidebar-w); z-index:90; background:var(--surface); border-right:1px solid var(--border); transform:translateX(-100%); transition:transform .3s cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column; padding:16px 12px; overflow-y:auto; }
  .sidebar.open { transform:translateX(0); }
  .nav-item { display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:var(--radius-sm); cursor:pointer; transition:background .2s,color .2s; color:var(--text-muted); font-weight:500; font-size:.92rem; }
  .nav-item:hover,.nav-item.active { background:rgba(var(--accent-rgb),.1); color:var(--accent); }
  .nav-item.danger:hover { background:rgba(239,68,68,.1); color:#ef4444; }
  .nav-item svg { flex-shrink:0; }
  .sidebar-spacer { flex:1; }
  .sidebar-section { font-size:.68rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--text-muted); padding:8px 16px 4px; margin-top:8px; }
  .page-content { padding-top:var(--topbar-h); min-height:100vh; }
  .feed { max-width:620px; margin:0 auto; padding:20px 16px 100px; }
  .post-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); transition:transform .2s,box-shadow .2s; margin-bottom:14px; animation:fadeUp .35s ease both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .post-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-lg); }
  .post-header { display:flex; align-items:center; gap:11px; padding:14px 16px 8px; }
  .post-av { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,var(--accent),#a78bfa); display:flex; align-items:center; justify-content:center; font-family:var(--font-head); font-size:.8rem; font-weight:700; color:#fff; overflow:hidden; flex-shrink:0; border:1.5px solid rgba(var(--accent-rgb),.2); }
  .post-av img { width:100%; height:100%; object-fit:cover; }
  .post-meta { flex:1; min-width:0; }
  .post-author { font-weight:700; font-size:.87rem; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:color .2s; }
  .post-author:hover { color:var(--accent); }
  .post-date { font-size:.73rem; color:var(--text-muted); }
  .post-body { padding:2px 16px 16px; }
  .post-title { font-family:var(--font-head); font-weight:700; font-size:1rem; margin-bottom:5px; }
  .post-desc { font-size:.87rem; color:var(--text-muted); line-height:1.55; word-break:break-word; }
  .post-img { width:100%; max-height:380px; object-fit:cover; display:block; margin-top:10px; }
  .fab { position:fixed; bottom:28px; right:24px; z-index:95; width:54px; height:54px; background:var(--accent); color:#fff; border:none; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 4px 20px rgba(var(--accent-rgb),.45); transition:transform .2s; }
  .fab:hover { transform:scale(1.1) rotate(45deg); }
  .modal-bg { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,.55); backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:opacity .25s; }
  .modal-bg.show { opacity:1; pointer-events:all; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:28px; width:100%; max-width:480px; box-shadow:var(--shadow-lg); transform:translateY(20px); transition:transform .25s; max-height:90vh; overflow-y:auto; }
  .modal-bg.show .modal { transform:translateY(0); }
  .modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .modal-title { font-family:var(--font-head); font-size:1.1rem; font-weight:700; }
  .modal-close { background:var(--surface-2); border:none; cursor:pointer; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--text-muted); transition:background .2s; }
  .modal-close:hover { background:var(--border); }
  .field { margin-bottom:14px; }
  .field label { display:block; margin-bottom:5px; font-size:.73rem; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--text-muted); }
  .input { width:100%; padding:11px 14px; background:var(--surface-2); border:1.5px solid var(--border); border-radius:var(--radius-sm); color:var(--text); font-family:var(--font-body); font-size:.93rem; transition:border-color .2s,box-shadow .2s; outline:none; }
  .input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(var(--accent-rgb),.15); background:var(--surface); }
  textarea.input { resize:vertical; min-height:90px; }
  .img-picker { border:2px dashed var(--border); border-radius:var(--radius-sm); padding:18px; text-align:center; cursor:pointer; transition:border-color .2s,background .2s; }
  .img-picker:hover { border-color:var(--accent); background:rgba(var(--accent-rgb),.03); }
  .img-picker input { display:none; }
  .img-picker-hint { font-size:.82rem; color:var(--text-muted); }
  .img-preview { width:100%; max-height:180px; object-fit:contain; border-radius:var(--radius-sm); display:none; margin-bottom:8px; }
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:10px 22px; border-radius:var(--radius-sm); font-family:var(--font-body); font-weight:600; font-size:.9rem; cursor:pointer; transition:all .2s; border:1.5px solid transparent; }
  .btn-primary { background:var(--accent); color:#fff; border-color:var(--accent); }
  .btn-primary:hover { filter:brightness(1.1); transform:translateY(-1px); }
  .btn-primary:disabled { opacity:.5; cursor:not-allowed; transform:none; filter:none; }
  .btn-full { width:100%; }
  .empty-state { text-align:center; padding:60px 20px; color:var(--text-muted); }
  .spinner-wrap { text-align:center; padding:40px; }
  .spinner { width:28px; height:28px; border-radius:50%; border:3px solid var(--border); border-top-color:var(--accent); animation:spin .7s linear infinite; display:inline-block; }
  @keyframes spin { to{transform:rotate(360deg)} }
  #toast-container { position:fixed; bottom:90px; right:20px; z-index:999; display:flex; flex-direction:column; gap:10px; align-items:flex-end; }
  .toast { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px 18px; box-shadow:var(--shadow-lg); font-size:.87rem; font-weight:500; animation:toastIn .3s ease,toastOut .4s 2.6s forwards; max-width:300px; }
  .toast.success { border-left:3px solid #22c55e; }
  .toast.error   { border-left:3px solid #ef4444; }
  @keyframes toastIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
  @keyframes toastOut { from{opacity:1} to{opacity:0;pointer-events:none} }
  ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
</style>
</head>
<body>

<div class="topbar">
  <button class="topbar-btn" onclick="toggleSidebar()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div class="topbar-logo">BlockVault</div>
  <div class="avatar" id="top-avatar" onclick="location.href='perfil.html'" title="Mi perfil">
    <span id="top-avatar-letter"></span>
  </div>
</div>

<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>
<nav class="sidebar" id="sidebar">
  <div class="sidebar-section">Navegación</div>
  <a class="nav-item active" onclick="closeSidebar()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Inicio
  </a>
  <a class="nav-item" onclick="location.href='perfil.html'">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    Mi Perfil
  </a>
  <div class="sidebar-spacer"></div>
  <div class="sidebar-section">Ajustes</div>
  <a class="nav-item" onclick="location.href='ajustes.html'">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    Ajustes
  </a>
  <a class="nav-item danger" onclick="logout()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    Cerrar sesión
  </a>
</nav>

<div class="page-content">
  <div class="feed" id="feed"><div class="spinner-wrap"><div class="spinner"></div></div></div>
</div>

<button class="fab" onclick="openModal()">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<div class="modal-bg" id="modal-publicar">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Nueva publicación</div>
      <button class="modal-close" onclick="closeModal()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="field"><label>Título *</label><input class="input" id="pub-titulo" type="text" placeholder="¿Sobre qué trata?" maxlength="120"></div>
    <div class="field"><label>Descripción</label><textarea class="input" id="pub-desc" placeholder="Cuéntanos más..." maxlength="600" rows="4"></textarea></div>
    <div class="field">
      <label>Imagen <span style="color:var(--text-muted);font-weight:400;text-transform:none;letter-spacing:0">(opcional)</span></label>
      <div class="img-picker" onclick="document.getElementById('pub-img-input').click()">
        <input type="file" id="pub-img-input" accept="image/*" onchange="previewImg(this)">
        <img class="img-preview" id="pub-img-preview" src="" alt="">
        <p class="img-picker-hint" id="pub-img-hint">Haz clic para subir imagen</p>
      </div>
    </div>
    <button class="btn btn-primary btn-full" id="btn-publicar" onclick="doPublicar()">Publicar</button>
  </div>
</div>
<div id="toast-container"></div>

<script>
(function () {
  var API = 'https://script.google.com/macros/s/AKfycby_q9XZ8vYBsnr0G5PZGapHZh1iZ-GFBJqychgMnZ-hs3Napp1fWE_RfisJ91B2ZBwQ/exec';

  var session = null;
  try { session = JSON.parse(localStorage.getItem('bv_session') || 'null'); } catch(e) {}
  if (!session) { location.href = 'index.html'; return; }

  function applyAccent(hex) {
    try { var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); document.documentElement.style.setProperty('--accent',hex); document.documentElement.style.setProperty('--accent-rgb',r+','+g+','+b); } catch(e) {}
  }
  document.documentElement.setAttribute('data-theme', localStorage.getItem('bv_theme')||'light');
  applyAccent(localStorage.getItem('bv_accent')||'#6C63FF');

  var av = document.getElementById('top-avatar');
  if (session.fotoPerfil) av.innerHTML = '<img src="'+session.fotoPerfil+'" alt="">';
  else document.getElementById('top-avatar-letter').textContent = (session.nombre||'?')[0].toUpperCase();

  // ── helpers globales ──────────────────────────────────────
  window.logout = function() { localStorage.removeItem('bv_session'); location.href='index.html'; };
  window.toggleSidebar = function() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); };
  window.closeSidebar  = function() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); };

  function api(payload) {
    return fetch(API, { method:'POST', body:JSON.stringify(payload) }).then(function(r){ return r.json(); });
  }
  function toast(msg,type) {
    var t=document.createElement('div'); t.className='toast '+(type||'info'); t.textContent=msg;
    document.getElementById('toast-container').appendChild(t);
    setTimeout(function(){ if(t.parentNode) t.parentNode.removeChild(t); },3100);
  }
  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fmtDate(d){
    try{ var dt=new Date(d),diff=(new Date()-dt)/1000;
      if(diff<60) return 'ahora mismo'; if(diff<3600) return Math.floor(diff/60)+' min';
      if(diff<86400) return Math.floor(diff/3600)+'h';
      return dt.toLocaleDateString('es',{day:'numeric',month:'short',year:'numeric'});
    }catch(_){return '';}
  }

  // ── Feed ──────────────────────────────────────────────────
  function loadFeed() {
    api({ action:'obtenerPublicaciones' }).then(function(res) {
      var feed = document.getElementById('feed');
      if (!res||!res.ok) { feed.innerHTML='<div class="empty-state">Error al cargar.</div>'; return; }
      if (!res.publicaciones||!res.publicaciones.length) { feed.innerHTML='<div class="empty-state">Aún no hay publicaciones.<br>¡Sé el primero!</div>'; return; }
      feed.innerHTML = res.publicaciones.map(function(p) {
        var av = p.fotoPerfil ? '<div class="post-av"><img src="'+p.fotoPerfil+'" alt=""></div>' : '<div class="post-av">'+(p.nombreUsuario||'?')[0].toUpperCase()+'</div>';
        var img = p.imagen ? '<img class="post-img" src="'+p.imagen+'" alt="">' : '';
        return '<div class="post-card">'
          +'<div class="post-header">'+av+'<div class="post-meta">'
          +'<div class="post-author" onclick="verPerfil(\''+p.uuidUsuario+'\')">'+esc(p.nombreUsuario)+'</div>'
          +'<div class="post-date">'+fmtDate(p.fecha)+'</div></div></div>'
          +'<div class="post-body"><div class="post-title">'+esc(p.titulo)+'</div>'
          +(p.descripcion?'<div class="post-desc">'+esc(p.descripcion)+'</div>':'')
          +'</div>'+img+'</div>';
      }).join('');
    }).catch(function(){ document.getElementById('feed').innerHTML='<div class="empty-state">No se pudo conectar.</div>'; });
  }

  window.verPerfil = function(uuid) { localStorage.setItem('bv_view_profile',uuid); location.href='perfil.html'; };

  // ── Publicar ──────────────────────────────────────────────
  var imgBase64='';
  window.openModal  = function(){ document.getElementById('modal-publicar').classList.add('show'); };
  window.closeModal = function(){
    document.getElementById('modal-publicar').classList.remove('show');
    document.getElementById('pub-titulo').value=''; document.getElementById('pub-desc').value='';
    document.getElementById('pub-img-preview').style.display='none';
    document.getElementById('pub-img-hint').style.display=''; imgBase64='';
  };
  window.previewImg = function(input) {
    var file=input.files[0]; if(!file) return;
    if(file.size>5*1024*1024){ toast('Máx 5MB','error'); return; }
    var r=new FileReader();
    r.onload=function(e){ imgBase64=e.target.result; var p=document.getElementById('pub-img-preview'); p.src=imgBase64; p.style.display='block'; document.getElementById('pub-img-hint').style.display='none'; };
    r.readAsDataURL(file);
  };
  window.doPublicar = function() {
    var titulo=document.getElementById('pub-titulo').value.trim();
    var desc=document.getElementById('pub-desc').value.trim();
    if(!titulo){ toast('El título es requerido','error'); return; }
    var btn=document.getElementById('btn-publicar');
    btn.disabled=true; btn.innerHTML='<div class="spinner" style="width:18px;height:18px;border-width:2px"></div>';
    api({ action:'crearPublicacion', datos:{ uuidUsuario:session.uuid, nombreUsuario:session.nombre, titulo:titulo, descripcion:desc, imagen:imgBase64 } })
      .then(function(res){
        btn.disabled=false; btn.textContent='Publicar';
        if(!res.ok){ toast(res.msg||'Error','error'); return; }
        window.closeModal(); toast('¡Publicado!','success'); loadFeed();
      }).catch(function(){ btn.disabled=false; btn.textContent='Publicar'; toast('Error de conexión','error'); });
  };

  loadFeed();
})();
</script>
</body>
</html>
