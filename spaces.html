<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando...</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --pal-boton: #c4a87c; --pal-borde: rgba(255,255,255,0.08);
            --pal-barra-superior: rgba(0,0,0,0.4); --pal-marca-agua: rgba(196,168,124,0.06);
            --pal-menu-fondo: rgba(0,0,0,0.6); --pal-menu-texto: rgba(224,230,240,0.7);
            --pal-buscador-fondo: rgba(255,255,255,0.04); --pal-buscador-texto: #e0e6f0;
            --pal-buscador-borde: rgba(255,255,255,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; -webkit-user-drag: none; -khtml-user-drag: none; -moz-user-drag: none; -o-user-drag: none; -webkit-touch-callout: none; }
        input, textarea, select, [contenteditable="true"] { -webkit-user-select: text; -moz-user-select: text; -ms-user-select: text; user-select: text; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0e17; color: #e0e6f0;
            min-height: 100vh; font-size: clamp(13px, 1.1vw, 15px);
            transition: background 0.3s, color 0.3s;
        }
        .watermark-bg {
            position: fixed; inset: 0; pointer-events: none;
            display: flex; align-items: center; justify-content: center;
            opacity: 0.06; z-index: 0;
            color: var(--pal-marca-agua);
        }
        .watermark-bg img {
            width: 300px; height: 300px; border-radius: 40px; object-fit: cover;
        }
        .brand-bottom {
            position: fixed; bottom: 20px; left: 0; right: 0;
            text-align: center; z-index: 1;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-size: 13px; color: rgba(224,230,240,0.25);
        }
        .brand-bottom img {
            width: 22px; height: 22px; border-radius: 5px; object-fit: cover;
        }
        .brand-bottom .bn { font-weight: 600; }
        /* Top bar */
        .topbar {
            position: fixed; top: 0; left: 0; right: 0; height: 52px;
            display: flex; align-items: center; padding: 0 16px;
            background: var(--pal-barra-superior); z-index: 100;
            backdrop-filter: blur(8px);
        }
        .menu-btn {
            width: 36px; height: 36px; border-radius: 10px;
            border: 1px solid var(--pal-borde);
            background: var(--pal-buscador-fondo);
            color: #e0e6f0; font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .menu-btn:hover { background: rgba(255,255,255,0.1); }
        .topbar-title {
            margin-left: 12px; font-size: 15px; font-weight: 600;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        /* Sidebar */
        .sidebar {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: var(--pal-menu-fondo); z-index: 200;
            backdrop-filter: blur(16px); border-right: 1px solid var(--pal-borde);
            transition: left 0.3s ease; overflow-y: auto;
            display: flex; flex-direction: column;
        }
        .sidebar.open { left: 0; }
        .sidebar-header {
            display: flex; align-items: center; gap: 10px;
            padding: 16px; border-bottom: 1px solid var(--pal-borde);
        }
        .sidebar-icon {
            width: 40px; height: 40px; border-radius: 10px;
            object-fit: cover; flex-shrink: 0;
        }
        .sidebar-name {
            font-size: 15px; font-weight: 700;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        /* Overlay */
        .sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); z-index: 199;
            display: none;
        }
        .sidebar-overlay.open { display: block; }
        /* Category nav items */
        .nav-list { padding: 8px 0; flex: 1; }
        .nav-item { margin: 0; }
        .nav-btn {
            display: flex; align-items: center; gap: 10px;
            width: 100%; padding: 10px 16px;
            background: none; border: none; color: var(--pal-menu-texto);
            font-size: 14px; font-weight: 500; cursor: pointer;
            transition: background 0.15s; text-align: left;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.04); color: #e0e6f0; }
        .nav-btn .arrow {
            margin-left: auto; font-size: 12px; transition: transform 0.2s;
        }
        .nav-btn .arrow.open { transform: rotate(90deg); }
        .submenu {
            max-height: 0; overflow: hidden;
            transition: max-height 0.25s ease;
        }
        .submenu.open { max-height: 200px; }
        .sub-btn {
            display: block; width: 100%; padding: 8px 16px 8px 42px;
            background: none; border: none; color: rgba(224,230,240,0.45);
            font-size: 13px; cursor: pointer; text-align: left;
            transition: background 0.15s, color 0.15s;
        }
        .sub-btn:hover { background: rgba(255,255,255,0.03); color: var(--pal-menu-texto); }
        /* Main content */
        .main-content {
            padding: 80px 20px 40px; max-width: 800px; margin: 0 auto;
            text-align: center;
        }
        .space-icon { width: 80px; height: 80px; border-radius: 18px; object-fit: cover; margin: 0 auto 16px; display: block; }
        .space-name { font-size: 28px; font-weight: 800; }
        .loading, .error {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; font-size: 15px;
        }
        .loading { opacity: 0.5; flex-direction: column; gap: 16px; }
        .loading-icon { width: 48px; height: 48px; border-radius: 12px; object-fit: cover; }
        .error { color: #ef4444; }
        @media (max-width: 768px) {
            .sidebar { width: 260px; left: -260px; }
            .main-content { padding: 72px 16px 32px; }
            .space-name { font-size: 24px; }
            .space-icon { width: 64px; height: 64px; }
        }
        @media (max-width: 480px) {
            .sidebar { width: 85vw; left: -85vw; }
            .main-content { padding: 64px 12px 40px; }
            .space-name { font-size: clamp(18px, 5vw, 24px); }
            .space-icon { width: 56px; height: 56px; border-radius: 14px; }
            .topbar { height: 44px; padding: 0 10px; }
            .topbar-title { font-size: 13px; margin-left: 8px; }
            .menu-btn { width: 32px; height: 32px; font-size: 16px; }
            .sidebar-header { padding: 12px 14px; }
            .sidebar-icon { width: 32px; height: 32px; border-radius: 8px; }
            .sidebar-name { font-size: 13px; }
            .nav-btn { padding: 8px 14px; font-size: 13px; }
            .sub-btn { padding: 6px 14px 6px 36px; font-size: 12px; }
            .brand-bottom { font-size: 11px; bottom: 12px; gap: 5px; }
            .brand-bottom img { width: 18px; height: 18px; border-radius: 4px; }
            .watermark-bg img { width: 180px; height: 180px; }
        }
        @media (min-width: 769px) and (max-width: 1024px) {
            .main-content { max-width: 600px; }
            .space-name { font-size: 26px; }
        }
        @media (hover: none) and (pointer: coarse) {
            .nav-btn, .sub-btn, .menu-btn { cursor: default; }
            .nav-btn:active, .sub-btn:active { background: rgba(255,255,255,0.08); }
        }

        /* === ADDONS SECTION === */
        #addonsSection { margin-top: 28px; text-align: left; }
        #addonsSection.hidden { display: none; }
        .addons-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 14px; flex-wrap: wrap; gap: 8px;
        }
        .addons-header h3 {
            font-size: 16px; font-weight: 700;
        }
        .addons-header .cat-label {
            font-size: 12px; color: var(--pal-boton); font-weight: 600;
            background: rgba(196,168,124,0.1);
            padding: 4px 12px; border-radius: 20px;
        }
        .addon-search-wrap { margin-bottom: 14px; }
        .addon-search {
            width: 100%; box-sizing: border-box;
            padding: 10px 14px; border-radius: 8px;
            border: 1px solid var(--pal-buscador-borde);
            background: var(--pal-buscador-fondo);
            color: var(--pal-buscador-texto); font-size: 14px; outline: none;
            transition: border-color 0.2s;
        }
        .addon-search:focus { border-color: var(--pal-boton); }
        .addon-search::placeholder { color: rgba(224,230,240,0.25); }
        .addons-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
        }
        @media (min-width: 600px) {
            .addons-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (min-width: 900px) {
            .addons-grid { grid-template-columns: repeat(3, 1fr); }
        }
        /* ── Layout: Lineal (1 col, horizontal) ── */
        .layout-lineal .addons-grid { grid-template-columns:1fr; gap:10px; }
        .layout-lineal .addon-card { display:flex; flex-direction:row; }
        .layout-lineal .addon-card-thumb-wrap { width:160px; flex-shrink:0; }
        .layout-lineal .addon-card-thumb { height:100%; aspect-ratio:unset; }
        .layout-lineal .addon-card-body { flex:1; display:flex; flex-direction:column; justify-content:center; padding:12px 16px; }
        .layout-lineal .addon-card-desc { -webkit-line-clamp:1; }
        /* ── Layout: Compacto (siempre 2 col, mas gap) ── */
        .layout-compacto .addons-grid { grid-template-columns:repeat(2,1fr); gap:10px; }
        .layout-compacto .addon-card-thumb { aspect-ratio:16/9; }
        .layout-compacto .addon-card-body { padding:10px; }
        .layout-compacto .addon-card-desc { -webkit-line-clamp:1; font-size:0.7rem; }
        /* ── Layout: Grande (2 col tablet, 3 col desktop, cards grandes) ── */
        .layout-grande .addons-grid { gap:16px; }
        @media (min-width:600px) { .layout-grande .addons-grid { grid-template-columns:repeat(2,1fr); } }
        @media (min-width:900px) { .layout-grande .addons-grid { grid-template-columns:repeat(3,1fr); } }
        .layout-grande .addon-card-body { padding:16px; }
        .layout-grande .addon-card-title { font-size:1rem; }
        .layout-grande .addon-card-desc { -webkit-line-clamp:3; }
        /* ── Layout: Cuadricula (4 col desktop) ── */
        .layout-cuadricula .addons-grid { grid-template-columns:repeat(2,1fr); gap:8px; }
        @media (min-width:600px) { .layout-cuadricula .addons-grid { grid-template-columns:repeat(3,1fr); } }
        @media (min-width:900px) { .layout-cuadricula .addons-grid { grid-template-columns:repeat(4,1fr); } }
        .layout-cuadricula .addon-card-thumb { aspect-ratio:1; }
        .layout-cuadricula .addon-card-body { padding:8px; }
        .layout-cuadricula .addon-card-desc { display:none; }
        .layout-cuadricula .addon-card-title { font-size:0.78rem; margin-bottom:4px; }
        .layout-cuadricula .addon-card-cat { font-size:0.55rem; }
        /* ── Mobile: all layouts go 1 col (solo muy pequeño) ── */
        @media (max-width:359px) {
            .layout-compacto .addons-grid,
            .layout-grande .addons-grid,
            .layout-cuadricula .addons-grid { grid-template-columns:1fr; }
            .layout-lineal .addon-card { flex-direction:column; }
            .layout-lineal .addon-card-thumb-wrap { width:100%; }
            .layout-lineal .addon-card-thumb { aspect-ratio:16/9; height:auto; }
            .layout-cuadricula .addon-card-thumb { aspect-ratio:16/9; }
            .layout-cuadricula .addon-card-desc { display:block; }
        }
        .addon-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--pal-borde);
            border-radius: 12px; overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .addon-card:hover {
            border-color: color-mix(in srgb, var(--pal-boton) 30%, transparent);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .addon-card-thumb-wrap {
            position: relative; display: block;
        }
        .addon-card-thumb {
            width: 100%; aspect-ratio: 16/9;
            object-fit: cover; background: rgba(0,0,0,0.3);
            display: block;
        }
        .addon-card-thumb.hidden { display: none; }
        .addon-card-thumb-wrap:has(.addon-card-thumb.hidden) { display: none; }
        .play-badge {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.3);
            color: #fff; font-size: 28px;
            transition: background 0.2s, transform 0.2s;
        }
        .addon-card-video:hover .play-badge {
            background: rgba(0,0,0,0.15);
            transform: scale(1.1);
        }
        .play-badge i {
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
        }
        .addon-card-body { padding: 14px; }
        .addon-card-cat {
            font-size: 0.62rem; font-weight: 700;
            letter-spacing: 0.6px; text-transform: uppercase;
            color: var(--pal-boton); margin-bottom: 4px;
        }
        .addon-card-space {
            font-size: 0.7rem; color: rgba(224,230,240,0.35);
            margin-bottom: 4px; display: flex; align-items: center; gap: 4px;
        }
        .addon-card-space i { font-size: 10px; }
        .addon-card-title {
            font-size: 0.9rem; font-weight: 700;
            color: #e0e6f0; margin-bottom: 6px; line-height: 1.3;
        }
        .addon-card-desc {
            font-size: 0.77rem; color: rgba(224,230,240,0.55);
            line-height: 1.5; margin-bottom: 10px;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
        }
        .addon-card-foot {
            display: flex; gap: 8px; padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.06);
            align-items: center; justify-content: space-between;
        }
        .addon-card-foot .addon-link {
            font-size: 12px; color: var(--pal-boton); text-decoration: none;
            font-weight: 500; display: inline-flex; align-items: center; gap: 4px;
            cursor: pointer;
        }
        .addon-card-foot .addon-link:hover { text-decoration: underline; }
        .addon-card-foot .addon-date {
            font-size: 10px; color: rgba(224,230,240,0.25);
        }
        .empty-addons {
            text-align: center; padding: 40px 20px;
            color: rgba(224,230,240,0.25); font-size: 14px;
            grid-column: 1 / -1;
        }
        .addon-card-stats {
            display: flex; gap: 12px; padding: 8px 0 4px;
            font-size: 12px; color: rgba(224,230,240,0.45);
            align-items: center; flex-wrap: wrap;
        }
        .addon-card-stats span {
            display: inline-flex; align-items: center; gap: 3px;
        }
        .addon-card-stats .stat-like { color: #ef4444; }
        .addon-card-stats .stat-dislike { color: #f59e0b; }
        .addon-card-stats .stat-dl { color: #3b82f6; }
        .modal-vote-btns {
            display: flex; gap: 10px; margin-bottom: 14px;
        }
        .modal-vote-btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 18px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04);
            color: #e0e6f0; font-size: 14px; cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }
        .modal-vote-btn:hover { background: rgba(255,255,255,0.08); }
        .modal-vote-btn.active-like { border-color: #ef4444; background: rgba(239,68,68,0.15); color: #ef4444; }
        .modal-vote-btn.active-dislike { border-color: #f59e0b; background: rgba(245,158,11,0.15); color: #f59e0b; }
        .modal-vote-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .modal-vote-btn .vote-count { font-weight: 600; }

        /* === ADDON DETAIL MODAL === */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 500;
            background: rgba(0,0,0,0.7);
            display: none; align-items: center; justify-content: center;
            padding: 20px; backdrop-filter: blur(4px);
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--modal-bg, #111827); border: 1px solid var(--modal-borde, rgba(255,255,255,0.1));
            border-radius: 16px; max-width: 560px; width: 100%;
            max-height: 90vh; overflow-y: auto;
            padding: 0; position: relative;
            animation: modalIn 0.2s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-close-btn {
            position: absolute; top: 12px; right: 12px; z-index: 10;
            width: 32px; height: 32px; border-radius: 50%;
            background: rgba(0,0,0,0.5); border: none;
            color: #fff; font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .modal-close-btn:hover { background: rgba(239,68,68,0.7); }
        .modal-video {
            width: 100%; aspect-ratio: 16/9;
            display: block; border: none; background: #000;
        }
        .modal-img {
            width: 100%; aspect-ratio: 16/9;
            object-fit: cover; display: block;
            background: rgba(0,0,0,0.3);
        }
        .modal-img-gallery {
            display: flex; gap: 6px; overflow-x: auto; padding: 10px 16px 6px;
            scrollbar-width: thin;
        }
        .modal-img-gallery img {
            width: 60px; height: 45px; border-radius: 6px;
            object-fit: cover; cursor: pointer; flex-shrink: 0;
            border: 2px solid transparent; transition: border-color 0.2s;
        }
        .modal-img-gallery img:hover,
        .modal-img-gallery img.active { border-color: var(--pal-boton); }
        .modal-body { padding: 16px; }
        .modal-body .m-category {
            font-size: 0.65rem; font-weight: 700; letter-spacing: 0.6px;
            text-transform: uppercase; color: var(--pal-boton); margin-bottom: 4px;
        }
        .modal-body .m-title {
            font-size: 1.2rem; font-weight: 800; color: var(--modal-texto, #e0e6f0);
            margin-bottom: 4px; line-height: 1.3;
        }
        .modal-body .m-meta {
            font-size: 12px; color: var(--modal-meta, rgba(224,230,240,0.35));
            margin-bottom: 14px;
        }
        .modal-body .m-desc {
            font-size: 14px; color: var(--modal-texto, rgba(224,230,240,0.7));
            line-height: 1.6; margin-bottom: 18px;
            white-space: pre-wrap;
        }
        .modal-body .m-download {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 28px;
            background: var(--modal-acento, var(--pal-boton));
            color: #0a0e17; font-weight: 700; font-size: 14px;
            border-radius: 10px; text-decoration: none;
            transition: opacity 0.2s;
        }
        .modal-body .m-download:hover { opacity: 0.9; }
        @media (max-width: 480px) {
            .modal { max-width: 100%; border-radius: 12px; }
            .modal-body { padding: 14px; }
            .modal-body .m-title { font-size: 1rem; }
        }

        /* === SOCIAL LINKS === */
        .social-links {
            display: flex; gap: 10px; justify-content: center;
            padding: 12px 16px; flex-wrap: wrap;
        }
        .social-link {
            display: flex; align-items: center; gap: 6px;
            padding: 8px 14px; border-radius: 8px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--pal-borde);
            color: var(--pal-menu-texto);
            text-decoration: none; font-size: 13px; font-weight: 500;
            transition: background 0.2s, border-color 0.2s;
            cursor: pointer;
        }
        .social-link:hover { background: rgba(255,255,255,0.1); border-color: var(--pal-boton); }
        .social-link i { font-size: 16px; }
        @media (max-width: 480px) {
            .social-links { gap: 6px; padding: 10px 12px; }
            .social-link { padding: 6px 10px; font-size: 12px; }
        }
        /* === DARK/LIGHT MODE TOGGLE === */
        .theme-toggle {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 16px; cursor: pointer;
        }
        .theme-toggle-icon { font-size: 18px; }
        .theme-toggle-label { font-size: 13px; color: var(--pal-menu-texto); }
        /* === STATS PANEL === */
        .stats-section {
            margin-top: 24px; padding: 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--pal-borde);
            border-radius: 12px; text-align: left;
        }
        .stats-section h3 {
            font-size: 16px; font-weight: 700;
            margin-bottom: 14px; color: var(--pal-boton);
        }
        .stats-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
        }
        .stat-card {
            text-align: center; padding: 14px 8px;
            background: rgba(0,0,0,0.2); border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .stat-card .stat-num {
            font-size: 22px; font-weight: 800; color: var(--pal-boton);
        }
        .stat-card .stat-label {
            font-size: 11px; color: rgba(224,230,240,0.4);
            margin-top: 4px; text-transform: uppercase; letter-spacing: 0.4px;
        }
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .stat-card { padding: 10px 4px; }
            .stat-card .stat-num { font-size: 18px; }
        }
        /* === AD OVERLAY === */
        .ad-overlay {
            position: fixed; inset: 0; z-index: 600;
            background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(8px);
        }
        .ad-overlay.open { display: flex; }
        .ad-center {
            display: flex; flex-direction: column; align-items: center; gap: 14px;
        }
        .ad-adsterra {
            width: 300px; height: 250px;
            border-radius: 8px; overflow: hidden;
            background: rgba(255,255,255,0.05);
        }

    <script>
        var API_URL = 'https://script.google.com/macros/s/AKfycbx7yl9hxkU2MYE6ijNKDZDvLyDkZHI7oBt5LOzGGFn4RDtLoFpXijl07JBoQ3W7KFNk/exec';
        var SUBMENU_ITEMS = ["Mas recientes","Mas viejos","Mas descargados","Mas populares","Aleatorio"];

        function getParam(name) {
            var p = new URLSearchParams(window.location.search);

        var rawQuery = window.location.search.substring(1).trim();
        var user = getParam('u') || getParam('user') || '';
        var nombrePlataforma = getParam('n') || getParam('nombrePlataforma') || '';
        if (!user && !nombrePlataforma && rawQuery && rawQuery.indexOf('=') === -1) {
            nombrePlataforma = decodeURIComponent(rawQuery);

        var sessionPass = '';
        var loggedUser = '';
        var isAdmin = false;
        try {
            sessionPass = sessionStorage.getItem('wl_sessionPass') || '';
            loggedUser = sessionStorage.getItem('wl_sessionUser') || '';
            isAdmin = sessionStorage.getItem('wl_admin') === '1';
        } catch(e) {}
        if (!loggedUser) {
            loggedUser = 'v_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8);
            sessionPass = 'anon';
            isAdmin = false;
        }
        window._voteApi = function(action, espacio, nombre, vote, cb) {
            var c = 'v_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
            var u = API_URL + '?action=' + action + '&user=' + encodeURIComponent(loggedUser) + '&pass=' + encodeURIComponent(sessionPass) + '&espacio=' + encodeURIComponent(espacio) + '&nombre=' + encodeURIComponent(nombre);
            if (vote !== undefined) u += '&vote=' + vote;
            u += '&callback=' + c;
            window[c] = function(r) { try { cb(typeof r === 'string' ? JSON.parse(r) : r); } catch(e) {} delete window[c]; if (s.parentNode) s.parentNode.removeChild(s); };
            var s = document.createElement('script'); s.src = u; s.onerror = function() { delete window[c]; };
            document.body.appendChild(s);
            setTimeout(function() { if (window[c]) delete window[c]; }, 10000);
        };
        var allMode = false;
        var userVoteMap = {};
        var currentEspacio = '';
        var lookupParam = nombrePlataforma ? 'nombrePlataforma=' + encodeURIComponent(nombrePlataforma) : (user ? 'username=' + encodeURIComponent(user) : '');

        if (!user && !nombrePlataforma) {

            // Fire space request
            var cb = 'spc_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
            var url = API_URL + '?action=getSpace&' + lookupParam + '&callback=' + cb;
            window[cb] = function(resp) {
                try {
                    var data = typeof resp === 'string' ? JSON.parse(resp) : resp;
                    if (data.status === 'OK' && data.space) {
                        renderSpace(data.space);
                        var espacioReal = data.space.nombrePlataforma || user;
                        currentEspacio = espacioReal;

                            cargarAddonsEspacio(espacioReal);
                        }
                    } else showError();
                } catch(e) { showError(); }
                delete window[cb];
                if (script.parentNode) script.parentNode.removeChild(script);
            };
            var script = document.createElement('script');
            script.src = url;
            script.onerror = function() { showError(); };

        function renderSpace(space) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('topbar').style.display = 'flex';
            document.title = space.nombrePlataforma || space.usuario + "'s Space";
            var config = {};
            try { config = JSON.parse(space.config || '{}'); } catch(e) {}
            var pal = config.palette || {};
            var bgCfg = config.background || {};
            var defaultFondo = pal.fondo || space.colorFondo || '#0a0e17';

            document.body.style.background = defaultFondo;
            document.body.style.color = defaultTexto;
            document.documentElement.style.setProperty('--accent', accent);
            // Background image & gradient
            var bgParts = [];

            if (bgCfg.imagen) {
                if (Array.isArray(bgCfg.imagen) && bgCfg.imagen.length) {
                    bgImgUrl = bgCfg.imagen[0].src || bgCfg.imagen[0];

                    bgImgUrl = bgCfg.imagen;

            }
            if (bgImgUrl) bgParts.push('url(' + bgImgUrl + ')');
            if (bgCfg.gradiente) bgParts.push(bgCfg.gradiente);
            if (bgImgUrl && bgCfg.colorOpacidad) {
                var opHex = bgCfg.colorOpacidad || '#000000';
                var opVal = (typeof bgCfg.opacidad === 'number' ? bgCfg.opacidad : 100) / 100;
                bgParts.push('linear-gradient(rgba(' + parseInt(opHex.slice(1,3),16) + ',' + parseInt(opHex.slice(3,5),16) + ',' + parseInt(opHex.slice(5,7),16) + ',' + opVal + '),rgba(' + parseInt(opHex.slice(1,3),16) + ',' + parseInt(opHex.slice(3,5),16) + ',' + parseInt(opHex.slice(5,7),16) + ',' + opVal + '))');
            }
            if (bgParts.length) {
                document.body.style.background = bgParts.join(', ');
                document.body.style.backgroundSize = 'cover';
                document.body.style.backgroundPosition = 'center';
                document.body.style.backgroundRepeat = 'no-repeat';
            }
            // Apply other palette colors as CSS vars
            document.documentElement.style.setProperty('--pal-boton', pal.boton || accent);
            document.documentElement.style.setProperty('--pal-borde', pal.borde || 'rgba(255,255,255,0.08)');
            document.documentElement.style.setProperty('--pal-barra-superior', pal.barraSuperior || 'rgba(0,0,0,0.4)');
            document.documentElement.style.setProperty('--pal-marca-agua', pal.marcaAgua || 'rgba(196,168,124,0.06)');
            document.documentElement.style.setProperty('--pal-menu-fondo', pal.menuFondo || 'rgba(0,0,0,0.6)');
            document.documentElement.style.setProperty('--pal-menu-texto', pal.menuTexto || 'rgba(224,230,240,0.7)');
            document.documentElement.style.setProperty('--pal-buscador-fondo', pal.buscadorFondo || 'rgba(255,255,255,0.04)');
            document.documentElement.style.setProperty('--pal-buscador-texto', pal.buscadorTexto || '#e0e6f0');
            document.documentElement.style.setProperty('--pal-buscador-borde', pal.buscadorBorde || 'rgba(255,255,255,0.08)');
            // Grid layout
            var gridLayout = config.gridLayout || 'automatico';
            document.body.className = 'layout-' + gridLayout;

            // Topbar
            document.getElementById('topbarTitle').textContent = space.nombrePlataforma || space.usuario;

            var showTop = config.showTop !== false;
            var showIcon = config.showIcon !== false;
            var showName = config.showName !== false;
            var showUser = config.showUser !== false;
            var showBrand = config.showBrand !== false;
            var brandPosition = config.brandPosition || 'watermark';
            var brandByText = config.brandByText || 'by @' + (space.usuario || '');

            // Show/hide main content (top section)
            document.getElementById('spaceContent').style.display = showTop ? 'block' : 'none';

            // Icon - main content (based on toggles)
            var iconUrl = space.iconoURL || '';
            var iconEls = ['spaceIcon','sidebarIcon'];
            iconEls.forEach(function(id) {
                var el = document.getElementById(id);
                if (showTop && showIcon && iconUrl) { el.src = iconUrl; el.style.display = ''; }
                else { el.style.display = 'none'; }
            });

            // Name & user - main content (always visible based on toggles)
            var nameEl = document.getElementById('spaceName');
            nameEl.textContent = showName ? (space.nombrePlataforma || space.usuario + "'s Space") : '';
            nameEl.style.display = showName ? '' : 'none';
            var userEl = document.getElementById('spaceUser');
            userEl.textContent = showUser ? ('@' + space.usuario) : '';
            userEl.style.display = showUser ? '' : 'none';
            document.getElementById('sidebarName').textContent = space.nombrePlataforma || space.usuario;

            // Branding - additional placement (watermark or bottom credit)

                aplicarBranding(space, config, iconUrl, brandPosition, brandByText, showIcon, showName, showUser);
            }

            // Show space icon in loading state
            if (iconUrl) {
                document.getElementById('loadingIcon').src = iconUrl;
                document.getElementById('loadingIcon').style.display = '';
            }

            // Categories from complementos or fallback
            var categorias = config.complementos || [];
            if (!categorias.length) { try { categorias = JSON.parse(space.categorias || '[]'); } catch(e) {} }
            renderNav(categorias, accent);

            // Social links
            renderSocialLinks(config.socialLinks || {});

            // Modal colors
            applyModalColors(config.modalColors || {});

            // Theme toggle - show in sidebar
            document.getElementById('themeToggle').style.display = 'flex';
            // Check saved theme preference
            try {
                var savedTheme = localStorage.getItem('wl_theme_' + (space.usuario || user));
                if (savedTheme === 'light') { isLightMode = true; applyTheme(); }

        function isYouTubeUrl(url) {
            return /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/.test(url);
        }

        function getYouTubeEmbedUrl(url) {
            var m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
            return m ? 'https://www.youtube.com/embed/' + m[1] + '?autoplay=1&rel=0' : null;
        }

        function getYouTubeThumb(url) {
            var m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
            return m ? 'https://img.youtube.com/vi/' + m[1] + '/mqdefault.jpg' : null;
        }

        var AD_CIRC = 2 * Math.PI * 30;

        function verificarDescarga(url, espacio, nombre) {

        function showAdGate() {
            var overlay = document.getElementById('adOverlay');
            var box = document.getElementById('adSterraBox');
            var countdownEl = document.getElementById('adCountdown');
            var secLabel = document.getElementById('adSecLabel');
            var progress = document.getElementById('adProgress');
            progress.style.strokeDashoffset = '0';
            overlay.classList.add('open');

            // Smartlink: any click on the overlay opens the smartlink
            overlay.onclick = function(e) {
                e.preventDefault();
                window.open('https://www.effectivecpmnetwork.com/w3p3q042a?key=f434414e2725d8e0fe98a16302c651f2', '_blank');
            };

            // Inject invoke.js ad
            box.innerHTML = '';
            try {
                var s1 = document.createElement('script');
                s1.textContent = 'var atOptions={"key":"a0082d89d50ee2582d54e84972c04961","format":"iframe","height":250,"width":300,"params":{}};';
                box.appendChild(s1);
                var s2 = document.createElement('script');
                s2.src = 'https://www.highperformanceformat.com/a0082d89d50ee2582d54e84972c04961/invoke.js';
                box.appendChild(s2);
            } catch(e) {}

            // Countdown 5s
            var remaining = 5;
            countdownEl.textContent = remaining;
            secLabel.textContent = remaining;
            if (adTimer) clearInterval(adTimer);
            adTimer = setInterval(function() {
                remaining--;
                countdownEl.textContent = remaining;
                secLabel.textContent = remaining;
                progress.style.strokeDashoffset = String(((5 - remaining) / 5) * AD_CIRC);
                if (remaining <= 0) {
                    clearInterval(adTimer);
                    adTimer = null;
                    closeAdGate();
                    doDownload(pendingDownloadUrl, pendingDownloadEsp, pendingDownloadName);
                }
            }, 1000);
        }

        function closeAdGate() {
            if (adTimer) { clearInterval(adTimer); adTimer = null; }

        function doDownload(url, espacio, nombre) {
            var key = espacio + '::' + nombre;
            allSpaceAddons.forEach(function(a) {
                var aEsp = a.espacio || currentEspacio;
                if ((aEsp + '::' + (a.nombre || '')) === key) {
                    a.downloads = (a.downloads || 0) + 1;
                }
            });
            renderAddonsList();
            _voteApi('registerDownload', espacio, nombre, undefined, function(data) {
                if (data && data.status === 'OK' && data.downloads !== undefined) {
                    allSpaceAddons.forEach(function(a) {
                        var aEsp = a.espacio || currentEspacio;
                        if ((aEsp + '::' + (a.nombre || '')) === key) {
                            a.downloads = data.downloads;
                        }
                    });
                    renderAddonsList();
                }
            });
            window.open(url, '_blank');
        }

        function voteUI(key, newVote, oldVote, item) {
            var likes = item.likes || 0;
            var dislikes = item.dislikes || 0;
            if (oldVote === 'like') { likes = Math.max(0, likes - 1); userVoteMap[key] = null; }
            else if (oldVote === 'dislike') { dislikes = Math.max(0, dislikes - 1); userVoteMap[key] = null; }
            if (newVote === 'like') { likes++; userVoteMap[key] = 'like'; }
            else if (newVote === 'dislike') { dislikes++; userVoteMap[key] = 'dislike'; }
            else if (newVote === 'unlike' || newVote === 'undislike') { userVoteMap[key] = null; }
            item.likes = likes;
            item.dislikes = dislikes;
            document.getElementById('voteLikeCount').textContent = likes;
            document.getElementById('voteDislikeCount').textContent = dislikes;
            var lb = document.getElementById('voteLikeBtn');
            var db = document.getElementById('voteDislikeBtn');
            lb.className = 'modal-vote-btn';
            db.className = 'modal-vote-btn';
            if (newVote === 'like') lb.classList.add('active-like');
            else if (newVote === 'dislike') db.classList.add('active-dislike');
            allSpaceAddons.forEach(function(a) {
                var aEsp = a.espacio || currentEspacio;
                if ((aEsp + '::' + (a.nombre || '')) === key) {
                    a.likes = likes;
                    a.dislikes = dislikes;
                }
            });
            renderAddonsList();
        }

        function darLike() {
            if (!currentModalItem) return;
            var espacio = currentModalItem.espacio || currentEspacio;
            var nombre = currentModalItem.nombre || '';
            var key = espacio + '::' + nombre;
            var old = userVoteMap[key] || null;
            var newVote = old === 'like' ? 'unlike' : (old === 'dislike' ? 'like' : 'like');
            voteUI(key, newVote, old, currentModalItem);
            _voteApi('rateAddon', espacio, nombre, newVote, function(data) {
                if (data && data.status === 'OK') {
                    currentModalItem.likes = data.likes;
                    currentModalItem.dislikes = data.dislikes;
                    document.getElementById('voteLikeCount').textContent = data.likes;
                    document.getElementById('voteDislikeCount').textContent = data.dislikes;
                    allSpaceAddons.forEach(function(a) {
                        var aEsp = a.espacio || currentEspacio;
                        if ((aEsp + '::' + (a.nombre || '')) === key) {
                            a.likes = data.likes;
                            a.dislikes = data.dislikes;
                        }
                    });
                    renderAddonsList();
                }
            });
        }

        function darDislike() {
            if (!currentModalItem) return;
            var espacio = currentModalItem.espacio || currentEspacio;
            var nombre = currentModalItem.nombre || '';
            var key = espacio + '::' + nombre;
            var old = userVoteMap[key] || null;
            var newVote = old === 'dislike' ? 'undislike' : (old === 'like' ? 'dislike' : 'dislike');
            voteUI(key, newVote, old, currentModalItem);
            _voteApi('rateAddon', espacio, nombre, newVote, function(data) {

        }

        function renderAddonsList() {
            var term = document.getElementById('addonSearch').value.trim().toLowerCase();
            var list = allSpaceAddons.filter(function(a) {
                if (term && (a.nombre || '').toLowerCase().indexOf(term) === -1) return false;
                if (currentCategory && a.categoria !== currentCategory) return false;
                return true;
            });
            list = list.slice();
            if (currentSort === 'recent') {
                list.sort(function(a, b) { return (b.fecha || '').localeCompare(a.fecha || ''); });
            } else if (currentSort === 'oldest') {
                list.sort(function(a, b) { return (a.fecha || '').localeCompare(b.fecha || ''); });
            } else if (currentSort === 'downloads') {
                list.sort(function(a, b) { return (b.downloads || 0) - (a.downloads || 0); });
            } else if (currentSort === 'popular') {
                list.sort(function(a, b) { return (b.likes || 0) - (a.likes || 0); });
            } else if (currentSort === 'random') {
                for (var i = list.length - 1; i > 0; i--) {
                    var j = Math.floor(Math.random() * (i + 1));
                    var tmp = list[i]; list[i] = list[j]; list[j] = tmp;
                }
            }
            renderAddons(list);
            renderStats(allSpaceAddons);
        }

                });
                document.querySelectorAll('.addon-card-title').forEach(function(t) { t.style.color = ''; });
                document.querySelectorAll('.addon-card-desc').forEach(function(t) { t.style.color = ''; });
                document.getElementById('themeIcon').textContent = '🌙';
                document.getElementById('themeLabel').textContent = 'Modo oscuro';
                var sidebar2 = document.getElementById('sidebar');
                if (sidebar2) sidebar2.style.borderRightColor = '';
            }
        }

        // ============================================================
        // STATS (owner only)
        // ============================================================
        function renderStats(addons) {
            var section = document.getElementById('statsSection');
            if (!section || !addons || !addons.length) { if (section) section.style.display = 'none'; return; }
            var totalDownloads = 0;
            var totalLikes = 0;
            addons.forEach(function(a) {
                totalDownloads += (a.downloads || 0);
                totalLikes += (a.likes || 0);
            });
            document.getElementById('statDownloads').textContent = totalDownloads.toLocaleString();
            document.getElementById('statLikes').textContent = totalLikes.toLocaleString();
            // Visit count placeholder - we'll increment a local counter
            var visitKey = 'wl_visits_' + (currentEspacio || user);
            var visits = 0;
            try { visits = parseInt(localStorage.getItem(visitKey)) || 0; } catch(e) {}
            visits++;
            try { localStorage.setItem(visitKey, visits); } catch(e) {}
            document.getElementById('statVisits').textContent = visits.toLocaleString();
            // Only show if the current visitor is the owner
            var isOwner = (loggedUser === user || loggedUser === currentEspacio);
            section.style.display = isOwner ? '' : 'none';
        }

        // ============================================================
        // MODAL COLORS
        // ============================================================
        function applyModalColors(modalColors) {
            if (!modalColors) return;
            var root = document.documentElement;
            if (modalColors.modalBg) root.style.setProperty('--modal-bg', modalColors.modalBg);
            if (modalColors.modalTexto) root.style.setProperty('--modal-texto', modalColors.modalTexto);
            if (modalColors.modalBorde) root.style.setProperty('--modal-borde', modalColors.modalBorde);
            if (modalColors.modalAcento) root.style.setProperty('--modal-acento', modalColors.modalAcento);
            if (modalColors.modalMeta) root.style.setProperty('--modal-meta', modalColors.modalMeta);
        }

        // Security
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
        function isEditable3(el) { return el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.isContentEditable); }
        document.addEventListener('copy', function(e) { if (!isEditable3(e.target)) { e.preventDefault(); return false; } });
        document.addEventListener('cut', function(e) { if (!isEditable3(e.target)) { e.preventDefault(); return false; } });
        document.addEventListener('paste', function(e) { if (!isEditable3(e.target)) { e.preventDefault(); return false; } });
        document.addEventListener('keydown', function(e) {
            if (isEditable3(e.target)) return;
            var mod = e.ctrlKey || e.metaKey;
            if (mod) {
                if (e.key === 'c' || e.key === 'C') { e.preventDefault(); return false; }
                if (e.key === 'u' || e.key === 'U') { e.preventDefault(); return false; }
                if (e.key === 's' || e.key === 'S') { e.preventDefault(); return false; }
                if (e.key === 'p' || e.key === 'P') { e.preventDefault(); return false; }
            }
            if (e.key === 'F12') { e.preventDefault(); return false; }
        });
        document.addEventListener('dragstart', function(e) { if (e.target.tagName === 'IMG') { e.preventDefault(); return false; } });
        document.addEventListener('drop', function(e) { e.preventDefault(); return false; });
        document.addEventListener('dragover', function(e) { e.preventDefault(); return false; });
        console.log('%cWorldLeaf Space v2.0', 'color: ' + getComputedStyle(document.documentElement).getPropertyValue('--pal-boton').trim() + '; font-size: 14px; font-weight: bold;');
        console.log('%cEntorno protegido', 'color: #666; font-size: 11px;');
    </script>
</body>
</html>
