<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="google-adsense-account" content="ca-pub-3345712294617095">
    <title>MC Addons - (Web)</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script async custom-element="amp-auto-ads"
        src="https://cdn.ampproject.org/v0/amp-auto-ads-0.1.js">
    </script>
    <style>
        /* --- VARIABLES Y RESET --- */
        :root {
            --primary: #FFD700;
            --primary-glow: rgba(255, 215, 0, 0.4);
            --bg-dark: #050505;
            --bg-panel: #0d0d0d;
            --surface: #161616;
            --surface-2: #1e1e1e;
            --text-main: #ffffff;
            --text-sec: #888888;
            --success: #00ff88;
            --glass: rgba(12, 12, 12, 0.85);
            --glass-border: rgba(255, 255, 255, 0.06);
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            --cyan-green: #00ffd5;
            --cyan-glow: rgba(0, 255, 213, 0.25);

            /* Nuevas variables de tema */
            --header-shadow: 0 4px 40px rgba(0,0,0,0.6);
            --card-shadow: 0 8px 32px rgba(0,0,0,0.5);
            --card-hover-shadow: 0 16px 48px rgba(255,215,0,0.12);
            --glow-line: rgba(255, 215, 0, 0.15);
            --input-bg: rgba(255,255,255,0.04);
            --sidebar-bg: #0a0a0a;
            --accent-gradient: linear-gradient(135deg, #FFD700, #FF8C00);
            --bg-pattern: radial-gradient(ellipse at 20% 50%, rgba(255,215,0,0.03) 0%, transparent 60%),
                          radial-gradient(ellipse at 80% 20%, rgba(0,255,213,0.03) 0%, transparent 50%);
        }

        /* ========================
           TEMA CLARO - MEJORADO
        ======================== */
        [data-theme="light"] {
            --primary: #d4a000;
            --primary-glow: rgba(212, 160, 0, 0.3);
            --bg-dark: #f4f6f9;
            --bg-panel: #ffffff;
            --surface: #ffffff;
            --surface-2: #f8f9fb;
            --text-main: #1a1a2e;
            --text-sec: #6b7280;
            --glass: rgba(255, 255, 255, 0.92);
            --glass-border: rgba(0, 0, 0, 0.07);
            --header-shadow: 0 4px 30px rgba(0,0,0,0.08);
            --card-shadow: 0 4px 20px rgba(0,0,0,0.06);
            --card-hover-shadow: 0 12px 40px rgba(212,160,0,0.18);
            --glow-line: rgba(212, 160, 0, 0.2);
            --input-bg: rgba(0,0,0,0.03);
            --sidebar-bg: #ffffff;
            --accent-gradient: linear-gradient(135deg, #d4a000, #e07b00);
            --bg-pattern: radial-gradient(ellipse at 30% 40%, rgba(212,160,0,0.05) 0%, transparent 60%),
                          radial-gradient(ellipse at 70% 80%, rgba(0,180,150,0.04) 0%, transparent 50%);
            --cyan-green: #00b89c;
            --cyan-glow: rgba(0, 184, 156, 0.2);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-drag: none;
        }

        /* Fondo animado */
        body {
            margin: 0;
            background-color: var(--bg-dark);
            background-image: var(--bg-pattern);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        /* Scrollbar Personalizado */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* --- HEADER MEJORADO --- */
        .app-header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 70px;
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
            box-shadow: var(--header-shadow);
            transition: background 0.5s ease, box-shadow 0.5s ease;
        }

        /* Línea decorativa inferior del header */
        .app-header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0.4;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }

        .menu-btn {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 1.4rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, color 0.2s;
        }
        .menu-btn:hover {
            background: rgba(255,215,0,0.1);
            color: var(--primary);
        }

        .app-logo {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .search-container {
            flex-grow: 1;
            max-width: 500px;
            margin: 0 20px;
            position: relative;
        }

        #addon-search {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            padding: 10px 45px 10px 20px;
            border-radius: 50px;
            color: var(--text-main);
            font-family: inherit;
            outline: none;
            transition: var(--transition);
            font-size: 0.9rem;
        }

        #addon-search:focus {
            background: rgba(255,215,0,0.06);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        #addon-search::placeholder { color: var(--text-sec); }

        .search-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--text-sec); pointer-events: none; transition: color 0.3s; }
        #addon-search:focus + .search-icon { color: var(--primary); }

        /* --- SIDEBAR MEJORADO --- */
        .sidebar {
            position: fixed;
            top: 0; left: 0;
            width: 280px;
            height: 100vh;
            background: var(--sidebar-bg);
            transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 2000;
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 40px rgba(0,0,0,0.3);
        }

        .sidebar.active { transform: translateX(0); }

        .sidebar-header {
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            position: relative;
        }

        .sidebar-header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 20px; right: 20px;
            height: 1px;
            background: var(--accent-gradient);
            opacity: 0.5;
        }

        .sidebar-close {
            background: var(--surface-2);
            border: 1px solid var(--glass-border);
            color: var(--text-sec);
            font-size: 0.9rem;
            cursor: pointer;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .sidebar-close:hover { background: rgba(255,215,0,0.1); color: var(--primary); }

        .nav-list { list-style: none; padding: 15px 10px; margin: 0; flex-grow: 1; overflow-y: auto; }
        .nav-item { margin-bottom: 4px; }
        
        .nav-link {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: var(--text-main);
            text-decoration: none;
            border-radius: 12px;
            transition: var(--transition);
            font-weight: 500;
            cursor: pointer;
            font-size: 0.95rem;
            position: relative;
            overflow: hidden;
        }

        .nav-link::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: var(--accent-gradient);
            border-radius: 0 3px 3px 0;
            transform: scaleY(0);
            transition: transform 0.2s;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(255, 215, 0, 0.08);
            color: var(--primary);
            padding-left: 20px;
        }

        .nav-link:hover::before, .nav-link.active::before { transform: scaleY(1); }

        .nav-link i { margin-right: 12px; width: 20px; text-align: center; font-size: 0.95rem; }

        .submenu { 
            max-height: 0; overflow: hidden; transition: max-height 0.4s ease; padding-left: 15px;
        }
        .submenu.open { max-height: 400px; }
        .dropdown-arrow { margin-left: auto; transition: 0.3s; font-size: 0.75rem; opacity: 0.6; }
        .dropdown-arrow.rotate { transform: rotate(180deg); }

        /* Divider en sidebar */
        .nav-divider {
            height: 1px;
            background: var(--glass-border);
            margin: 10px 15px;
        }

        /* --- HERO SECTION --- */
        .hero-container {
            margin-top: 70px;
            position: relative;
            height: 240px;
            width: 100%;
            overflow: hidden;
        }

        .hero-slide {
            position: absolute; inset: 0;
            background-size: cover; background-position: center;
            opacity: 0; transition: opacity 1s ease;
            filter: brightness(0.5);
        }
        .hero-slide.active {
            opacity: 1;
            transform: scale(1.05);
            transition: opacity 1s ease, transform 6s linear;
            filter: brightness(0.55);
        }

        /* Gradientes del hero mejorados */
        .hero-container::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                transparent 30%,
                rgba(5,5,5,0.6) 70%,
                var(--bg-dark) 100%
            );
            z-index: 1;
            pointer-events: none;
        }

        [data-theme="light"] .hero-container::after {
            background: linear-gradient(
                to bottom,
                transparent 30%,
                rgba(244,246,249,0.5) 70%,
                var(--bg-dark) 100%
            );
        }

        .hero-content {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            padding: 30px 20px;
            z-index: 2;
        }

        .hero-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.2rem;
            text-transform: uppercase;
            margin: 0;
            color: #fff;
            text-shadow: 0 2px 20px rgba(0,0,0,0.9);
            letter-spacing: 2px;
        }

        [data-theme="light"] .hero-title { text-shadow: 0 2px 20px rgba(0,0,0,0.7); }

        .hero-subtitle {
            color: var(--primary);
            font-size: 0.85rem;
            margin-top: 6px;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--primary-glow);
        }

        /* Línea decorativa hero */
        .hero-title-line {
            width: 40px;
            height: 3px;
            background: var(--accent-gradient);
            border-radius: 2px;
            margin-bottom: 8px;
        }

        /* --- CONTENIDO PRINCIPAL --- */
        .main-content {
            padding: 20px;
            min-height: calc(100vh - 350px);
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-header {
            display: flex;
            align-items: center;
            margin: 30px 0 18px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.15rem;
            color: var(--text-main);
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .section-header i { margin-right: 10px; color: var(--primary); font-size: 1rem; }
        .section-line { flex-grow: 1; height: 1px; background: var(--glass-border); margin-left: 15px; }

        /* --- SCROLL HORIZONTAL --- */
        .h-scroll-wrapper {
            display: flex;
            gap: 14px;
            overflow-x: auto;
            padding-bottom: 12px;
            scroll-behavior: smooth;
        }
        .h-scroll-wrapper::-webkit-scrollbar { height: 3px; }
        .h-scroll-wrapper::-webkit-scrollbar-thumb { background: var(--primary); opacity: 0.4; }

        /* --- GRID LAYOUT --- */
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 14px;
        }

        @media (min-width: 768px) {
            .grid-layout { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 18px; }
            .hero-container { height: 350px; }
            .hero-title { font-size: 3rem; }
        }

        /* --- CARDS MEJORADAS --- */
        .card {
            background: var(--surface);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            overflow: hidden;
            position: relative;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.3s ease, border-color 0.3s ease;
            display: flex;
            flex-direction: column;
            box-shadow: var(--card-shadow);
        }

        [data-theme="light"] .card {
            box-shadow: 0 2px 12px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: var(--card-hover-shadow);
            border-color: rgba(255,215,0,0.2);
        }

        [data-theme="light"] .card:hover {
            box-shadow: 0 12px 40px rgba(212,160,0,0.12), 0 4px 12px rgba(0,0,0,0.06);
        }

        .card-img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            background: var(--surface-2);
            display: block;
        }

        /* Overlay en imagen */
        .card-img-wrapper {
            position: relative;
            overflow: hidden;
        }

        .card-img-wrapper::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.3) 0%, transparent 50%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card:hover .card-img-wrapper::after { opacity: 1; }

        .card-body { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; }
        
        .card-meta {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;
        }

        .card-tag {
            font-size: 0.65rem; color: var(--primary); text-transform: uppercase; font-weight: 700;
            letter-spacing: 1px; opacity: 0.85;
        }

        .card-version {
            font-size: 0.62rem;
            background: rgba(255, 215, 0, 0.1);
            color: var(--primary);
            padding: 2px 7px;
            border-radius: 20px;
            font-weight: 700;
            border: 1px solid rgba(255,215,0,0.15);
        }

        [data-theme="light"] .card-version {
            background: rgba(212,160,0,0.08);
            border-color: rgba(212,160,0,0.2);
        }

        .card-title {
            font-size: 0.9rem; margin: 0 0 5px; line-height: 1.4; font-weight: 600;
            display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
        }

        .card-desc {
            font-size: 0.75rem; color: var(--text-sec); margin-bottom: 10px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
            line-height: 1.3; height: 2rem;
        }

        .card-footer {
            margin-top: auto;
            display: flex; align-items: center; justify-content: space-between;
            font-size: 0.72rem; color: var(--text-sec); padding-top: 8px;
            border-top: 1px solid var(--glass-border);
        }

        .stat { display: flex; align-items: center; gap: 5px; cursor: pointer; transition: 0.2s; }
        .stat:hover i { transform: scale(1.2); }
        .stat i { color: var(--text-sec); transition: 0.2s; }
        .stat.liked i { color: #ff4757; }

        .btn-action {
            width: 100%;
            margin-top: 10px;
            background: var(--surface-2);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 8px;
            border-radius: 10px;
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.25s;
            text-align: center;
            text-decoration: none;
            display: block;
            letter-spacing: 0.5px;
        }

        [data-theme="light"] .btn-action {
            background: #f4f6f9;
            border-color: rgba(0,0,0,0.08);
            color: #1a1a2e;
        }

        .btn-action:hover {
            background: var(--accent-gradient);
            color: #000;
            border-color: transparent;
            box-shadow: 0 4px 15px var(--primary-glow);
            transform: translateY(-1px);
        }

        /* Descarga badge sobre la imagen */
        .card-dl-badge {
            position: absolute;
            top: 8px; right: 8px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(6px);
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.68rem;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 4px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        [data-theme="light"] .card-dl-badge {
            background: rgba(0,0,0,0.6);
        }

        /* --- LOADER & OVERLAY --- */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px); z-index: 1500; opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .overlay.active { opacity: 1; pointer-events: all; }

        .loader-container {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 200; text-align: center;
        }

        .spinner {
            width: 44px; height: 44px;
            border: 3px solid rgba(255,215,0,0.15);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
            box-shadow: 0 0 20px var(--primary-glow);
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loader-text {
            font-size: 0.78rem;
            letter-spacing: 2px;
            color: var(--text-sec);
            text-transform: uppercase;
        }

        #toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: var(--surface);
            color: var(--text-main);
            padding: 12px 24px; border-radius: 50px;
            font-size: 0.88rem; opacity: 0; pointer-events: none; transition: 0.35s;
            border: 1px solid var(--primary);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3), 0 0 15px var(--primary-glow);
            z-index: 2000;
            white-space: nowrap;
            font-weight: 500;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* --- MODAL DETALLES MEJORADO --- */
        .modal-overlay {
            position: fixed; inset: 0; 
            background: rgba(0,0,0,0.88);
            backdrop-filter: blur(12px) saturate(150%);
            z-index: 3000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-card {
            background: var(--bg-panel);
            width: 92%;
            max-width: 440px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            padding: 22px;
            border: 1.5px solid var(--cyan-green);
            box-shadow: 0 0 40px var(--cyan-glow), 0 20px 60px rgba(0,0,0,0.5);
            border-radius: 22px;
            transform: scale(0.88) translateY(20px);
            transition: 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        [data-theme="light"] .modal-card {
            background: #ffffff;
            box-shadow: 0 0 30px var(--cyan-glow), 0 20px 60px rgba(0,0,0,0.12);
        }

        .modal-overlay.active .modal-card {
            transform: scale(1) translateY(0);
        }

        .modal-close-btn {
            position: absolute; top: 14px; right: 14px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-sec);
            width: 32px; height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            transition: 0.2s;
            z-index: 10;
        }
        .modal-close-btn:hover { background: rgba(255,255,255,0.15); color: var(--text-main); }

        [data-theme="light"] .modal-close-btn {
            background: rgba(0,0,0,0.05);
            border-color: rgba(0,0,0,0.08);
            color: var(--text-sec);
        }
        [data-theme="light"] .modal-close-btn:hover { background: rgba(0,0,0,0.08); color: var(--text-main); }

        .detalles-img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 16px;
        }

        [data-theme="light"] .detalles-img { border-color: rgba(0,0,0,0.06); }

        .detalles-nombre {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.55rem;
            color: var(--text-main);
            text-align: center;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .detalles-version {
            display: inline-block;
            background: rgba(0, 255, 213, 0.1);
            color: var(--cyan-green);
            padding: 5px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 16px;
            border: 1px solid rgba(0, 255, 213, 0.25);
            letter-spacing: 0.5px;
        }

        [data-theme="light"] .detalles-version {
            background: rgba(0, 184, 156, 0.08);
            border-color: rgba(0, 184, 156, 0.3);
        }

        .detalles-desc {
            width: 100%;
            text-align: center;
            color: var(--text-sec);
            font-size: 0.9rem;
            line-height: 1.65;
            margin-bottom: 22px;
            background: var(--input-bg);
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        .btn-descarga-final {
            width: 100%;
            background: var(--cyan-green);
            color: #000;
            font-weight: 800;
            padding: 15px;
            border: none;
            border-radius: 14px;
            font-size: 1.05rem;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 6px 24px var(--cyan-glow);
            transition: 0.25s;
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 1px;
        }
        
        .btn-descarga-final:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 10px 32px var(--cyan-glow);
            filter: brightness(1.08);
        }

        /* --- TEMA TOGGLE BTN MEJORADO --- */
        .theme-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--surface-2);
            border: 1px solid var(--glass-border);
            color: var(--text-sec);
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            width: 100%;
            transition: 0.25s;
        }
        .theme-btn:hover {
            background: rgba(255,215,0,0.08);
            border-color: rgba(255,215,0,0.2);
            color: var(--primary);
        }

        [data-theme="light"] .theme-btn {
            background: #f4f6f9;
            border-color: rgba(0,0,0,0.08);
        }
        [data-theme="light"] .theme-btn:hover {
            background: rgba(212,160,0,0.06);
            border-color: rgba(212,160,0,0.2);
        }

        /* Animación de entrada cards */
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            animation: fadeSlideUp 0.4s ease both;
        }
    </style>
</head>
<body data-theme="dark">
<amp-auto-ads type="adsense"
        data-ad-client="ca-pub-3345712294617095">
</amp-auto-ads>
    <div style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:99999;display:none;" id="security-shield"></div>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="app-logo"><i class="fas fa-cube"></i> MC Add-Ons</div>
            <button class="sidebar-close" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
        </div>
        <ul class="nav-list">
            <li class="nav-item"><a class="nav-link" onclick="mostrarInicio()"><i class="fas fa-home"></i> Inicio</a></li>
            
            <li class="nav-item">
                <div class="nav-link" onclick="toggleDropdown()">
                    <i class="fas fa-layer-group"></i> Categorías 
                    <i class="fas fa-chevron-down dropdown-arrow" id="dd-arrow"></i>
                </div>
                <ul class="submenu" id="submenu">
                    <li><a class="nav-link" onclick="filtrar('Add-On')" style="padding-left: 50px;">Addons</a></li>
                    <li><a class="nav-link" onclick="filtrar('Mapa')" style="padding-left: 50px;">Mapas</a></li>
                    <li><a class="nav-link" onclick="filtrar('Texture')" style="padding-left: 50px;">Texturas</a></li>
                    <li><a class="nav-link" onclick="filtrar('Semilla')" style="padding-left: 50px;">Semillas</a></li>
                </ul>
            </li>

            <div class="nav-divider"></div>
            
            <li class="nav-item"><a class="nav-link" href="https://www.paypal.com/paypalme/MystStart112"><i class="fas fa-crown"></i> Donaciones</a></li>

        </ul>
        <div style="padding: 15px;">
            <button class="theme-btn" onclick="toggleTheme()">
                <i class="fas fa-moon" id="theme-icon"></i>
                <span id="theme-label">Cambiar Tema</span>
            </button>
        </div>
    </nav>

    <header class="app-header">
        <div class="header-left">
            <button class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <div class="app-logo" style="display:none;" id="header-logo">MC Add-Ons</div>
        </div>
        
        <div class="search-container">
            <input type="text" id="addon-search" placeholder="Buscar por nombre o versión..." oninput="buscar()">
            <i class="fas fa-search search-icon"></i>
        </div>
        
        <div style="width: 30px;"></div>
    </header>

    <main>
        <div id="loader" class="loader-container">
            <div class="spinner"></div>
            <div class="loader-text">Cargando recursos...</div>
        </div>

        <div id="dynamic-content" style="opacity: 0; transition: opacity 0.6s;"></div>
    </main>

    <div class="modal-overlay" id="modal-detalles">
        <div class="modal-card">
            <button class="modal-close-btn" onclick="cerrarDetalles()"><i class="fas fa-times"></i></button>
            
            <img id="md-img" src="" class="detalles-img">
            <h2 id="md-nombre" class="detalles-nombre">Nombre del Addon</h2>
            <div id="md-version" class="detalles-version">v1.0.0</div>
            <div id="md-desc" class="detalles-desc">Descripción del addon...</div>
            
            <a id="md-btn-download" href="#" target="_blank" class="btn-descarga-final">
                <i class="fas fa-download"></i> DESCARGAR AHORA
            </a>
        </div>
    </div>

    <div id="toast">Acción completada</div>


    
    <script>
        // --- SEGURIDAD AVANZADA ---
        (function() {
            document.addEventListener('contextmenu', event => event.preventDefault());
            document.onkeydown = function(e) {
                if(e.keyCode == 123) return false;
                if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
                if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
                if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
                if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
            };
        })();

        // --- LÓGICA DE LA APP ---
        const scriptURL = "https://script.google.com/macros/s/AKfycbyxezM7lhtD7lmpqg_ww8X3afZ_VEUTH56klo55skV9CJ-0XlW63hAUvyyTyYGWUr8mdQ/exec";
        let db = [];
        let heroTimer;

        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.body.setAttribute('data-theme', savedTheme);
            updateThemeUI(savedTheme);
            cargarDatos();
        });

        async function cargarDatos() {
            try {
                const res = await fetch(`${scriptURL}?action=read`);
                const data = await res.json();
                if(data.error) throw new Error(data.error);
                db = data;
                
                document.getElementById('loader').style.display = 'none';
                document.getElementById('dynamic-content').style.opacity = '1';
                mostrarInicio();
            } catch (e) {
                document.getElementById('loader').innerHTML = `<p style="color:#ff4757; text-align:center;">Error de conexión.<br>Intenta recargar.</p>`;
            }
        }

        function mostrarInicio() {
            if(window.innerWidth < 1000) toggleSidebar(false);
            const container = document.getElementById('dynamic-content');
            container.innerHTML = '';

            const imagenes = db.map(i => i[3]).filter(url => url && url.startsWith('http'));
            renderHero(imagenes, container);

            renderHorizontalSection("Novedades", [...db].reverse().slice(0, 10), container);
            renderHorizontalSection("Populares", [...db].sort((a,b)=>b[6]-a[6]).slice(0, 10), container);
        }

        function renderHero(imgs, container) {
            if(!imgs.length) return;
            const hero = document.createElement('div');
            hero.className = 'hero-container';
            hero.innerHTML = `
                <div id="hero-bg-1" class="hero-slide active"></div>
                <div id="hero-bg-2" class="hero-slide"></div>
                <div class="hero-content">
                    <div class="hero-title-line"></div>
                    <h1 class="hero-title">Explora. Crea. Juega.</h1>
                    <p class="hero-subtitle">LA MEJOR COLECCIÓN PARA MINECRAFT PE/BE</p>
                </div>
            `;
            container.appendChild(hero);

            let idx = 0;
            let activeDiv = 1;
            const s1 = hero.querySelector('#hero-bg-1');
            const s2 = hero.querySelector('#hero-bg-2');
            s1.style.backgroundImage = `url('${imgs[Math.floor(Math.random()*imgs.length)]}')`;

            if(heroTimer) clearInterval(heroTimer);
            heroTimer = setInterval(() => {
                idx = Math.floor(Math.random() * imgs.length);
                const nextImg = imgs[idx];
                if(activeDiv === 1) {
                    s2.style.backgroundImage = `url('${nextImg}')`;
                    s2.classList.add('active');
                    s1.classList.remove('active');
                    activeDiv = 2;
                } else {
                    s1.style.backgroundImage = `url('${nextImg}')`;
                    s1.classList.add('active');
                    s2.classList.remove('active');
                    activeDiv = 1;
                }
            }, 5000);
        }

        function renderHorizontalSection(titulo, items, container) {
            const section = document.createElement('div');
            section.style.padding = '0 20px';
            section.innerHTML = `
                <div class="section-header"><i class="fas fa-fire"></i> ${titulo} <div class="section-line"></div></div>
                <div class="h-scroll-wrapper">
                    ${items.map(item => getCardHTML(item, 'min-width:175px; width:175px;')).join('')}
                </div>
            `;
            container.appendChild(section);
        }

        function filtrar(categoria) {
            toggleSidebar(false);
            clearInterval(heroTimer);
            const container = document.getElementById('dynamic-content');
            const filtrados = db.filter(item => item[4] === categoria).reverse();
            
            container.innerHTML = `
                <div style="padding: 0 20px;">
                    <div class="section-header" style="margin-top:90px;">
                        <i class="fas fa-layer-group"></i> ${categoria}s 
                        <span style="font-size:0.8rem; margin-left:10px; color:var(--text-sec); font-weight:400;">(${filtrados.length})</span>
                        <div class="section-line"></div>
                    </div>
                    <div class="grid-layout">
                        ${filtrados.length ? filtrados.map(item => getCardHTML(item)).join('') : '<p style="color:var(--text-sec)">No hay resultados.</p>'}
                    </div>
                </div>
            `;
        }

        function buscar() {
            clearInterval(heroTimer);
            const q = document.getElementById('addon-search').value.toLowerCase();
            if(!q) { mostrarInicio(); return; }

            const container = document.getElementById('dynamic-content');
            const res = db.filter(item => 
                item[1].toString().toLowerCase().includes(q) || 
                (item[9] && item[9].toString().toLowerCase().includes(q))
            );
            
            container.innerHTML = `
                <div style="padding: 0 20px;">
                    <div class="section-header" style="margin-top:90px;"><i class="fas fa-search"></i> Resultados <div class="section-line"></div></div>
                    <div class="grid-layout">
                        ${res.length ? res.map(item => getCardHTML(item)).join('') : '<p style="color:var(--text-sec); padding:20px 0;">No se encontraron coincidencias.</p>'}
                    </div>
                </div>
            `;
        }

        // --- GENERADOR DE CARDS ---
        function getCardHTML(item, styleOverride = '') {
            const [id, nombre, link, img, cat, likes, dls, seed, autor, version, desc] = item;
            
            const isSeed = cat.toLowerCase().includes('semilla');
            const displayVersion = version ? version : '1.0';
            const displayDesc = desc ? desc : 'Sin descripción disponible.';

            let btnAction;
            if(isSeed) {
                btnAction = `<button class="btn-action" onclick="copiar('${seed}')"><i class="fas fa-copy"></i> COPIAR SEED</button>`;
            } else {
                btnAction = `<button class="btn-action" onclick="abrirDetalles('${id}')">DETALLES</button>`;
            }

            return `
            <div class="card" style="${styleOverride}">
                <div class="card-img-wrapper">
                    <img src="${img}" class="card-img" onerror="this.src='https://via.placeholder.com/300x170?text=MC+Addons'" loading="lazy">
                    <div class="card-dl-badge">
                        <i class="fas fa-download"></i> ${dls || 0}
                    </div>
                </div>
                <div class="card-body">
                    <div class="card-meta">
                        <div class="card-tag">${cat}</div>
                        <div class="card-version">v${displayVersion}</div>
                    </div>
                    <h3 class="card-title">${nombre}</h3>
                    <div class="card-footer">
                        <span>By ${autor}</span>
                        <div class="stat" onclick="like(this, '${nombre}')">
                            <i class="fas fa-heart"></i> <span>${likes || 0}</span>
                        </div>
                    </div>
                    ${btnAction}
                </div>
            </div>`;
        }

        // --- NUEVA FUNCIÓN: ABRIR DETALLES ---
        function abrirDetalles(id) {
            const item = db.find(x => x[0] == id);
            if(!item) return;

            const nombre = item[1];
            const link = item[2];
            const img = item[3];
            const version = item[9] || '1.0';
            const descripcion = item[10] || 'No hay descripción detallada disponible para este complemento.';

            document.getElementById('md-img').src = img;
            document.getElementById('md-nombre').innerText = nombre;
            document.getElementById('md-version').innerText = 'Versión: ' + version;
            document.getElementById('md-desc').innerText = descripcion;
            
            const btnDown = document.getElementById('md-btn-download');
            btnDown.href = link;
            btnDown.onclick = function() {
                registrar('download', nombre);
            };

            document.getElementById('modal-detalles').classList.add('active');
        }

        function cerrarDetalles() {
            document.getElementById('modal-detalles').classList.remove('active');
        }

        // --- INTERACCIONES ---
        function toggleSidebar(forceState) {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('overlay');
            if (forceState !== undefined) {
                if (forceState) { sb.classList.add('active'); ov.classList.add('active'); }
                else { sb.classList.remove('active'); ov.classList.remove('active'); }
            } else {
                sb.classList.toggle('active');
                ov.classList.toggle('active');
            }
        }

        function toggleDropdown() {
            document.getElementById('submenu').classList.toggle('open');
            document.getElementById('dd-arrow').classList.toggle('rotate');
        }

        function updateThemeUI(theme) {
            const icon = document.getElementById('theme-icon');
            const label = document.getElementById('theme-label');
            if(!icon || !label) return;
            if(theme === 'dark') {
                icon.className = 'fas fa-sun';
                label.textContent = 'Tema Claro';
            } else {
                icon.className = 'fas fa-moon';
                label.textContent = 'Tema Oscuro';
            }
        }

        function toggleTheme() {
            const body = document.body;
            const current = body.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateThemeUI(next);
        }

        function copiar(texto) {
            navigator.clipboard.writeText(texto);
            showToast("¡Semilla copiada al portapapeles!");
        }

        function like(el, nombre) {
            if(el.classList.contains('liked')) return;
            el.classList.add('liked');
            const span = el.querySelector('span');
            span.innerText = parseInt(span.innerText) + 1;
            registrar('like', nombre);
        }

        function registrar(accion, nombre) {
            fetch(`${scriptURL}?action=${accion}&nombre=${encodeURIComponent(nombre)}`, {mode:'no-cors'});
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
