<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="google-adsense-account" content="ca-pub-3345712294617095">
    <title>MC Addons - (Web)</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script async custom-element="amp-auto-ads" src="https://cdn.ampproject.org/v0/amp-auto-ads-0.1.js"></script>

    <style>
        /* =========================================
           VARIABLES & RESET
        ========================================= */
        :root {
            --primary:        #FFD700;
            --primary-glow:   rgba(255, 215, 0, 0.35);
            --primary-soft:   rgba(255, 215, 0, 0.08);
            --cyan-green:     #00ffd5;
            --cyan-glow:      rgba(0, 255, 213, 0.25);
            --cyan-soft:      rgba(0, 255, 213, 0.08);
            --blue-deep:      #0a0e1a;
            --bg-dark:        #060810;
            --bg-panel:       #0d1017;
            --surface:        #131824;
            --surface-2:      #1a2030;
            --text-main:      #eef1f8;
            --text-sec:       #6e7a96;
            --text-muted:     #353f56;
            --success:        #00ff88;
            --glass:          rgba(13, 16, 23, 0.85);
            --glass-border:   rgba(255, 255, 255, 0.06);
            --glass-border-h: rgba(255, 215, 0, 0.2);
            --radius:         18px;
            --radius-sm:      10px;
            --ease:           cubic-bezier(0.25, 0.8, 0.25, 1);
            --ease-spring:    cubic-bezier(0.34, 1.56, 0.64, 1);
            --transition:     all 0.3s var(--ease);
            --shadow-gold:    0 8px 32px rgba(255,215,0,0.15), 0 2px 8px rgba(255,215,0,0.1);
            --shadow-cyan:    0 8px 32px rgba(0,255,213,0.15);
            --shadow-card:    0 4px 24px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.04) inset;
        }

        [data-theme="light"] {
            --bg-dark:      #edf0f7;
            --bg-panel:     #f7f9fc;
            --surface:      #ffffff;
            --surface-2:    #f0f3fa;
            --text-main:    #0d1017;
            --text-sec:     #4a5568;
            --text-muted:   #a0aec0;
            --glass:        rgba(255,255,255,0.9);
            --glass-border: rgba(0,0,0,0.06);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-drag: none;
        }

        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(ellipse 70% 50% at 0% 0%,   rgba(255,215,0,0.04)  0%, transparent 50%),
                radial-gradient(ellipse 60% 50% at 100% 0%, rgba(0,255,213,0.04)  0%, transparent 50%),
                radial-gradient(ellipse 80% 80% at 50% 110%,rgba(10,14,40,0.8)    0%, transparent 80%);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            transition: background 0.3s ease;
            /* dot grid */
            background-image:
                radial-gradient(ellipse 70% 50% at 0% 0%, rgba(255,215,0,0.04) 0%, transparent 50%),
                radial-gradient(ellipse 60% 50% at 100% 0%, rgba(0,255,213,0.04) 0%, transparent 50%),
                url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='1' cy='1' r='1' fill='%23ffffff' fill-opacity='0.018'/%3E%3C/svg%3E");
        }

        /* Noise overlay */
        body::after {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 9998; opacity: 0.5;
        }

        /* ---- SCROLLBAR ---- */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--surface-2); border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* =========================================
           HEADER
        ========================================= */
        .app-header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 68px;
            background: rgba(6, 8, 16, 0.9);
            backdrop-filter: blur(24px) saturate(1.8);
            -webkit-backdrop-filter: blur(24px) saturate(1.8);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
            /* gold top accent line */
            box-shadow:
                0 1px 0 rgba(255,215,0,0.08),
                0 4px 30px rgba(0,0,0,0.4);
        }

        .header-left { display: flex; align-items: center; gap: 14px; }

        .menu-btn {
            background: var(--surface);
            border: 1px solid var(--glass-border);
            color: var(--text-sec);
            font-size: 1rem;
            width: 40px; height: 40px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition);
        }
        .menu-btn:hover {
            background: var(--primary-soft);
            border-color: var(--glass-border-h);
            color: var(--primary);
        }

        .app-logo {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700; font-size: 1.4rem;
            color: var(--primary);
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255,215,0,0.4);
            display: flex; align-items: center; gap: 8px;
        }

        .search-container {
            flex-grow: 1;
            max-width: 480px;
            margin: 0 20px;
            position: relative;
        }

        #addon-search {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--glass-border);
            padding: 10px 44px 10px 18px;
            border-radius: 50px;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            font-size: 0.88rem;
            outline: none;
            transition: var(--transition);
        }
        #addon-search::placeholder { color: var(--text-sec); }
        #addon-search:focus {
            background: var(--surface-2);
            border-color: rgba(255,215,0,0.25);
            box-shadow: 0 0 0 3px rgba(255,215,0,0.07), 0 0 20px rgba(255,215,0,0.05);
        }

        .search-icon {
            position: absolute; right: 16px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-sec); pointer-events: none;
            font-size: 0.85rem;
        }

        /* =========================================
           SIDEBAR
        ========================================= */
        .sidebar {
            position: fixed;
            top: 0; left: 0;
            width: 290px; height: 100vh;
            background: linear-gradient(180deg, #0b0e18 0%, #080b14 100%);
            transform: translateX(-100%);
            transition: transform 0.42s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 2000;
            border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column;
            box-shadow: 6px 0 40px rgba(0,0,0,0.7);
        }
        .sidebar.active { transform: translateX(0); }

        .sidebar-header {
            padding: 28px 22px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--glass-border);
            background: linear-gradient(135deg, rgba(255,215,0,0.04) 0%, transparent 80%);
        }

        .sidebar-close {
            background: var(--surface);
            border: 1px solid var(--glass-border);
            color: var(--text-sec);
            width: 34px; height: 34px; border-radius: 8px;
            cursor: pointer; font-size: 0.9rem;
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition);
        }
        .sidebar-close:hover { background: rgba(255,59,59,0.15); color: #ff4757; border-color: rgba(255,59,59,0.2); }

        .nav-list { list-style: none; padding: 18px 14px; margin: 0; flex-grow: 1; overflow-y: auto; }
        .nav-item { margin-bottom: 4px; }

        .nav-link {
            display: flex; align-items: center;
            padding: 11px 14px;
            color: var(--text-sec);
            text-decoration: none;
            border-radius: 10px;
            transition: var(--transition);
            font-weight: 500; font-size: 0.92rem;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .nav-link:hover {
            background: var(--primary-soft);
            color: var(--primary);
            border-color: rgba(255,215,0,0.1);
        }
        .nav-link.active {
            background: var(--primary-soft);
            color: var(--primary);
            border-color: rgba(255,215,0,0.15);
        }
        .nav-link i { margin-right: 14px; width: 18px; text-align: center; font-size: 0.9rem; }

        .submenu {
            max-height: 0; overflow: hidden;
            transition: max-height 0.4s ease;
            padding-left: 14px;
        }
        .submenu.open { max-height: 400px; }
        .dropdown-arrow { margin-left: auto; transition: 0.3s; font-size: 0.75rem; }
        .dropdown-arrow.rotate { transform: rotate(180deg); }

        /* NAV DIVIDER */
        .nav-divider {
            height: 1px;
            background: var(--glass-border);
            margin: 10px 14px;
            opacity: 0.6;
        }

        /* =========================================
           HERO
        ========================================= */
        .hero-container {
            margin-top: 68px;
            position: relative;
            height: 260px;
            width: 100%;
            overflow: hidden;
        }

        .hero-slide {
            position: absolute; inset: 0;
            background-size: cover; background-position: center;
            opacity: 0;
            transition: opacity 1.2s ease;
            filter: brightness(0.45) saturate(1.3);
        }
        .hero-slide.active {
            opacity: 1;
            transform: scale(1.05);
            transition: opacity 1.2s ease, transform 8s linear;
        }

        /* cinematic vignette */
        .hero-container::before {
            content: '';
            position: absolute; inset: 0; z-index: 1;
            background:
                linear-gradient(to bottom, rgba(6,8,16,0.5) 0%, transparent 40%, rgba(6,8,16,0.95) 100%),
                linear-gradient(to right, rgba(6,8,16,0.6) 0%, transparent 50%);
        }

        /* scanline effect */
        .hero-container::after {
            content: '';
            position: absolute; inset: 0; z-index: 2; pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 3px,
                rgba(0,0,0,0.04) 3px,
                rgba(0,0,0,0.04) 4px
            );
        }

        .hero-content {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            padding: 28px 24px 28px;
            z-index: 3;
        }

        .hero-eyebrow {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(255,215,0,0.12);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 50px;
            padding: 4px 14px;
            font-size: 0.7rem; font-weight: 700; letter-spacing: 2px;
            color: var(--primary); text-transform: uppercase;
            margin-bottom: 10px;
        }
        .hero-eyebrow span { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; animation: pulse-dot 2s infinite; }
        @keyframes pulse-dot { 0%,100%{opacity:1; transform:scale(1);} 50%{opacity:0.4; transform:scale(0.7);} }

        .hero-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            text-transform: uppercase; margin: 0;
            color: #fff; font-weight: 700;
            line-height: 1.1;
            text-shadow: 0 2px 20px rgba(0,0,0,0.8);
        }
        .hero-title em { color: var(--primary); font-style: normal; }

        .hero-subtitle {
            color: rgba(255,255,255,0.55);
            font-size: 0.8rem; margin-top: 6px;
            font-weight: 500; letter-spacing: 2px; text-transform: uppercase;
        }

        /* =========================================
           MAIN CONTENT
        ========================================= */
        .main-content {
            padding: 6px 18px 100px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-header {
            display: flex; align-items: center;
            margin: 32px 0 16px;
            gap: 12px;
        }
        .section-header-icon {
            width: 32px; height: 32px;
            background: var(--primary-soft);
            border: 1px solid rgba(255,215,0,0.15);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: var(--primary); font-size: 0.85rem;
            flex-shrink: 0;
        }
        .section-header-text {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase;
            color: var(--text-main);
        }
        .section-line { flex-grow: 1; height: 1px; background: var(--glass-border); }
        .section-count {
            font-size: 0.72rem; color: var(--text-sec);
            background: var(--surface); border: 1px solid var(--glass-border);
            padding: 2px 10px; border-radius: 50px;
        }

        /* Legacy section-header for dynamic HTML compatibility */
        .section-header i { display:none; }

        /* =========================================
           HORIZONTAL SCROLL
        ========================================= */
        .h-scroll-wrapper {
            display: flex;
            gap: 14px;
            overflow-x: auto;
            padding-bottom: 10px;
            padding-top: 2px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .h-scroll-wrapper::-webkit-scrollbar { height: 3px; }
        .h-scroll-wrapper::-webkit-scrollbar-thumb { background: var(--surface-2); }

        /* =========================================
           GRID
        ========================================= */
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
            gap: 14px;
        }
        @media (min-width: 768px) {
            .grid-layout { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 18px; }
            .hero-container { height: 380px; }
        }

        /* =========================================
           CARDS
        ========================================= */
        .card {
            background: var(--surface);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            overflow: hidden;
            position: relative;
            transition: transform 0.35s var(--ease), box-shadow 0.35s var(--ease), border-color 0.35s;
            display: flex; flex-direction: column;
            box-shadow: var(--shadow-card);
        }
        /* Inner shimmer */
        .card::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.025) 0%, transparent 50%);
            pointer-events: none; z-index: 0; border-radius: inherit;
        }
        .card:hover {
            transform: translateY(-7px) scale(1.015);
            box-shadow: 0 24px 48px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,215,0,0.15) inset;
            border-color: rgba(255,215,0,0.2);
        }

        /* Image area */
        .card-img-wrap {
            position: relative; overflow: hidden;
        }
        .card-img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            background: var(--surface-2);
            transition: transform 0.55s var(--ease), filter 0.55s;
            display: block;
        }
        .card:hover .card-img { transform: scale(1.08); filter: brightness(1.1) saturate(1.2); }

        /* dl badge */
        .card-dl-badge {
            position: absolute; top: 8px; right: 8px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(6px);
            padding: 3px 9px; border-radius: 6px;
            font-size: 0.68rem; color: rgba(255,255,255,0.7);
            display: flex; align-items: center; gap: 5px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .card-dl-badge i { color: var(--cyan-green); font-size: 0.65rem; }

        /* gradient over bottom of image */
        .card-img-wrap::after {
            content: '';
            position: absolute; bottom: 0; left: 0; right: 0; height: 50px;
            background: linear-gradient(transparent, var(--surface));
            pointer-events: none;
        }

        .card-body { padding: 12px 14px 14px; flex-grow: 1; display: flex; flex-direction: column; position: relative; z-index: 1; }

        .card-meta {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 6px;
        }
        .card-tag {
            font-size: 0.67rem; color: var(--primary);
            text-transform: uppercase; font-weight: 700; letter-spacing: 1px;
            background: var(--primary-soft);
            border: 1px solid rgba(255,215,0,0.12);
            padding: 2px 8px; border-radius: 5px;
        }
        .card-version {
            font-size: 0.63rem;
            background: var(--surface-2);
            color: var(--text-sec);
            padding: 2px 7px; border-radius: 5px;
            font-weight: 600; border: 1px solid var(--glass-border);
        }

        .card-title {
            font-size: 0.9rem; font-weight: 600; margin: 0 0 5px;
            line-height: 1.35;
            display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
            color: var(--text-main);
        }
        .card-desc {
            font-size: 0.74rem; color: var(--text-sec); margin-bottom: 10px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
            line-height: 1.4; height: 2.1rem;
        }

        .card-footer {
            margin-top: auto;
            display: flex; align-items: center; justify-content: space-between;
            font-size: 0.72rem; color: var(--text-sec);
            padding-top: 8px;
            border-top: 1px solid var(--glass-border);
        }
        .card-footer-author { display: flex; align-items: center; gap: 5px; }
        .card-footer-author::before {
            content: '';
            width: 18px; height: 18px;
            background: linear-gradient(135deg, var(--primary-soft), var(--cyan-soft));
            border-radius: 50%; border: 1px solid var(--glass-border);
            flex-shrink: 0;
        }

        .stat { display: flex; align-items: center; gap: 5px; cursor: pointer; transition: 0.2s; }
        .stat:hover i { color: #ff6b7a; }
        .stat i { color: var(--text-muted); transition: 0.2s; }
        .stat.liked i { color: #ff4757; }

        .btn-action {
            width: 100%;
            margin-top: 10px;
            background: var(--surface-2);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 9px;
            border-radius: var(--radius-sm);
            font-size: 0.78rem; font-weight: 700;
            cursor: pointer; transition: 0.28s var(--ease);
            text-align: center; text-decoration: none; display: block;
            letter-spacing: 0.5px; text-transform: uppercase;
            font-family: 'Rajdhani', sans-serif;
            position: relative; overflow: hidden;
        }
        .btn-action::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, transparent 60%);
            pointer-events: none;
        }
        .btn-action:hover {
            background: var(--primary);
            color: #000; border-color: var(--primary);
            box-shadow: var(--shadow-gold);
            transform: translateY(-1px);
        }

        /* =========================================
           LOADER & OVERLAY
        ========================================= */
        .overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(6px);
            z-index: 1500; opacity: 0; pointer-events: none;
            transition: 0.3s;
        }
        .overlay.active { opacity: 1; pointer-events: all; }

        .loader-container {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 200; text-align: center;
        }

        /* Ring loader */
        .spinner-wrap { position: relative; width: 52px; height: 52px; margin: 0 auto 16px; }
        .spinner {
            width: 52px; height: 52px;
            border: 2px solid rgba(255,215,0,0.15);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .spinner-inner {
            position: absolute; top: 8px; left: 8px;
            width: 36px; height: 36px;
            border: 2px solid transparent;
            border-bottom-color: var(--cyan-green);
            border-radius: 50%;
            animation: spin 0.7s linear infinite reverse;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loader-text {
            font-size: 0.72rem; letter-spacing: 3px; color: var(--text-sec);
            text-transform: uppercase; font-family: 'Rajdhani', sans-serif;
        }

        /* =========================================
           TOAST
        ========================================= */
        #toast {
            position: fixed; bottom: 80px; left: 50%;
            transform: translateX(-50%) translateY(12px);
            background: var(--surface);
            border: 1px solid rgba(255,215,0,0.2);
            color: var(--text-main);
            padding: 10px 22px; border-radius: 50px;
            font-size: 0.86rem; opacity: 0; pointer-events: none;
            transition: 0.3s var(--ease-spring);
            box-shadow: var(--shadow-gold);
            z-index: 5000; white-space: nowrap;
            display: flex; align-items: center; gap: 8px;
        }
        #toast::before { content: '✦'; color: var(--primary); font-size: 0.7rem; }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* =========================================
           MODAL DETALLES
        ========================================= */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,6,0.88);
            backdrop-filter: blur(16px) saturate(0.8);
            -webkit-backdrop-filter: blur(16px) saturate(0.8);
            z-index: 3000;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }

        .modal-card {
            background: linear-gradient(160deg, #0e1420 0%, #0a0e18 100%);
            width: 90%; max-width: 460px;
            max-height: 90vh; overflow-y: auto;
            position: relative; padding: 0;
            border: 1px solid rgba(0,255,213,0.2);
            box-shadow:
                0 0 0 1px rgba(0,255,213,0.08),
                0 40px 80px rgba(0,0,0,0.8),
                var(--shadow-cyan);
            border-radius: 24px;
            transform: scale(0.88) translateY(20px);
            transition: 0.4s var(--ease-spring);
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden;
        }
        .modal-overlay.active .modal-card { transform: scale(1) translateY(0); }

        /* Modal image with gradient overlay */
        .modal-img-wrap {
            width: 100%; position: relative;
        }
        .modal-img-wrap::after {
            content: '';
            position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
            background: linear-gradient(transparent, #0a0e18);
        }

        .modal-close-btn {
            position: absolute; top: 14px; right: 14px;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.8); width: 32px; height: 32px;
            border-radius: 50%; cursor: pointer; z-index: 10;
            font-size: 0.85rem; transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-close-btn:hover { background: rgba(255,59,59,0.3); color: #fff; border-color: rgba(255,59,59,0.3); }

        .modal-body { padding: 0 22px 26px; width: 100%; display: flex; flex-direction: column; align-items: center; }

        .detalles-img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            display: block;
            margin-bottom: 0;
        }

        .detalles-nombre {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.65rem; color: #fff;
            text-align: center; margin: 18px 0 8px;
            text-transform: uppercase; font-weight: 700;
            line-height: 1.1;
            text-shadow: 0 2px 12px rgba(0,0,0,0.5);
        }

        .detalles-version {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(0,255,213,0.1);
            color: var(--cyan-green);
            padding: 5px 16px;
            border-radius: 50px;
            font-size: 0.85rem; font-weight: 700;
            margin-bottom: 18px;
            border: 1px solid rgba(0,255,213,0.2);
            box-shadow: 0 0 15px rgba(0,255,213,0.1);
        }
        .detalles-version::before { content:'◆'; font-size:0.55rem; }

        .detalles-desc {
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.55);
            font-size: 0.88rem; line-height: 1.65;
            margin-bottom: 22px;
            background: rgba(255,255,255,0.03);
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        /* Modal divider */
        .modal-divider {
            width: 60px; height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan-green), transparent);
            border-radius: 99px; margin: 0 auto 20px;
        }

        .btn-descarga-final {
            width: 100%;
            background: linear-gradient(135deg, var(--cyan-green) 0%, #00d4b0 100%);
            color: #000; font-weight: 800;
            padding: 15px;
            border: none; border-radius: 14px;
            font-size: 1rem; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1.5px;
            font-family: 'Rajdhani', sans-serif;
            box-shadow: 0 6px 24px rgba(0,255,213,0.3);
            transition: 0.25s var(--ease);
            text-align: center; text-decoration: none; display: block;
            position: relative; overflow: hidden;
        }
        .btn-descarga-final::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 60%);
        }
        .btn-descarga-final:hover {
            transform: scale(1.02) translateY(-2px);
            box-shadow: 0 10px 32px rgba(0,255,213,0.45);
            background: linear-gradient(135deg, #fff 0%, #e0fffa 100%);
        }

        /* =========================================
           SECTION STYLING OVERRIDE (for dynamic HTML)
        ========================================= */
        /* When filtrar/buscar injects raw section-header HTML */
        #dynamic-content .section-header {
            margin-top: 86px;
        }
        #dynamic-content .section-header i {
            display: inline; margin-right: 10px; color: var(--primary);
        }

        /* =========================================
           THEME BUTTON
        ========================================= */
        .sidebar-footer { padding: 16px 14px 28px; }
        .btn-theme {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--glass-border);
            color: var(--text-sec);
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 0.82rem; font-weight: 600;
            cursor: pointer; transition: 0.25s;
            display: flex; align-items: center; gap: 10px;
            font-family: 'Outfit', sans-serif;
        }
        .btn-theme:hover { background: var(--surface-2); color: var(--text-main); border-color: rgba(255,255,255,0.1); }

        /* Light theme card adjustments */
        [data-theme="light"] .card { background: #fff; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
        [data-theme="light"] .card:hover { box-shadow: 0 16px 40px rgba(0,0,0,0.12); }
        [data-theme="light"] .modal-card { background: #f7f9fc; border-color: rgba(0,200,170,0.3); }
        [data-theme="light"] .detalles-desc { background: rgba(0,0,0,0.04); color: #444; }

        /* =========================================
           ANIMATIONS
        ========================================= */
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(16px); }
            to   { opacity:1; transform:translateY(0); }
        }
        .card { animation: fadeUp 0.4s ease both; }
        .card:nth-child(1)  { animation-delay: 0.02s; }
        .card:nth-child(2)  { animation-delay: 0.05s; }
        .card:nth-child(3)  { animation-delay: 0.08s; }
        .card:nth-child(4)  { animation-delay: 0.11s; }
        .card:nth-child(5)  { animation-delay: 0.14s; }
        .card:nth-child(6)  { animation-delay: 0.17s; }
        .card:nth-child(n+7){ animation-delay: 0.20s; }
    </style>
</head>
<body data-theme="dark">
<amp-auto-ads type="adsense" data-ad-client="ca-pub-3345712294617095"></amp-auto-ads>

    <div style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:99999;display:none;" id="security-shield"></div>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <!-- SIDEBAR -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="app-logo"><i class="fas fa-cube"></i> MC Add-Ons</div>
            <button class="sidebar-close" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
        </div>
        <ul class="nav-list">
            <li class="nav-item">
                <a class="nav-link" onclick="mostrarInicio()">
                    <i class="fas fa-home"></i> Inicio
                </a>
            </li>
            <li class="nav-item">
                <div class="nav-link" onclick="toggleDropdown()">
                    <i class="fas fa-layer-group"></i> Categorías
                    <i class="fas fa-chevron-down dropdown-arrow" id="dd-arrow"></i>
                </div>
                <ul class="submenu" id="submenu">
                    <li><a class="nav-link" onclick="filtrar('Add-On')"  style="padding-left:46px;"><i class="fas fa-puzzle-piece" style="margin-right:10px;font-size:0.8rem;"></i>Addons</a></li>
                    <li><a class="nav-link" onclick="filtrar('Mapa')"    style="padding-left:46px;"><i class="fas fa-map"          style="margin-right:10px;font-size:0.8rem;"></i>Mapas</a></li>
                    <li><a class="nav-link" onclick="filtrar('Texture')" style="padding-left:46px;"><i class="fas fa-th-large"     style="margin-right:10px;font-size:0.8rem;"></i>Texturas</a></li>
                    <li><a class="nav-link" onclick="filtrar('Semilla')" style="padding-left:46px;"><i class="fas fa-seedling"     style="margin-right:10px;font-size:0.8rem;"></i>Semillas</a></li>
                </ul>
            </li>
            <div class="nav-divider"></div>
            <li class="nav-item">
                <a class="nav-link" href="https://www.paypal.com/paypalme/MystStart112">
                    <i class="fas fa-crown" style="color:var(--primary);"></i> Donaciones
                </a>
            </li>
        </ul>
        <div class="sidebar-footer">
            <button class="btn-theme" onclick="toggleTheme()">
                <i class="fas fa-moon"></i> Cambiar Tema
            </button>
        </div>
    </nav>

    <!-- HEADER -->
    <header class="app-header">
        <div class="header-left">
            <button class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <div class="app-logo" style="display:none;" id="header-logo">MC Add-Ons</div>
        </div>
        <div class="search-container">
            <input type="text" id="addon-search" placeholder="Buscar por nombre o versión..." oninput="buscar()">
            <i class="fas fa-search search-icon"></i>
        </div>
        <div style="width:40px;"></div>
    </header>

    <!-- MAIN -->
    <main>
        <div id="loader" class="loader-container">
            <div class="spinner-wrap">
                <div class="spinner"></div>
                <div class="spinner-inner"></div>
            </div>
            <div class="loader-text">Cargando recursos...</div>
        </div>
        <div id="dynamic-content" style="opacity:0; transition:opacity 0.5s;"></div>
    </main>

    <!-- MODAL DETALLES -->
    <div class="modal-overlay" id="modal-detalles">
        <div class="modal-card">
            <button class="modal-close-btn" onclick="cerrarDetalles()"><i class="fas fa-times"></i></button>
            <div class="modal-img-wrap">
                <img id="md-img" src="" class="detalles-img">
            </div>
            <div class="modal-body">
                <h2 id="md-nombre" class="detalles-nombre">Nombre del Addon</h2>
                <div id="md-version" class="detalles-version">v1.0.0</div>
                <div class="modal-divider"></div>
                <div id="md-desc" class="detalles-desc">Descripción del addon...</div>
                <a id="md-btn-download" href="#" target="_blank" class="btn-descarga-final">
                    <i class="fas fa-download"></i> DESCARGAR AHORA
                </a>
            </div>
        </div>
    </div>

    <div id="toast">Acción completada</div>

    <script>
        // --- SEGURIDAD AVANZADA ---
        (function() {
            document.addEventListener('contextmenu', event => event.preventDefault());
            document.onkeydown = function(e) {
                if(e.keyCode == 123) return false;
                if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
                if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
                if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
                if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
            };
        })();

        // --- LÓGICA DE LA APP ---
        const scriptURL = "https://script.google.com/macros/s/AKfycbyxezM7lhtD7lmpqg_ww8X3afZ_VEUTH56klo55skV9CJ-0XlW63hAUvyyTyYGWUr8mdQ/exec";
        let db = [];
        let heroTimer;

        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.body.setAttribute('data-theme', savedTheme);
            cargarDatos();
        });

        async function cargarDatos() {
            try {
                const res = await fetch(`${scriptURL}?action=read`);
                const data = await res.json();
                if(data.error) throw new Error(data.error);
                db = data;
                document.getElementById('loader').style.display = 'none';
                document.getElementById('dynamic-content').style.opacity = '1';
                mostrarInicio();
            } catch (e) {
                document.getElementById('loader').innerHTML = `<p style="color:#ff4757">Error de conexión.<br>Intenta recargar.</p>`;
            }
        }

        function mostrarInicio() {
            if(window.innerWidth < 1000) toggleSidebar(false);
            const container = document.getElementById('dynamic-content');
            container.innerHTML = '';

            const imagenes = db.map(i => i[3]).filter(url => url && url.startsWith('http'));
            renderHero(imagenes, container);

            renderHorizontalSection("Novedades",  [...db].reverse().slice(0, 10), container);
            renderHorizontalSection("Populares",  [...db].sort((a,b)=>b[6]-a[6]).slice(0, 10), container);
        }

        function renderHero(imgs, container) {
            if(!imgs.length) return;
            const hero = document.createElement('div');
            hero.className = 'hero-container';
            hero.innerHTML = `
                <div id="hero-bg-1" class="hero-slide active"></div>
                <div id="hero-bg-2" class="hero-slide"></div>
                <div class="hero-content">
                    <div class="hero-eyebrow"><span></span> Colección Oficial</div>
                    <h1 class="hero-title">Explora. <em>Crea.</em> Juega.</h1>
                    <p class="hero-subtitle">La mejor colección para Minecraft PE / BE</p>
                </div>
            `;
            container.appendChild(hero);

            let idx = 0;
            let activeDiv = 1;
            const s1 = hero.querySelector('#hero-bg-1');
            const s2 = hero.querySelector('#hero-bg-2');
            s1.style.backgroundImage = `url('${imgs[Math.floor(Math.random()*imgs.length)]}')`;

            if(heroTimer) clearInterval(heroTimer);
            heroTimer = setInterval(() => {
                idx = Math.floor(Math.random() * imgs.length);
                const nextImg = imgs[idx];
                if(activeDiv === 1) {
                    s2.style.backgroundImage = `url('${nextImg}')`;
                    s2.classList.add('active');
                    s1.classList.remove('active');
                    activeDiv = 2;
                } else {
                    s1.style.backgroundImage = `url('${nextImg}')`;
                    s1.classList.add('active');
                    s2.classList.remove('active');
                    activeDiv = 1;
                }
            }, 5000);
        }

        function renderHorizontalSection(titulo, items, container) {
            const section = document.createElement('div');
            section.innerHTML = `
                <div class="section-header"><i class="fas fa-fire"></i> ${titulo} <div class="section-line"></div></div>
                <div class="h-scroll-wrapper">
                    ${items.map(item => getCardHTML(item, 'min-width:180px; width:180px;')).join('')}
                </div>
            `;
            container.appendChild(section);
        }

        function filtrar(categoria) {
            toggleSidebar(false);
            clearInterval(heroTimer);
            const container = document.getElementById('dynamic-content');
            const filtrados = db.filter(item => item[4] === categoria).reverse();
            container.innerHTML = `
                <div class="section-header" style="margin-top:80px;">
                    <i class="fas fa-layer-group"></i> ${categoria}s
                    <span style="font-size:0.8rem; margin-left:10px; color:var(--text-sec)">(${filtrados.length})</span>
                </div>
                <div class="grid-layout">
                    ${filtrados.length ? filtrados.map(item => getCardHTML(item)).join('') : '<p>No hay resultados.</p>'}
                </div>
            `;
        }

        function buscar() {
            clearInterval(heroTimer);
            const q = document.getElementById('addon-search').value.toLowerCase();
            if(!q) { mostrarInicio(); return; }
            const container = document.getElementById('dynamic-content');
            const res = db.filter(item =>
                item[1].toString().toLowerCase().includes(q) ||
                (item[9] && item[9].toString().toLowerCase().includes(q))
            );
            container.innerHTML = `
                <div class="section-header" style="margin-top:80px;">Resultados de búsqueda</div>
                <div class="grid-layout">
                    ${res.length ? res.map(item => getCardHTML(item)).join('') : '<p style="padding:20px;">No se encontraron coincidencias.</p>'}
                </div>
            `;
        }

        // --- GENERADOR DE CARDS ---
        function getCardHTML(item, styleOverride = '') {
            const [id, nombre, link, img, cat, likes, dls, seed, autor, version, desc] = item;
            const isSeed = cat.toLowerCase().includes('semilla');
            const displayVersion = version ? version : 'V1.0';
            const displayDesc = desc ? desc : 'Sin descripción disponible.';

            let btnAction;
            if(isSeed) {
                btnAction = `<button class="btn-action" onclick="copiar('${seed}')"><i class="fas fa-copy"></i> COPIAR SEED</button>`;
            } else {
                btnAction = `<button class="btn-action" onclick="abrirDetalles('${id}')">DETALLES</button>`;
            }

            return `
            <div class="card" style="${styleOverride}">
                <div class="card-img-wrap">
                    <img src="${img}" class="card-img" onerror="this.src='https://via.placeholder.com/300x170?text=MC+Addons'" loading="lazy">
                    <div class="card-dl-badge"><i class="fas fa-download"></i> ${dls || 0}</div>
                </div>
                <div class="card-body">
                    <div class="card-meta">
                        <div class="card-tag">${cat}</div>
                        <div class="card-version">v${displayVersion}</div>
                    </div>
                    <h3 class="card-title">${nombre}</h3>
                    <div class="card-footer">
                        <span class="card-footer-author">By ${autor}</span>
                        <div class="stat" onclick="like(this, '${nombre}')">
                            <i class="fas fa-heart"></i> <span>${likes || 0}</span>
                        </div>
                    </div>
                    ${btnAction}
                </div>
            </div>`;
        }

        // --- NUEVA FUNCIÓN: ABRIR DETALLES ---
        function abrirDetalles(id) {
            const item = db.find(x => x[0] == id);
            if(!item) return;
            const nombre = item[1];
            const link = item[2];
            const img = item[3];
            const version = item[9] || '1.0';
            const descripcion = item[10] || 'No hay descripción detallada disponible para este complemento.';

            document.getElementById('md-img').src = img;
            document.getElementById('md-nombre').innerText = nombre;
            document.getElementById('md-version').innerText = 'Versión: ' + version;
            document.getElementById('md-desc').innerText = descripcion;
            const btnDown = document.getElementById('md-btn-download');
            btnDown.href = link;
            btnDown.onclick = function() { registrar('download', nombre); };
            document.getElementById('modal-detalles').classList.add('active');
        }

        function cerrarDetalles() {
            document.getElementById('modal-detalles').classList.remove('active');
        }

        // --- INTERACCIONES ---
        function toggleSidebar(forceState) {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('overlay');
            if (forceState !== undefined) {
                if (forceState) { sb.classList.add('active'); ov.classList.add('active'); }
                else { sb.classList.remove('active'); ov.classList.remove('active'); }
            } else {
                sb.classList.toggle('active');
                ov.classList.toggle('active');
            }
        }

        function toggleDropdown() {
            document.getElementById('submenu').classList.toggle('open');
            document.getElementById('dd-arrow').classList.toggle('rotate');
        }

        function toggleTheme() {
            const body = document.body;
            const current = body.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }

        function copiar(texto) {
            navigator.clipboard.writeText(texto);
            showToast("¡Semilla copiada al portapapeles!");
        }

        function like(el, nombre) {
            if(el.classList.contains('liked')) return;
            el.classList.add('liked');
            const span = el.querySelector('span');
            span.innerText = parseInt(span.innerText) + 1;
            registrar('like', nombre);
        }

        function registrar(accion, nombre) {
            fetch(`${scriptURL}?action=${accion}&nombre=${encodeURIComponent(nombre)}`, {mode:'no-cors'});
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
