<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favoritos — Pinkcraft Addons</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page" id="favorite-page">
    <!-- Page Title -->
    <div class="page-title-bar">
      <h1 class="page-title">♥ Favoritos</h1>
      <p class="page-subtitle">Addons que te han gustado</p>
    </div>

    <!-- Addon List -->
    <div class="addon-list" id="favorites-list"></div>

    <!-- Loading -->
    <div id="favorites-loader"></div>
  </div>

  <script src="app.js"></script>
  <script>
    let favAddons = [];

    async function initFavorites() {
      const loaderEl = document.getElementById('favorites-loader');
      loaderEl.innerHTML = renderLoader();

      try {
        const addons = await getAddons();
        allLoadedAddons = addons;
        loaderEl.innerHTML = '';

        renderFavorites(addons);
      } catch (err) {
        loaderEl.innerHTML = renderEmptyState(
          ICONS.heart,
          'Error al cargar',
          'No se pudieron cargar tus favoritos.'
        );
      }
    }

    function renderFavorites(addons) {
      const container = document.getElementById('favorites-list');
      const favNames = getFavorites();

      if (favNames.length === 0) {
        container.innerHTML = renderEmptyState(
          ICONS.heart,
          'Sin favoritos',
          'Dale ♥ a un addon para agregarlo aquí.'
        );
        return;
      }

      // Filter addons that are in favorites
      favAddons = addons.filter(a => favNames.includes(a.nombre));

      if (favAddons.length === 0) {
        container.innerHTML = renderEmptyState(
          ICONS.heart,
          'Sin favoritos',
          'Los addons que marcaste ya no están disponibles.'
        );
        return;
      }

      container.innerHTML = favAddons.map((addon, i) => renderAddonCard(addon, i)).join('');
    }

    /* ── Override handleLike to re-render when removing fav ── */
    window.handleLike = function(nombre, btnEl) {
      performLike(nombre);
      // Re-render favorites list
      const addons = allLoadedAddons.length ? allLoadedAddons : (getCachedAddons() || []);
      renderFavorites(addons);
    };

    /* ── Search filter ── */
    window.onFilterAddons = function(query) {
      query = (query || '').trim().toLowerCase();
      const addons = allLoadedAddons.length ? allLoadedAddons : (getCachedAddons() || []);

      if (!query) {
        renderFavorites(addons);
        return;
      }

      const favNames = getFavorites();
      const filtered = addons.filter(a =>
        favNames.includes(a.nombre) &&
        (a.nombre.toLowerCase().includes(query) || (a.descripcion || '').toLowerCase().includes(query))
      );

      const container = document.getElementById('favorites-list');

      if (filtered.length === 0) {
        container.innerHTML = renderEmptyState(
          '<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',
          'Sin resultados',
          'No se encontraron favoritos con ese nombre.'
        );
        return;
      }

      container.innerHTML = filtered.map((addon, i) => renderAddonCard(addon, i)).join('');
    };

    initFavorites();
  </script>
</body>
</html>
