<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Versiones — NekoCraft Addons</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page" id="home-page">
    <div class="hero-slider" id="hero-slider">
      <div class="hero-track" id="hero-track"></div>
      <div class="hero-dots" id="hero-dots"></div>
    </div>

    <div class="section-header">
      <h2 class="section-title">Todas las versiones</h2>
    </div>
    <div class="addon-grid" id="catalog-grid"></div>

    <div id="home-loader"></div>
  </div>

  <script src="app.js"></script>
  <script>
    let currentSlide = 0;
    let sliderInterval = null;
    let homeAddons = [];

    async function initHome() {
      const loaderEl = document.getElementById('home-loader');
      loaderEl.innerHTML = renderLoader();

      try {
        const addons = await getVersiones();
        allLoadedAddons = addons;
        homeAddons = addons.slice();
        loaderEl.innerHTML = '';

        renderSlider(addons);
        renderCatalog(addons);
      } catch (err) {
        loaderEl.innerHTML = renderEmptyState(
          ICONS.package,
          'Error al cargar',
          'No se pudieron cargar las versiones. Intenta de nuevo más tarde.'
        );
      }
    }

    function renderSlider(addons) {
      if (addons.length === 0) {
        document.getElementById('hero-slider').classList.add('hidden');
        return;
      }
      const sliderAddons = shuffleArray(addons).slice(0, 5).filter(a => getFirstImage(a.imagenes));
      if (sliderAddons.length === 0) {
        document.getElementById('hero-slider').classList.add('hidden');
        return;
      }
      const track = document.getElementById('hero-track');
      const dots = document.getElementById('hero-dots');
      track.innerHTML = sliderAddons.map(addon => {
        const img = getFirstImage(addon.imagenes);
        return `
          <div class="hero-slide" style="background-image:url('${escapeHtml(img)}')" onclick="openModal('${escapeHtml(addon.nombre)}')">
            <div class="hero-slide-overlay">
              <span class="hero-badge">Versiones</span>
              <h3 class="hero-title">${escapeHtml(addon.nombre)}</h3>
              <button class="hero-btn" onclick="event.stopPropagation(); openModal('${escapeHtml(addon.nombre)}')">Ver más</button>
            </div>
          </div>
        `;
      }).join('');
      dots.innerHTML = sliderAddons.map((_, i) =>
        `<button class="hero-dot ${i === 0 ? 'active' : ''}" onclick="goToSlide(${i})"></button>`
      ).join('');
      if (sliderAddons.length > 1) {
        sliderInterval = setInterval(() => {
          currentSlide = (currentSlide + 1) % sliderAddons.length;
          updateSlider();
        }, 4000);
      }
    }

    function goToSlide(idx) {
      currentSlide = idx;
      updateSlider();
      clearInterval(sliderInterval);
      const totalSlides = document.querySelectorAll('.hero-slide').length;
      if (totalSlides > 1) {
        sliderInterval = setInterval(() => {
          currentSlide = (currentSlide + 1) % totalSlides;
          updateSlider();
        }, 4000);
      }
    }

    function updateSlider() {
      const track = document.getElementById('hero-track');
      track.style.transform = `translateX(-${currentSlide * 100}%)`;
      document.querySelectorAll('.hero-dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === currentSlide);
      });
    }

    function renderCatalog(addons) {
      const container = document.getElementById('catalog-grid');
      const shuffled = shuffleArray(addons);
      if (shuffled.length === 0) {
        container.innerHTML = renderEmptyState(ICONS.package, 'Sin versiones', 'No hay versiones disponibles.');
        return;
      }
      container.innerHTML = shuffled.map((addon, i) => renderAddonGridCard(addon, i)).join('');
    }

    window.onFilterAddons = function(query) {
      query = (query || '').trim().toLowerCase();
      const container = document.getElementById('catalog-grid');
      const heroSlider = document.getElementById('hero-slider');

      if (!query) {
        heroSlider.classList.remove('hidden');
        renderCatalog(homeAddons);
        return;
      }
      const filtered = homeAddons.filter(a =>
        a.nombre.toLowerCase().includes(query) ||
        (a.descripcion || '').toLowerCase().includes(query)
      );
      heroSlider.classList.add('hidden');
      if (filtered.length === 0) {
        container.innerHTML = renderEmptyState(
          '<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',
          'Sin resultados',
          `No se encontraron versiones con "${escapeHtml(query)}"`
        );
        return;
      }
      container.innerHTML = filtered.map((addon, i) => renderAddonGridCard(addon, i)).join('');
    };

    initHome();

    /* ── Theme Sync from localStorage ── */
    (function syncTheme() {
      const THEME_KEY = 'nekocraft_theme';
      function applyLocalTheme() {
        const saved = localStorage.getItem(THEME_KEY);
        const isDark = saved === 'dark';
        document.documentElement.classList.toggle('dark', isDark);
      }
      applyLocalTheme();
      window.addEventListener('storage', function(e) {
        if (e.key === THEME_KEY) applyLocalTheme();
      });
    })();
  </script>
</body>
</html>
