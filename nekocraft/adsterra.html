<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificación — NekoCraft Addons</title>
  <link rel="stylesheet" href="style.css">
  
  <style>
    body {
      background: var(--bg-main);
      overflow-y: auto;
    }
    .verify-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      text-align: center;
      min-height: 100vh;
    }
    .verify-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      padding: 24px 20px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .verify-icon {
      width: 64px;
      height: 64px;
      background: var(--bg-main);
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-card-sm);
      font-size: 28px;
      margin-bottom: 16px;
    }
    .verify-title {
      font-family: 'Fredoka', sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .verify-text {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 18px;
    }
    .ad-wrapper {
      margin: 10px auto 20px;
      width: 300px;
      height: 250px;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--bg-main);
      box-shadow: var(--shadow-inset);
      border: 1px solid rgba(255, 117, 151, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .timer-ring {
      width: 90px;
      height: 90px;
      margin: 10px auto 16px;
      position: relative;
    }
    .timer-ring svg {
      transform: rotate(-90deg);
    }
    .timer-ring circle {
      fill: none;
      stroke-width: 5;
    }
    .timer-bg {
      stroke: var(--bg-main);
    }
    .timer-progress {
      stroke: var(--accent);
      stroke-dasharray: 251.327; /* 2 * PI * 40 */
      stroke-dashoffset: 0;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear;
    }
    .timer-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Fredoka', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--accent);
    }
    .verify-status {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 12px;
      font-weight: 500;
    }
    .verify-completed {
      color: #2ECC71;
      font-size: 14px;
      font-weight: 600;
      display: none;
      margin-top: 10px;
      margin-bottom: 14px;
      animation: heartPop 0.4s ease;
    }
    .verify-btn {
      width: 100%;
      padding: 12px;
      border: none;
      background: var(--accent-gradient);
      color: var(--white);
      border-radius: var(--radius);
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 15px var(--accent-glow);
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: var(--transition);
      animation: fadeInUp 0.4s ease;
    }
    .verify-btn:active {
      transform: scale(0.97);
    }
    .verify-warning {
      background: #FFF5F7;
      border: 1px dashed var(--accent);
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 11px;
      color: var(--text-primary);
      line-height: 1.4;
      margin-top: -10px;
      margin-bottom: 16px;
      max-width: 300px;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="verify-container">
    <div class="verify-card">
      <div class="verify-icon">🔓</div>
      <h2 class="verify-title">Desbloquea las Descargas</h2>
      <p class="verify-text">Mira el anuncio de abajo y espera el temporizador.<br>Tu descarga comenzará de inmediato.</p>

      <!-- Adsterra Box -->
      <div class="ad-wrapper">
        <div id="ad-container">
          <script>
            atOptions = {
              'key' : 'a0082d89d50ee2582d54e84972c04961',
              'format' : 'iframe',
              'height' : 250,
              'width' : 300,
              'params' : {}
            };
          </script>
          <script src="https://www.highperformanceformat.com/a0082d89d50ee2582d54e84972c04961/invoke.js" async></script>
        </div>
      </div>

      <!-- Warning Box -->
      <div class="verify-warning" id="verify-warning" style="display:none;"></div>

      <!-- Timer Ring -->
      <div class="timer-ring" id="timer-ring-container">
        <svg width="90" height="90">
          <circle class="timer-bg" cx="45" cy="45" r="40"/>
          <circle class="timer-progress" id="timer-circle" cx="45" cy="45" r="40"/>
        </svg>
        <div class="timer-text" id="timer-text">15</div>
      </div>

      <p class="verify-status" id="status-text">Espera a que termine el temporizador...</p>
      <p class="verify-completed" id="completed-text">✅ ¡Verificación completada!</p>
      <button class="verify-btn" id="continue-btn">Continuar ⏩</button>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // Get target addon info from URL
    const params = new URLSearchParams(window.location.search);
    const targetLink = params.get('link') || '';
    const targetNombre = params.get('nombre') || '';

    const TOTAL_TIME = 15;
    const CIRCUMFERENCE = 2 * Math.PI * 40; // 251.327
    let timer = TOTAL_TIME;
    let verified = false;

    const circle = document.getElementById('timer-circle');
    const timerText = document.getElementById('timer-text');
    const statusText = document.getElementById('status-text');
    const completedText = document.getElementById('completed-text');
    const continueBtn = document.getElementById('continue-btn');
    const timerRingContainer = document.getElementById('timer-ring-container');

    circle.style.strokeDasharray = CIRCUMFERENCE;
    circle.style.strokeDashoffset = 0;

    const interval = setInterval(() => {
      timer--;
      timerText.textContent = timer;
      const offset = CIRCUMFERENCE * (1 - timer / TOTAL_TIME);
      circle.style.strokeDashoffset = offset;

      if (timer <= 0) {
        clearInterval(interval);
        completeVerification();
      }
    }, 1000);

    function completeVerification() {
      if (verified) return;
      verified = true;

      timerRingContainer.classList.add('hidden');
      statusText.classList.add('hidden');
      
      completedText.style.display = 'block';
      continueBtn.style.display = 'inline-flex';

      continueBtn.onclick = () => {
        if (!targetLink) {
          goBack();
          return;
        }

        // Set verification expiry to 12 hours from now
        try {
          localStorage.setItem('nekocraft_verification_expiry', String(Date.now() + 12 * 60 * 60 * 1000));
        } catch (e) {
          console.error("Failed to save verification status:", e);
        }

        // 1. Record download in local history and backend
        try {
          const cached = getCachedAddons() || [];
          const addon = cached.find(a => a.nombre === targetNombre);
          if (addon) {
            saveDownload(addon);
          } else {
            // Fallback object
            saveDownload({
              nombre: targetNombre,
              imagenes: '',
              categoria: 'Marcketplace',
              link: targetLink
            });
          }
          sendDownload(targetNombre);
        } catch (e) {
          console.error("Local download tracking failed:", e);
        }

        // 2. Open actual download link in a new tab
        window.open(targetLink, '_blank');

        // 3. Redirect the parent app to downloads tab
        redirectToDownloads();
      };
    }

    function goBack() {
      window.history.back();
    }

    function redirectToDownloads() {
      try {
        if (window.parent && window.parent !== window && typeof window.parent.navigateTo === 'function') {
          const btn = window.parent.document.querySelector('[data-page="downloads.html"]');
          window.parent.navigateTo('downloads.html', btn);
        } else {
          window.location.href = 'downloads.html';
        }
      } catch (e) {
        window.location.href = 'downloads.html';
      }
    }

    // Check protocol and ad blockers
    const warningEl = document.getElementById('verify-warning');
    if (window.location.protocol === 'file:') {
      warningEl.innerHTML = '⚠️ <strong>Protocolo Local Detectado:</strong> Los anuncios de Adsterra no cargan abriendo el archivo HTML directamente (file://). Debes abrir el proyecto usando un servidor local (ej. Live Server en VS Code o npx serve) para probarlos.';
      warningEl.style.display = 'block';
    } else {
      // Simple check after ad script attempts to evaluate
      setTimeout(() => {
        const adContainer = document.getElementById('ad-container');
        if (!adContainer || adContainer.offsetHeight === 0 || adContainer.children.length <= 1) {
          warningEl.innerHTML = '⚠️ <strong>¿AdBlocker Activo?</strong> Si el anuncio no se muestra, desactiva tu bloqueador de anuncios (AdBlock) para asegurar que la verificación se registre correctamente.';
          warningEl.style.display = 'block';
        }
      }, 3000);
    }
  </script>
</body>
</html>
