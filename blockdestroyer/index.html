<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descargar BlockDestroyer</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" />
    
    <style>
        /* --- PROTECCIÓN ANTI-SELECCIÓN DE TEXTO --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none; /* Deshabilita menú emergente en móviles */
        }

        /* --- FONDO ULTRA MODERNO CON LUCES --- */
        body {
            background: #090d16;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        /* Efectos de luz de neón de fondo (Glow) */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            filter: blur(130px);
            opacity: 0.15;
            z-index: 0;
        }
        body::before { top: -50px; left: -50px; }
        body::after { bottom: -50px; right: -50px; }

        /* --- TARJETA DE DESCARGA (DISEÑO PREMIUM DE CRISTAL) --- */
        .download-card {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 48px 32px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5),
                        inset 0 1px 1px rgba(255, 255, 255, 0.1);
            z-index: 1;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .download-card:hover {
            transform: translateY(-5px);
        }

        /* --- ICONO DE LA APLICACIÓN (CORREGIDO Y DETALLADO) --- */
        .app-icon-wrapper {
            width: 110px;
            height: 110px;
            background: #1e293b;
            border-radius: 28px;
            margin: 0 auto 24px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4),
                        0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        /* Brillo metálico sobre el icono */
        .app-icon-wrapper::after {
            content: '';
            position: absolute;
            top: 0; left: -75%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.15) 100%);
            transform: skewX(-25deg);
            transition: 0.75s;
        }

        .download-card:hover .app-icon-wrapper::after {
            left: 125%;
        }

        .app-icon-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* --- TEXTOS ORDENADOS Y CENTRADOS --- */
        .app-name {
            font-size: 28px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .app-meta {
            font-size: 14px;
            font-weight: 500;
            color: #3b82f6; /* Azul eléctrico moderno */
            margin-bottom: 32px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- BOTÓN DE DESCARGA ESTILO GAMER/PREMIUM --- */
        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 18px 32px;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            border-radius: 16px;
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
        }

        .download-btn:hover {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            box-shadow: 0 10px 28px rgba(37, 99, 235, 0.6);
            transform: scale(1.02);
        }

        .download-btn:active {
            transform: scale(0.98);
        }

        /* Icono de descarga animado */
        .download-btn .material-symbols-outlined {
            font-size: 22px;
            transition: transform 0.3s ease;
        }

        .download-btn:hover .material-symbols-outlined {
            transform: translateY(2px);
        }

        /* --- ESPECIFICACIONES INFERIORES --- */
        .requirements {
            margin-top: 24px;
            font-size: 13px;
            font-weight: 500;
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
    </style>
</head>
<body oncontextmenu="return false;" ondragstart="return false;" onselectstart="return false;"> 

    <div class="download-card">
        <div class="app-icon-wrapper">
            <img src="icon.png" alt="Icono BlockDestroyer" class="app-icon-img">
        </div>

        <h1 class="app-name">BlockDestroyer</h1>
        <p class="app-meta">Archivo Oficial APK</p>

        <a href="BlockDestroyer.apk" download="BlockDestroyer.apk" class="download-btn">
            <span class="material-symbols-outlined">download</span>
            Descargar APK
        </a>

        <p class="requirements">
            <span class="material-symbols-outlined" style="font-size: 16px;">verified_user</span>
            Seguro • Android 5.0 o superior
        </p>
    </div>

    <script>
        // Bloqueo estricto de combinaciones de teclas en PC (F12, Ctrl+U, Inspectores)
        document.addEventListener('keydown', function(e) {
            if (e.key === "F12" || 
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || 
                (e.ctrlKey && e.key === 'u')) {
                e.preventDefault();
                return false;
            }
        });
    </script>
</body>
</html>
