<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlockDestroyer - Admin</title>
  <style>
:root{--bg:#050510;--sidebar-bg:#08081a;--card-bg:#0d0d25;--neon:#00b8ff;--neon-dim:rgba(0,150,255,0.2);--neon-glow:rgba(0,184,255,0.3);--text:#e0f0ff;--text-dim:rgba(255,255,255,0.4);--border:rgba(0,150,255,0.15);--success:#4ade80;--error:#ff6b6b;--warning:#ffaa33;--topbar-h:60px}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:"Segoe UI",system-ui,-apple-system,sans-serif;overflow:hidden}
body{display:flex;flex-direction:column}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;height:var(--topbar-h);display:flex;align-items:center;padding:0 20px;background:rgba(8,8,26,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);z-index:200}
.btn-hamburger{width:38px;height:38px;border:1px solid var(--border);border-radius:10px;background:rgba(0,50,100,0.15);color:var(--text);font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.25s ease;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.btn-hamburger:hover,.btn-hamburger:active{background:rgba(0,150,255,0.1);border-color:var(--neon)}
.topbar-brand{position:absolute;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:0;font-size:17px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#fff;text-shadow:0 0 20px rgba(0,150,255,0.12);white-space:nowrap}
.topbar-brand span{color:var(--neon);text-shadow:0 0 12px var(--neon-glow)}
.topbar-brand .brand-icon{width:26px;height:26px;border:2px solid var(--neon);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--neon);box-shadow:0 0 10px rgba(0,184,255,0.12);margin-right:6px}

/* SIDEBAR */
.sidebar{position:fixed;top:0;left:-270px;width:250px;height:100%;background:var(--sidebar-bg);border-right:1px solid var(--border);z-index:310;transition:left 0.35s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column}
.sidebar.open{left:0}
.sidebar-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border);min-height:var(--topbar-h)}
.sidebar-head h2{font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.4)}
.sidebar-close{width:34px;height:34px;border:none;border-radius:8px;background:rgba(255,255,255,0.04);color:var(--text-dim);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s ease}
.sidebar-close:hover{background:rgba(255,50,50,0.1);color:var(--error)}
.sidebar-nav{flex:1;padding:10px 10px 5px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;cursor:pointer;color:rgba(255,255,255,0.4);font-size:13px;font-weight:500;transition:all 0.2s ease;border:none;background:transparent;width:100%;text-align:left}
.nav-item:hover{color:rgba(255,255,255,0.7);background:rgba(0,150,255,0.06)}
.nav-item.active{color:var(--neon);background:rgba(0,150,255,0.1);box-shadow:inset 3px 0 0 var(--neon)}
.nav-item .icon{font-size:15px;width:20px;text-align:center}
.nav-item.logout{margin-top:auto;color:rgba(255,100,100,0.5)}
.nav-item.logout:hover{color:var(--error);background:rgba(255,50,50,0.06)}
.nav-item.user-link{margin-top:8px;padding-top:12px;border-top:1px solid var(--border)}
.nav-item.user-link:hover{color:var(--neon);background:rgba(0,150,255,0.06)}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:305;opacity:0;pointer-events:none;transition:opacity 0.35s ease}
.sidebar-overlay.show{opacity:1;pointer-events:auto}

/* MAIN */
.main-content{flex:1;min-height:0;overflow-y:auto;padding:calc(var(--topbar-h) + 24px) 28px 24px;position:relative}
.main-content::before{content:"";position:fixed;top:-50%;right:-50%;width:100%;height:100%;background:radial-gradient(ellipse at 80% 20%,rgba(0,100,255,0.04) 0%,transparent 60%);pointer-events:none;z-index:0}
.section{display:none;position:relative;z-index:1}
.section.active{display:block}
.section-title{font-size:clamp(18px,3vw,26px);font-weight:700;margin:0 0 4px}
.section-sub{color:var(--text-dim);font-size:clamp(12px,1.5vw,14px);margin:0 0 24px}

/* ADMIN TABLE */
.admin-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:20px}
.btn-crear{padding:10px 22px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#0055ff,var(--neon));color:#fff;letter-spacing:0.5px;text-transform:uppercase;transition:all 0.3s ease;white-space:nowrap}
.btn-crear:hover{box-shadow:0 0 25px var(--neon-glow);transform:translateY(-2px)}
.btn-crear:active{transform:translateY(0)}
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:14px;background:var(--card-bg)}
table.admin-tabla{width:100%;border-collapse:collapse;min-width:600px;font-size:clamp(12px,1.3vw,14px)}
table.admin-tabla th{text-align:left;padding:12px 14px;background:rgba(0,50,100,0.15);color:var(--text-dim);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border)}
table.admin-tabla td{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.04);color:var(--text);vertical-align:middle}
table.admin-tabla tr:last-child td{border-bottom:none}
table.admin-tabla tr:hover td{background:rgba(0,150,255,0.03)}
.acciones{display:flex;gap:6px;flex-wrap:wrap}
.btn-accion{padding:5px 12px;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s ease;white-space:nowrap}
.btn-editar{background:rgba(0,150,255,0.12);color:var(--neon)}
.btn-editar:hover{background:rgba(0,150,255,0.2)}
.btn-finalizar{background:rgba(255,170,0,0.12);color:var(--warning)}
.btn-finalizar:hover{background:rgba(255,170,0,0.2)}
.btn-eliminar{background:rgba(255,50,50,0.12);color:var(--error)}
.btn-eliminar:hover{background:rgba(255,50,50,0.2)}
.btn-accion:disabled{opacity:0.3;cursor:not-allowed}
.estado-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.estado-activa{background:rgba(0,200,100,0.12);color:var(--success)}
.estado-finalizada{background:rgba(255,255,255,0.06);color:var(--text-dim)}
.no-data{text-align:center;padding:40px;color:var(--text-dim);font-size:14px}

/* OVERLAY / MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--card-bg);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;position:relative;box-shadow:0 0 60px rgba(0,100,255,0.1)}
.modal h2{font-size:clamp(17px,2.5vw,21px);margin:0 0 18px}
.modal-close{position:absolute;top:16px;right:18px;width:32px;height:32px;border:none;border-radius:8px;background:rgba(255,255,255,0.04);color:var(--text-dim);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s ease}
.modal-close:hover{background:rgba(255,50,50,0.1);color:var(--error)}
.modal .campo{margin-bottom:16px}
.modal .campo label{display:block;color:var(--text-dim);font-size:12px;font-weight:500;margin-bottom:4px}
.modal .campo input,.modal .campo select{width:100%;padding:10px 14px;background:rgba(0,50,100,0.15);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none;transition:all 0.3s ease}
.modal .campo input:focus,.modal .campo select:focus{border-color:var(--neon);box-shadow:0 0 0 3px rgba(0,184,255,0.1)}
.modal .campo select option{background:#0a0a1a;color:var(--text)}
.modal .btn-submit{padding:11px 24px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#0055ff,var(--neon));color:#fff;letter-spacing:0.5px;text-transform:uppercase;transition:all 0.3s ease;margin-top:6px}
.modal .btn-submit:hover{box-shadow:0 0 20px var(--neon-glow)}
.modal .btn-submit:disabled{opacity:0.4;cursor:not-allowed}
.modal .btn-cancel{padding:11px 24px;border:1px solid var(--border);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--text-dim);transition:all 0.2s ease;margin-top:6px;margin-left:8px}
.modal .btn-cancel:hover{border-color:var(--text-dim);color:var(--text)}
.modal-btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}

/* Opciones dinámicas en modal */
.opcion-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.opcion-row input{flex:1}
.opcion-row .btn-quitar{width:32px;height:32px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--error);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s ease;flex-shrink:0}
.opcion-row .btn-quitar:hover{background:rgba(255,50,50,0.1);border-color:var(--error)}
.btn-agregar-opc{padding:8px 16px;border:1px dashed var(--border);border-radius:8px;background:transparent;color:var(--text-dim);font-size:12px;cursor:pointer;transition:all 0.2s ease;display:inline-flex;align-items:center;gap:6px}
.btn-agregar-opc:hover{border-color:var(--neon);color:var(--neon)}

/* Confirm / Notification modals */
.confirm-icon{font-size:36px;text-align:center;margin-bottom:12px}
.confirm-msg{text-align:center;font-size:clamp(14px,1.8vw,16px);color:var(--text);margin-bottom:20px;line-height:1.5}
.confirm-btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.confirm-btn{padding:11px 28px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.3s ease;text-transform:uppercase;letter-spacing:0.5px;min-width:100px}
.confirm-btn:hover{transform:translateY(-2px)}
.confirm-btn-danger{background:linear-gradient(135deg,#cc0000,var(--error));color:#fff}
.confirm-btn-danger:hover{box-shadow:0 0 20px rgba(255,50,50,0.3)}
.confirm-btn-success{background:linear-gradient(135deg,#009944,var(--success));color:#fff}
.confirm-btn-success:hover{box-shadow:0 0 20px rgba(0,200,100,0.3)}
.confirm-btn-info{background:linear-gradient(135deg,#0055ff,var(--neon));color:#fff}
.confirm-btn-info:hover{box-shadow:0 0 20px var(--neon-glow)}
.confirm-btn-cancel{padding:11px 28px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;background:transparent;color:var(--text-dim);transition:all 0.2s ease;min-width:100px}
.confirm-btn-cancel:hover{border-color:var(--text-dim);color:var(--text)}

/* USER TABLE */
.user-rol-select{padding:4px 8px;background:rgba(0,50,100,0.15);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;outline:none;cursor:pointer}
.user-rol-select:focus{border-color:var(--neon)}
.user-rol-badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:600}
.rol-owner{background:rgba(255,184,0,0.15);color:#ffb800}
.rol-admin{background:rgba(0,150,255,0.12);color:var(--neon)}
.rol-user{background:rgba(255,255,255,0.06);color:var(--text-dim)}

/* SCROLLBAR */
.main-content::-webkit-scrollbar{width:5px;height:5px}
.main-content::-webkit-scrollbar-track{background:transparent}
.main-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.main-content::-webkit-scrollbar-thumb:hover{background:var(--neon-dim)}

/* RESPONSIVE */
@media(max-width:1024px){.main-content{padding:calc(var(--topbar-h) + 20px) 20px 20px}}
@media(max-width:768px){.topbar{padding:0 16px}.btn-hamburger{width:36px;height:36px;font-size:17px;border-radius:8px}.sidebar{width:240px;left:-240px}.sidebar-head{padding:14px 16px}.sidebar-nav{padding:8px 8px 4px}.nav-item{padding:9px 12px;font-size:12px}.main-content{padding:calc(var(--topbar-h) + 16px) 16px 16px}.modal{padding:20px 18px}.admin-header{flex-direction:column;align-items:stretch}.btn-crear{text-align:center}}
@media(max-width:400px){.topbar{padding:0 12px;height:54px;--topbar-h:54px}.topbar-brand{font-size:14px}.topbar-brand .brand-icon{width:22px;height:22px;font-size:11px}.btn-hamburger{width:34px;height:34px;font-size:16px}.sidebar{width:230px;left:-230px}.main-content{padding:calc(var(--topbar-h) + 12px) 12px 12px}.section-title{font-size:17px}table.admin-tabla{min-width:450px;font-size:11px}table.admin-tabla th,table.admin-tabla td{padding:8px 10px}.acciones{flex-direction:column;gap:4px}.btn-accion{text-align:center}}
@media(min-width:769px)and(max-width:1024px){table.admin-tabla{min-width:500px}}
@media(max-height:500px)and(orientation:landscape){.topbar{height:48px;--topbar-h:48px}.topbar-brand{font-size:13px}.btn-hamburger{width:32px;height:32px;font-size:15px}.sidebar-head{padding:10px 14px;min-height:48px}.sidebar-nav{padding:6px 6px 3px;gap:1px}.nav-item{padding:6px 10px;font-size:12px}.main-content{padding:calc(var(--topbar-h) + 8px) 14px 8px}.modal{padding:16px;max-height:80vh}}
  </style>
  <script src="config.js"></script>
</head>
<body>
  <!-- TOPBAR -->
  <header class="topbar">
    <button class="btn-hamburger" id="btnHamburger" onclick="toggleSidebar()" aria-label="Menu">☰</button>
    <div class="topbar-brand"><span class="brand-icon">B</span>Block<span>Destroyer</span></div>
  </header>

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <h2>Admin</h2>
      <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
    </div>
    <div class="sidebar-nav">
      <button class="nav-item active" data-section="inicio" onclick="irA('inicio')">
        <span class="icon">&#9679;</span> Encuestas
      </button>
      <button class="nav-item" data-section="usuarios" onclick="irA('usuarios');cargarUsuarios()">
        <span class="icon">&#9783;</span> Usuarios
      </button>
      <button class="nav-item user-link" onclick="irADashboard()">
        <span class="icon">&#8592;</span> Panel Principal
      </button>
      <button class="nav-item logout" onclick="cerrarSesion()">
        <span class="icon">&#8592;</span> Cerrar Sesion
      </button>
    </div>
  </nav>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <!-- SECCION: ENCUESTAS -->
    <section id="sec-inicio" class="section active">
      <h2 class="section-title">Administrar Encuestas</h2>
      <p class="section-sub">Gestiona todas las encuestas del sistema</p>
      <div class="admin-header">
        <span id="pollsCount" style="color:var(--text-dim);font-size:13px"></span>
        <button class="btn-crear" onclick="abrirModalCrear()">+ Crear Encuesta</button>
      </div>
      <div id="pollsTableWrap" class="table-wrap">
        <div class="no-data" id="pollsLoading">Cargando encuestas...</div>
      </div>
    </section>

    <!-- SECCION: USUARIOS -->
    <section id="sec-usuarios" class="section">
      <h2 class="section-title">Usuarios</h2>
      <p class="section-sub">Gestion de roles y permisos</p>
      <div id="usersTableWrap" class="table-wrap">
        <div class="no-data" id="usersLoading">Cargando usuarios...</div>
      </div>
    </section>

  </main>

  <!-- MODAL: Crear/Editar Encuesta -->
  <div class="modal-overlay" id="modalEncuesta">
    <div class="modal">
      <button class="modal-close" onclick="cerrarModal('modalEncuesta')">✕</button>
      <h2 id="modalEncuestaTitulo">Crear Encuesta</h2>
      <div id="modalEncuestaMsg" class="mensaje"></div>
      <div class="campo">
        <label>Titulo</label>
        <input type="text" id="inputTitulo" placeholder="Titulo de la encuesta" maxlength="100">
      </div>
      <div class="campo">
        <label>Tipo</label>
        <select id="inputTipo">
          <option value="normal">Normal</option>
          <option value="ruleta">Ruleta</option>
        </select>
      </div>
      <div class="campo">
        <label>Opciones (2-10)</label>
        <div id="opcionesList"></div>
        <button class="btn-agregar-opc" onclick="agregarOpcionInput()">+ Agregar opcion</button>
      </div>
      <div class="modal-btn-row">
        <button class="btn-submit" id="btnGuardarEncuesta" onclick="guardarEncuesta()">Crear</button>
        <button class="btn-cancel" onclick="cerrarModal('modalEncuesta')">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- MODAL: Confirmacion personalizada -->
  <div class="modal-overlay" id="modalConfirmacion">
    <div class="modal" style="max-width:400px;text-align:center">
      <div class="confirm-icon" id="confirmIcon">&#9888;</div>
      <div class="confirm-msg" id="confirmMsg">¿Estas seguro?</div>
      <div class="confirm-btn-row" id="confirmBtnRow">
        <button class="confirm-btn confirm-btn-danger" id="confirmBtnAction" onclick="ejecutarConfirmacion()">Aceptar</button>
        <button class="confirm-btn-cancel" onclick="cancelarConfirmacion()">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- MODAL: Notificacion personalizada -->
  <div class="modal-overlay" id="modalNotificacion">
    <div class="modal" style="max-width:400px;text-align:center">
      <div class="confirm-icon" id="notifIcon">&#9432;</div>
      <div class="confirm-msg" id="notifMsg">Mensaje</div>
      <div class="confirm-btn-row">
        <button class="confirm-btn confirm-btn-info" id="notifBtn" onclick="cerrarNotificacion()">OK</button>
      </div>
    </div>
  </div>

  <script>
// Estado global
var USUARIO = "";
var ROL = "";
var encuestasCache = [];
var encuestaEditandoId = null;
var opcionCount = 2;
var confirmCallback = null;

function $(id) { return document.getElementById(id); }

// Inicializacion
(function init() {
  var u = localStorage.getItem("bd_usuario");
  var r = localStorage.getItem("bd_rol");
  if (!u) { window.location.href = "index.html"; return; }
  USUARIO = u;
  ROL = r;
  if (ROL !== "admin" && ROL !== "owner") {
    window.location.href = "dashboard.html";
    return;
  }
  cargarEncuestasAdmin();
})();

// Navegacion
function toggleSidebar() {
  $("sidebar").classList.toggle("open");
  $("sidebarOverlay").classList.toggle("show");
}

function cerrarSidebar() {
  $("sidebar").classList.remove("open");
  $("sidebarOverlay").classList.remove("show");
}

function irA(section) {
  cerrarSidebar();
  document.querySelectorAll(".section").forEach(function(s) { s.classList.remove("active"); });
  document.querySelectorAll(".nav-item").forEach(function(n) { n.classList.remove("active"); });
  var sec = $("sec-" + section);
  if (sec) sec.classList.add("active");
  var nav = document.querySelector('.nav-item[data-section="' + section + '"]');
  if (nav) nav.classList.add("active");
}

function irADashboard() {
  window.location.href = "dashboard.html";
}

function cerrarSesion() {
  localStorage.removeItem("bd_usuario");
  localStorage.removeItem("bd_rol");
  window.location.href = "index.html";
}

// API
function llamarAPI(accion, datos, onExito, onError) {
  datos.action = accion;
  fetch(APP_SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams(datos)
  })
  .then(function(r) { return r.text(); })
  .then(function(t) {
    if (!t) { onError("No se pudo completar la operacion. Intenta de nuevo."); return; }
    try { onExito(JSON.parse(t)); }
    catch (e) { onError("Respuesta invalida del servidor."); }
  })
  .catch(function(e) { onError("Error de conexion. Revisa tu internet e intenta de nuevo."); });
}

function mostrarMensaje(id, tipo, texto) {
  var el = $(id);
  if (!el) return;
  el.style.display = "block";
  el.className = "mensaje " + tipo;
  el.textContent = texto;
}

function ocultarMensaje(id) {
  var el = $(id);
  if (!el) return;
  el.style.display = "none";
  el.className = "mensaje";
}

function escapar(t) {
  var d = document.createElement("div");
  d.appendChild(document.createTextNode(t));
  return d.innerHTML;
}

// ============================================================
// MODALES PERSONALIZADOS (Confirmacion / Notificacion)
// ============================================================
function mostrarConfirmacion(msg, icono, btnText, btnClass, callback) {
  $("confirmMsg").innerHTML = msg;
  $("confirmIcon").innerHTML = icono || "&#9888;";
  var btn = $("confirmBtnAction");
  btn.textContent = btnText || "Aceptar";
  btn.className = "confirm-btn " + (btnClass || "confirm-btn-danger");
  confirmCallback = callback;
  $("modalConfirmacion").classList.add("show");
}

function ejecutarConfirmacion() {
  $("modalConfirmacion").classList.remove("show");
  if (typeof confirmCallback === "function") confirmCallback();
  confirmCallback = null;
}

function cancelarConfirmacion() {
  $("modalConfirmacion").classList.remove("show");
  confirmCallback = null;
}

function mostrarNotificacion(msg, icono, btnText, btnClass) {
  $("notifMsg").innerHTML = msg;
  $("notifIcon").innerHTML = icono || "&#9432;";
  var btn = $("notifBtn");
  btn.textContent = btnText || "OK";
  btn.className = "confirm-btn " + (btnClass || "confirm-btn-info");
  $("modalNotificacion").classList.add("show");
}

function cerrarNotificacion() {
  $("modalNotificacion").classList.remove("show");
}

// Cerrar modales con Escape
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") {
    if ($("modalConfirmacion").classList.contains("show")) cancelarConfirmacion();
    else if ($("modalNotificacion").classList.contains("show")) cerrarNotificacion();
    else if ($("modalEncuesta").classList.contains("show")) cerrarModal("modalEncuesta");
  }
});

// ============================================================
// MODAL: Crear / Editar Encuesta
// ============================================================
function abrirModal(modalId) {
  $(modalId).classList.add("show");
}

function cerrarModal(modalId) {
  $(modalId).classList.remove("show");
}

function resetModalEncuesta() {
  $("inputTitulo").value = "";
  $("inputTipo").value = "normal";
  ocultarMensaje("modalEncuestaMsg");
  encuestaEditandoId = null;
  opcionCount = 2;
  $("opcionesList").innerHTML = "";
  for (var i = 0; i < 2; i++) agregarOpcionInput();
  $("btnGuardarEncuesta").textContent = "Crear";
  $("modalEncuestaTitulo").textContent = "Crear Encuesta";
  $("btnGuardarEncuesta").disabled = false;
}

function abrirModalCrear() {
  resetModalEncuesta();
  abrirModal("modalEncuesta");
}

function abrirModalEditar(id) {
  var e = null;
  for (var i = 0; i < encuestasCache.length; i++) {
    if (encuestasCache[i].id === id) { e = encuestasCache[i]; break; }
  }
  if (!e) return;
  resetModalEncuesta();
  encuestaEditandoId = id;
  $("inputTitulo").value = e.titulo;
  $("inputTipo").value = e.tipo === "ruleta" ? "ruleta" : "normal";
  var ops = obtenerOpciones(e);
  $("opcionesList").innerHTML = "";
  for (var i = 0; i < ops.length; i++) {
    agregarOpcionInput(ops[i]);
  }
  opcionCount = ops.length;
  $("btnGuardarEncuesta").textContent = "Guardar Cambios";
  $("modalEncuestaTitulo").textContent = "Editar Encuesta";
  abrirModal("modalEncuesta");
}

function agregarOpcionInput(valor) {
  if (opcionCount >= 10) {
    mostrarNotificacion("Maximo 10 opciones permitidas.");
    return;
  }
  opcionCount++;
  var div = document.createElement("div");
  div.className = "opcion-row";
  div.innerHTML = '<input type="text" placeholder="Opcion ' + opcionCount + '" maxlength="50" value="' + escapar(valor || "") + '">' +
    '<button class="btn-quitar" onclick="quitarOpcionInput(this)" ' + (opcionCount <= 2 ? 'disabled style="opacity:0.3"' : "") + '>✕</button>';
  $("opcionesList").appendChild(div);
}

function quitarOpcionInput(btn) {
  var row = btn.parentNode;
  row.parentNode.removeChild(row);
  opcionCount--;
}

function obtenerOpcionesInputs() {
  var inputs = $("opcionesList").querySelectorAll(".opcion-row input");
  var ops = [];
  for (var i = 0; i < inputs.length; i++) {
    var val = inputs[i].value.trim();
    if (val) ops.push(val);
  }
  return ops;
}

function guardarEncuesta() {
  var titulo = $("inputTitulo").value.trim();
  if (!titulo) { mostrarMensaje("modalEncuestaMsg", "error", "El titulo es obligatorio"); return; }
  if (titulo.length > 100) { mostrarMensaje("modalEncuestaMsg", "error", "Maximo 100 caracteres"); return; }
  var tipo = $("inputTipo").value;
  var opciones = obtenerOpcionesInputs();
  if (opciones.length < 2) { mostrarMensaje("modalEncuestaMsg", "error", "Debe haber al menos 2 opciones"); return; }
  $("btnGuardarEncuesta").disabled = true;
  if (encuestaEditandoId) {
    llamarAPI("editarEncuesta", { id: encuestaEditandoId, titulo: titulo, opciones: JSON.stringify(opciones), usuario: USUARIO }, function(r) {
      $("btnGuardarEncuesta").disabled = false;
      if (r.exito) {
        cerrarModal("modalEncuesta");
        mostrarNotificacion("Encuesta actualizada exitosamente.", "&#10003;", "OK", "confirm-btn-success");
        cargarEncuestasAdmin();
      } else {
        mostrarMensaje("modalEncuestaMsg", "error", r.error);
      }
    }, function(e) {
      $("btnGuardarEncuesta").disabled = false;
      mostrarMensaje("modalEncuestaMsg", "error", e);
    });
  } else {
    llamarAPI("crearEncuesta", { titulo: titulo, opciones: JSON.stringify(opciones), tipo: tipo, usuario: USUARIO }, function(r) {
      $("btnGuardarEncuesta").disabled = false;
      if (r.exito) {
        cerrarModal("modalEncuesta");
        mostrarNotificacion("Encuesta creada exitosamente.", "&#10003;", "OK", "confirm-btn-success");
        cargarEncuestasAdmin();
      } else {
        mostrarMensaje("modalEncuestaMsg", "error", r.error);
      }
    }, function(e) {
      $("btnGuardarEncuesta").disabled = false;
      mostrarMensaje("modalEncuestaMsg", "error", e);
    });
  }
}

// ============================================================
// ADMIN: Cargar y renderizar encuestas
// ============================================================
function cargarEncuestasAdmin() {
  $("pollsLoading").textContent = "Cargando encuestas...";
  llamarAPI("listarEncuestas", {}, function(r) {
    if (!r.exito) {
      $("pollsTableWrap").innerHTML = '<div class="no-data">Error al cargar encuestas</div>';
      return;
    }
    encuestasCache = r.encuestas || [];
    renderizarTablaEncuestas();
  }, function(e) {
    $("pollsTableWrap").innerHTML = '<div class="no-data">' + e + '</div>';
  });
}

function renderizarTablaEncuestas() {
  var wrap = $("pollsTableWrap");
  var e = encuestasCache;
  $("pollsCount").textContent = "Total: " + e.length + " encuesta(s)";
  if (e.length === 0) {
    wrap.innerHTML = '<div class="no-data">No hay encuestas. Crea una nueva.</div>';
    return;
  }
  var html = '<table class="admin-tabla"><thead><tr><th>ID</th><th>Titulo</th><th>Tipo</th><th>Opciones</th><th>Estado</th><th>Votos</th><th>Acciones</th></tr></thead><tbody>';
  for (var i = 0; i < e.length; i++) {
    var p = e[i];
    var ops = obtenerOpciones(p);
    var estClass = p.estado === "activa" ? "estado-activa" : "estado-finalizada";
    var puedeEditar = p.estado === "activa";
    html += '<tr><td>' + escapar(p.id) + '</td>' +
      '<td><strong>' + escapar(p.titulo) + '</strong></td>' +
      '<td>' + (p.tipo === "ruleta" ? "Ruleta" : "Normal") + '</td>' +
      '<td>' + (ops.length) + '</td>' +
      '<td><span class="estado-badge ' + estClass + '">' + p.estado + '</span></td>' +
      '<td>' + (p.totalVotos || 0) + '</td>' +
      '<td class="acciones">' +
      '<button class="btn-accion btn-editar" onclick="abrirModalEditar(\'' + p.id + '\')"' + (puedeEditar ? "" : " disabled") + '>Editar</button>' +
      (p.estado === "activa" ? '<button class="btn-accion btn-finalizar" onclick="confirmarFinalizar(\'' + p.id + '\')">Finalizar</button>' : "") +
      '<button class="btn-accion btn-eliminar" onclick="confirmarEliminar(\'' + p.id + '\')">Eliminar</button>' +
      '</td></tr>';
  }
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function obtenerOpciones(e) {
  if (!e || !e.opciones) return [];
  var ops = e.opciones;
  if (Array.isArray(ops)) return ops;
  if (typeof ops === "string") {
    if (ops.indexOf(",") > 0 && ops.indexOf("[") !== 0) {
      return ops.split(",").map(function(s) { return s.trim(); }).filter(function(s) { return s; });
    }
    try { return JSON.parse(ops); } catch(_) { return []; }
  }
  return [];
}

// ============================================================
// ADMIN: Finalizar / Eliminar encuestas
// ============================================================
function confirmarFinalizar(id) {
  mostrarConfirmacion("¿Finalizar esta encuesta? Ya no se podran recibir mas votos.", "&#128200;", "Finalizar", "confirm-btn-info", function() {
    llamarAPI("finalizarEncuesta", { id: id, usuario: USUARIO }, function(r) {
      if (r.exito) {
        mostrarNotificacion("Encuesta finalizada.", "&#10003;", "OK", "confirm-btn-success");
        cargarEncuestasAdmin();
      } else {
        mostrarNotificacion(r.error, "&#9888;", "OK", "confirm-btn-danger");
      }
    }, function(e) {
      mostrarNotificacion(e, "&#9888;", "OK", "confirm-btn-danger");
    });
  });
}

function confirmarEliminar(id) {
  mostrarConfirmacion("¿Eliminar esta encuesta? Todos los votos asociados tambien se eliminaran.", "&#9888;", "Eliminar", "confirm-btn-danger", function() {
    llamarAPI("eliminarEncuesta", { id: id, usuario: USUARIO }, function(r) {
      if (r.exito) {
        mostrarNotificacion("Encuesta eliminada.", "&#10003;", "OK", "confirm-btn-success");
        cargarEncuestasAdmin();
      } else {
        mostrarNotificacion(r.error, "&#9888;", "OK", "confirm-btn-danger");
      }
    }, function(e) {
      mostrarNotificacion(e, "&#9888;", "OK", "confirm-btn-danger");
    });
  });
}

// ============================================================
// ADMIN: Usuarios
// ============================================================
var _puedeCambiarRoles = false;

function cargarUsuarios() {
  $("usersLoading").textContent = "Cargando usuarios...";
  llamarAPI("listarUsuarios", { usuario: USUARIO }, function(r) {
    if (!r.exito) {
      $("usersTableWrap").innerHTML = '<div class="no-data">' + r.error + '</div>';
      return;
    }
    _puedeCambiarRoles = r.miRol === "owner";
    renderizarTablaUsuarios(r.usuarios || [], r.miRol);
  }, function(e) {
    $("usersTableWrap").innerHTML = '<div class="no-data">' + e + '</div>';
  });
}

function renderizarTablaUsuarios(usuarios, miRol) {
  var wrap = $("usersTableWrap");
  if (usuarios.length === 0) {
    wrap.innerHTML = '<div class="no-data">No hay usuarios registrados</div>';
    return;
  }
  var html = '<table class="admin-tabla"><thead><tr><th>Usuario</th><th>Rol</th><th>Fecha Registro</th>' + (_puedeCambiarRoles ? '<th>Accion</th>' : '') + '</tr></thead><tbody>';
  for (var i = 0; i < usuarios.length; i++) {
    var u = usuarios[i];
    var rolClass = u.rol === "owner" ? "rol-owner" : u.rol === "admin" ? "rol-admin" : "rol-user";
    var rolLabel = u.rol === "owner" ? "Propietario" : u.rol === "admin" ? "Admin" : "Usuario";
    html += '<tr><td>' + escapar(u.usuario) + '</td>' +
      '<td><span class="user-rol-badge ' + rolClass + '">' + rolLabel + '</span></td>' +
      '<td style="color:var(--text-dim);font-size:12px">' + (u.fecha ? u.fecha.substring(0, 10) : "-") + '</td>';
    if (_puedeCambiarRoles) {
      var selRol = u.rol;
      html += '<td><select class="user-rol-select" onchange="cambiarRolUsuario(\'' + escapar(u.usuario) + '\', this.value)" ' +
        (u.usuario.toLowerCase() === USUARIO.toLowerCase() ? 'disabled style="opacity:0.5"' : '') + '>' +
        '<option value="user"' + (selRol === "user" ? " selected" : "") + '>Usuario</option>' +
        '<option value="admin"' + (selRol === "admin" ? " selected" : "") + '>Admin</option>' +
        '<option value="owner"' + (selRol === "owner" ? " selected" : "") + '>Propietario</option>' +
        '</select></td>';
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function cambiarRolUsuario(targetUsuario, nuevoRol) {
  mostrarConfirmacion("¿Cambiar el rol de <strong>" + escapar(targetUsuario) + "</strong> a <strong>" + nuevoRol + "</strong>?", "&#9881;", "Cambiar Rol", "confirm-btn-info", function() {
    llamarAPI("cambiarRol", { usuario: USUARIO, targetUsuario: targetUsuario, nuevoRol: nuevoRol }, function(r) {
      if (r.exito) {
        mostrarNotificacion(r.mensaje, "&#10003;", "OK", "confirm-btn-success");
        cargarUsuarios();
      } else {
        mostrarNotificacion(r.error, "&#9888;", "OK", "confirm-btn-danger");
        cargarUsuarios();
      }
    }, function(e) {
      mostrarNotificacion(e, "&#9888;", "OK", "confirm-btn-danger");
    });
  });
}
