<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlockDestroyer - Votaciones</title>
  <script src="config.js"></script>
  <style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",system-ui,-apple-system,sans-serif}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#050510;padding:20px;position:relative;overflow:hidden}
body::before{content:"";position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 20% 50%,rgba(0,100,255,0.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 50%,rgba(0,200,255,0.06) 0%,transparent 60%);z-index:0;animation:neonDrift 15s ease-in-out infinite alternate}
@keyframes neonDrift{0%{transform:translate(0,0)}100%{transform:translate(-2%,-2%)}}
.card{position:relative;z-index:1;background:#0a0a1a;backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid rgba(0,150,255,0.2);border-radius:24px;padding:40px;width:100%;max-width:420px;box-shadow:0 0 40px rgba(0,100,255,0.08),0 0 80px rgba(0,100,255,0.04),inset 0 1px 0 rgba(0,150,255,0.1)}
.card::before{content:"";position:absolute;top:-1px;left:-1px;right:-1px;bottom:-1px;border-radius:25px;background:linear-gradient(135deg,rgba(0,150,255,0.3),transparent 40%,transparent 60%,rgba(0,200,255,0.15));z-index:-1;opacity:0.6}
.logo{text-align:center;margin-bottom:32px}
.logo h1{color:#fff;font-size:26px;font-weight:800;letter-spacing:2px;text-transform:uppercase;text-shadow:0 0 30px rgba(0,150,255,0.3)}
.logo h1 span{color:#00b8ff;text-shadow:0 0 20px rgba(0,184,255,0.6),0 0 40px rgba(0,184,255,0.3),0 0 80px rgba(0,184,255,0.15)}
.logo p{color:rgba(255,255,255,0.4);font-size:13px;margin-top:6px;letter-spacing:3px;text-transform:uppercase;font-weight:300}
.tabs{display:flex;background:rgba(0,150,255,0.05);border:1px solid rgba(0,150,255,0.1);border-radius:12px;padding:4px;margin-bottom:28px}
.tab{flex:1;padding:10px;text-align:center;border:none;background:transparent;color:rgba(255,255,255,0.35);font-size:13px;font-weight:600;cursor:pointer;border-radius:8px;transition:all 0.3s ease;letter-spacing:0.5px}
.tab:hover{color:rgba(255,255,255,0.7)}
.tab.active{background:rgba(0,150,255,0.15);color:#00b8ff;box-shadow:0 0 20px rgba(0,150,255,0.1)}
.form{display:none}
.form.active{display:block}
.campo{margin-bottom:20px}
.campo label{display:block;color:rgba(255,255,255,0.5);font-size:12px;font-weight:500;margin-bottom:6px;letter-spacing:0.5px;text-transform:uppercase}
.campo input{width:100%;padding:12px 16px;background:rgba(0,50,100,0.15);border:1px solid rgba(0,150,255,0.15);border-radius:12px;color:#e0f0ff;font-size:15px;outline:none;transition:all 0.3s ease}
.campo input:focus{border-color:#00b8ff;background:rgba(0,50,100,0.25);box-shadow:0 0 0 3px rgba(0,184,255,0.1),0 0 20px rgba(0,184,255,0.05)}
.campo input::placeholder{color:rgba(255,255,255,0.15)}
.btn{width:100%;padding:13px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.3s ease;background:linear-gradient(135deg,#0055ff,#00b8ff);color:#fff;letter-spacing:1px;text-transform:uppercase;position:relative;overflow:hidden}
.btn::after{content:"";position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent);transition:left 0.5s ease}
.btn:hover::after{left:100%}
.btn:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(0,150,255,0.3),0 0 60px rgba(0,100,255,0.15)}
.btn:active{transform:translateY(0);box-shadow:0 0 15px rgba(0,150,255,0.2)}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn:disabled::after{display:none}
.mensaje{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none}
.mensaje.error{display:block;background:rgba(255,50,50,0.1);border:1px solid rgba(255,50,50,0.25);color:#ff6b6b;box-shadow:0 0 15px rgba(255,50,50,0.05)}
.mensaje.exito{display:block;background:rgba(0,200,100,0.1);border:1px solid rgba(0,200,100,0.25);color:#4ade80;box-shadow:0 0 15px rgba(0,200,100,0.05)}
.spinner{display:none;width:22px;height:22px;border:2px solid rgba(0,150,255,0.15);border-top-color:#00b8ff;border-radius:50%;animation:spin 0.7s linear infinite;margin:14px auto 0}
.spinner.visible{display:block}
@keyframes spin{to{transform:rotate(360deg)}}
.reglas{background:rgba(0,50,100,0.1);border:1px solid rgba(0,150,255,0.1);border-radius:10px;padding:12px 16px;margin-bottom:20px}
.reglas p{color:rgba(255,255,255,0.35);font-size:11px;line-height:1.7}
.reglas p strong{color:rgba(0,180,255,0.7)}
.footer{margin-top:26px;text-align:center}
.footer p{color:rgba(255,255,255,0.15);font-size:11px;letter-spacing:1px}
@media(max-width:480px){body{padding:12px;align-items:flex-start;padding-top:5vh}.card{padding:24px 18px;border-radius:18px}.logo{margin-bottom:24px}.logo h1{font-size:22px}.logo p{font-size:11px;letter-spacing:2px}.tabs{margin-bottom:20px}.tab{font-size:12px;padding:8px}.campo{margin-bottom:14px}.campo label{font-size:11px}.campo input{padding:10px 14px;font-size:14px}.btn{padding:11px;font-size:13px}.mensaje{font-size:12px;padding:10px 14px}.reglas p{font-size:10px}}
@media(max-width:360px){.card{padding:18px 14px}.logo h1{font-size:18px}.campo input{font-size:13px}.reglas{padding:10px 12px}}
@media(max-height:600px)and(orientation:landscape){body{align-items:flex-start;padding:10px}.card{padding:16px 18px;max-width:360px}.logo{margin-bottom:12px}.logo h1{font-size:18px}.logo p{font-size:10px;margin-top:2px;display:none}.tabs{margin-bottom:12px}.campo{margin-bottom:10px}.campo input{padding:8px 12px;font-size:13px}.btn{padding:9px;font-size:12px}.reglas{display:none}.footer{margin-top:12px}}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>Block<span>Destroyer</span></h1>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="mostrarTab('login')">Iniciar Sesion</button>
      <button class="tab" onclick="mostrarTab('registro')">Registrarse</button>
    </div>

    <!-- LOGIN -->
    <div id="formLogin" class="form active">
      <div id="msgLogin" class="mensaje"></div>

      <div class="campo">
        <label>Nombre de usuario</label>
        <input type="text" id="loginUser" placeholder="Tu nombre de usuario" maxlength="15" autocomplete="username">
      </div>

      <div class="campo">
        <label>Contraseña</label>
        <input type="password" id="loginPass" placeholder="Tu contraseña" autocomplete="current-password">
      </div>

      <button class="btn" id="btnLogin" onclick="iniciarSesion()">Iniciar Sesion</button>
      <div class="spinner" id="spinnerLogin"></div>
    </div>

    <!-- REGISTRO -->
    <div id="formRegistro" class="form">
      <div id="msgRegistro" class="mensaje"></div>

      <div class="campo">
        <label>Nombre de usuario</label>
        <input type="text" id="regUser" placeholder="Elige un nombre" maxlength="15" autocomplete="username">
      </div>

      <div class="campo">
        <label>Contraseña</label>
        <input type="password" id="regPass" placeholder="Minimo 8 caracteres" autocomplete="new-password">
      </div>

      <div class="campo">
        <label>Confirmar contraseña</label>
        <input type="password" id="regPass2" placeholder="Repite la contraseña" autocomplete="new-password">
      </div>

      <div class="reglas">
        <p>
          <strong>Reglas:</strong><br>
          Usuario: maximo 15 caracteres, sin correos electronicos.<br>
          Contraseña: minimo 8 caracteres, debe empezar con una letra (ej: juan1234).
        </p>
      </div>

      <button class="btn" id="btnRegistro" onclick="registrar()">Crear Cuenta</button>
      <div class="spinner" id="spinnerRegistro"></div>
    </div>

    <div class="footer">
      <p>BlockDestroyer &copy; 2026</p>
    </div>
  </div>

  <script>
function $(id){return document.getElementById(id)}
function mostrarMensaje(id,tipo,texto){var el=$(id);el.className="mensaje "+tipo;el.textContent=texto}
function ocultarMensaje(id){$(id).className="mensaje"}
function setLoading(btnId,spinnerId,loading){$(btnId).style.display=loading?"none":"block";$(spinnerId).className="spinner"+(loading?" visible":"")}
function guardarSesion(usuario,rol){localStorage.setItem("bd_usuario",usuario);localStorage.setItem("bd_rol",rol)}
function cerrarSesion(){localStorage.removeItem("bd_usuario");localStorage.removeItem("bd_rol")}
function sesionActiva(){return localStorage.getItem("bd_usuario")!==null}
function autoLogin(){if(!sesionActiva())return false;var usuario=localStorage.getItem("bd_usuario");var rol=localStorage.getItem("bd_rol");window.location.href="dashboard.html?usuario="+encodeURIComponent(usuario)+"&rol="+encodeURIComponent(rol);return true}
function validarUsuarioLocal(u){if(!u.trim())return"El nombre de usuario es obligatorio";if(u.length>15)return"El nombre de usuario no puede exceder 15 caracteres";if(u.indexOf("@")!==-1)return"No se permiten correos electronicos como nombre de usuario";if(/[|;&$%{}()\[\]\"'`\\]/.test(u))return"El nombre contiene caracteres no permitidos";return""}
function validarPasswordLocal(p){if(p.length<8)return"La contrasena debe tener al menos 8 caracteres";if(!/^[A-Za-z]/.test(p))return"La contrasena debe empezar con una letra (ejemplo: juan1234)";return""}
function llamarAPI(accion,datos,onExito,onError){datos.action=accion;fetch(APP_SCRIPT_URL,{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:new URLSearchParams(datos)}).then(function(r){return r.text()}).then(function(t){if(!t){onError("No se pudo completar la operacion. Intenta de nuevo.");return}try{onExito(JSON.parse(t))}catch(e){onError("Respuesta invalida del servidor.")}}).catch(function(e){onError("Error de conexion. Revisa tu internet e intenta de nuevo.")})}
function registrar(){var user=$("regUser").value.trim();var pass=$("regPass").value;var pass2=$("regPass2").value;if(localStorage.getItem("bd_usuario_registrado")){mostrarMensaje("msgRegistro","error","Ya existe una cuenta registrada en este dispositivo.");return}var err=validarUsuarioLocal(user);if(err){mostrarMensaje("msgRegistro","error",err);return}if(pass!==pass2){mostrarMensaje("msgRegistro","error","Las contrasenas no coinciden");return}err=validarPasswordLocal(pass);if(err){mostrarMensaje("msgRegistro","error",err);return}ocultarMensaje("msgRegistro");setLoading("btnRegistro","spinnerRegistro",true);llamarAPI("registrar",{usuario:user,password:pass},function(r){setLoading("btnRegistro","spinnerRegistro",false);if(r.exito){localStorage.setItem("bd_usuario_registrado",r.usuario);mostrarMensaje("msgRegistro","exito","Registro exitoso! Ahora puedes iniciar sesion.");$("regUser").value="";$("regPass").value="";$("regPass2").value="";setTimeout(function(){mostrarTab("login")},1500)}else{mostrarMensaje("msgRegistro","error",r.error)}},function(e){setLoading("btnRegistro","spinnerRegistro",false);mostrarMensaje("msgRegistro","error",e)})}
function iniciarSesion(){var user=$("loginUser").value.trim();var pass=$("loginPass").value;if(!user){mostrarMensaje("msgLogin","error","Nombre de usuario obligatorio");return}if(!pass){mostrarMensaje("msgLogin","error","Contrasena obligatoria");return}ocultarMensaje("msgLogin");setLoading("btnLogin","spinnerLogin",true);llamarAPI("iniciarSesion",{usuario:user,password:pass},function(r){setLoading("btnLogin","spinnerLogin",false);if(r.exito){guardarSesion(r.usuario,r.rol);mostrarMensaje("msgLogin","exito","Bienvenido "+r.usuario+"!");setTimeout(function(){window.location.replace("dashboard.html?usuario="+encodeURIComponent(r.usuario)+"&rol="+encodeURIComponent(r.rol))},500)}else{mostrarMensaje("msgLogin","error",r.error)}},function(e){setLoading("btnLogin","spinnerLogin",false);mostrarMensaje("msgLogin","error",e)})}
function mostrarTab(tab){document.querySelectorAll(".form").forEach(function(f){f.classList.remove("active")});document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("active")});if(tab==="login"){$("formLogin").classList.add("active");document.querySelectorAll(".tab")[0].classList.add("active");$("btnRegistro").disabled=false;ocultarMensaje("msgRegistro")}else{$("formRegistro").classList.add("active");document.querySelectorAll(".tab")[1].classList.add("active");if(localStorage.getItem("bd_usuario_registrado")){mostrarMensaje("msgRegistro","error","Ya existe una cuenta registrada en este dispositivo. No puedes crear una nueva.");$("btnRegistro").disabled=true}else{$("btnRegistro").disabled=false}}}
document.addEventListener("DOMContentLoaded",function(){if(autoLogin())return;$("loginPass").addEventListener("keydown",function(e){if(e.key==="Enter")iniciarSesion()});$("regPass2").addEventListener("keydown",function(e){if(e.key==="Enter")registrar()})})
  </script>
</body>
</html>
