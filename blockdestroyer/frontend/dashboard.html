<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlockDestroyer - Dashboard</title>
  <style>
:root{--bg:#050510;--sidebar-bg:#08081a;--card-bg:#0d0d25;--neon:#00b8ff;--neon-dim:rgba(0,150,255,0.2);--neon-glow:rgba(0,184,255,0.3);--text:#e0f0ff;--text-dim:rgba(255,255,255,0.4);--border:rgba(0,150,255,0.15);--success:#4ade80;--error:#ff6b6b;--topbar-h:60px}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:"Segoe UI",system-ui,-apple-system,sans-serif;overflow:hidden}
body{display:flex;flex-direction:column}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;height:var(--topbar-h);display:flex;align-items:center;padding:0 20px;background:rgba(8,8,26,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);z-index:200}
.btn-hamburger{width:38px;height:38px;border:1px solid var(--border);border-radius:10px;background:rgba(0,50,100,0.15);color:var(--text);font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.25s ease;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.btn-hamburger:hover,.btn-hamburger:active{background:rgba(0,150,255,0.1);border-color:var(--neon)}
.topbar-brand{position:absolute;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:0;font-size:17px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#fff;text-shadow:0 0 20px rgba(0,150,255,0.12);white-space:nowrap}
.topbar-brand span{color:var(--neon);text-shadow:0 0 12px var(--neon-glow)}
.topbar-brand .brand-icon{width:26px;height:26px;border:2px solid var(--neon);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--neon);box-shadow:0 0 10px rgba(0,184,255,0.12);margin-right:6px}

/* SIDEBAR */
.sidebar{position:fixed;top:0;left:-270px;width:250px;height:100%;background:var(--sidebar-bg);border-right:1px solid var(--border);z-index:310;transition:left 0.35s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column}
.sidebar.open{left:0}
.sidebar-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border);min-height:var(--topbar-h)}
.sidebar-head h2{font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.4)}
.sidebar-close{width:34px;height:34px;border:none;border-radius:8px;background:rgba(255,255,255,0.04);color:var(--text-dim);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s ease}
.sidebar-close:hover{background:rgba(255,50,50,0.1);color:var(--error)}
.sidebar-nav{flex:1;padding:10px 10px 5px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;cursor:pointer;color:rgba(255,255,255,0.4);font-size:13px;font-weight:500;transition:all 0.2s ease;border:none;background:transparent;width:100%;text-align:left}
.nav-item:hover{color:rgba(255,255,255,0.7);background:rgba(0,150,255,0.06)}
.nav-item.active{color:var(--neon);background:rgba(0,150,255,0.1);box-shadow:inset 3px 0 0 var(--neon)}
.nav-item .icon{font-size:15px;width:20px;text-align:center}
.nav-item.admin-link{margin-top:8px;padding-top:12px;border-top:1px solid var(--border)}
.nav-item.admin-link:hover{color:var(--neon);background:rgba(0,150,255,0.06)}
.nav-item.logout{margin-top:auto;color:rgba(255,100,100,0.5)}
.nav-item.logout:hover{color:var(--error);background:rgba(255,50,50,0.06)}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:305;opacity:0;pointer-events:none;transition:opacity 0.35s ease}
.sidebar-overlay.show{opacity:1;pointer-events:auto}

/* MAIN */
.main-content{flex:1;min-height:0;overflow-y:auto;padding:calc(var(--topbar-h) + 24px) 28px 24px;position:relative}
.main-content::before{content:"";position:fixed;top:-50%;right:-50%;width:100%;height:100%;background:radial-gradient(ellipse at 80% 20%,rgba(0,100,255,0.04) 0%,transparent 60%);pointer-events:none;z-index:0}
.section{display:none;position:relative;z-index:1}
.section.active{display:block}
.section-title{font-size:clamp(18px,3vw,26px);font-weight:700;margin:0 0 4px}
.section-sub{color:var(--text-dim);font-size:clamp(12px,1.5vw,14px);margin:0 0 24px}
.poll-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,300px),1fr));gap:14px}
.poll-card{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:18px 20px;cursor:pointer;transition:all 0.25s ease;-webkit-tap-highlight-color:transparent}
.poll-card:active{transform:scale(0.98)}
.poll-card:hover{border-color:var(--neon);box-shadow:0 0 25px rgba(0,150,255,0.08);transform:translateY(-2px)}
.poll-card-title{font-size:clamp(14px,2vw,16px);font-weight:600;margin:0 0 10px;line-height:1.4}
.poll-card-meta{display:flex;flex-wrap:wrap;gap:6px;justify-content:space-between;align-items:center;font-size:12px;color:var(--text-dim)}
.poll-card-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.badge-active{background:rgba(0,200,100,0.12);color:var(--success);border:1px solid rgba(0,200,100,0.2)}
.badge-finalizada{background:rgba(255,255,255,0.06);color:var(--text-dim);border:1px solid rgba(255,255,255,0.1)}
.badge-ruleta{background:rgba(255,150,0,0.12);color:#ffaa33;border:1px solid rgba(255,150,0,0.2)}
.no-polls{text-align:center;padding:60px 20px;color:var(--text-dim)}
.no-polls .icon{font-size:40px;margin-bottom:12px;opacity:0.3}
.vote-header{margin-bottom:20px}
.vote-header h2{margin:0 0 4px;font-size:clamp(17px,2.5vw,22px);line-height:1.3}
.vote-header p{color:var(--text-dim);font-size:clamp(12px,1.4vw,14px);margin:0}
.vote-options{display:flex;flex-direction:column;gap:10px}
.vote-option{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all 0.2s ease;font-size:clamp(13px,1.5vw,15px);color:var(--text);display:flex;align-items:center;gap:12px;-webkit-tap-highlight-color:transparent}
.vote-option:active{transform:scale(0.99)}
.vote-option:hover:not(.disabled){border-color:var(--neon);background:rgba(0,150,255,0.06)}
.vote-option .radio{width:18px;min-width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);transition:all 0.2s ease}
.vote-option:hover:not(.disabled) .radio{border-color:var(--neon)}
.vote-option.selected{border-color:var(--neon);background:rgba(0,150,255,0.08)}
.vote-option.selected .radio{border-color:var(--neon);background:var(--neon);box-shadow:0 0 10px var(--neon-glow)}
.vote-option.disabled{cursor:default;opacity:0.6}
.btn-vote,.btn-primary-full{margin-top:20px;padding:13px;border:none;border-radius:12px;font-size:clamp(13px,1.5vw,15px);font-weight:700;cursor:pointer;background:linear-gradient(135deg,#0055ff,var(--neon));color:#fff;letter-spacing:1px;text-transform:uppercase;width:100%;transition:all 0.3s ease}
.btn-vote:hover,.btn-primary-full:hover{box-shadow:0 0 30px var(--neon-glow);transform:translateY(-2px)}
.btn-vote:disabled,.btn-primary-full:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-back{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text-dim);font-size:13px;cursor:pointer;transition:all 0.2s ease;margin-bottom:16px;-webkit-tap-highlight-color:transparent}
.btn-back:hover{border-color:var(--neon);color:var(--text)}
.result-bar-wrap{margin-bottom:12px}
.result-label{display:flex;justify-content:space-between;font-size:clamp(12px,1.4vw,14px);margin-bottom:4px;gap:8px}
.result-label span:last-child{color:var(--neon);font-weight:600;white-space:nowrap}
.result-track{width:100%;height:clamp(20px,3vw,28px);background:rgba(255,255,255,0.04);border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.result-fill{height:100%;background:linear-gradient(90deg,#0055ff,var(--neon));border-radius:12px;transition:width 0.6s ease;min-width:4px}
.result-total{margin-top:20px;text-align:center;color:var(--text-dim);font-size:clamp(12px,1.4vw,14px)}
.result-voted-msg{background:rgba(0,200,100,0.08);border:1px solid rgba(0,200,100,0.2);border-radius:12px;padding:10px 14px;color:var(--success);font-size:clamp(12px,1.4vw,14px);margin-bottom:16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ruleta-container{display:flex;flex-direction:column;align-items:center;gap:20px}
.ruleta-canvas-wrap{position:relative;display:flex;align-items:center;justify-content:center;width:100%;max-width:320px}
.ruleta-canvas-wrap canvas{width:100%;height:auto;max-width:300px;aspect-ratio:1;border-radius:50%;box-shadow:0 0 40px rgba(0,150,255,0.15),0 0 80px rgba(0,100,255,0.05)}
.ruleta-pointer{position:absolute;top:-10px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:12px solid transparent;border-right:12px solid transparent;border-top:22px solid var(--neon);filter:drop-shadow(0 0 10px var(--neon-glow));z-index:5}
.btn-girar{padding:14px 36px;border:none;border-radius:12px;font-size:clamp(14px,2vw,16px);font-weight:700;cursor:pointer;background:linear-gradient(135deg,#0055ff,var(--neon));color:#fff;letter-spacing:1px;text-transform:uppercase;transition:all 0.3s ease}
.btn-girar:hover{box-shadow:0 0 35px var(--neon-glow);transform:translateY(-2px)}
.btn-girar:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.ruleta-resultado{text-align:center;padding:14px 20px;background:var(--card-bg);border:1px solid var(--border);border-radius:14px;width:100%;max-width:280px}
.ruleta-resultado h3{margin:0 0 4px;font-size:13px;color:var(--text-dim)}
.ruleta-resultado p{margin:0;font-size:clamp(16px,2.5vw,22px);font-weight:700;color:var(--neon);text-shadow:0 0 20px var(--neon-glow)}
.main-content::-webkit-scrollbar{width:5px;height:5px}
.main-content::-webkit-scrollbar-track{background:transparent}
.main-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.main-content::-webkit-scrollbar-thumb:hover{background:var(--neon-dim)}

/* RESPONSIVE */
@media(max-width:1024px){.main-content{padding:calc(var(--topbar-h) + 20px) 20px 20px}.poll-grid{gap:12px}}
@media(max-width:768px){.topbar{padding:0 16px}.btn-hamburger{width:36px;height:36px;font-size:17px;border-radius:8px}.sidebar{width:240px;left:-240px}.sidebar-head{padding:14px 16px}.sidebar-nav{padding:8px 8px 4px}.nav-item{padding:9px 12px;font-size:12px}.main-content{padding:calc(var(--topbar-h) + 16px) 16px 16px}.poll-grid{grid-template-columns:1fr}.ruleta-canvas-wrap{max-width:280px}}
@media(max-width:400px){.topbar{padding:0 12px;height:54px;--topbar-h:54px}.topbar-brand{font-size:14px}.topbar-brand .brand-icon{width:22px;height:22px;font-size:11px}.btn-hamburger{width:34px;height:34px;font-size:16px}.sidebar{width:230px;left:-230px}.main-content{padding:calc(var(--topbar-h) + 12px) 12px 12px}.section-title{font-size:17px}.poll-card{padding:14px 16px}.poll-card-title{font-size:14px}.vote-option{padding:12px 14px;font-size:13px}.result-label{font-size:12px;flex-direction:column;gap:2px}.result-label span:last-child{white-space:normal}.ruleta-canvas-wrap{max-width:260px}}
@media(min-width:769px)and(max-width:1024px){.poll-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-height:500px)and(orientation:landscape){.topbar{height:48px;--topbar-h:48px}.topbar-brand{font-size:13px}.btn-hamburger{width:32px;height:32px;font-size:15px}.sidebar-head{padding:10px 14px;min-height:48px}.sidebar-nav{padding:6px 6px 3px;gap:1px}.nav-item{padding:6px 10px;font-size:12px}.main-content{padding:calc(var(--topbar-h) + 8px) 14px 8px}.poll-grid{grid-template-columns:repeat(2,1fr);gap:8px}.poll-card{padding:12px 14px}.poll-card-title{font-size:13px}}
  </style>
  <script src="config.js"></script>
</head>
<body>
  <!-- TOPBAR -->
  <header class="topbar">
    <button class="btn-hamburger" id="btnHamburger" onclick="toggleSidebar()" aria-label="Menu">☰</button>
    <div class="topbar-brand"><span class="brand-icon">B</span>Block<span>Destroyer</span></div>
  </header>

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <h2>Menu</h2>
      <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
    </div>
    <div class="sidebar-nav">
      <button class="nav-item active" data-section="inicio" onclick="irA('inicio')">
        <span class="icon">&#9679;</span> Inicio
      </button>
      <button class="nav-item admin-link" id="btnAdminPanel" onclick="irAPanel()" style="display:none">
        <span class="icon">&#9881;</span> Panel Admin
      </button>
      <button class="nav-item logout" onclick="cerrarSesion()">
        <span class="icon">&#8592;</span> Cerrar Sesion
      </button>
    </div>
  </nav>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <!-- SECCION: INICIO -->
    <section id="sec-inicio" class="section active">
      <h2 class="section-title" id="bienvenida">Bienvenido</h2>
      <p class="section-sub">Encuestas disponibles para votar</p>
      <div id="pollList" class="poll-grid"></div>
    </section>

    <!-- SECCION: VOTAR -->
    <section id="sec-votar" class="section">
      <button class="btn-back" onclick="irA('inicio')">&larr; Volver</button>
      <div class="vote-header">
        <h2 id="voteTitulo"></h2>
        <p id="voteTipo"></p>
      </div>
      <div id="voteMsg" class="mensaje"></div>
      <div id="voteOptions" class="vote-options"></div>
      <button class="btn-vote" id="btnConfirmarVoto" onclick="confirmarVoto()" disabled>Votar</button>
    </section>

    <!-- SECCION: RESULTADOS -->
    <section id="sec-resultados" class="section">
      <button class="btn-back" onclick="irA('inicio')">&larr; Volver</button>
      <div class="vote-header">
        <h2 id="resTitulo"></h2>
        <p id="resTipo"></p>
      </div>
      <div id="resVotadoMsg" class="result-voted-msg" style="display:none">
        &#10003; Has votado: <strong id="resMiVoto"></strong>
      </div>
      <div id="resBarras"></div>
      <div class="result-total" id="resTotal"></div>
    </section>

    <!-- SECCION: RULETA -->
    <section id="sec-ruleta" class="section">
      <button class="btn-back" onclick="irA('inicio')">&larr; Volver</button>
      <div class="vote-header">
        <h2 id="ruletaTitulo"></h2>
        <p>Gira la ruleta para votar al azar</p>
      </div>
      <div id="ruletaMsg" class="mensaje"></div>
      <div class="ruleta-container">
        <div class="ruleta-canvas-wrap">
          <div class="ruleta-pointer"></div>
          <canvas id="ruletaCanvas" width="300" height="300"></canvas>
        </div>
        <button class="btn-girar" id="btnGirar" onclick="girarRuleta()">Girar Ruleta</button>
        <div class="ruleta-resultado" id="ruletaResultado" style="display:none">
          <h3>Resultado:</h3>
          <p id="ruletaOpcion"></p>
        </div>
      </div>
    </section>

  </main>

  <script>
// Estado global
var USUARIO = "";
var ROL = "";
var encuestasCache = [];
var encuestaActual = null;
var opcionSeleccionada = null;
var ruletaOpcionElegida = null;
var ruletaCanvas = null;
var ruletaCtx = null;
var ruletaAngulo = 0;
var ruletaOpciones = [];
var ruletaGirando = false;

function $(id) { return document.getElementById(id); }

// Inicializacion
(function init() {
  var u = localStorage.getItem("bd_usuario");
  var r = localStorage.getItem("bd_rol");
  if (!u) { window.location.href = "index.html"; return; }
  USUARIO = u;
  ROL = r;
  $("bienvenida").textContent = "Bienvenido, " + u;
  if (ROL === "admin" || ROL === "owner") $("btnAdminPanel").style.display = "flex";
  cargarEncuestas();
})();

// Navegacion
function toggleSidebar() {
  $("sidebar").classList.toggle("open");
  $("sidebarOverlay").classList.toggle("show");
}

function cerrarSidebar() {
  $("sidebar").classList.remove("open");
  $("sidebarOverlay").classList.remove("show");
}

function irA(section) {
  cerrarSidebar();
  document.querySelectorAll(".section").forEach(function(s) { s.classList.remove("active"); });
  document.querySelectorAll(".nav-item").forEach(function(n) { n.classList.remove("active"); });
  var sec = $("sec-" + section);
  if (sec) sec.classList.add("active");
  var nav = document.querySelector('.nav-item[data-section="' + section + '"]');
  if (nav) nav.classList.add("active");
}

function irAPanel() {
  window.location.href = "panel.html";
}

function cerrarSesion() {
  localStorage.removeItem("bd_usuario");
  localStorage.removeItem("bd_rol");
  window.location.href = "index.html";
}

// API
function llamarAPI(accion, datos, onExito, onError) {
  datos.action = accion;
  fetch(APP_SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams(datos)
  })
  .then(function(r) { return r.text(); })
  .then(function(t) {
    if (!t) { onError("No se pudo completar la operacion. Intenta de nuevo."); return; }
    try { onExito(JSON.parse(t)); }
    catch (e) { onError("Respuesta invalida del servidor."); }
  })
  .catch(function(e) { onError("Error de conexion. Revisa tu internet e intenta de nuevo."); });
}

function mostrarMensaje(id, tipo, texto) {
  var el = $(id);
  if (!el) return;
  el.style.display = "block";
  el.className = "mensaje " + tipo;
  el.textContent = texto;
}

function ocultarMensaje(id) {
  var el = $(id);
  if (!el) return;
  el.style.display = "none";
  el.className = "mensaje";
}

function loading(btnId, on) {
  var btn = $(btnId);
  if (!btn) return;
  btn.disabled = on;
  btn.textContent = on ? "Cargando..." : btn.getAttribute("data-text") || btn.textContent;
  if (!btn.getAttribute("data-text")) btn.setAttribute("data-text", btn.textContent);
}

// Cargar encuestas
function cargarEncuestas() {
  var lista = $("pollList");
  lista.innerHTML = '<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.3);font-size:14px">Cargando encuestas...</div>';
  llamarAPI("listarEncuestas", {}, function(r) {
    if (!r.exito) {
      lista.innerHTML = '<div class="no-polls"><div class="icon">&#9888;</div><p>No se pudieron cargar las encuestas</p></div>';
      return;
    }
    encuestasCache = r.encuestas || [];
    renderizarEncuestas();
  }, function(e) {
    lista.innerHTML = '<div class="no-polls"><div class="icon">&#9888;</div><p>' + e + '</p></div>';
  });
}

function renderizarEncuestas() {
  var lista = $("pollList");
  var activas = encuestasCache.filter(function(e) { return e.estado === "activa"; });
  var finalizadas = encuestasCache.filter(function(e) { return e.estado === "finalizada"; });
  if (activas.length === 0 && finalizadas.length === 0) {
    lista.innerHTML = '<div class="no-polls"><div class="icon">&#9733;</div><p>No hay encuestas disponibles</p></div>';
    return;
  }
  var html = "";
  if (activas.length > 0) {
    html += '<p style="font-size:12px;color:var(--text-dim);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px">Activas</p>';
    activas.forEach(function(e) { html += tarjetaEncuesta(e); });
  }
  if (finalizadas.length > 0) {
    html += '<p style="font-size:12px;color:var(--text-dim);margin:20px 0 10px;text-transform:uppercase;letter-spacing:1px">Finalizadas</p>';
    finalizadas.forEach(function(e) { html += tarjetaEncuesta(e); });
  }
  lista.innerHTML = html;
}

function obtenerOpciones(e) {
  if (!e || !e.opciones) return [];
  var ops = e.opciones;
  if (Array.isArray(ops)) return ops;
  if (typeof ops === "string") {
    if (ops.indexOf(",") > 0 && ops.indexOf("[") !== 0) {
      return ops.split(",").map(function(s) { return s.trim(); }).filter(function(s) { return s; });
    }
    try { return JSON.parse(ops); } catch(_) { return []; }
  }
  return [];
}

function tarjetaEncuesta(e) {
  var oa = obtenerOpciones(e);
  var badges = e.estado === "activa"
    ? '<span class="poll-card-badge badge-active">Activa</span>'
    : '<span class="poll-card-badge badge-finalizada">Finalizada</span>';
  if (e.tipo === "ruleta") badges += '<span class="poll-card-badge badge-ruleta">Ruleta</span>';
  return '<div class="poll-card" onclick="abrirEncuesta(\'' + e.id + '\')">' +
    '<h3 class="poll-card-title">' + escapar(e.titulo) + '</h3>' +
    '<div class="poll-card-meta">' +
    '<span>' + oa.length + ' opciones &middot; ' + (e.totalVotos || 0) + ' votos</span>' +
    '<span>' + badges + '</span></div></div>';
}

function escapar(t) {
  var d = document.createElement("div");
  d.appendChild(document.createTextNode(t));
  return d.innerHTML;
}

// Abrir encuesta
function abrirEncuesta(id) {
  var e = null;
  for (var i = 0; i < encuestasCache.length; i++) {
    if (encuestasCache[i].id === id) { e = encuestasCache[i]; break; }
  }
  if (!e) return;
  encuestaActual = e;
  opcionSeleccionada = null;
  var yaVoto = localStorage.getItem("bd_voto_" + e.id);
  if (yaVoto) { mostrarResultados(e, yaVoto); return; }
  if (e.estado === "finalizada") { mostrarResultados(e, null); return; }
  if (e.tipo === "ruleta") { abrirRuleta(e); return; }

  irA("votar");
  $("voteTitulo").textContent = e.titulo;
  $("voteTipo").textContent = e.tipo === "ruleta" ? "Tipo: Ruleta" : "Tipo: Normal";
  var opcionesArr = obtenerOpciones(e);

  if (!Array.isArray(opcionesArr) || opcionesArr.length < 2) {
    var msj = "Sin opciones. Raw: " + JSON.stringify(e.opciones).substring(0, 80);
    ocultarMensaje("voteMsg");
    mostrarMensaje("voteMsg", "error", msj);
    $("voteOptions").innerHTML = "";
    $("btnConfirmarVoto").disabled = true;
    $("btnConfirmarVoto").style.display = "none";
    return;
  }

  ocultarMensaje("voteMsg");
  var html = "";
  for (var idx = 0; idx < opcionesArr.length; idx++) {
    var o = opcionesArr[idx];
    html += '<div class="vote-option" data-idx="' + idx + '" onclick="seleccionarOpcion(this)">' +
      '<div class="radio"></div><span>' + escapar(o) + '</span></div>';
  }
  $("voteOptions").innerHTML = html;
  $("btnConfirmarVoto").disabled = true;
  $("btnConfirmarVoto").style.display = "block";
}

function seleccionarOpcion(el) {
  document.querySelectorAll(".vote-option").forEach(function(o) { o.classList.remove("selected"); });
  el.classList.add("selected");
  var idx = parseInt(el.getAttribute("data-idx"));
  var opcionesArr = obtenerOpciones(encuestaActual);
  opcionSeleccionada = opcionesArr[idx] || el.getAttribute("data-idx");
  $("btnConfirmarVoto").disabled = false;
}

// Confirmar voto
function confirmarVoto() {
  if (!opcionSeleccionada || !encuestaActual) return;
  var _encuesta = encuestaActual;
  var _opcion = opcionSeleccionada;
  var _id = _encuesta.id;
  loading("btnConfirmarVoto", true);
  llamarAPI("votar", {
    encuestaId: _id,
    usuario: USUARIO,
    opcion: _opcion
  }, function(r) {
    loading("btnConfirmarVoto", false);
    if (r.exito) {
      localStorage.setItem("bd_voto_" + _id, _opcion);
      mostrarResultados(_encuesta, _opcion);
    } else if (r.yaVoto) {
      localStorage.setItem("bd_voto_" + _id, r.opcionElegida);
      mostrarResultados(_encuesta, r.opcionElegida);
    } else {
      mostrarMensaje("voteMsg", "error", r.error);
    }
  }, function(e) {
    loading("btnConfirmarVoto", false);
    mostrarMensaje("voteMsg", "error", e);
  });
}

// Resultados
function mostrarResultados(e, miVoto) {
  irA("resultados");
  if (miVoto) {
    $("resVotadoMsg").style.display = "flex";
    $("resMiVoto").textContent = miVoto;
  } else {
    $("resVotadoMsg").style.display = "none";
  }
  $("resTitulo").textContent = e.titulo;
  $("resTipo").textContent = (e.tipo === "ruleta" ? "Ruleta" : "Normal") + " - " + (e.estado === "activa" ? "Activa" : "Finalizada");

  var barras = $("resBarras");
  barras.innerHTML = '<div style="text-align:center;padding:20px;color:rgba(255,255,255,0.3)">Cargando resultados...</div>';
  llamarAPI("resultados", { encuestaId: e.id }, function(r) {
    if (!r.exito) { barras.innerHTML = '<p style="color:var(--error)">' + r.error + '</p>'; return; }
    var rs = r.resultados;
    var total = r.totalVotos || 0;
    $("resTotal").textContent = "Total de votos: " + total;
    var html = "";
    for (var op in rs) {
      if (!rs.hasOwnProperty(op)) continue;
      var count = rs[op];
      var pct = total > 0 ? (count / total * 100) : 0;
      html += '<div class="result-bar-wrap"><div class="result-label"><span>' + escapar(op) + '</span><span>' + count + ' (' + pct.toFixed(1) + '%)</span></div>' +
        '<div class="result-track"><div class="result-fill" style="width:' + pct + '%"></div></div></div>';
    }
    barras.innerHTML = html;
  }, function(e) {
    barras.innerHTML = '<p style="color:var(--error)">' + e + '</p>';
  });
}

// Ruleta
function abrirRuleta(e) {
  encuestaActual = e;
  irA("ruleta");
  $("ruletaTitulo").textContent = e.titulo;
  ocultarMensaje("ruletaMsg");
  $("ruletaResultado").style.display = "none";
  $("btnGirar").disabled = false;
  ruletaOpcionElegida = null;
  ruletaOpciones = obtenerOpciones(e);
  ruletaCanvas = $("ruletaCanvas");
  ruletaCtx = ruletaCanvas.getContext("2d");
  ruletaAngulo = 0;
  dibujarRuleta();
}

function dibujarRuleta() {
  var ctx = ruletaCtx;
  var cw = ruletaCanvas.width, ch = ruletaCanvas.height;
  var cx = cw / 2, cy = ch / 2;
  var r = Math.min(cx, cy) - 10;
  var n = ruletaOpciones.length;
  var arc = (2 * Math.PI) / n;
  ctx.clearRect(0, 0, cw, ch);
  ctx.beginPath();
  ctx.arc(cx, cy, r + 4, 0, 2 * Math.PI);
  ctx.fillStyle = "rgba(0,50,100,0.3)";
  ctx.fill();
  var colores = ["#0055ff", "#00b8ff", "#0033aa", "#0099dd", "#0044cc", "#00aaff", "#002288", "#0088bb"];
  for (var i = 0; i < n; i++) {
    var sa = ruletaAngulo + i * arc;
    var ea = sa + arc;
    var color = colores[i % colores.length];
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, sa, ea); ctx.closePath();
    ctx.fillStyle = color; ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,0.3)"; ctx.lineWidth = 1; ctx.stroke();
    var mid = sa + arc / 2;
    var tx = cx + r * 0.6 * Math.cos(mid);
    var ty = cy + r * 0.6 * Math.sin(mid);
    ctx.save(); ctx.translate(tx, ty); ctx.rotate(mid);
    ctx.fillStyle = "#fff";
    ctx.font = "bold 11px Segoe UI, sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.shadowColor = "rgba(0,0,0,0.5)"; ctx.shadowBlur = 3;
    var lbl = ruletaOpciones[i];
    if (lbl.length > 12) lbl = lbl.substring(0, 11) + "...";
    ctx.fillText(lbl, 0, 0);
    ctx.restore();
  }
  ctx.beginPath();
  ctx.arc(cx, cy, 20, 0, 2 * Math.PI);
  ctx.fillStyle = "#0a0a1a"; ctx.fill();
  ctx.strokeStyle = "#00b8ff"; ctx.lineWidth = 2; ctx.stroke();
}

function girarRuleta() {
  if (ruletaGirando || ruletaOpcionElegida) return;
  var yaVoto = localStorage.getItem("bd_voto_" + encuestaActual.id);
  if (yaVoto) {
    mostrarMensaje("ruletaMsg", "error", "Ya votaste en esta encuesta");
    $("ruletaResultado").style.display = "block";
    $("ruletaOpcion").textContent = yaVoto;
    return;
  }
  ruletaGirando = true;
  $("btnGirar").disabled = true;

  var giros = 5 + Math.random() * 5;
  var anguloFinal = ruletaAngulo + giros * 2 * Math.PI + Math.random() * 2 * Math.PI;
  var duracion = 4000;
  var inicio = null;
  var anguloInicial = ruletaAngulo;

  function animar(ts) {
    if (!inicio) inicio = ts;
    var p = Math.min((ts - inicio) / duracion, 1);
    var ease = 1 - Math.pow(1 - p, 3);
    ruletaAngulo = anguloInicial + (anguloFinal - anguloInicial) * ease;
    dibujarRuleta();
    if (p < 1) {
      requestAnimationFrame(animar);
    } else {
      ruletaGirando = false;
      $("btnGirar").disabled = false;
      ruletaOpcionElegida = ruletaOpciones[Math.floor((((-Math.PI / 2 - ruletaAngulo) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI)) / (2 * Math.PI / ruletaOpciones.length)) % ruletaOpciones.length];
      confirmarVotoRuleta(ruletaOpcionElegida);
    }
  }
  requestAnimationFrame(animar);
}

function confirmarVotoRuleta(opcion) {
  $("ruletaResultado").style.display = "block";
  $("ruletaOpcion").textContent = opcion;
  var _encuesta = encuestaActual;
  var _id = _encuesta.id;
  llamarAPI("votar", { encuestaId: _id, usuario: USUARIO, opcion: opcion }, function(r) {
    if (r.exito) {
      localStorage.setItem("bd_voto_" + _id, opcion);
      mostrarMensaje("ruletaMsg", "exito", "Voto registrado: " + opcion);
    } else if (r.yaVoto) {
      localStorage.setItem("bd_voto_" + _id, r.opcionElegida);
      $("ruletaOpcion").textContent = r.opcionElegida;
      mostrarMensaje("ruletaMsg", "error", "Ya habias votado");
    } else {
      mostrarMensaje("ruletaMsg", "error", r.error);
    }
    $("btnGirar").disabled = false;
  }, function(e) {
    mostrarMensaje("ruletaMsg", "error", e);
    $("btnGirar").disabled = false;
  });
}
  </script>
