<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://script.google.com https://docs.google.com https://*.googleusercontent.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; script-src 'self' 'unsafe-inline' https://script.google.com https://*.googleusercontent.com https://*.google.com;">
    <title>Atencion al Cliente - WorldLeaf</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif; background: #0a0e17; color: #e0e6f0;
            min-height: 100vh;
        }
        header {
            padding: 8px 14px; background: rgba(10,14,23,0.9);
        }
        .logo-text { font-size: 13px; font-weight: 500; color: rgba(224,230,240,0.5); }

        .login-box {
            max-width: 380px; margin: 80px auto; text-align: center;
        }
        .login-box h1 { font-size: 24px; margin-bottom: 6px; }
        .login-box p { color: rgba(224,230,240,0.5); font-size: 14px; margin-bottom: 24px; }

        .form-group { margin-bottom: 16px; text-align: left; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: rgba(224,230,240,0.6); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
        .form-group input {
            width: 100%; padding: 11px 14px; background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #e0e6f0;
            font-family: 'Inter', sans-serif; font-size: 14px; outline: none;
        }
        .form-group input:focus { border-color: #c4a87c; }

        .btn {
            width: 100%; padding: 12px 28px; background: linear-gradient(135deg, #c4a87c, #a08050);
            color: #0a0e17; border: none; border-radius: 10px; font-family: 'Inter', sans-serif;
            font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.25s;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .message { display: none; padding: 10px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 16px; }
        .message.error { display: block; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #fca5a5; }
        .message.success { display: block; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: #86efac; }

        .chat-box { display: none; }
        .chat-box.active { display: flex; flex-direction: column; height: calc(100vh - 34px); }

        .chat-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 18px; background: rgba(255,255,255,0.02);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .chat-header .user-info { font-size: 14px; font-weight: 600; }
        .chat-header .user-info span { color: #c4a87c; }
        .chat-header .logout-link {
            color: rgba(224,230,240,0.4); cursor: pointer; font-size: 13px;
            text-decoration: underline; transition: color 0.2s;
        }
        .chat-header .logout-link:hover { color: #ef4444; }

        .chat-messages {
            flex: 1; overflow-y: auto; padding: 16px 18px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .chat-messages .msg {
            max-width: 85%; padding: 10px 14px; border-radius: 14px;
            font-size: 13px; line-height: 1.45; word-wrap: break-word;
        }
        .chat-messages .msg.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #c4a87c, #a08050);
            color: #0a0e17; border-bottom-right-radius: 4px;
        }
        .chat-messages .msg.admin {
            align-self: flex-start;
            background: rgba(255,255,255,0.06); color: #e0e6f0;
            border-bottom-left-radius: 4px;
        }
        .chat-messages .msg .time {
            font-size: 10px; opacity: 0.5; margin-top: 4px; display: block;
        }
        .chat-messages .msg .respondido-badge {
            display: inline-block; font-size: 10px; padding: 1px 7px;
            border-radius: 8px; background: rgba(34,197,94,0.2);
            color: #86efac; font-weight: 600; margin-left: 6px;
        }
        .chat-messages .empty-state {
            margin: auto; text-align: center; color: rgba(224,230,240,0.3);
        }
        .chat-messages .empty-state h3 { font-size: 16px; margin-bottom: 4px; }
        .chat-messages .empty-state p { font-size: 13px; }

        .chat-input-area {
            padding: 10px 12px;
            background: rgba(255,255,255,0.02);
            border-top: 1px solid rgba(255,255,255,0.06);
            display: flex; gap: 8px; align-items: flex-end;
        }
        .chat-input {
            flex: 1; padding: 10px 14px; background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
            color: #e0e6f0; font-family: 'Inter', sans-serif; font-size: 13px;
            outline: none; resize: none; max-height: 80px; line-height: 1.4;
        }
        .chat-input:focus { border-color: #c4a87c; }
        .chat-send {
            width: 38px; height: 38px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, #c4a87c, #a08050);
            color: #0a0e17; cursor: pointer; display: flex; align-items: center;
            justify-content: center; flex-shrink: 0;
        }
        .chat-send:hover { opacity: 0.85; }
        .chat-send:disabled { opacity: 0.3; cursor: not-allowed; }

        .spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.2); border-top-color: #c4a87c;
            border-radius: 50%; animation: spin 0.6s linear infinite;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .connection-status {
            font-size: 11px; color: rgba(224,230,240,0.3);
            display: flex; align-items: center; gap: 5px;
        }
        .connection-status .dot {
            width: 6px; height: 6px; border-radius: 50%; display: inline-block;
        }
        .connection-status .dot.online { background: #22c55e; }
        .connection-status .dot.offline { background: #ef4444; }
    </style>
</head>
<body>

<header>
    <div class="logo-text">Servicio MCPE</div>
</header>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
    <h1>Atencion al Cliente</h1>
    <p>Ingresa tu nombre de usuario para iniciar el chat.</p>
    <div id="loginMessage" class="message"></div>
    <form id="loginForm">
        <div class="form-group">
            <label>Nombre de usuario</label>
            <input type="text" id="usernameInput" placeholder="Tu nombre de usuario" required maxlength="20" autocomplete="off">
        </div>
        <button type="submit" class="btn" id="enterBtn">Ingresar al chat</button>
    </form>
</div>

<!-- CHAT -->
<div class="chat-box" id="chatBox">
    <div class="chat-header">
        <div class="user-info"><span id="displayName"></span></div>
        <div style="display:flex;align-items:center;gap:12px">
            <div class="connection-status">
                <span class="dot online" id="statusDot"></span>
                <span id="statusText">Conectado</span>
            </div>
            <span class="logout-link" onclick="logout()">Salir</span>
        </div>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="empty-state">
            <h3>Bienvenido</h3>
            <p>Escribe tu mensaje para contactar con soporte.</p>
        </div>
    </div>
    <div class="chat-input-area">
        <textarea class="chat-input" id="chatInput" placeholder="Escribe tu mensaje..." maxlength="500" rows="1"></textarea>
        <button class="chat-send" onclick="sendMessage()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
    </div>
</div>

<script>
var API_URL = 'https://script.google.com/macros/s/AKfycbw4xSb_7kuSYysqXkXJiDMXBKDx1o2zdmPGW-izp_aulbdvjre7EjoahKAL0S4ZIGg8/exec';
var currentUser = localStorage.getItem('wl_chat_user') || '';
var refreshTimer = null;

function escHtml(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function jsonp(data) {
    return new Promise(function(resolve, reject) {
        var cb = 'wlc_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
        var params = [];
        for (var key in data) {
            if (data.hasOwnProperty(key)) params.push(encodeURIComponent(key) + '=' + encodeURIComponent(data[key]));
        }
        params.push('callback=' + cb);
        var url = API_URL + '?' + params.join('&');
        window[cb] = function(resp) {
            delete window[cb];
            if (script.parentNode) script.parentNode.removeChild(script);
            resolve(resp);
        };
        var script = document.createElement('script');
        script.src = url;
        script.onerror = function() {
            delete window[cb];
            if (script.parentNode) script.parentNode.removeChild(script);
            reject(new Error('Error de conexion'));
        };
        document.body.appendChild(script);
        setTimeout(function() {
            if (window[cb]) { delete window[cb]; reject(new Error('Tiempo agotado')); }
        }, 15000);
    });
}

function mostrarMsg(el, msg, type) {
    el.textContent = msg;
    el.className = 'message ' + type;
}

function autoLogin() {
    if (!currentUser) return;
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('chatBox').classList.add('active');
    document.getElementById('displayName').textContent = currentUser;
    startChat();
}

// LOGIN
document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var btn = document.getElementById('enterBtn');
    var msg = document.getElementById('loginMessage');
    var user = document.getElementById('usernameInput').value.trim();
    if (!user) { mostrarMsg(msg, 'Ingresa tu nombre de usuario.', 'error'); return; }
    if (user.length < 2) { mostrarMsg(msg, 'El nombre debe tener al menos 2 caracteres.', 'error'); return; }

    currentUser = user;
    localStorage.setItem('wl_chat_user', user);
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('chatBox').classList.add('active');
    document.getElementById('displayName').textContent = user;
    startChat();
});

function startChat() {
    loadMessages();
    refreshTimer = setInterval(loadMessages, 2000);
    document.getElementById('chatInput').focus();
}

function logout() {
    if (refreshTimer) clearInterval(refreshTimer);
    currentUser = '';
    localStorage.removeItem('wl_chat_user');
    document.getElementById('chatBox').classList.remove('active');
    document.getElementById('loginBox').style.display = 'block';
    document.getElementById('loginForm').reset();
    document.getElementById('loginMessage').style.display = 'none';
}

function loadMessages() {
    if (!currentUser) return;
    jsonp({ action:'getMessages', user:currentUser }).then(function(resp) {
        try {
            var data = typeof resp === 'string' ? JSON.parse(resp) : resp;
            if (data.status !== 'OK') return;
            renderMessages(data.messages || []);
            updateConnectionStatus(true);
        } catch(e) {}
    }).catch(function() {
        updateConnectionStatus(false);
    });
}

function renderMessages(messages) {
    var container = document.getElementById('chatMessages');
    var lastMsgCount = parseInt(container.getAttribute('data-count') || '-1');
    if (lastMsgCount === messages.length) return;
    container.setAttribute('data-count', messages.length);

    var html = '';
    for (var i = 0; i < messages.length; i++) {
        var m = messages[i];
        var isFromUser = m.fromUser === currentUser;
        var isFromAdmin = m.fromUser === 'WorldLeaf';

        if (isFromUser) {
            var time = m.timestamp ? new Date(m.timestamp).toLocaleString() : '';
            var hasReply = false;
            for (var j = i + 1; j < messages.length; j++) {
                if (messages[j].fromUser === 'WorldLeaf' && messages[j].toUser === currentUser) {
                    hasReply = true; break;
                }
            }
            var badge = hasReply ? '<span class="respondido-badge">Respondido</span>' : '';
            html += '<div class="msg user">' +
                escHtml(m.message) + badge +
                '<span class="time">' + time + '</span></div>';
        } else if (isFromAdmin && m.toUser === currentUser) {
            var time = m.timestamp ? new Date(m.timestamp).toLocaleString() : '';
            html += '<div class="msg admin">' +
                '<strong>WorldLeaf</strong><br>' +
                escHtml(m.message) +
                '<span class="time">' + time + '</span></div>';
        }
    }
    if (html === '') {
        html = '<div class="empty-state"><h3>Bienvenido</h3><p>Escribe tu mensaje para contactar con soporte.</p></div>';
    }
    container.innerHTML = html;
    container.scrollTop = container.scrollHeight;
}

function sendMessage() {
    var input = document.getElementById('chatInput');
    var msg = input.value.trim();
    if (!msg || !currentUser) return;
    var btn = document.querySelector('.chat-send');
    btn.disabled = true;
    jsonp({ action:'sendMessage', user:currentUser, message:msg }).then(function(resp) {
        btn.disabled = false;
        try {
            var data = typeof resp === 'string' ? JSON.parse(resp) : resp;
            if (data.status === 'OK') {
                input.value = '';
                input.style.height = 'auto';
                loadMessages();
            }
        } catch(e) {}
    }).catch(function() {
        btn.disabled = false;
    });
}

function updateConnectionStatus(online) {
    var dot = document.getElementById('statusDot');
    var text = document.getElementById('statusText');
    if (online) {
        dot.className = 'dot online';
        text.textContent = 'Conectado';
    } else {
        dot.className = 'dot offline';
        text.textContent = 'Desconectado';
    }
}

// Enter to send
document.addEventListener('DOMContentLoaded', function() {
    var input = document.getElementById('chatInput');
    if (input) {
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });
        input.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 80) + 'px';
        });
    }
});

autoLogin();
</script>

</body>
</html>
