<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldLEaf - Pantalla Completa</title>
    <style>
        /* Elimina los márgenes por defecto del navegador y oculta las barras de scroll */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* Fondo negro por si tarda en cargar */
        }

        /* Configura el iframe para ocupar el 100% de la ventana */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block; /* Elimina un pequeño espacio en blanco inferior por defecto */
        }
    </style>
</head>
<body>

    <iframe 
        src="https://ms-mcpe.github.io/#WorldLEaf" 
        title="WorldLEaf"
        allow="fullscreen">
    </iframe>

</body>
</html>
