<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://script.google.com https://docs.google.com https://*.googleusercontent.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; script-src 'self' 'unsafe-inline' https://script.google.com https://*.googleusercontent.com https://*.google.com;">
    <title>Gestionar Chat - WorldLeaf</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif; background: #0a0e17; color: #e0e6f0;
            min-height: 100vh; font-size: clamp(13px, 1.1vw, 15px);
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        header {
            padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
            background: rgba(10,14,23,0.9); backdrop-filter: blur(12px);
            position: sticky; top: 0; z-index: 100;
        }
        .header-content { display: flex; align-items: center; justify-content: space-between; }
        .logo-text { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, #f0e6d0, #c4a87c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

        .login-box {
            max-width: 400px; margin: 80px auto; text-align: center;
        }
        .login-box h1 { font-size: 24px; margin-bottom: 8px; }
        .login-box p { color: rgba(224,230,240,0.5); font-size: 14px; margin-bottom: 24px; }

        .form-group { margin-bottom: 16px; text-align: left; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: rgba(224,230,240,0.6); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
        .form-group input {
            width: 100%; padding: 11px 14px; background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #e0e6f0;
            font-family: 'Inter', sans-serif; font-size: 14px; outline: none;
        }
        .form-group input:focus { border-color: #c4a87c; }

        .btn {
            width: 100%; padding: 12px 28px; background: linear-gradient(135deg, #c4a87c, #a08050);
            color: #0a0e17; border: none; border-radius: 10px; font-family: 'Inter', sans-serif;
            font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.25s;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-sm { padding: 8px 16px; font-size: 12px; width: auto; }
        .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); }

        .message { display: none; padding: 10px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 16px; }
        .message.error { display: block; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #fca5a5; }
        .message.success { display: block; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: #86efac; }

        .chat-admin { display: none; }
        .chat-admin.active { display: block; }

        .admin-layout { display: flex; gap: 20px; margin-top: 20px; height: calc(100vh - 160px); min-height: 400px; }

        .user-list {
            width: 280px; flex-shrink: 0; background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06); border-radius: 14px;
            overflow-y: auto;
        }
        .user-list h3 {
            padding: 16px 18px; font-size: 13px; font-weight: 600;
            color: rgba(224,230,240,0.5); text-transform: uppercase; letter-spacing: 0.4px;
            border-bottom: 1px solid rgba(255,255,255,0.06); position: sticky; top: 0;
            background: #0a0e17; z-index: 1;
        }
        .user-item {
            padding: 12px 18px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.03);
            transition: background 0.15s;
        }
        .user-item:hover { background: rgba(255,255,255,0.04); }
        .user-item.active { background: rgba(196,168,124,0.1); border-left: 3px solid #c4a87c; }
        .user-item .name { font-weight: 600; font-size: 14px; }
        .user-item .preview { font-size: 12px; color: rgba(224,230,240,0.4); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 2px; }
        .user-item .badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 8px; background: #c4a87c; color: #0a0e17; margin-left: 6px; font-weight: 700; }
        .user-item .badge.responded { background: rgba(34,197,94,0.2); color: #86efac; font-weight: 600; }

        .chat-area {
            flex: 1; display: flex; flex-direction: column;
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px; overflow: hidden;
        }
        .chat-area .placeholder {
            margin: auto; text-align: center; color: rgba(224,230,240,0.3);
            padding: 40px;
        }
        .chat-area .placeholder h3 { font-size: 18px; margin-bottom: 8px; }
        .chat-area .placeholder p { font-size: 13px; }

        .conv-header {
            padding: 14px 18px; border-bottom: 1px solid rgba(255,255,255,0.06);
            font-weight: 700; font-size: 14px; display: none; align-items: center; gap: 8px;
        }
        .conv-header.show { display: flex; }

        .conv-messages {
            flex: 1; overflow-y: auto; padding: 14px 16px;
            display: flex; flex-direction: column; gap: 8px;
        }
        .conv-messages .msg {
            max-width: 80%; padding: 10px 14px; border-radius: 14px;
            font-size: 13px; line-height: 1.45; word-wrap: break-word;
        }
        .conv-messages .msg.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #c4a87c, #a08050);
            color: #0a0e17; border-bottom-right-radius: 4px;
        }
        .conv-messages .msg.admin {
            align-self: flex-start;
            background: rgba(255,255,255,0.06); color: #e0e6f0;
            border-bottom-left-radius: 4px;
        }
        .conv-messages .msg .time {
            font-size: 10px; opacity: 0.5; margin-top: 4px; display: block;
        }

        .conv-input-area {
            padding: 10px 12px; border-top: 1px solid rgba(255,255,255,0.06);
            display: none; gap: 8px; align-items: flex-end;
        }
        .conv-input-area.show { display: flex; }
        .conv-input {
            flex: 1; padding: 10px 14px; background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
            color: #e0e6f0; font-family: 'Inter', sans-serif; font-size: 13px;
            outline: none; resize: none; max-height: 80px; line-height: 1.4;
        }
        .conv-input:focus { border-color: #c4a87c; }
        .conv-send {
            width: 38px; height: 38px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, #c4a87c, #a08050);
            color: #0a0e17; cursor: pointer; display: flex; align-items: center;
            justify-content: center; flex-shrink: 0;
        }
        .conv-send:hover { opacity: 0.85; }
        .conv-send:disabled { opacity: 0.3; cursor: not-allowed; }

        .logout-link {
            color: rgba(224,230,240,0.4); cursor: pointer; font-size: 13px;
            text-decoration: underline; transition: color 0.2s;
        }
        .logout-link:hover { color: #ef4444; }

        @media (max-width: 1024px) {
            .container { padding: 16px; }
        }
        @media (max-width: 768px) {
            .admin-layout { flex-direction: column; height: auto; }
            .user-list { width: 100%; max-height: 180px; }
            .chat-area { min-height: 350px; }
            .login-box { margin: 40px auto; padding: 0 16px; }
            .login-box h1 { font-size: 20px; }
        }
        @media (max-width: 480px) {
            .container { padding: 12px; }
            .login-box { margin: 24px auto; }
            .login-box h1 { font-size: 18px; }
            .login-box p { font-size: 13px; }
            .form-group input { font-size: 13px; padding: 10px 12px; }
            .btn { padding: 10px 20px; font-size: 13px; }
            .conv-messages { padding: 10px 12px; }
            .conv-messages .msg { max-width: 90%; font-size: 12px; padding: 8px 12px; }
            .conv-input-area { padding: 8px 10px; }
            .conv-input { font-size: 12px; padding: 8px 12px; }
            .conv-header { font-size: 13px; padding: 10px 14px; }
            .user-list h3 { font-size: 12px; padding: 12px 14px; }
            .user-item { padding: 10px 14px; }
            .user-item .name { font-size: 13px; }
            .user-item .preview { font-size: 11px; }
            header { padding: 12px 0; }
            .logo-text { font-size: 16px; }
            .user-list { max-height: 150px; }
            .chat-area { min-height: 300px; }
        }
        @media (max-width: 360px) {
            .header-content { flex-direction: column; gap: 6px; text-align: center; }
            .conv-messages .msg { max-width: 95%; }
        }
        @media (hover: none) and (pointer: coarse) {
            .user-item { cursor: default; }
            .btn:active { opacity: 0.8; }
        }

        .spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.2); border-top-color: #c4a87c;
            border-radius: 50%; animation: spin 0.6s linear infinite;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <div class="container header-content">
        <div class="logo-text">WorldLeaf <span style="font-weight:300;-webkit-text-fill-color:rgba(224,230,240,0.6)">| Chat</span></div>
        <div id="adminHeader" style="display:none;display:flex;align-items:center;gap:12px">
            <span style="font-size:13px;color:rgba(224,230,240,0.5)" id="adminName"></span>
            <span class="logout-link" onclick="logoutAdmin()">Cerrar sesion</span>
        </div>
    </div>
</header>

<div class="container">
    <!-- LOGIN -->
    <div class="login-box" id="loginBox">
        <h1>Gestionar Chat</h1>
        <p>Inicia sesion con tu cuenta de administrador para gestionar los mensajes.</p>
        <div id="loginMessage" class="message"></div>
        <form id="adminLoginForm">
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" id="loginUser" placeholder="Tu usuario" required maxlength="20">
            </div>
            <div class="form-group">
                <label>Contrasena</label>
                <input type="password" id="loginPass" placeholder="Tu contrasena" required maxlength="20">
            </div>
            <button type="submit" class="btn" id="loginBtn">Ingresar</button>
        </form>
    </div>

    <!-- ADMIN PANEL -->
    <div class="chat-admin" id="adminPanel">
        <div class="admin-layout">
            <div class="user-list" id="userList">
                <h3>Conversaciones</h3>
                <div id="userListContainer"></div>
            </div>
            <div class="chat-area" id="chatArea">
                <div class="placeholder" id="chatPlaceholder">
                    <h3>Selecciona un usuario</h3>
                    <p>Elige una conversacion de la lista para ver y responder mensajes.</p>
                </div>
                <div class="conv-header" id="convHeader">
                    <span>Chat con: <strong id="convUserName"></strong></span>
                </div>
                <div class="conv-messages" id="convMessages"></div>
                <div class="conv-input-area" id="convInputArea">
                    <textarea class="conv-input" id="convInput" placeholder="Escribe tu respuesta..." maxlength="500" rows="1"></textarea>
                    <button class="conv-send" onclick="sendAdminReply()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
var API_URL = 'https://script.google.com/macros/s/AKfycbx7yl9hxkU2MYE6ijNKDZDvLyDkZHI7oBt5LOzGGFn4RDtLoFpXijl07JBoQ3W7KFNk/exec';
var adminUser = localStorage.getItem('wl_admin_user') || '';
var adminPass = localStorage.getItem('wl_admin_pass') || '';
var selectedUser = '';
var allMessages = [];
var refreshTimer = null;

function escHtml(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function jsonp(data) {
    return new Promise(function(resolve, reject) {
        var cb = 'wlc_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
        var params = [];
        for (var key in data) {
            if (data.hasOwnProperty(key)) params.push(encodeURIComponent(key) + '=' + encodeURIComponent(data[key]));
        }
        params.push('callback=' + cb);
        var url = API_URL + '?' + params.join('&');
        window[cb] = function(resp) {
            delete window[cb];
            if (script.parentNode) script.parentNode.removeChild(script);
            resolve(resp);
        };
        var script = document.createElement('script');
        script.src = url;
        script.onerror = function() {
            delete window[cb];
            if (script.parentNode) script.parentNode.removeChild(script);
            reject(new Error('Error de conexion'));
        };
        document.body.appendChild(script);
        setTimeout(function() {
            if (window[cb]) { delete window[cb]; reject(new Error('Tiempo agotado')); }
        }, 15000);
    });
}

function mostrarMsg(el, msg, type) {
    el.textContent = msg;
    el.className = 'message ' + type;
}

function autoLogin() {
    if (!adminUser || !adminPass) return;
    jsonp({ action:'login', user:adminUser, pass:adminPass }).then(function(resp) {
        try {
            var data = typeof resp === 'string' ? JSON.parse(resp) : resp;
            if (data.status === 'LOGIN_OK' && (data.rol === 'Owner' || data.rol === 'Admin')) {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('adminPanel').classList.add('active');
                document.getElementById('adminName').textContent = adminUser;
                document.getElementById('adminHeader').style.display = 'flex';
                loadConversations();
                refreshTimer = setInterval(loadConversations, 3000);
            } else {
                localStorage.removeItem('wl_admin_user');
                localStorage.removeItem('wl_admin_pass');
                adminUser = ''; adminPass = '';
            }
        } catch(e) {
            localStorage.removeItem('wl_admin_user');
            localStorage.removeItem('wl_admin_pass');
            adminUser = ''; adminPass = '';
        }
    }).catch(function() {});
}

// LOGIN
document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var btn = document.getElementById('loginBtn');
    var msg = document.getElementById('loginMessage');
    var user = document.getElementById('loginUser').value.trim();
    var pass = document.getElementById('loginPass').value;
    if (!user || !pass) { mostrarMsg(msg, 'Completa todos los campos.', 'error'); return; }
    btn.disabled = true;
    btn.textContent = 'Verificando...';
    msg.style.display = 'none';

    jsonp({ action:'login', user:user, pass:pass }).then(function(resp) {
        btn.disabled = false;
        btn.textContent = 'Ingresar';
        try {
            var data = typeof resp === 'string' ? JSON.parse(resp) : resp;
            if (data.status === 'LOGIN_OK') {
                if (data.rol !== 'Owner' && data.rol !== 'Admin') {
                    mostrarMsg(msg, 'Acceso no autorizado. Se requiere rol Owner o Admin.', 'error');
                    return;
                }
                adminUser = user;
                adminPass = pass;
                localStorage.setItem('wl_admin_user', user);
                localStorage.setItem('wl_admin_pass', pass);
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('adminPanel').classList.add('active');
                document.getElementById('adminName').textContent = user;
                document.getElementById('adminHeader').style.display = 'flex';
                loadConversations();
                refreshTimer = setInterval(loadConversations, 3000);
            } else if (data.status === 'LOGIN_BLOCKED') {
                mostrarMsg(msg, 'Tu cuenta ha sido suspendida.', 'error');
            } else {
                mostrarMsg(msg, 'Usuario o contrasena incorrectos.', 'error');
            }
        } catch(e) { mostrarMsg(msg, 'Error al procesar respuesta.', 'error'); }
    }).catch(function() {
        btn.disabled = false;
        btn.textContent = 'Ingresar';
        mostrarMsg(msg, 'Error de conexion.', 'error');
    });
});

function logoutAdmin() {
    if (refreshTimer) clearInterval(refreshTimer);
    adminUser = ''; adminPass = ''; selectedUser = '';
    localStorage.removeItem('wl_admin_user');
    localStorage.removeItem('wl_admin_pass');
    document.getElementById('adminPanel').classList.remove('active');
    document.getElementById('loginBox').style.display = 'block';
    document.getElementById('adminHeader').style.display = 'none';
    document.getElementById('adminLoginForm').reset();
}

function loadConversations() {
    if (!adminUser || !adminPass) return;
    jsonp({ action:'getAdminMessages', adminUser:adminUser, adminPass:adminPass }).then(function(resp) {
        try {
            var data = typeof resp === 'string' ? JSON.parse(resp) : resp;
            if (data.status !== 'OK') return;
            allMessages = data.messages || [];
            renderUserList();
            if (selectedUser) renderConversation(selectedUser);
        } catch(e) {}
    }).catch(function() {});
}

function getUsersFromMessages(msgs) {
    var users = {};
    for (var i = 0; i < msgs.length; i++) {
        var u = msgs[i].fromUser;
        if (u && u !== 'WorldLeaf') { if (!users[u]) users[u] = 0; users[u]++; }
        u = msgs[i].toUser;
        if (u && u !== 'WorldLeaf') { if (!users[u]) users[u] = 0; users[u]++; }
    }
    var sorted = Object.keys(users).sort(function(a, b) { return users[b] - users[a]; });
    return sorted;
}

function renderUserList() {
    var users = getUsersFromMessages(allMessages);
    var container = document.getElementById('userListContainer');
    var html = '';
    for (var i = 0; i < users.length; i++) {
        var lastMsg = '';
        for (var j = allMessages.length - 1; j >= 0; j--) {
            if (allMessages[j].fromUser === users[i] || allMessages[j].toUser === users[i]) {
                lastMsg = allMessages[j].message; break;
            }
        }
        var count = 0;
        for (var j = 0; j < allMessages.length; j++) {
            if (allMessages[j].fromUser === users[i] && allMessages[j].toUser === 'WorldLeaf') count++;
        }
        var hasReply = false;
        for (var j = 0; j < allMessages.length; j++) {
            if (allMessages[j].fromUser === 'WorldLeaf' && allMessages[j].toUser === users[i]) {
                hasReply = true; break;
            }
        }
        var activeClass = selectedUser === users[i] ? 'active' : '';
        var badge = '';
        if (hasReply) {
            badge = '<span class="badge responded">Respondido</span>';
        } else if (count > 0) {
            badge = '<span class="badge">' + count + '</span>';
        }
        html += '<div class="user-item ' + activeClass + '" onclick="selectUser(\'' + users[i].replace(/'/g, "\\'") + '\')">' +
            '<div class="name">' + escHtml(users[i]) + badge + '</div>' +
            '<div class="preview">' + escHtml(lastMsg.slice(0, 60)) + '</div></div>';
    }
    if (users.length === 0) {
        html = '<div style="padding:20px;text-align:center;color:rgba(224,230,240,0.3);font-size:13px;">No hay conversaciones aun.</div>';
    }
    container.innerHTML = html;
}

function selectUser(username) {
    selectedUser = username;
    renderUserList();
    renderConversation(username);
    document.getElementById('chatPlaceholder').style.display = 'none';
    document.getElementById('convHeader').classList.add('show');
    document.getElementById('convInputArea').classList.add('show');
    document.getElementById('convUserName').textContent = username;
    document.getElementById('convInput').focus();
}

function renderConversation(username) {
    var container = document.getElementById('convMessages');
    var msgs = allMessages.filter(function(m) {
        return m.fromUser === username || m.toUser === username;
    });
    var html = '';
    for (var i = 0; i < msgs.length; i++) {
        var m = msgs[i];
        var isUser = m.fromUser === username;
        var fromName = isUser ? username : 'WorldLeaf';
        var time = m.timestamp ? new Date(m.timestamp).toLocaleString() : '';
        html += '<div class="msg ' + (isUser ? 'user' : 'admin') + '">' +
            '<strong>' + escHtml(fromName) + '</strong><br>' +
            escHtml(m.message) +
            '<span class="time">' + time + '</span></div>';
    }
    if (html === '') html = '<div style="text-align:center;color:rgba(224,230,240,0.3);font-size:13px;margin:20px;">No hay mensajes en esta conversacion.</div>';
    container.innerHTML = html;
    container.scrollTop = container.scrollHeight;
}

function sendAdminReply() {
    if (!selectedUser) return;
    var input = document.getElementById('convInput');
    var msg = input.value.trim();
    if (!msg) return;
    var btn = document.querySelector('.conv-send');
    btn.disabled = true;
    jsonp({ action:'sendMessage', user:'WorldLeaf', toUser:selectedUser, message:msg }).then(function(resp) {
        btn.disabled = false;
        try {
            var data = typeof resp === 'string' ? JSON.parse(resp) : resp;
            if (data.status === 'OK') {
                input.value = '';
                input.style.height = 'auto';
                loadConversations();
            } else { alert('Error al enviar.'); }
        } catch(e) { alert('Error al enviar.'); }
    }).catch(function() {
        btn.disabled = false;
        alert('Error de conexion.');
    });
}

// Enter to send
document.addEventListener('DOMContentLoaded', function() {
    var input = document.getElementById('convInput');
    if (input) {
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendAdminReply(); }
        });
        input.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 80) + 'px';
        });
    }
});

// Auto-login on load
autoLogin();
</script>

</body>
</html>
